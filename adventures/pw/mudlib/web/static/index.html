<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSE: Programming World (編程冒險)</title>
    <meta name="description" content="FSE 編程冒險：透過拖曳積木學習程式設計概念，解鎖隱藏的程式世界。">
    <!-- 載入 Google Blockly CDN -->
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- PW Blockly 通訊適配器 -->
    <script src="/js/pw-blockly-adapter.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: #0f1015;
            color: #eceef4;
            font-family: 'Consolas', monospace, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background: #181922;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #3b3d54;
        }
        h1 { margin: 0; font-size: 18px; color: #4fc3f7; }
        #wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        /* 左分欄：FSE 文字與終端 */
        #left-panel {
            width: 450px;
            background: #12131a;
            border-right: 2px solid #3b3d54;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }
        /* 記憶體使用條 */
        .status-container {
            margin-top: 15px;
            padding: 10px;
            background: #181922;
            border-radius: 6px;
            border: 1px solid #3b3d54;
        }
        .status-bar-bg {
            background: #3b3d54;
            border-radius: 4px;
            height: 14px;
            width: 100%;
            overflow: hidden;
            margin-top: 5px;
            position: relative;
        }
        .status-bar-fill {
            background: #81c784;
            height: 100%;
            width: 100%;
            transition: width 0.3s, background 0.3s;
        }
        /* 右分欄：Blockly 工作區 + 程式碼預覽 */
        #right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        #blocklyArea {
            flex: 2;
            position: relative;
            background: #181922;
        }
        #blocklyDiv {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }
        #code-preview-panel {
            flex: 1;
            background: #1e1e2e;
            border-top: 2px solid #3b3d54;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        #code-preview-panel h3 { margin: 0 0 10px 0; font-size: 14px; color: #cba6f7; }
        #code-output {
            flex: 1;
            background: #11111b;
            padding: 10px;
            border-radius: 6px;
            color: #a6e3a1;
            font-size: 14px;
            overflow-y: auto;
            white-space: pre-wrap;
            border: 1px solid #313244;
        }
        
        .terminal-container {
            flex: 1;
            background: #090a0f;
            border: 1px solid #3b3d54;
            border-radius: 6px;
            padding: 15px;
            overflow-y: auto;
            margin-top: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .term-line { margin: 6px 0; line-height: 1.5; font-size: 15px; }
        .green-txt { color: #81c784; }
        .red-txt { color: #e57373; }
        .blue-txt { color: #89b4fa; }
        .yellow-txt { color: #f9e2af; }
        
        .btn-run {
            background: #a6e3a1;
            color: #11111b;
            border: none;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .btn-run:hover { background: #94e2d5; transform: scale(1.05); }
        .btn-run:active { transform: scale(0.95); }

        /* Blockly 工具區/飛出面板對比度特化 override */
        .blocklyToolboxDiv {
            background-color: #11111b !important;
            border-right: 3px solid #313244 !important;
            padding: 12px 8px !important;
        }
        .blocklyTreeLabel {
            font-size: 15px !important;
            font-weight: 800 !important;
            letter-spacing: 0.8px;
        }
        .blocklyToolboxCategory,
        .blocklyToolboxCategory *,
        .blocklyTreeRow,
        .blocklyTreeRow * {
            opacity: 1.0 !important;
        }
        
        .blocklyToolboxCategory,
        .blocklyTreeRow {
            margin-bottom: 12px !important;
            padding: 8px 12px !important;
            border-radius: 6px !important;
            box-shadow: none !important;
            transition: all 0.2s ease-in-out;
            border: 2px solid #313244 !important;
            height: auto !important;
            min-height: 40px !important;
            display: flex !important;
            align-items: center !important;
        }
        
        .blocklyToolboxCategory:not(.blocklyToolboxCategorySelected),
        .blocklyTreeRow:not(.blocklyTreeSelected) {
            background-color: #1e1e2e !important; 
            border-color: #ffd54f !important;
        }
        .blocklyToolboxCategory:not(.blocklyToolboxCategorySelected) .blocklyTreeLabel,
        .blocklyTreeRow:not(.blocklyTreeSelected) .blocklyTreeLabel {
            color: #ffd54f !important;
        }
        
        .blocklyToolboxCategory:not(.blocklyToolboxCategorySelected):hover,
        .blocklyTreeRow:not(.blocklyTreeSelected):hover {
            background-color: #252538 !important;
            border-color: #89b4fa !important;
        }
        
        .blocklyToolboxCategorySelected,
        .blocklyTreeSelected {
            background-color: #89b4fa !important; 
            border-color: #89b4fa !important;
            box-shadow: none !important;
        }
        .blocklyToolboxCategorySelected .blocklyTreeLabel,
        .blocklyTreeSelected .blocklyTreeLabel {
            color: #11111b !important;
        }
        .blocklyFlyoutBackground {
            fill: #16161e !important;
            fill-opacity: 0.98 !important;
        }
        .blocklyFlyoutLabelText {
            fill: #ffffff !important;
            font-weight: bold !important;
            font-size: 15px !important;
        }
        
        .blocklyText {
            fill: #ffffff !important; 
            font-weight: 800 !important;
            font-size: 14px !important;
            text-shadow: 0px 1px 2px rgba(0, 0, 0, 0.9);
        }
        
        .blocklyHtmlInput {
            background-color: #1e1e2e !important;
            color: #ffffff !important;
            border: 2px solid #7aa2f7 !important;
            font-weight: bold !important;
        }
        .blocklyDropdownText {
            fill: #ffffff !important;
            font-weight: bold !important;
        }
        .blocklyNonEditableText>text {
            fill: #ffffff !important;
            font-weight: bold !important;
        }
    </style>
</head>
<body>

    <header>
        <h1>💻 FSE: Programming World (編程世界)</h1>
        <button id="btn-run" class="btn-run">▶ 執行程式 (Run)</button>
    </header>

    <div id="wrapper">
        <div id="left-panel">
            <h3 class="blue-txt">📍 當前位置：無窮迴圈沼澤</h3>
            <div id="site-desc" style="font-size: 14px; color: #a6adc8; line-height: 1.6;">
                這裡堆滿了永遠停不下來的廢棄進程，周圍飄散著發熱的記憶體碎屑。
            </div>
            
            <div class="status-container">
                <div style="font-size: 12px; color: #bac2de;">系統記憶體 (Memory)</div>
                <div class="status-bar-bg">
                    <div id="memory-bar" class="status-bar-fill"></div>
                </div>
            </div>

            <div class="terminal-container" id="terminal">
                <div class="term-line yellow-txt">⚡ 系統就緒：請在右側組裝 Blockly 積木。</div>
            </div>
        </div>

        <div id="right-panel">
            <div id="blocklyArea">
                <div id="blocklyDiv"></div>
            </div>
            <div id="code-preview-panel">
                <h3>📝 偽代碼預覽 (Pseudo Code)</h3>
                <div id="code-output">// 拖曳積木來產生程式碼...</div>
            </div>
        </div>
    </div>

    <script>
        // ─────────────────────────────────────────────────────────
        // 1. 積木類型定義（前端宣告，與後端 block_registry 對應）
        // ─────────────────────────────────────────────────────────
        Blockly.Blocks['controls_loop'] = {
            init: function() {
                this.appendDummyInput().appendField("無條件重複 (Loop)");
                this.appendStatementInput("DO").appendField("執行");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour(120);
                this.setTooltip("無條件重複執行");
            }
        };

        Blockly.Blocks['controls_break'] = {
            init: function() {
                this.appendDummyInput().appendField("中斷 (Break)");
                this.setPreviousStatement(true, null);
                this.setColour(0);
                this.setTooltip("強制跳出迴圈");
            }
        };

        Blockly.Blocks['variables_count'] = {
            init: function() {
                this.appendDummyInput().appendField("變數 count");
                this.setOutput(true, "Number");
                this.setColour(230);
            }
        };

        Blockly.Blocks['compare_less_100'] = {
            init: function() {
                this.appendValueInput("LEFT")
                    .setCheck("Number");
                this.appendDummyInput().appendField("< 100");
                this.setOutput(true, "Boolean");
                this.setColour(210);
            }
        };

        Blockly.Blocks['action_increment'] = {
            init: function() {
                this.appendDummyInput().appendField("count 累加 (count++)");
                this.setOutput(true, "Action");
                this.setColour(65);
            }
        };

        Blockly.Blocks['action_assignment'] = {
            init: function() {
                this.appendDummyInput().appendField("設定")
                    .appendField(new Blockly.FieldTextInput("x"), "VAR")
                    .appendField("為")
                    .appendField(new Blockly.FieldNumber(42), "VALUE");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour(290);
                this.setTooltip("將值賦予變數");
            }
        };

        // ─────────────────────────────────────────────────────────
        // 2. 初始化 Blockly 工作區（使用最小 toolbox，後端會即時更新）
        // ─────────────────────────────────────────────────────────
        var initialToolbox = '<xml>' +
            '  <category name="控制流" colour="#5b80a5">' +
            '    <block type="controls_loop"></block>' +
            '  </category>' +
            '</xml>';

        var workspace = Blockly.inject('blocklyDiv', {
            toolbox: initialToolbox,
            grid: { spacing: 20, length: 3, colour: '#313244', snap: true },
            zoom: { controls: true, wheel: true, startScale: 1.0, maxScale: 3, minScale: 0.3, scaleSpeed: 1.2 },
            theme: Blockly.Themes.Dark
        });

        // ─────────────────────────────────────────────────────────
        // 3. AST 轉換（Blockly → FSE 標準 AST）
        // ─────────────────────────────────────────────────────────
        function blockToAST(block) {
            if (!block) return null;
            
            if (block.type === 'controls_loop') {
                var condBlock = block.getInputTargetBlock('CONDITION');
                var actBlock = block.getInputTargetBlock('ACT');
                var doBlock = block.getInputTargetBlock('DO');
                
                var ast = {
                    type: "Loop",
                    condition: condBlock ? blockToAST(condBlock) : null,
                    act: actBlock ? blockToAST(actBlock) : null,
                    body: []
                };
                
                var current = doBlock;
                var hasBreak = 0;
                while (current) {
                    var childAST = blockToAST(current);
                    if (childAST) {
                        ast.body.push(childAST);
                        if (childAST.type === "Break" || childAST.has_break === 1) {
                            hasBreak = 1;
                        }
                    }
                    current = current.getNextBlock();
                }
                ast.has_break = hasBreak;
                return ast;
            } else if (block.type === 'controls_break') {
                return { type: "Break" };
            } else if (block.type === 'variables_count') {
                return "count";
            } else if (block.type === 'compare_less_100') {
                var leftBlock = block.getInputTargetBlock('LEFT');
                var leftVal = leftBlock ? blockToAST(leftBlock) : "?";
                return leftVal + " < 100";
            } else if (block.type === 'action_increment') {
                return "count++";
            } else if (block.type === 'action_assignment') {
                return {
                    type: "Assignment",
                    var_name: block.getFieldValue('VAR'),
                    value: parseInt(block.getFieldValue('VALUE'), 10)
                };
            }
            return null;
        }

        // ─────────────────────────────────────────────────────────
        // 4. AST → 偽代碼（Python-like）
        // ─────────────────────────────────────────────────────────
        function astToPython(ast, indent) {
            if (!ast) return "";
            var res = "";
            if (ast.type === "Loop") {
                var cond = ast.condition || "True";
                res += indent + "while " + cond + ":\n";
                
                var hasStatements = false;
                if (ast.body && ast.body.length > 0) {
                    ast.body.forEach(function(child) {
                        res += astToPython(child, indent + "    ");
                        hasStatements = true;
                    });
                }
                if (ast.act) {
                    res += indent + "    " + ast.act + "\n";
                    hasStatements = true;
                }
                if (!hasStatements) {
                    res += indent + "    pass\n";
                }
            } else if (ast.type === "Break") {
                res += indent + "break\n";
            } else if (ast.type === "Assignment") {
                res += indent + ast.var_name + " = " + ast.value + "\n";
            }
            return res;
        }

        function updatePseudoCode() {
            var topBlocks = workspace.getTopBlocks(true);
            var code = "";
            for (var i = 0; i < topBlocks.length; i++) {
                var ast = blockToAST(topBlocks[i]);
                if (ast) {
                    code += astToPython(ast, "") + "\n";
                }
            }
            if (code.trim() === "") code = "// 拖曳積木來產生程式碼...";
            document.getElementById('code-output').innerText = code;
        }

        workspace.addChangeListener(updatePseudoCode);

        // ─────────────────────────────────────────────────────────
        // 5. UI 工具函式
        // ─────────────────────────────────────────────────────────
        var memoryLevel = 100;

        function updateMemoryBar(level) {
            memoryLevel = Math.max(0, Math.min(100, level));
            var bar = document.getElementById('memory-bar');
            bar.style.width = memoryLevel + "%";
            if (memoryLevel < 30) {
                bar.style.background = "#e57373"; 
            } else if (memoryLevel < 60) {
                bar.style.background = "#f9e2af"; 
            } else {
                bar.style.background = "#a6e3a1"; 
            }
        }

        function logToTerminal(text, cssClass) {
            var term = document.getElementById("terminal");
            var line = document.createElement("div");
            line.className = "term-line " + (cssClass || "");
            line.innerText = text;
            term.appendChild(line);
            term.scrollTop = term.scrollHeight;
        }

        function triggerUnlockEffect() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#f9e2af', '#89b4fa', '#a6e3a1'] });
        }
        function triggerSuccessEffect() {
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.4 } });
        }
        function shakeScreen() {
            var wrap = document.getElementById('wrapper');
            wrap.style.transform = 'translate(10px, 10px)';
            setTimeout(() => wrap.style.transform = 'translate(-10px, -10px)', 50);
            setTimeout(() => wrap.style.transform = 'translate(10px, -10px)', 100);
            setTimeout(() => wrap.style.transform = 'translate(-10px, 10px)', 150);
            setTimeout(() => wrap.style.transform = 'translate(0, 0)', 200);
        }

        // ─────────────────────────────────────────────────────────
        // 6. 初始化 PWBlocklyAdapter（後端主導通訊）
        // ─────────────────────────────────────────────────────────
        var adapter = new PWBlocklyAdapter(workspace, {
            onLog: function(text, cssClass) {
                logToTerminal(text, cssClass);
            },
            onMemoryUpdate: function(level) {
                updateMemoryBar(level);
            },
            onWorldState: function(payload) {
                // 可依 payload.current_node 更新場景名稱等
                console.log("[WorldState]", payload);
            },
            onUnlock: function() {
                triggerUnlockEffect();
            },
            onExecutionResult: function(success) {
                if (success) {
                    triggerSuccessEffect();
                    updateMemoryBar(100);
                } else {
                    shakeScreen();
                    updateMemoryBar(memoryLevel - 40);
                }
            }
        });

        var wsUrl = "ws://" + window.location.host + "/ws";
        adapter.connect(wsUrl);

        // ─────────────────────────────────────────────────────────
        // 7. 執行按鈕：透過 adapter 送出標準 EXECUTE 訊息
        // ─────────────────────────────────────────────────────────
        document.getElementById("btn-run").addEventListener("click", function() {
            var topBlocks = workspace.getTopBlocks(true);
            if (topBlocks.length === 0) {
                logToTerminal("⚠️ 請先拖曳積木到工作區！", "yellow-txt");
                return;
            }

            var ast = blockToAST(topBlocks[0]);
            if (!ast) return;

            adapter.execute(ast);
        });
    </script>
</body>
</html>
