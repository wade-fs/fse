<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <title>FSE: Programming World (編程冒險)</title>
    <!-- 載入 Google Blockly CDN -->
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: #0f1015;
            color: #eceef4;
            font-family: 'Consolas', monospace, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background: #181922;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #3b3d54;
        }
        h1 { margin: 0; font-size: 18px; color: #4fc3f7; }
        #wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        /* 左分欄：FSE 文字與終端 */
        #left-panel {
            width: 500px;
            background: #12131a;
            border-right: 2px solid #3b3d54;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }
        /* 右分欄：Blockly 工作區 */
        #right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        #blocklyArea {
            flex: 1;
            position: relative;
            background: #181922;
        }
        #blocklyDiv {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }
        .terminal-container {
            flex: 1;
            background: #090a0f;
            border: 1px solid #3b3d54;
            border-radius: 6px;
            padding: 15px;
            overflow-y: auto;
            margin-top: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .term-line { margin: 6px 0; line-height: 1.5; font-size: 15px; }
        .green-txt { color: #81c784; }
        .red-txt { color: #e57373; }
        .blue-txt { color: #64b5f6; }
        .yellow-txt { color: #ffd54f; }
        
        /* 綠色運行按鈕 (Scratch 風格) */
        .btn-run {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-run:hover { background: #45a049; }
    </style>
</head>
<body>

    <header>
        <h1>💻 FSE: Programming World (編程世界最小閉環)</h1>
        <button id="btn-run" class="btn-run">▶ 執行程式 (Run Project)</button>
    </header>

    <div id="wrapper">
        <!-- 左側：FSE 探索與 Console 輸出 -->
        <div id="left-panel">
            <h3 class="blue-txt">📍 當前位置：無窮迴圈沼澤</h3>
            <div id="site-desc" style="font-size: 14px; color: #aaa; line-height: 1.6;">
                這裡堆滿了永遠停不下來的廢棄進程，周圍飄散著發熱的記憶體碎屑。
            </div>
            
            <div class="terminal-container" id="terminal">
                <div class="term-line yellow-txt">⚡ 系統就緒：請在右側組裝 Blockly 積木以修復無窮迴圈控制流。</div>
            </div>
        </div>

        <!-- 右側：Blockly 工作區 -->
        <div id="right-panel">
            <div id="blocklyArea">
                <div id="blocklyDiv"></div>
            </div>
        </div>
    </div>

    <!-- Blockly Toolbox 定義 -->
    <xml id="toolbox" style="display: none">
        <category name="控制流" colour="#5b80a5">
            <block type="controls_loop"></block>
            <!-- 條件式顯示層 (Reveal) 會在解鎖 loop_termination 後注入此積木 -->
            <block type="controls_break" id="break_block_xml" style="display: none;"></block>
        </category>
    </xml>

    <script>
        // 1. 自訂一個 FSE 通用 Loop 積木
        Blockly.Blocks['controls_loop'] = {
            init: function() {
                this.appendDummyInput()
                    .appendField("重複執行 (Loop)");
                this.appendStatementInput("DO")
                    .appendField("執行");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour(120);
                this.setTooltip("無條件重複執行");
            }
        };

        // 2. 自訂一個中斷積木
        Blockly.Blocks['controls_break'] = {
            init: function() {
                this.appendDummyInput()
                    .appendField("中斷 (Break)");
                this.setPreviousStatement(true, null);
                this.setColour(0);
                this.setTooltip("強制跳出迴圈");
            }
        };

        // 3. 初始化 Workspace (預設工具箱 XML 字串)
        var defaultToolbox = '<xml id="toolbox" style="display: none">' +
            '  <category name="控制流" colour="#5b80a5">' +
            '    <block type="controls_loop"></block>' +
            '  </category>' +
            '</xml>';

        var workspace = Blockly.inject('blocklyDiv', {
            toolbox: defaultToolbox,
            grid: { spacing: 20, length: 3, colour: '#ccc', snap: true },
            zoom: { controls: true, wheel: true, startScale: 1.0, maxScale: 3, minScale: 0.3, scaleSpeed: 1.2 }
        });

        // 4. WebSocket 通訊
        var wsUrl = "ws://" + window.location.host + "/ws";
        var socket = new WebSocket(wsUrl);
        var hasBreakUnlocked = false; // 🚀 新增：防止重複彈出解鎖提示的狀態鎖

        socket.onopen = function() {
            logToTerminal("🌐 已成功連接至 FSE 核心虛擬機。", "green-txt");
            logToTerminal("");
            logToTerminal("👉 [新手任務指引]：請在右側積木區拖出 [重複執行 (Loop)] 積木，放開後點擊上方綠色的「▶ 執行程式」按鈕，看看會發生什麼事！", "yellow-txt");
        };

        socket.onmessage = function(event) {
            var msg = JSON.parse(event.data);
            if (msg.type === "mud_text" || msg.type === "output" || msg.type === "welcome") {
                var payload = msg.payload || "";
                
                // 檢查是否為特殊工具箱更新標籤
                if (payload.indexOf("__TOOLBOX__") === 0) {
                    var yamlStr = payload.substring(11);
                    try {
                        if (yamlStr.indexOf("break_block") !== -1) {
                            // 🚀 只有在第一次解鎖時，才印出提示並更新
                            if (!hasBreakUnlocked) {
                                hasBreakUnlocked = true;
                                logToTerminal("✨ [概念領悟] 你發現了「迴圈的盡頭」！原來重複執行的迴圈需要一個終止中斷條件，否則電腦會永遠執行下去直到崩潰卡死。", "yellow-txt");
                                logToTerminal("🛠️ [工具箱更新] 你的 Blockly 積木庫已新增 [中斷 (Break)] 積木！", "green-txt");
                                
                                // 動態重繪 XML 工具箱，注入中斷積木
                                var upgradedToolbox = '<xml>' +
                                    '  <category name="控制流" colour="#5b80a5">' +
                                    '    <block type="controls_loop"></block>' +
                                    '    <block type="controls_break"></block>' + // 注入
                                    '  </category>' +
                                    '</xml>';
                                workspace.updateToolbox(upgradedToolbox);
                            }
                        }
                    } catch(e) {
                        console.error("Toolbox parse error", e);
                    }
                } else if (payload !== "") {
                    // 清理 LPC ANSI 顏色代碼 與 $TAG$ MUD 標記，讓網頁 Console 更乾淨
                    var cleanText = payload.replace(/\u001b\[\d+m/g, "");
                    cleanText = cleanText.replace(/\$\w+\$/g, ""); // 清理 $HIG$, $NOR$ 等標籤
                    
                    // 根據文字關鍵字自訂顏色
                    if (cleanText.indexOf("🎉") !== -1 || cleanText.indexOf("成功") !== -1) {
                        logToTerminal(cleanText, "green-txt");
                    } else if (cleanText.indexOf("💥") !== -1 || cleanText.indexOf("失敗") !== -1 || cleanText.indexOf("卡死") !== -1) {
                        logToTerminal(cleanText, "red-txt");
                    } else {
                        logToTerminal(cleanText, "blue-txt");
                    }
                }
            }
        };

        function logToTerminal(text, className) {
            var term = document.getElementById("terminal");
            var line = document.createElement("div");
            line.className = "term-line " + (className || "");
            line.innerText = text;
            term.appendChild(line);
            term.scrollTop = term.scrollHeight;
        }

        // 5. 點擊「執行程式」
        document.getElementById("btn-run").addEventListener("click", function() {
            logToTerminal("▶ 正在傳送積木邏輯至虛擬機執行...", "blue-txt");
            
            // 簡單生成 AST 語意元組
            var blocks = workspace.getAllBlocks(false);
            var ast = { type: "Unknown" };
            var hasBreak = false;

            for (var i = 0; i < blocks.length; i++) {
                if (blocks[i].type === "controls_loop") {
                    ast.type = "Loop";
                }
                if (blocks[i].type === "controls_break") {
                    hasBreak = true;
                }
            }
            ast.has_break = hasBreak;

            // 送出指令，封裝為 cmd 格式以便 Go 端直接轉發給 LPC VM 的 execute 指令
            socket.send(JSON.stringify({
                type: "cmd",
                payload: "execute " + JSON.stringify({
                    type: ast.type,
                    has_break: hasBreak ? 1 : 0 // 傳送明確的 1 或 0
                })
            }));
        });
    </script>
</body>
</html>
