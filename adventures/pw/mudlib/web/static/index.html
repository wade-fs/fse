<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <title>FSE: Programming World (編程冒險)</title>
    <!-- 載入 Google Blockly CDN -->
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: #0f1015;
            color: #eceef4;
            font-family: 'Consolas', monospace, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background: #181922;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #3b3d54;
        }
        h1 { margin: 0; font-size: 18px; color: #4fc3f7; }
        #wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        /* 左分欄：FSE 文字與終端 */
        #left-panel {
            width: 450px;
            background: #12131a;
            border-right: 2px solid #3b3d54;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }
        /* 記憶體使用條 */
        .status-container {
            margin-top: 15px;
            padding: 10px;
            background: #181922;
            border-radius: 6px;
            border: 1px solid #3b3d54;
        }
        .status-bar-bg {
            background: #3b3d54;
            border-radius: 4px;
            height: 14px;
            width: 100%;
            overflow: hidden;
            margin-top: 5px;
            position: relative;
        }
        .status-bar-fill {
            background: #81c784;
            height: 100%;
            width: 100%;
            transition: width 0.3s, background 0.3s;
        }
        /* 右分欄：Blockly 工作區 + 程式碼預覽 */
        #right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        #blocklyArea {
            flex: 2;
            position: relative;
            background: #181922;
        }
        #blocklyDiv {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }
        #code-preview-panel {
            flex: 1;
            background: #1e1e2e;
            border-top: 2px solid #3b3d54;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        #code-preview-panel h3 { margin: 0 0 10px 0; font-size: 14px; color: #cba6f7; }
        #code-output {
            flex: 1;
            background: #11111b;
            padding: 10px;
            border-radius: 6px;
            color: #a6e3a1;
            font-size: 14px;
            overflow-y: auto;
            white-space: pre-wrap;
            border: 1px solid #313244;
        }
        
        .terminal-container {
            flex: 1;
            background: #090a0f;
            border: 1px solid #3b3d54;
            border-radius: 6px;
            padding: 15px;
            overflow-y: auto;
            margin-top: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .term-line { margin: 6px 0; line-height: 1.5; font-size: 15px; }
        .green-txt { color: #81c784; }
        .red-txt { color: #e57373; }
        .blue-txt { color: #89b4fa; }
        .yellow-txt { color: #f9e2af; }
        
        .btn-run {
            background: #a6e3a1;
            color: #11111b;
            border: none;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .btn-run:hover { background: #94e2d5; transform: scale(1.05); }
        .btn-run:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <header>
        <h1>💻 FSE: Programming World (編程世界)</h1>
        <button id="btn-run" class="btn-run">▶ 執行程式 (Run)</button>
    </header>

    <div id="wrapper">
        <div id="left-panel">
            <h3 class="blue-txt">📍 當前位置：無窮迴圈沼澤</h3>
            <div id="site-desc" style="font-size: 14px; color: #a6adc8; line-height: 1.6;">
                這裡堆滿了永遠停不下來的廢棄進程，周圍飄散著發熱的記憶體碎屑。
            </div>
            
            <div class="status-container">
                <div style="font-size: 12px; color: #bac2de;">系統記憶體 (Memory)</div>
                <div class="status-bar-bg">
                    <div id="memory-bar" class="status-bar-fill"></div>
                </div>
            </div>

            <div class="terminal-container" id="terminal">
                <div class="term-line yellow-txt">⚡ 系統就緒：請在右側組裝 Blockly 積木。</div>
            </div>
        </div>

        <div id="right-panel">
            <div id="blocklyArea">
                <div id="blocklyDiv"></div>
            </div>
            <div id="code-preview-panel">
                <h3>📝 偽代碼預覽 (Pseudo Code)</h3>
                <div id="code-output">// 拖曳積木來產生程式碼...</div>
            </div>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="控制流" colour="#5b80a5">
            <block type="controls_loop"></block>
            <!-- 隱藏的中斷積木 -->
            <block type="controls_break" id="break_block_xml" style="display: none;"></block>
        </category>
        <category name="變數與運算" colour="#a55b80">
            <block type="variables_count"></block>
            <block type="compare_less_100"></block>
            <block type="action_increment"></block>
        </category>
    </xml>

    <script>
        Blockly.Blocks['controls_loop'] = {
            init: function() {
                this.appendDummyInput().appendField("重複執行 (Loop)");
                this.appendValueInput("CONDITION")
                    .setCheck("Boolean")
                    .appendField("條件");
                this.appendValueInput("ACT")
                    .setCheck("Action")
                    .appendField("每步執行");
                this.appendStatementInput("DO").appendField("執行");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour(120);
                this.setTooltip("無條件重複執行");
            }
        };

        Blockly.Blocks['controls_break'] = {
            init: function() {
                this.appendDummyInput().appendField("中斷 (Break)");
                this.setPreviousStatement(true, null);
                this.setColour(0);
                this.setTooltip("強制跳出迴圈");
            }
        };

        Blockly.Blocks['variables_count'] = {
            init: function() {
                this.appendDummyInput().appendField("變數 count");
                this.setOutput(true, "Number");
                this.setColour(230);
            }
        };

        Blockly.Blocks['compare_less_100'] = {
            init: function() {
                this.appendValueInput("LEFT")
                    .setCheck("Number");
                this.appendDummyInput().appendField("< 100");
                this.setOutput(true, "Boolean");
                this.setColour(210);
            }
        };

        Blockly.Blocks['action_increment'] = {
            init: function() {
                this.appendDummyInput().appendField("count 累加 (count++)");
                this.setOutput(true, "Action");
                this.setColour(65);
            }
        };

        var defaultToolbox = '<xml id="toolbox" style="display: none">' +
            '  <category name="控制流" colour="#5b80a5">' +
            '    <block type="controls_loop"></block>' +
            '  </category>' +
            '  <category name="變數與運算" colour="#a55b80">' +
            '    <block type="variables_count"></block>' +
            '    <block type="compare_less_100"></block>' +
            '    <block type="action_increment"></block>' +
            '  </category>' +
            '</xml>';

        var workspace = Blockly.inject('blocklyDiv', {
            toolbox: defaultToolbox,
            grid: { spacing: 20, length: 3, colour: '#313244', snap: true },
            zoom: { controls: true, wheel: true, startScale: 1.0, maxScale: 3, minScale: 0.3, scaleSpeed: 1.2 },
            theme: Blockly.Themes.Dark
        });

        // 遞迴將 Blockly Blocks 轉成 FSE 標準 AST
        function blockToAST(block) {
            if (!block) return null;
            
            if (block.type === 'controls_loop') {
                var condBlock = block.getInputTargetBlock('CONDITION');
                var actBlock = block.getInputTargetBlock('ACT');
                var doBlock = block.getInputTargetBlock('DO');
                
                var ast = {
                    type: "Loop",
                    condition: condBlock ? blockToAST(condBlock) : null,
                    act: actBlock ? blockToAST(actBlock) : null,
                    body: []
                };
                
                var current = doBlock;
                var hasBreak = 0;
                while (current) {
                    var childAST = blockToAST(current);
                    if (childAST) {
                        ast.body.push(childAST);
                        if (childAST.type === "Break" || childAST.has_break === 1) {
                            hasBreak = 1;
                        }
                    }
                    current = current.getNextBlock();
                }
                ast.has_break = hasBreak;
                return ast;
            } else if (block.type === 'controls_break') {
                return { type: "Break" };
            } else if (block.type === 'variables_count') {
                return "count";
            } else if (block.type === 'compare_less_100') {
                var leftBlock = block.getInputTargetBlock('LEFT');
                var leftVal = leftBlock ? blockToAST(leftBlock) : "?";
                return leftVal + " < 100";
            } else if (block.type === 'action_increment') {
                return "count++";
            }
            return null;
        }

        // 將 AST 轉成 Python-like 偽碼
        function astToPython(ast, indent) {
            if (!ast) return "";
            var res = "";
            if (ast.type === "Loop") {
                var cond = ast.condition || "True";
                res += indent + "while " + cond + ":\n";
                
                var hasStatements = false;
                if (ast.body && ast.body.length > 0) {
                    ast.body.forEach(function(child) {
                        res += astToPython(child, indent + "    ");
                        hasStatements = true;
                    });
                }
                if (ast.act) {
                    res += indent + "    " + ast.act + "\n";
                    hasStatements = true;
                }
                if (!hasStatements) {
                    res += indent + "    pass\n";
                }
            } else if (ast.type === "Break") {
                res += indent + "break\n";
            }
            return res;
        }

        // 產生偽碼並渲染
        function updatePseudoCode() {
            var topBlocks = workspace.getTopBlocks(true);
            var code = "";
            for(var i=0; i<topBlocks.length; i++) {
                var ast = blockToAST(topBlocks[i]);
                if (ast) {
                    code += astToPython(ast, "") + "\n";
                }
            }
            if(code.trim() === "") code = "// 拖曳積木來產生程式碼...";
            document.getElementById('code-output').innerText = code;
        }

        workspace.addChangeListener(updatePseudoCode);

        var wsUrl = "ws://" + window.location.host + "/ws";
        var socket = new WebSocket(wsUrl);
        var hasBreakUnlocked = false; 
        var memoryLevel = 100;

        function updateMemoryBar(level) {
            memoryLevel = level;
            if (memoryLevel < 0) memoryLevel = 0;
            var bar = document.getElementById('memory-bar');
            bar.style.width = memoryLevel + "%";
            if (memoryLevel < 30) {
                bar.style.background = "#e57373"; 
            } else if (memoryLevel < 60) {
                bar.style.background = "#f9e2af"; 
            } else {
                bar.style.background = "#a6e3a1"; 
            }
        }

        socket.onopen = function() {
            logToTerminal("🌐 已成功連接至 FSE 核心虛擬機。", "green-txt");
        };

        socket.onmessage = function(event) {
            var msg = JSON.parse(event.data);
            if (msg.type === "mud_text" || msg.type === "output" || msg.type === "welcome") {
                var payload = msg.payload || "";
                
                // 結構化 JSON 協定處理
                if (payload.indexOf("JSON:") === 0) {
                    try {
                        var packet = JSON.parse(payload.substring(5));
                        if (packet.type === "toolbox") {
                            var revealLayers = packet.data ? packet.data.reveal_layers : null;
                            var unlockBreak = false;
                            if (revealLayers) {
                                revealLayers.forEach(function(l) {
                                    if (l.reveal_block === "break_block") unlockBreak = true;
                                });
                            }
                            if (unlockBreak && !hasBreakUnlocked) {
                                hasBreakUnlocked = true;
                                triggerUnlockEffect();
                                logToTerminal("✨ [成就解鎖] 你領悟了「迴圈的盡頭」！", "yellow-txt");
                                logToTerminal("🛠️ [工具箱更新] 已新增 [中斷 (Break)] 積木！", "green-txt");
                                var upgradedToolbox = '<xml>' +
                                    '  <category name="控制流" colour="#5b80a5">' +
                                    '    <block type="controls_loop"></block>' +
                                    '    <block type="controls_break"></block>' +
                                    '  </category>' +
                                    '  <category name="變數與運算" colour="#a55b80">' +
                                    '    <block type="variables_count"></block>' +
                                    '    <block type="compare_less_100"></block>' +
                                    '    <block type="action_increment"></block>' +
                                    '  </category>' +
                                    '</xml>';
                                workspace.updateToolbox(upgradedToolbox);
                            }
                        }
                    } catch (e) {
                        console.error("Failed to parse JSON protocol", e);
                    }
                    return;
                }

                if (payload !== "") {
                    var cleanText = payload.replace(/\u001b\[\d+m/g, "");
                    cleanText = cleanText.replace(/\$\w+\$/g, ""); 
                    
                    if (cleanText.indexOf("🎉") !== -1 || cleanText.indexOf("成功") !== -1) {
                        logToTerminal(cleanText, "green-txt");
                        triggerSuccessEffect();
                        updateMemoryBar(100);
                    } else if (cleanText.indexOf("💥") !== -1 || cleanText.indexOf("無窮迴圈") !== -1) {
                        logToTerminal(cleanText, "red-txt");
                        shakeScreen();
                        updateMemoryBar(memoryLevel - 40); 
                    } else {
                        logToTerminal(cleanText, "blue-txt");
                    }
                }
            }
        };

        function logToTerminal(text, className) {
            var term = document.getElementById("terminal");
            var line = document.createElement("div");
            line.className = "term-line " + (className || "");
            line.innerText = text;
            term.appendChild(line);
            term.scrollTop = term.scrollHeight;
        }

        function triggerUnlockEffect() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#f9e2af', '#89b4fa', '#a6e3a1'] });
        }
        function triggerSuccessEffect() {
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.4 } });
        }
        function shakeScreen() {
            var wrap = document.getElementById('wrapper');
            wrap.style.transform = 'translate(10px, 10px)';
            setTimeout(() => wrap.style.transform = 'translate(-10px, -10px)', 50);
            setTimeout(() => wrap.style.transform = 'translate(10px, -10px)', 100);
            setTimeout(() => wrap.style.transform = 'translate(-10px, 10px)', 150);
            setTimeout(() => wrap.style.transform = 'translate(0, 0)', 200);
        }

        document.getElementById("btn-run").addEventListener("click", function() {
            var topBlocks = workspace.getTopBlocks(true);
            if (topBlocks.length === 0) {
                logToTerminal("⚠️ 請先拖曳積木到工作區！", "yellow-txt");
                return;
            }
            
            var ast = blockToAST(topBlocks[0]);
            if (!ast) return;
            
            logToTerminal("▶ 正在傳送積木邏輯至虛擬機執行...", "blue-txt");
            socket.send(JSON.stringify({
                type: "cmd",
                payload: "execute " + JSON.stringify({
                    type: ast.type,
                    condition: ast.condition,
                    act: ast.act,
                    has_break: ast.has_break ? 1 : 0
                })
            }));
        });
    </script>
</body>
</html>
