short: "火山熔岩管"
long: "你進入了一個幽暗而悶熱的地下火山熔岩通道。\n四周粗糙的熔岩管壁散發著殘餘的地熱，空氣乾燥得像是在灼燒你的喉嚨。\n這裡空氣極度稀薄且不流通，夾雜著嗆人的火山氣體，你的頭部感到劇烈刺痛。\n四周一片黑暗，只有地表裂隙中隱約透出暗紅色的火光。"
presence: []

environmental_multipliers:
  thirst_decay: 2.5
  hunger_decay: 1.0

exits:
  back: "/rooms/wind_canyon/room"

reveal_exits:
  flats:
    dest: "/rooms/alkali_flats/room"
    requires_factor: "convection_currents"
    reveal_msg: "藉由對流氣流的指引，你成功在熔岩管深處找到了通往外界「鹽鹼荒灘 (flats)」的安全通道！"

sensory_signals:
  smell: "空氣中滿是令人窒息的二氧化硫與一氧化碳，硫磺臭味濃烈得讓你無法深呼吸。"
  sound: "熔岩管深處隱約傳來岩漿流動的沉悶低鳴，以及地熱氣體釋放的微弱嘶嘶聲。"
  wind:
    default_msg: "這裡的空氣幾乎是完全靜止的，沉悶而壓抑。在極度缺氧的環境下，你的呼吸越來越急促。"
    discovery:
      requires_no_factor: "convection_currents"
      requires_item: "embers"
      set_temp: "observed_convection"
      msg: "【 🔍 發現 】在微弱的火種（embers）熱氣烘托下，你驚奇地發現火種產生的微弱青煙，正朝著岩壁上方一條微小的岩石裂縫劇烈「朝上偏折」！\n空氣在這裡產生了熱對流。這條裂縫上方必然連接著富氧的外界大氣，形成了一道隱密的富氧對流氣流夾層！\n你可以嘗試利用這股熱對流（harness convection / harness wind）來重新獲得氧氣。"

  ground: "鋪滿火山碎屑與凝灰岩的地面，腳踩上去能感受到滾燙的溫度。"

interactions:
  - action: "harness"
    target:
      - "convection"
      - "wind"
      - "current"
    prerequisites:
      temp_state: "observed_convection"
    discover_factor: "convection_currents"
    complete_quest: "harness_air"
    success_msg: "==================================================\n  🌟【 困惑 ➔ 領悟 (Insight) 】熱對流導引與富氧夾層！\n==================================================\n你將口鼻貼近煙霧偏折的方向，發現一股涼爽、富含氧氣的新鮮空氣正源源不斷地從岩縫中吸入！\n你利用這個熱對流氣流，在缺氧的火山管線中開闢了一道安全的呼吸防線。你領悟了『熱對流引導 (convection_currents)』！"
    repeat_msg: "你已學會利用這個熔岩管 the 熱對流夾層維持呼吸，不需要再次調整。"
    fatigue: 5

  # 失敗是信息：直接在缺氧處奔跑（移除已解鎖的 discover_factor 以防阻擋扣血判定）
  - action: "run"
    success_msg: "你試圖在缺氧且充滿火山毒氣的熔岩管中拔足狂奔。高強度的無氧運動瞬間耗盡了你體內僅存 of 氧氣，你的大腦瞬間失去知覺，無力地栽倒在滾燙的岩石上..."
    hp_change: -100

  - action: "dash"
    success_msg: "你試圖在缺氧且充滿火山毒氣的熔岩管中拔足狂奔。高強度的無氧運動瞬間耗盡了你體內僅存 of 氧氣，你的大腦瞬間失去知覺，無力地栽倒在滾燙的岩石上..."
    hp_change: -100

  # 原地等待會窒息
  - action: "wait"
    success_msg: "你站在原地急促喘息，試圖平復呼吸。然而二氧化碳與火山硫化氣體沉積在管線底部，你吸入的毒氣越來越多，視線逐漸模糊，四肢無力地癱倒在地..."
    hp_change: -100

  - action: "breathe"
    success_msg: "你站在原地急促喘息，試圖平復呼吸。然而二氧化碳與火山硫化氣體沉積在管線底部，你吸入的毒氣越來越多，視線逐漸模糊，四肢無力地癱倒在地..."
    hp_change: -100
