short: "山脊瞭望台"
long: "你攀上了聚落山脊的最高點，這裡有一個用石塊堆砌的簡陋但實用的瞭望台。\n從這裡可以360度俯瞰整片白堊紀地貌——南方是閃耀的白堊紀海洋，北方是廣袤的針葉林，東方的火山口吐著白煙，西方的遠古平原延伸至天際。\n下方，聚落的煙火裊裊升起，提醒著你這是人類文明在這個星球上存在的痕跡。"

exits:
  back: "/rooms/settlement_ridge/room"

sensory_signals:
  smell: "高處的空氣清新而稀薄，偶爾帶著遠方火山吹來的隱約硫磺氣息，以及下方聚落炊煙的木材香味。"
  sound: "強風在耳邊呼嘯，遠處傳來幾聲恐龍的嘶吼，以及下方聚落中人們勞作的隱約聲音。"
  wind: "各方向的風在此交匯——有時是來自海洋的濕潤海風，有時是來自平原的乾燥草原風，有時是火山的硫磺熱風。\n仔細感受風向（focus wind），可以掌握整個區域的氣候與生態規律。"
  ground:
    default_msg: "瞭望台的岩面光滑，由史前人類磨平後使用，表面刻有密密麻麻的原始符號，記載著對四方地形的觀察。"
    discovery:
      requires_no_factor: "symbol_abstraction"
      msg: "【 🔍 發現 】這些岩石上的符號不是隨意的塗鴉——它們與四周的地形一一對應，是一份原始的「地圖」！\n這是人類試圖用抽象符號記錄具體地理資訊的最早嘗試。"
      set_temp: "found_ancient_marks"

interactions:
  - action: "look"
    target: "horizon"
    discover_factor: "migration_cycle"
    success_msg: "==================================================\n  🌟【 困惑 ➔ 領悟 (Insight) 】恐龍的遷徙週期！\n==================================================\n從這個制高點，你看到了令人震撼的景象：\n一條由數百隻恐龍組成的遷徙隊伍，正以緩慢但堅定的步伐向北移動，牠們的路徑沿著古老的河道延伸。\n💡 動物的遷徙並非隨機——牠們按照季節與食物循環遵循著固定的路徑！"
    fatigue: 5

  - action: "scan"
    discover_factor: "migration_cycle"
    success_msg: "==================================================\n  🌟【 困惑 ➔ 領悟 (Insight) 】恐龍的遷徙週期！\n==================================================\n從這個制高點，你看到了令人震撼的景象：\n一條由數百隻恐龍組成的遷徙隊伍，正以緩慢但堅定的步伐向北移動，牠們的路徑沿著古老的河道延伸。\n💡 動物的遷徙並非隨機——牠們按照季節與食物循環遵循著固定的路徑！"
    fatigue: 5

  - action: "read"
    target: "marks"
    prerequisites:
      temp_state: "found_ancient_marks"
      factor: "symbol_abstraction"
    discover_factor: "civilization_meaning"
    success_msg: "==================================================\n  🌟【 困惑 ➔ 領悟 (Insight) 】符號記錄的重要性！\n==================================================\n你對照著岩石上的符號與眼前的實際地形，逐漸解讀出了前人留下的智慧：\n哪條路安全、哪片水源可信、哪個季節哪個方向有食物……\n這些資訊幾乎就是一份完整的生存指南！💡 符號讓知識得以跨越個體壽命傳遞！"
    fatigue: 10

  - action: "decipher"
    prerequisites:
      temp_state: "found_ancient_marks"
      factor: "symbol_abstraction"
    discover_factor: "civilization_meaning"
    success_msg: "==================================================\n  🌟【 困惑 ➔ 領悟 (Insight) 】符號記錄的重要性！\n==================================================\n你對照著岩石上的符號與眼前的實際地形，逐漸解讀出了前人留下的智慧：\n哪條路安全、哪片水源可信、哪個季節哪個方向有食物……\n這些資訊幾乎就是一份完整的生存指南！💡 符號讓知識得以跨越個體壽命傳遞！"
    fatigue: 10
