short: "巨型蕨類森林"
long: "你走進了高大茂密的蕨類與松科植物森林。\n空氣中瀰漫著古老而濕潤的植物氣息，光線被高處的葉片遮蔽，顯得幽暗神秘。\n在不遠處的大樹下，有幾塊質地堅實的黑曜石，你可以試著敲擊它們。"
monsters: []
exits:
  back: "/rooms/triassic_plains/room"

# 🌟 非線性網狀 Reveal 分叉
reveal_exits:
  # 只要學會生火(thermodynamics)，火光就可以照亮並開啟通往黑暗溶洞的路徑
  cave:
    dest: "/rooms/dark_cave/room"
    requires_factor: "thermodynamics"
    reveal_msg: "在微弱的火光映照下，你注意到一側隱密的巨型樹根後方，露出了一個黑漆漆的溶洞入口 (cave)！"

  # 必須學會打製石器(flint_knapping)獲得石刃，才能割開荊棘屏障，開啟通往峽谷的路徑
  canyon:
    dest: "/rooms/predator_canyon/room"
    requires_factor: "flint_knapping"
    reveal_msg: "在森林深處，一堵由粗壯荊棘組成的天然屏障擋在路前。\n現在，你可以用手中鋒利的黑曜石片將其割開了 (canyon)！"

sensory_signals:
  smell: "濃厚的腐植土氣味中，隱隱有一絲雨水的清新。"
  sound: "高大的葉片在風中摩擦，發出沙沙的浪潮聲。"
  wind: "森林深處的微風很小，你的氣味暫時不會擴散。"
  
  # 宣告式感官發現
  ground:
    default_msg: "厚厚的落葉堆，踩上去十分鬆軟，但也可能隱藏著捕食者的陷阱。"
    discovery:
      requires_no_factor: "flint_knapping"
      set_temp: "found_obsidian"
      msg: "【 🔍 發現 】在鬆軟的落葉堆下，露出了幾塊質地極為堅硬且邊緣銳利的黑曜石 (obsidian)。\n這似乎是打製石器的絕佳材料。你可以嘗試敲擊 (strike) 它們，看看會發生什麼。"

# 統一物理互動宣告
interactions:
  - action: "strike"
    target: "obsidian obsidian"
    prerequisites:
      temp_state: "found_obsidian"
    discover_factor: "flint_knapping"
    success_msg: "==================================================\n  🌟【 困惑 ➔ 領悟 (Insight) 】燧石打製與刃口形成！\n==================================================\n你將兩塊黑曜石以大約 45 度的夾角猛烈碰擊。\n隨著清脆的破裂聲，石塊邊緣呈貝殼狀剝落，露出了薄如蟬翼、極為鋒利的邊緣！"
    give_item:
      id: "obsidian_blade"
      name: "鋒利的黑曜石片"
      desc: "一片薄而鋒利的黑曜石裂片，邊緣呈貝殼狀斷裂，削鐵如泥，可以用來割斷堅韌的史前植物。"
      durability: 10
    set_temp: "has_sharp_obsidian"
    repeat_msg: "你嫻熟地調整敲擊角度，輕敲黑曜石，剝落出薄而鋒利的石片。\n🔪 你手中已經擁有極為鋒利的黑曜石工具了。"
    fatigue: 10

  - action: "strike"
    target: "obsidian"
    success_msg: "💡 敲擊黑曜石需要兩塊互相撞擊，試著輸入：strike obsidian obsidian"
    fatigue: 2
