short: "捕食者峽谷"
long: "你來到了一片狹窄而深邃的紅砂岩峽谷。\n兩側是近乎垂直的峭壁，遮擋了大部分光線。\n風在峽谷狹窄的通道中呼嘯而過，發出尖銳的口哨聲。\n此地充滿了未知的壓迫感，每一步都必須極為小心。"
presence:
  - id: "/presence/herrerasaurus/presence"
    count: 1
exits:
  back: "/rooms/fern_forest/room"

reveal_exits:
  desert:
    dest: "/rooms/desert_canyon/room"
    requires_factor: "stealth_camouflage"
    reveal_msg: "避開了掠食者，前方露出了通往未知深處的「荒野峽谷 (desert)」通道！"

sensory_signals:
  smell:
    default_msg: "風中傳來極度腥臭的野獸體味，混雜著腐肉的臭氣。"
    discovery:
      requires_factor: "predator_scent"
      msg: "【 👃 生態分析 - 氣味 】這種腥臭味特徵符合中大型掠食者（如赫氏翼龍），距離你非常近！"
      failure_confusion: "identify_scent"
  sound:
    default_msg: "岩壁上方不時傳來碎石滾落的沙沙聲，伴隨著低沉且帶有威脅的喉音。"
    discovery:
      requires_factor: "vibration_translation"
      msg: "【 💡 領悟 】低頻的震動聲頻率規律，代表有一隻恐龍正踏著碎步在附近踱步。"
  wind:
    default_msg: "強烈而冰冷的風正從峽谷出口（你前進的方向）直吹向你。"
    discovery:
      set_temp: "observed_wind"
      msg: "【 🔍 發現 】風正朝著你吹來（逆風）。逆風前進可以使你的氣味不被前方的野獸察覺！你可以嘗試在逆風處隱蔽偽裝前進（hide downwind）。"
  ground: "紅砂岩地表，布滿了深陷的巨爪撕裂痕跡。"

interactions:
  - action: "hide"
    target: "downwind"
    prerequisites:
      temp_state: "observed_wind"
    success_msg: "你立刻俯下身子，利用逆風的優勢，將全身塗滿紅砂泥土以遮蓋體味，藉著岩石陰影匍匐前進。\n那頭巨大的捕食者在上方峭壁聳了聳鼻子，疑惑地往另一個方向走開了。\n💡 成功避開威脅！"
    discover_factor: "stealth_camouflage"
    complete_quest: "first_escape"
    fatigue: 15
