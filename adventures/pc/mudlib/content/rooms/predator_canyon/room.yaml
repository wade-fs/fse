short: "捕食者峽谷"
long: "你來到了一片狹窄而深邃的紅砂岩峽谷。\n兩側是近乎垂直的峭壁，遮擋了大部分光線。\n風在峽谷狹窄的通道中呼嘯而過，發出尖銳的口哨聲。\n此地充滿了未知的壓迫感，每一步都必須極為小心。"
monsters:
  - id: "/monsters/herrerasaurus/monster"
    count: 1
    respawn: true
exits:
  back: "/rooms/fern_forest/room"

sensory_signals:
  smell: "風中傳來極度腥臭的野獸體味，混雜著腐肉的臭氣。"
  sound: "岩壁上方不時傳來碎石滾落的沙沙聲，伴隨著低沉且帶有威脅的喉音。"
  wind: "強烈的狂風正從峽谷出口（你前進的方向）直吹向你（逆風前進）。"
  ground: "紅砂岩地表，布滿了深陷的巨爪撕裂痕跡。"

interactions:
  - action: "hide"
    target: "downwind"
    prerequisites:
      factor: "wind_direction"
    success_msg: "你立刻俯下身子，利用逆風的優勢，將全身塗滿紅砂泥土以遮蓋體味，藉著岩石陰影匍匐前進。\n那頭巨大的捕食者在上方峭壁聳了聳鼻子，疑惑地往另一個方向走開了。\n💡 成功避開威脅！你發現了通往峽谷深處更安全地帶的路徑。"
    set_temp: "canyon_escaped"
    complete_quest: "wind_stealth"
    fatigue: 15
