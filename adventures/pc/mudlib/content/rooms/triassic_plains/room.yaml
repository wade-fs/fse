short: "三疊紀荒原"
long: "你置身在一片詭異而炎熱的史前荒原。\n天空是橘紅色的，空氣中瀰漫著硫磺的氣味。\n腳下是紅棕色的砂岩地，偶有低矮的蕨類植物在石縫間掙扎求存。\n遠方可以看見巨大的蕨類森林輪廓。\n這裡處於下風處，細心感知周圍的訊息，否則你將寸步難行。"
monsters:
  - id: "/monsters/proto_chicken/monster"
    count: 1
    respawn: true

exits: {}
sensory_signals:
  smell: "一陣潮濕的風吹來，夾雜著令人作嘔的腥臭味，彷彿是某種腐肉與巨獸口水混合的氣息。"
  sound: "一陣低頻的震動聲從遠處灌木叢傳來，地面沙礫隨之微微抖動。"
  wind: "東南風呼嘯，將你身上的氣味帶往了森林深處。"
  ground: "紅棕色的乾硬砂岩，留有一排深陷的、呈三趾狀的巨大腳印殘跡。"

