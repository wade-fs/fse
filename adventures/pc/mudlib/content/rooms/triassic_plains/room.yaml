short: "三疊紀荒原"
long: "你置身在一片詭異而炎熱的史前荒原。\n天空是橘紅色的，空氣中瀰漫著硫磺的氣味。\n腳下是紅棕色的砂岩地，偶有低矮的蕨類植物在石縫間掙扎求存。\n遠方可以看見巨大的蕨類森林輪廓。\n這裡處於下風處，細心感知周圍的訊息，否則你將寸步難行。"
monsters:
  - id: "/monsters/proto_chicken/monster"
    count: 1
    respawn: true

exits: {}

reveal_exits:
  forest:
    dest: "/rooms/fern_forest/room"
    requires_factor: "thermodynamics"
    reveal_msg: "在營火跳躍的火光下，遠方原本漆黑模糊的「蕨類森林 (forest)」路徑清晰地展現了出來！"

sensory_signals:
  smell: "一陣潮濕的風吹來，夾雜著令人作嘔的腥臭味，彷彿是某種腐肉與巨獸口水混合的氣息。"
  sound: "一陣低頻的震動聲從遠處灌木叢傳來，地面沙礫隨之微微抖動。"
  wind: "東南風呼嘯，將你身上的氣味帶往了森林深處。"
  
  # 宣告式感官發現
  ground:
    default_msg: "紅棕色的乾硬砂岩，留有一排深陷的、呈三趾狀的巨大腳印殘跡。"
    discovery:
      requires_no_factor: "thermodynamics"
      set_temp: "found_roots"
      msg: "【 🔍 發現 】在那些碎石縫中，你找到了幾株耐旱蕨類植物乾枯的根部 (roots)。\n這些根部極度乾燥且富含纖維。你可以嘗試將它們與這片荒野隨處可見的松科樹枝 (branches) 劇烈摩擦 (rub) 來產生火花！"

# 🌟 萬用實體互動宣告
interactions:
  - action: "rub"
    target: "branches roots"
    prerequisites:
      temp_state: "found_roots"
    discover_factor: "thermodynamics"
    complete_quest: "first_fire"
    success_msg: "你用乾燥的耐旱蕨類根部作為火絨，將質地堅硬的松科樹枝急速旋轉摩擦。\n一縷青煙冒出，伴隨著微小的火星，火被點燃了！"
    repeat_msg: "你嫻熟地用耐旱蕨類根部與樹枝摩擦，火苗輕易地跳躍而出。\n🔥 營火已在燃燒中。"
    fatigue: 10
    failure_msg: "【 🌀 產生困惑 】你用力拿樹枝去磨擦普通的岩石與濕土，除了一身汗之外，什麼也沒發生。\n大雨將至，寒風吹過，你的體溫正在迅速流失！\n💡 這裡有乾燥的引火介質嗎？也許你應該觀察地面 (focus ground)..."
    trigger_confusion: "rub_without_kindling"
    fail_fatigue: 15

  - action: "rub"
    target: "roots branches" # 支援顛倒的輸入順序
    prerequisites:
      temp_state: "found_roots"
    discover_factor: "thermodynamics"
    complete_quest: "first_fire"
    success_msg: "你用乾燥的耐旱蕨類根部作為火絨，將質地堅硬的松科樹枝急速旋轉摩擦。\n一縷青煙冒出，伴隨著微小的火星，火被點燃了！"
    repeat_msg: "你嫻熟地用耐旱蕨類根部與樹枝摩擦，火苗輕易地跳躍而出。\n🔥 營火已在燃燒中。"
    fatigue: 10
    failure_msg: "【 🌀 產生困惑 】你用力拿樹枝去磨擦普通的岩石與濕土，除了一身汗之外，什麼也沒發生。\n大雨將至，寒風吹過，你的體溫正在迅速流失！\n💡 這裡有乾燥的引火介質嗎？也許你應該觀察地面 (focus ground)..."
    trigger_confusion: "rub_without_kindling"
    fail_fatigue: 15

  - action: "kick"
    target: "rocks"
    prerequisites:
      temp_state: "found_roots"
    success_msg: "你狠狠踹了碎石堆一腳！滾落的砂岩後方露出了更多乾枯粗壯的蕨類根部。\n💡 現在這片地面到處都是引火物了。"
    set_temp: "found_roots_easy"
    fatigue: 5
    failure_msg: "你一腳猛力踹在堅硬的紅砂岩上，痛得你當場抱腳倒地，岩石紋絲不動。\n💡 或許你得先找到目標物，或者先專注觀察地面 (focus ground)。"
    fail_fatigue: 10
    fail_hp: -5

  - action: "lick"
    target: "water"
    success_msg: "你用舌尖稍微舔了舔帶有鐵鏽色澤的河水。\n一股辛辣、苦澀且夾雜著腐敗有機物的異味瞬間直衝腦門，你忍不住乾嘔起來！\n💡 警告：這水顯然含有嚴重的毒素，絕不能直接飲用。需要高溫加熱..."
    trigger_confusion: "poisonous_water"
    hp_change: -5
    fatigue: 10
