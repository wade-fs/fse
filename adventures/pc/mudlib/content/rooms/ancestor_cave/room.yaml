short: "祖先洞穴"
long: "你走進了這座位於山脊最高處的深邃洞穴。\n這裡曾有無數代開拓者在此避雨和歇息。\n巨大的岩壁平整而寬闊，上面密密麻麻地刻滿了用紅色、黃色礦石描繪的圖騰與符號。\n天空中那顆越來越大、越來越熾熱的小行星，將慘烈而金黃的光芒穿透雲層，直射在洞穴口。\n這似乎是這個文明做出的最後抉擇之地。"
monsters: []
exits:
  back: "/rooms/settlement_ridge/room"

sensory_signals:
  smell: "古老、乾燥且充滿時間厚重感的岩石氣味，夾雜著大氣被高熱烤焦的焦糊味。"
  sound: "空谷回響，只有天空中隱隱傳來的末日轟鳴聲與你自己的心跳聲。"
  wind: "空氣沉悶，高熱的風在洞口外狂嘯，但洞穴深處依然是一片令人窒息的靜謐。"
  ground: "平整的岩石地面，散落著許多用於研磨礦物顏料的石碾與赤鐵礦石塊。"

interactions:
  - action: "draw"
    target: "wall"
    prerequisites:
      item: "obsidian_knife"
    discover_factor: "symbol_abstraction"
    success_msg: "你拿起黑曜石獵刀，蘸上研磨好的赤鐵礦粉末，在石壁上畫下了代表「火」與「風」的符號。\n當你畫下最後一筆時，一陣奇特的共鳴在腦海中響起——\n這不再只是你個人的記憶。透過符號，你的領悟將超越肉體的極限，傳遞給萬年之後的後來者。\n這就是文明的起點。"
    fatigue: 20

  - action: "build"
    target: "altar"
    prerequisites:
      factor: "symbol_abstraction"
    discover_factor: "ritual_altar"
    success_msg: "你挑選扁平的砂岩片，在洞穴中央莊嚴地壘砌起一座古樸的祭台。\n這象徵著精神的寄託與傳承，標示著人族在混亂的世界中確立的秩序！"
    set_temp: "has_altar"
    fatigue: 20

  - action: "write"
    target: "legacy"
    prerequisites:
      temp_state: "has_altar"
    discover_factor: "civilization_meaning"
    complete_quest: "against_entropy"
    success_msg: "==================================================\n  🌟【 困惑 ➔ 領悟 (Insight) 】文明傳承與遺產留存！\n==================================================\n你在洞穴的石壁上深深地刻下了所有關於火、工具、風向與生態的規律記憶，並在祭壇上供奉了文明的火種。\n天空中，那顆小行星已經變得無比刺眼，末日衝擊波呼嘯而至。\n但看著牆上的文字與眼前的祭壇，你露出了微笑。\n你無法阻止宇宙的熵增，但你已經成功將生命的理解留給了未來的世界。"
    fatigue: 30
