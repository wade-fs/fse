short: "黑暗溶洞"
long: "你身處在一個極度幽暗的天然石灰岩溶洞深處。\n洞頂不時有冰冷的水滴落下，空氣中瀰漫著潮濕的石灰與古老獸類的糞便氣味。\n四周一片死寂，只有水滴的聲音在岩壁間激盪回響。"
monsters: []
exits:
  back: "/rooms/fern_forest/room"

reveal_exits:
  # 用火種照亮溶洞
  wood:
    dest: "/rooms/dark_cave/room"
    requires_factor: "thermodynamics"
    reveal_msg: "你點燃了火堆，跳動的火光照亮了整座溶洞，岩壁上隱約顯現出史前壁畫！"
  
  # 理解地鳴震動後，發覺溶洞深處的岩石裂縫有風吹出，可通往侏羅紀
  rift:
    dest: "/rooms/jurassic_valley/room"
    requires_factor: "vibration_translation"
    reveal_msg: "在持續低頻的地鳴震動中，溶洞深處的一堵鬆動岩牆崩塌了，露出一條散發著溫熱植物氣息的幽深地底裂縫 (rift)！"

sensory_signals:
  smell: "濃烈的霉味與濕氣，隱約夾雜著某種食肉動物留下的陳舊血腥氣息。"
  sound: "滴答... 滴答... 水滴擊打石筍的聲音，在空曠的洞穴中被放大得格外清晰。"
  wind: "幾乎沒有風，空氣凝滯得令人窒息。"
  ground: "潮濕且高低不平的岩石地面。在微弱的光線死角中，似乎堆積著一些大型動物的碎骨骸。"

interactions:
  - action: "burn"
    target: "wood"
    prerequisites:
      item: "embers"
    discover_factor: "cave_painting"
    success_msg: "你引燃了溶洞中央一堆前人留下的乾枯獸皮與木柴。火焰騰起，照亮了岩壁上的壁畫！"
    repeat_msg: "火堆仍在燃燒，跳動的火光照亮了牆上的壁畫。"
    fatigue: 5

  - action: "look"
    target: "painting"
    prerequisites:
      factor: "cave_painting"
    success_msg: "你湊近觀察壁畫。壁畫上用紅色赤鐵礦畫著巨獸，風向朝著巨獸吹去。\n💡 領悟：這幅畫警告你風向會帶走你的氣味，逆風接近捕食者才是生路。"
    discover_factor: "wind_direction"
