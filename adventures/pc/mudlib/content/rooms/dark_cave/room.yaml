short: "黑暗溶洞"
long: "你身處在一個極度幽暗的天然石灰岩溶洞深處。\n洞頂不時有冰冷的水滴落下，空氣中瀰漫著潮濕的石灰與古老獸類的糞便氣味。\n四周一片死寂，只有水滴的聲音在岩壁間激盪回響。"
monsters: []
exits:
  back: "/rooms/fern_forest/room"

sensory_signals:
  smell: "濃烈的霉味與濕氣，隱約夾雜著某種食肉動物留下的陳舊血腥氣息。"
  sound: "滴答... 滴答... 水滴擊打石筍的聲音，在空曠的洞穴中被放大得格外清晰。"
  wind: "幾乎沒有風，空氣凝滯得令人窒息。"
  ground: "潮濕且高低不平的岩石地面。在微弱的光線死角中，似乎堆積著一些大型動物的碎骨骸。"

# 🌟 溶洞互動：用火種點燃洞穴中的舊乾柴
interactions:
  - action: "burn"
    target: "wood"
    prerequisites:
      # 需要玩家背包裡有 embers 火種
      item: "embers"
    discover_factor: "cave_painting"
    success_msg: "你小心翼翼地取出背包中的火種，引燃了溶洞中央一堆前人留下的乾枯獸皮與木柴。\n火光瞬間騰起！跳躍的火焰照亮了整座岩洞，也驅散了令人窒息的陰冷。\n【 🔍 發現 】在跳動的火光下，你驚訝地發現溶洞深處的岩壁上，刻著幾幅簡陋但線條粗獷的史前壁畫！"
    repeat_msg: "火堆仍在燃燒，跳動的火光照亮了牆上的壁畫。"
    fatigue: 5

  - action: "look"
    target: "painting"
    prerequisites:
      factor: "cave_painting"
    success_msg: "你湊近觀察石壁上的壁畫。\n壁畫上用紅色的赤鐵礦粉末畫著一隻巨大的、長著三趾與匕首般巨牙的野獸。\n野獸的頭部畫著一個類似「風」的波浪符號，而人的圖樣則站在下風處。\n💡 領悟：這幅畫似乎是先人留下的生存警告——風向會帶走你的氣味，逆風接近獵手才是生路。"
    discover_factor: "wind_direction"
