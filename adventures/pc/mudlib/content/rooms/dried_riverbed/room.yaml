short: "乾涸古河道"
long: "你走入一條完全乾涸的史前河道。\n河床上的岩石被古老的水流磨得圓潤光滑，在陽光下泛著柔和的灰白光澤。\n河道兩側是清晰的沉積岩剖面，層層疊疊的岩層如同翻開的地質年鑑，\n記錄著億萬年前這條河流的興衰歷史。\n某段岩層中，你隱約可以看出一些奇特的輪廓。"
presence: []

exits:
  back: "/rooms/desert_canyon/room"

sensory_signals:
  smell: "乾燥泥土、腐朽植物和遠處硫磺氣的混合氣息，帶有一股久遠歲月的陳舊感。"
  sound: "風吹過乾涸河道形成低沉的迴響聲，偶爾有碎石從兩側岩壁滑落，在寂靜中格外清晰。"
  wind: "沿著河道的走向吹來一陣涼風，帶走了部分峽谷的熱氣。"
  ground:
    default_msg: "光滑的沉積岩盤，偶有燧石脈如白色閃電般貫穿其中。兩側岩壁清晰呈現岩層節理，層次分明。"
    discovery:
      requires_no_factor: "water_boiling"
      set_temp: "found_fossil_shell"
      msg: "【 🔍 發現 】你的目光被某段岩層中的奇特形狀吸引。\n仔細一看，那是貝殼的輪廓！清晰的螺旋紋路和放射狀稜線嵌在灰色岩層之中。\n在這片荒漠中看到貝殼化石 (fossil) 讓你感到困惑——這裡怎麼會有海洋生物？"

interactions:
  - action: "look"
    target: "fossil"
    prerequisites:
      temp_state: "found_fossil_shell"
    discover_factor: "triassic_flora"
    success_msg: "==================================================\n  🌟【 困惑 ➔ 領悟 (Insight) 】時間的縱深與地質變遷！\n==================================================\n你用手指輕輕描摹那個貝殼化石的輪廓。\n這裡曾是淺海！在數億年前，這片炎熱的荒漠底下是一片溫暖的淺海。\n水退去了，地殼隆起了，海底變成了沙漠，而這枚貝殼見證了整個過程。\n你對這個時代的認知發生了根本性的重塑：你所處的不只是一片荒原，\n而是億萬年地質變遷的最新篇章。"
    fatigue: 5

  - action: "examine"
    target: "fossil"
    prerequisites:
      temp_state: "found_fossil_shell"
    discover_factor: "triassic_flora"
    success_msg: "==================================================\n  🌟【 困惑 ➔ 領悟 (Insight) 】時間的縱深與地質變遷！\n==================================================\n你用手指輕輕描摹那個貝殼化石的輪廓。\n這裡曾是淺海！在數億年前，這片炎熱的荒漠底下是一片溫暖的淺海。\n水退去了，地殼隆起了，海底變成了沙漠，而這枚貝殼見證了整個過程。\n你對這個時代的認知發生了根本性的重塑：你所處的不只是一片荒原，\n而是億萬年地質變遷的最新篇章。"
    fatigue: 5

  - action: "pick"
    target: "flint"
    give_item:
      id: "raw_flint"
      name: "燧石"
      desc: "一塊從沉積岩脈中撬出的燧石，半透明的灰色質地，邊緣天然形成鋒利的斷面。敲擊時會產生火花，是極佳的打火石材料。"
      durability: 8
    success_msg: "你用另一塊石頭敲擊沉積岩中的燧石脈，幾塊燧石應聲而落。\n你挑選了一塊形狀最好的——半透明的灰色，邊緣鋒利，重量合手。"
    fatigue: 5
    repeat_msg: "你又撿起了一塊燧石。這條河床的燧石資源相當豐富。"

  - action: "collect"
    target: "flint"
    give_item:
      id: "raw_flint"
      name: "燧石"
      desc: "一塊從沉積岩脈中撬出的燧石，半透明的灰色質地，邊緣天然形成鋒利的斷面。敲擊時會產生火花，是極佳的打火石材料。"
      durability: 8
    success_msg: "你用另一塊石頭敲擊沉積岩中的燧石脈，幾塊燧石應聲而落。\n你挑選了一塊形狀最好的——半透明的灰色，邊緣鋒利，重量合手。"
    fatigue: 5
    repeat_msg: "你又撿起了一塊燧石。這條河床的燧石資源相當豐富。"

  - action: "look"
    target:
      - "layers"
      - "rock"
      - "wall"
    success_msg: "你仔細觀察河道兩側的岩層剖面：\n從底部到頂部，岩石的顏色和質地有著顯著的變化。\n深色的泥岩層代表靜水環境，砂岩層代表河流搬運，礫石層代表激流沉積。\n這道岩壁是一本用石頭寫成的歷史書。"
    fatigue: 2
