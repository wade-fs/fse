zh_TW:
  green_bamboo_forest: 清淨竹林
  green_bamboo_forest_desc: 此地翠竹掩映，清泉石上流。空氣中瀰漫著淡淡的竹香，令人神清氣爽。這裡是修行者參悟木德與風相的絕佳去處。
  hidden_shrine: 古仙密室
  hidden_shrine_desc: 一個隱蔽在瀑布後方的天然石室。四周石壁上刻滿了古老的劍意刻痕，中央有一座石台，上面散落著凡鐵殘渣。
  meditation_cliff: 靜慮崖
  meditation_cliff_desc: 此處是蜀山深處一處孤懸的峭壁。四周松濤如海，雲霧繚繞。峭壁邊緣有一塊平整的青石，似乎是前人打坐之處。此地風勢強勁，靈氣暗流奔湧。
  mountain_path: 蜀山山道
  mountain_path_desc: 一條蜿蜒曲折的石階山道，兩旁古木參天，濃霧在腳下漂浮。向山頂看去，隱約能看見蜀山派宏偉的殿宇輪廓。
