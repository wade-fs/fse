zh_TW:
  array_platform: 八卦壇
  array_platform_desc: 地面繪製著巨大精密的八卦圖陣，陣眼處有靈石微微閃爍。這裡是參悟「陣法」與「畫符」的場所，考驗修行者對能量流動的邏輯控制。
  craft_workshop: 百工坊
  craft_workshop_desc: 爐火熊熊，鐵錘敲擊之聲不絕於耳。這裡是修煉「挖礦」與「打鐵鍛造」的場所。牆上掛著各式鍛造工具，地面堆放著未提煉的礦石。
  desire_pavilion: 煙雨青樓
  desire_pavilion_desc: 絲竹之聲不絕於耳，紅粉飄香，煙雨朦朧。這裡是紅塵情欲與執念最深重之地，亦是修行者面臨色相考驗與心魔對峙的試煉場。
  destiny_pawnshop: 紅塵當舖
  destiny_pawnshop_desc: 光線有些昏暗，櫃檯高聳。年邁的掌櫃在櫃檯後撥打著算盤。此地不只典當世俗金銀，亦能交易修仙法寶與消除一身紅塵業力。
  herb_garden: 神草園
  herb_garden_desc: 百草芬芳，靈氣氤氳。這裡種植著各式奇花異草，中央擺放著一座青銅大鼎，散發著淡淡的藥香。在此可參悟陰陽藥理相生相剋之術。
  meditation_cliff: 靜慮崖
  meditation_cliff_desc: 蜀山深處一處孤懸的峭壁。四周松濤如海，冷風刺骨。峭壁邊緣有一塊平整 of 青石，似乎是前人打坐之處。此地風勢強勁，靈氣暗流奔湧。
  mountain_path: 蜀山山道
  mountain_path_desc: 蜿蜒的石階山道，兩旁古木參天，霧氣隨風飄浮。向山下走通往紅塵鎮，向上通往山門大殿。山道上隱隱有雷霆之意盤旋。
  pet_sanctuary: 靈獸齋
  pet_sanctuary_desc: 齋內豢養著各式珍稀的靈狐、仙鶴與靈獸。空氣中迴盪著獸鳴與清脆的鳥囀。修行者可在此與自然萬物共鳴，尋求靈獸同行的契機。
  spirit_auction: 天珍拍賣行
  spirit_auction_desc: 金碧輝煌的拍賣大廳，來自各方的修士在此交頭接耳。拍賣台上正展示著封印的法寶，等待著能與其靈性共鳴的有緣人出價競奪。
  sutra_pavilion: 藏經閣
  sutra_pavilion_desc: 蜀山派典藏功法秘笈的重地。閣內書架林立，玉簡散發著柔和的光芒。門派長老在此閉目盤坐，等待有緣人來此問道拜師。
  town_center: 紅塵集市
  town_center_desc: 鎮上最繁華的中心。小販的叫賣聲此起彼伏，路邊攤散發著炊煙。此地人流如織，是收集凡間情報與商貿交易的樞紐。
  town_entrance: 紅塵鎮牌坊
  town_entrance_desc: 紅塵鎮的入口，矗立著一座高大的石牌坊。穿過牌坊就是熱鬧的集市，凡俗的喧囂撲面而來，與山上的清冷截然不同。
  wind_tavern: 臨風酒館
  wind_tavern_desc: 酒香四溢，南來北往的旅客與凡人在酒肆中喧囂。酒館角落坐著各式各樣的說書人與江湖人士，是傾聽與收集紅塵 Evidence 情報的絕佳場所。
