incident_id: kaohsiung_cijin_french_siege
name: 清法戰爭：打狗港與旗後砲台攻防
description: |
  1884年清法戰爭爆發，法軍將領孤拔率軍艦封鎖台灣海峽，並砲轟打狗港及旗後砲台。
  清軍守將劉朝祐率軍頑強抵抗，利用旗後山的險要地勢與剛落成的砲台重創法軍，阻止了法軍登陸。
  你將前往海風呼嘯的砲台，還原這場捍衛打狗門戶的關鍵海戰。
truth: |
  清法戰爭期間，法軍為迫使清廷讓步，對台灣實施海面封鎖並嘗試奪取基隆與淡水。南部的打狗港（高雄港）與旗後砲台亦遭到法軍軍艦的砲擊。然而，由於砲台位置險要，加上清軍準備充分，法軍始終未能成功登陸打狗，最終隨著停戰協定簽署而撤軍。
