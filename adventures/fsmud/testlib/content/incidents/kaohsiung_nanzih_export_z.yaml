incident_id: kaohsiung_nanzih_export_z
name: 楠梓加工出口區的經濟奇蹟與女工淚
description: |
  民國五十五年（1966年），全球首創的加工出口區在高雄成立。楠梓加工區吸引了成千上萬的農村年輕女性進廠工作。
  她們在密閉的廠房裡從事高強度的電子裝配，用青春與健康換取了台灣的經濟騰飛。
  你將走訪老舊廠房，傾聽這段屬於女工的歷史心聲。
truth: |
  加工出口區結合了免稅與廉價勞動力的優勢，開創了台灣出口導向經濟的黃金時代。然而，當時的女工普遍面臨勞動條件惡劣、視力受損及化學中毒（如著名的有機溶劑中毒事件）等健康危害，這段「經濟奇蹟」背後隱含著無數底層女性的犧牲。
