incident_id: record_extra_pos_94
name: 台灣建省
description: '1885年，台灣正式建省，首任巡撫劉銘傳推行全面近代化改革：興建縱貫鐵路、開辦郵政、架設電報、開山撫番。

  你將追隨劉銘傳與修築鐵路的苦力，見證現代文明在台灣土地上的誕生與代價。'
truth: 台灣建省與劉銘傳改革使台灣成為大清帝國最先進的省份。然而，近代化背後有著無數鐵路苦力的汗水與代價，同時伴隨著激烈殘酷的『開山撫番』，給山區原住民部落帶來了毀滅性的打擊，展現了現代化發展的光影兩面。
