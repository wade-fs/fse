truth: 關刀山大地震是台灣有歷史紀錄以來傷亡最慘重的地震之一。此役造成了龍騰斷橋紅磚拱體崩塌，留下了今日的斷橋遺跡，亦推動了後續總督府防震建築規範的建立。
