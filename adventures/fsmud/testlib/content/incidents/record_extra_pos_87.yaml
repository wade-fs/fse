incident_id: record_extra_pos_87
name: 戴潮春事件
description: '同治元（1862）年，戴潮春利用八卦會起義，佔領彰化並實行四年長期的圍城自治。這是地方豪族、會黨與清廷官府三方角力的極致。

  你將在彰化與台中，調查宗族門閥的博弈與百姓對平靜的渴望。'
truth: 戴潮春事件的本質是地方武裝力量（如八卦會）與地方豪族（如霧峰林家）之間的博弈。戴潮春聯絡中台灣各大地主，與清廷對峙長達四年，最終因霧峰林家協助清軍而宣告失敗。此役奠定了霧峰林家此後在台灣中部無可匹敵的霸主地位。
