incident_id: minxiong_sugar_incident
name: 民雄糖業事件
description: 近期民雄糖廠屢傳事故，運糖火車脫軌，甚至有失源者出沒。你必須收集線索，查明真相。
truth: 糖廠頻發的事故並非意外，而是有人為了掩蓋日治時期遺留在地下設施的特殊力量，所刻意製造的混亂。
era_active: v1.0
clues:
  - clue_id: derailment_report
    name: 脫軌事故報告
    description: 從糖廠監督員處獲得的火車脫軌事故報告，暗示有人為破壞的痕跡。
    source_type: quest
    source_id: sugar_railway_repair
  - clue_id: strange_sugar_cane
    name: 變異的甘蔗
    description: 在甘蔗田深處發現的變異甘蔗，散發著奇異的能量。
    source_type: site_look
    source_id: site:minxiong_sugarcane_field
  - clue_id: old_worker_testimony
    name: 老工人的證詞
    description: 從老站長那裡聽說的，關於糖廠地下秘密設施的傳言。
    source_type: npc_ask
    source_id: npc:old_stationmaster
    ask_topic: 糖廠秘密
  - clue_id: sugar_factory_blueprint
    name: 糖廠舊藍圖
    description: 解鎖糖廠廢墟記憶時發現的舊藍圖，標示了地下空間的位置。
    source_type: memory
    source_id: memory:record_extra_pos_75
completion_reward:
