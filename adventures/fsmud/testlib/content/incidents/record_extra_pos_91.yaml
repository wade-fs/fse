incident_id: record_extra_pos_91
name: 朱一貴事件
description: '康熙六十（1721）年，鴨母王朱一貴率眾起義，攻陷鳳山縣城並直取台南府城。他在府城短暫建國自治，這是清領時期台灣第一次大規模民變。

  你將深入岡山與鳳山，還原起義軍的短暫自治奇蹟與慘烈尾聲。'
truth: 朱一貴事件是台灣移民社會積怨爆發的展現。朱一貴與杜君英雖聯合攻佔府城，但隨後因為閩粵籍貫的利益衝突而分裂，導致清軍得以迅速反攻平叛。事件後，清軍在南台灣加強防務，並激化了後續的閩粵分類械鬥。
