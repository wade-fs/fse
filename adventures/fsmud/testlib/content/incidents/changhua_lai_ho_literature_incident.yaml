incident_id: changhua_lai_ho_literature_incident
name: 賴和行醫與新文學的誕生
description: |
  大正至昭和年間，彰化名醫賴和在診所行醫的同時，用漢字創作出大量關懷社會底層、反抗日人剝削的新文學作品，被譽為『台灣新文學之父』。
  你將走訪賴和醫院舊址，還原這段以筆為刀的文學反抗歷史。
truth: |
  賴和的診所是日治時期彰化知識份子與底層庶民的交會所。他藉由行醫體會底層痛苦，並將其轉化為『一桿秤仔』等經典文學。他與天后宮、孔廟等地方組織關係緊密，被市民尊稱為『媽祖醫生』，其文學創作形成了台灣主體意識的初次萌芽。
