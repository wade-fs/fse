incident_id: record_extra_pos_95
name: 牡丹社事件
description: '1874年，日本以琉球漁民遇難為由派兵侵台。排灣族戰士在石門與日軍決一死戰。這是台灣走向近代國際舞台與清廷政策轉向的關鍵事件。

  你將深入恆春半島，重現帝國試探的足跡與排灣族祖靈的怒吼。'
truth: 牡丹社事件是日本帝國海軍的首次海外軍事擴張，也是清廷由『消極治台』轉為『積極開山撫番』的轉折點。排灣族頭目阿祿古斯率眾奮勇抗擊日軍，雖傷亡慘重，但其英勇迫使日軍退兵。事件後沈葆楨來台建古城、增設防務，台灣的命運被徹底改寫。
