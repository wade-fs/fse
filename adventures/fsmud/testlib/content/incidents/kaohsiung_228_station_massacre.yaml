incident_id: kaohsiung_228_station_massacre
name: 二二八事件：高雄火車站與要塞司令部衝突
description: |
  1947年三月，二二八事件蔓延至高雄。市民與學生在高雄火車站及市政府聚集，要求民主改革。
  高雄要塞司令彭孟緝下令軍隊下山掃蕩，在火車站周邊開槍射擊市民，造成慘重傷亡。
  你將在老車站的陰影中，尋找那段被刻意遺忘的歷史血淚。
truth: |
  高雄是二二八事件中最早遭到軍隊武力鎮壓的地區之一。三月六日，要塞司令部軍隊對市政府、火車站與高雄中學實施無差別掃蕩，多位談判代表在要塞司令部遭到逮捕處決。火車站一帶衝突尤為慘烈，是高雄二二八傷亡最嚴重的地點之一。
