incident_id: tainan_koxinga_landing_incident
name: 永曆十五年：明鄭大軍登陸鹿耳門
description: |
  1661年，鄭成功率領兩萬五千大兵跨越鹿耳門淺灘，奇襲普羅民遮城，圍攻熱蘭遮城，迫使荷蘭人投降撤離。
  這場戰役改寫了台灣的主權歸屬，使台灣正式進入漢人政權統治時期。
truth: |
  鄭成功的奇襲得益於對潮汐的精準預判與在地居民的情報支援。明鄭時期的建立雖然引入了儒學與官僚體制，但其本質仍是為了解決反清復明軍費問題的軍屯政權，對西拉雅族人的生存空間造成極大擠壓。
