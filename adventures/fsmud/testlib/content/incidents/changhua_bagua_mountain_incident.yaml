incident_id: changhua_bagua_mountain_incident
name: 1895八卦山戰役：乙未喋血
description: |
  1895年8月，日本近衛師團大軍壓境，台灣義軍與黑旗軍在八卦山展開激烈的防守決戰。
  吳彭年將軍率領義軍全軍覆沒，戰火甚至波及下方的彰化城與孔廟。
  你將重回這段乙未最悲壯的歷史防線。
truth: |
  八卦山決戰是乙未抗日中規模最大的山頭會戰。義軍雖然在裝備與訓練上居於絕對劣勢，但憑藉地勢頑強抵抗，造成日軍重大傷亡，包括日本北白川宮能久親王受傷的傳說。此役結束後，中台灣的組織性抵抗宣告瓦解，也留下了孔廟梁柱上的流彈彈孔等歷史標本。
