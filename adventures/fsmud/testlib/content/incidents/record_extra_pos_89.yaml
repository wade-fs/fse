incident_id: record_extra_pos_89
name: 林爽文事件
description: '乾隆五十一（1786）年，天地會領袖林爽文在彰化大里杙起義，攻佔彰化縣城與大半個台灣。這是清領歷史上規模最大的民變，波及全台，圍城數載。

  你將跨越彰化與雲林，尋找天地會的起義暗流與慘烈圍城印記。'
truth: 林爽文事件動搖了大清國本，清廷甚至派遣福康安率精銳大軍來台鎮壓。事件爆發時，各地方宗族為了自衛而選擇與官府合作或與義軍對立，催生了大量的『義民』信仰，對台灣中部社會的族群防衛結構產生了深遠影響。
