incident_id: tainan_siraya_identity_incident
name: 新港社後裔的阿立祖崇拜
description: |
  雖然表面上西拉雅族人在漢化過程中消失了，但在台南新市一帶的土地公廟裡，仍然可以發現與漢人神明並列的「阿立祖」祖靈甕。
  你將探尋這段在夾縫中求存的信仰混合歷史。
truth: |
  阿立祖與土地公的共存，是西拉雅族人在面對強大漢文化時所採取的文化適應策略。他們藉由將祖靈隱藏於漢人神殿的角落，成功地將其核心信仰脈絡延續到了現代，成為台灣多重族群史的活標本。
