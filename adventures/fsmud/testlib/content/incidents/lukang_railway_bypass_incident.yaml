incident_id: lukang_railway_bypass_incident
name: 縱貫線鐵路繞道與鹿港的沒落
description: |
  大正年間，日本政府修建縱貫線鐵路時，原本計畫經過鹿港，卻遭到當地行郊商人的強烈反對，鐵路最終繞道彰化。
  你將調查舊渡頭與隘門，探尋這段因拒絕鐵路而走向沒落的歷史轉折點。
truth: |
  縱貫線鐵路繞道是鹿港發展史上最關鍵的轉折。行郊商人因擔心風水被破壞與商業主導權喪失而集體反對，導致鹿港在鐵路時代被邊緣化。隨後港口嚴重淤積，鹿港從商業樞紐退化為保存古老工藝與民俗的『歷史博物館』。
