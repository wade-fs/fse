incident_id: tainan_shokusan_industry_incident
name: 日治時期的近代化基礎設施：台南水道與林百貨
description: |
  大正至昭和年間，日本殖民政府在台南展開大規模的基礎建設，包括現代自來水系統（台南水道）與現代化商業大樓（林百貨）。
  你將重溫這段將現代化文明引入古城的過程與代價。
truth: |
  台南水道與林百貨象徵著日治時期的「近代化」進程。在改善公共衛生與引進現代消費生活的同時，這些設施也服務於殖民政府的統治效率，並加深了階級與族群（日本人 vs. 本島人）在資源分配上的不平等。
