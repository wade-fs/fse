incident_id: kaohsiung_love_river_reclamation
name: 愛河整治與黑河變清流工程
description: |
  高雄愛河因長年工業與都市廢水排入，曾被謔稱為「黑水溝」或「臭水溝」，嚴重損害城市形象。
  從1970年代末開始，高雄市政府展開長達數十年的污水截流與河川整治工程，最終讓愛河恢復生機。
  你將走訪愛河兩畔，探尋這條母親河重獲新生的點滴記憶。
truth: |
  愛河的污染是高雄快速工業化付出的沉重代價。整治工程歷經多任市長，結合了現代化的污水下水道建設與水質監測系統，是台灣都市河川整治的典範工程，亦深刻改變了高雄市民的休閒生活與城市認同。
