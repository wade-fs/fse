incident_id: lukang_jiaobang_trade_incident
name: 一府二鹿：行郊與貿易的黃金年代
description: |
  乾隆至道光年間，鹿港作為對渡港口，商業極度繁盛，由各大商號組成的『八郊』（如泉郊、廈郊）主導了地方貿易與社會秩序。
  你將深入老街與天后宮，重溫那段萬船雲集的黃金歲月。
truth: |
  鹿港的行郊不僅是商業同盟，更是早期的市民自治組織。他們集資建廟、開井（半邊井）、修築防禦隘門，在清代官府控制力薄弱的台灣平原上，建立了一套基於信義與神明見證的社會秩序與繁榮結構。
