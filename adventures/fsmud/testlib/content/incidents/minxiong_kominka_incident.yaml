incident_id: minxiong_kominka_incident
name: 皇民化運動的裂縫
description: |
  昭和十二年（1937），台灣總督府推行「皇民化運動」，要求民雄公學校
  全面以日語教學，廢止漢文課程，並勸導家庭改用日本姓名。
  你透過殘存的文書、教師的私下記述、廟宇的隱藏文物，
  還原這段壓抑與抵抗並存的歷史。
truth: |
  民雄的皇民化並非全面成功。公學校教師德仔先在夜間私下教授漢文；
  大士爺廟的廟祝阿榮伯把主神像藏入牆縫；部分居民公開改了日本名，
  私底下仍使用漢名。表面順從、暗中保存的策略，讓台灣的文化根脈
  得以延續到戰後。
era_active: v1.5
