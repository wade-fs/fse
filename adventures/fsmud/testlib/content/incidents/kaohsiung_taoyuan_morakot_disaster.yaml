incident_id: kaohsiung_taoyuan_morakot_disaster
name: 八八風災與那瑪夏、桃源部落重建
description: |
  民國九十八年（2009年），莫拉克颱風挾帶超大豪雨席捲南台灣，引發嚴重的山崩與土石流，沖毀了那瑪夏與桃源多個原住民部落。
  災後，族人面臨遷村與原地重建的艱難抉擇，卡那卡那富族與布農族的傳統文化在重創中頑強復甦。
  你將走進荖濃溪畔的群山，傾聽大自然與原民記憶的對話。
truth: |
  八八風災是近年台灣最嚴重的自然災害之一，對高雄山區的生態環境與原住民社群造成毀滅性影響。災後的重建過程引發了關於「國土保安」與「原民文化空間主權」的深刻反思，族人透過社區營造與傳統祭典的復振，重新在破碎的土地上站立起來。
