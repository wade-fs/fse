incident_id: kaohsiung_zuoying_military_exile
name: 左營軍港二戰末期美軍大空襲
description: |
  二戰末期，日本海軍將左營建設為南進的重要軍港基地。
  昭和二十年（1945年），美軍特遣艦隊對左營軍港及周邊實施毀滅性大空襲，防空壕內死傷慘重。
  你將前往防空遺跡，尋找戰爭陰影留下的殘痕。
truth: |
  左營海軍基地是二戰時期日本帝國海軍在台灣最重要的基地，駐紮了高雄警備府。1944年底至1945年中，美軍對左營實施了密集的轟炸，不僅軍港設施受損嚴重，周邊的左營街區與防空壕亦波及甚深，造成大量平民與強制勞役工人的傷亡。
