incident_id: tainan_dutch_landing
name: 荷蘭東印度公司大員築城
description: |
  1624年，荷蘭東印度公司在今天安平的位置建造熱蘭遮城，開啟台灣的殖民時代與大航海歷史貿易。
  你將深入探尋當時台江內海與大員市鎮的開發原貌。
truth: |
  熱蘭遮城的建立確立了台灣作為東亞轉口港的戰略位置。荷蘭人利用其軍事優勢強迫周遭原住民族臣服，但同時引進了文字教育（新港文書）與水利、製鹽技術，奠定台江地區初期的空間結構。
