description: 宜蘭酒廠創立於日治時期，因蘭陽溪的清澈水源而聞名。廠中釀製的紅麴米酒以在地糯米為原料，醃豬腳、炒蚵仔、做三杯雞缺它不可。戰後酒廠轉為台灣省菸酒公賣局管轄，所有私釀皆屬違法，老農民私藏的陶缸被沒收，那股山林米香從此只留在記憶中。
