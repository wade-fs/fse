id: yilan_atayal_han_barter
title: 泰雅族與漢人的山林交易
era: qing
evidence_type: 族群記憶
quality: 2
progress: 10
description: 清代中葉，大同鄉一帶的泰雅族人會攜帶山豬肉、鹿皮、藤條下山，到漢人聚落換取鐵鍋、布匹和食鹽。這些交易通常在特定的「交易石」旁進行，雙方心照不宣地放下武器。然而隨著漢人逐漸向山上開墾，界線被打破，昔日的和平交易場所最終成為衝突爆發的地點。
