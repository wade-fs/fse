title: 新港社與新市的名稱淵源
era: dutch
evidence_type: 族群記憶
quality: 2
progress: 10
description: 新市舊稱「新港社」，是西拉雅族新港人（Sinkang）的原鄉。荷蘭時代，新港社是荷蘭東印度公司在台灣最早建立學校與教堂的地點之一，也是第一批接受拉丁字母文字教育的原住民所在地。那些用羅馬字書寫的「新港文書」，成為後人研究西拉雅族文化的珍貴窗口。
