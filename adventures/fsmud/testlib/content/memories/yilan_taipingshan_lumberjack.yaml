id: yilan_taipingshan_lumberjack
title: 太平山伐木工的生涯
era: japanese
evidence_type: 勞動記憶
quality: 2
progress: 10
description: 太平山的伐木工人分批進山，數月不歸。他們住在臨時搭建的山寮裡，以鋸子和斧頭對付百年巨木。日治時期，總督府在此鋪設了蹦蹦車（台車）軌道，讓樹木順著山坡滑入溪谷，再送往羅東。工人常在山中失蹤，有人說山神不喜人類砍伐，每一棵倒下的巨木都是一聲嘆息。
