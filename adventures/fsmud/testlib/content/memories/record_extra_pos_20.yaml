title: "打貓平原的插秧歌"
era: "japanese"
evidence_type: "農事日誌"
quality: 2
progress: 15
description: |
  農曆三月，插秧季節來臨。天還沒亮，田裡就已有人影。
  女人們排成一行，腰彎成弓，雙手在泥水中飛快地插下秧苗，
  嘴裡哼著用閩南語唱的插秧歌，調子悠長，像水一樣漫過田埂。
  男人在田畔用牛犁最後幾畝，水牛的步伐緩慢而有力，
  蹄印在泥土中深陷，像時間留下的印記。
  遠方糖廠的煙囪還沒點火，天邊的雲是淡橘色的。
  這一刻，整個打貓平原都在呼吸。
