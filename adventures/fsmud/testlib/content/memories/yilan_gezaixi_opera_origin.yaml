description: 歌仔戲相傳發源於宜蘭頭城，最初是農民在田埂上即興演唱的「歌仔」，融合了閩南山歌與車鼓陣的曲調。日治初期，宜蘭藝人歐欽明將其搬上簡易舞台，成為有劇情有妝扮的表演，並逐漸傳播至台灣全島乃至閩南一帶，成為最具台灣本土特色的劇種。
