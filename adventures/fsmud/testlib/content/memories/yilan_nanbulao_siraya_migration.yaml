description: 宜蘭南埔一帶曾是噶瑪蘭族與西拉雅族混居的地帶，兩族因習俗相近而通婚互助。然而漢人墾殖浪潮將他們逐漸推往山腳。老村長口傳，族人離去前將部落的祭祀石臼埋在大榕樹根部，並在樹幹上刻下記號，相約後代子孫若有緣回來，以此為憑，重建部落的靈魂。
