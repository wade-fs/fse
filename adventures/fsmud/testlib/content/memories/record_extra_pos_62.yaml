id: record_extra_pos_62
title: "傳教士的羅馬字課"
era: "dutch"
evidence_type: "教育記憶"
quality: 3
progress: 10
description: |
  荷蘭傳教士在教堂旁的大樹下架起一塊木板，用樹枝沾著墨汁，
  教新港社的孩子認識羅馬字母。
  那些孩子學得很快，比傳教士預期的快。
  三個月後，有個孩子用羅馬字寫下了他第一句族語：「我的土地在日出的方向。」
settlement: "singang"
trigger_site: "fengtian_shrine_garden"
