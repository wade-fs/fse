title: 新市糖廠的五分車汽笛
era: japanese
evidence_type: 產業記憶
quality: 2
progress: 10
description: 日治時期，新市設有糖業試驗所，周邊農地大量改種甘蔗。每年製糖季，五分車（小火車）拖著甘蔗沿著田埂鐵道蜿蜒行進，汽笛聲劃破田野的寧靜。老一輩的新市人說，那聲汽笛是他們童年最清晰的記憶，每當聽到，就代表又是一年的豐收開始。
