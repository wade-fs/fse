title: 北宜公路的九彎十八拐
era: modern
evidence_type: 交通記憶
quality: 2
progress: 10
description: 雪山隧道通車前，北宜公路是連接台北與宜蘭的唯一陸路。九彎十八拐的山路讓許多旅人聞之色變，濃霧、落石、颱風山洪輪番肆虐。老司機都知道哪個彎最危險，哪段路在大雨後會忽然塌陷。公路沿途設有幾座山神廟，香火鼎盛，每一柱香都是旅人平安抵達的感謝。
