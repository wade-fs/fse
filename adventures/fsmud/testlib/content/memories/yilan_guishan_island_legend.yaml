id: yilan_guishan_island_legend
title: 龜山島的漁村傳說
era: qing
evidence_type: 民俗記憶
quality: 2
progress: 10
description: 龜山島上的漁村曾住著百餘戶居民，世代以捕魚為生。島民相信龜山島是一隻沉睡的巨龜，若驚動牠，將引發海嘯。每逢出海，漁人必先向島頭的廟宇上香，求得神龜庇護。1977年政府以軍事為由強制遷村，島民含淚離開世代所居的小島，那座廟宇至今仍孤立於荒草之中。
