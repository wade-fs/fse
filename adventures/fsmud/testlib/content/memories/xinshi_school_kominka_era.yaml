title: 公學校與皇民化運動
era: japanese
evidence_type: 教育記憶
quality: 2
progress: 10
description: 日治後期，新市公學校推行皇民化教育，學生被要求在校內只能說日語，回家說台語的孩子被要求戴上「方言牌」示眾。然而放學後，老師背過身去，孩子們又恢復用台語嬉鬧。有位當年的學生回憶：「白天我是天皇的子民，晚上我還是阿嬤的孫子。」這句話道盡了殖民地孩子的雙重身分。
