id: xinshi_irrigation_ditch_battle
title: 新市水圳爭奪與械鬥
era: qing
evidence_type: 衝突記憶
quality: 2
progress: 10
description: 清代新市的漢人移民因為水源的控制權爆發數次械鬥。乾旱時節，上游村莊擅自截斷水圳，導致下游農田乾裂顆粒無收。憤怒的農民拿起鋤頭、扁擔，沿著水圳一路向上游衝去。知縣出面調解，勒石立碑，劃定各庄的用水輪序，碑文至今仍嵌在老廟牆上，記錄著那段血腥的水源爭奪史。
settlement: xinshi
trigger_site: xinshi_ditch
