description: |
  明治四十五年，阿里山森林鐵路正式通車。
  第一聲汽笛聲從嘉義出發，穿過平原，爬上山壁，進入森林。
  站台上的人拍手叫好，山上的鄒族人第一次看到這個冒煙的鐵獸，
  面面相觑，不知道這個開始意味著什麼。
