title: "製香的清晨"
era: "modern"
evidence_type: "日常記憶"
quality: 1
progress: 10
description: |
  清晨四點，香藝師傅起床，第一件事是確認昨天壓好的香條有沒有受潮。
  把乾燥的香條一根根放上竹架，讓它們在朝陽中慢慢乾燥。
  這個動作他做了三十年，他的師父做了四十年，師父的師父做了更多年。
  香的氣味是時間積累出來的，不是調配出來的。
