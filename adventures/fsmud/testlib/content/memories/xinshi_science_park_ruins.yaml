id: xinshi_science_park_ruins
title: 南科考古坑下的史前遺址
era: prehistoric
evidence_type: 考古記憶
quality: 2
progress: 10
description: 南部科學工業園區動土開挖之初，怪手挖出了大量史前人骨與陶器。考古學家緊急進場，發現這片土地之下埋藏著距今約五千年的大坌坑文化遺址，以及稍晚的蔦松文化層。數千年前的先民曾在此農耕、製陶、埋葬死者，而他們的文明在現代化的建設鏟車之前，只剩下最後幾個月的呼吸時間。
