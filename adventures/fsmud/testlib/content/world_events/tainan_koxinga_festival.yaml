description: |
  每年舉辦的延平郡王祭典，祭祀開台聖王鄭成功，忠義路一帶彩旗飄揚，廟埕民俗表演與儀式吸引大量人潮。
effects:
  site_desc_override:
    wu_fei_temple: |
      延平郡王祠外高掛著明鄭軍旗，廣場上進行著八家將與宋江陣的演出，鼓樂喧天。
    tainan_confucian_temple: |
      大成殿前今天特別安靜，為了祭孔與郡王祭的銜接，長老與樂生正在緊鑼密鼓地彩排大成樂舞。
