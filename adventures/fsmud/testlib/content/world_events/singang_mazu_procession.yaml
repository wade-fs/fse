description: |
  每年農曆三月，新港奉天宮舉行盛大的媽祖遶境活動，
  信眾從全台各地湧入，廟前廣場和周邊街道擠滿人群，
  鑼鼓聲和鞭炮聲從清晨持續到深夜。
effects:
  site_desc_override:
    singang: |
      廟前廣場完全被信眾佔滿，香煙瀰漫，鑼鼓聲震耳欲聾，你必須側身才能在人群中移動。
    duck_soup_alley: |
      三家鴨肉羹今天供不應求，隊伍排到巷口外，老闆說這一天的量等於平日一個月。
