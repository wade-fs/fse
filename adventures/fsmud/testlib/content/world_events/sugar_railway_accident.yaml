id: sugar_railway_accident
name:
  zh-TW: "糖鐵事故"
  en: "Sugar Railway Accident"
description:
  zh-TW: "糖業鐵路發生嚴重出軌事故！甘蔗車翻覆橫亙路上，蔗糖碎片滿地，工人們驚慌失措，相關路段暫時封鎖調查。"
  en: "A serious derailment has occurred on the sugar railway! Sugarcane cars are overturned, blocking the tracks. Workers are in a panic. The area is temporarily sealed."

trigger:
  type: "random"
  chance_per_tick: 2       # 每 15 遊戲分鐘 2% 機率觸發
  era: "japanese"          # 只在日治時代（糖鐵存在）才會發生
  min_interval: 600        # 距上次觸發至少 10 遊戲小時

duration_minutes: 120      # 持續 2 遊戲小時

effects:
  npc_event_flag: "sugar_railway_accident_active"

  # 封鎖糖廠相關的路線（玩家無法 travel 至糖廠）
  blocked_sites:
    - "sugar_factory_ruins"

  site_desc_override:
    sugar_factory_ruins:
      zh-TW: "廠區入口被鐵絲網圍住，幾名工頭在外怒罵。遠處傳來鐵器撞擊聲與受傷工人的呻吟。此地目前無法進入。"
      en: "The factory entrance is cordoned off with barbed wire. Foremen shout outside. Distant sounds of metal and injured workers can be heard. The area is inaccessible."
    minxiong_old_station:
      zh-TW: "月台上聚集了一群焦急的工人，七嘴八舌地議論著糖鐵出軌事故。老站長站在人群中，面色凝重，看起來比平時憔悴許多。"
      en: "Anxious workers crowd the platform, arguing about the sugar railway accident. The old station master stands among them, looking grave and worn."
    minxiong_market:
      zh-TW: "消息已傳到市場。攤販們竊竊私語，有人說這是遭了什麼詛咒，有人說是管理人員偷工減料。市場阿嬤搖著頭，嘆氣了好幾次。"
      en: "The news has reached the market. Vendors whisper among themselves. The market granny shakes her head repeatedly, sighing."

  # 關聯已有的 quest（讓玩家選擇去調查）
  related_incident: "minxiong_sugar_incident"
