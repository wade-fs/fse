id: tainan_ghost_festival
name: 府城中元大普渡
type: scheduled
era_active: null
duration_days: 3
affected_sites:
  - tainan_grand_mazu_temple
  - tainan_silian_yan
  - tainan_old_market
description: |
  農曆七月，台南府城各大聯境與天后宮共同舉行的大普渡。沿街擺設供桌，香煙繚繞，氣氛既莊嚴又熱鬧。
effects:
  site_desc_override:
    tainan_grand_mazu_temple: |
      廟門前的金爐火光熊熊，無數信眾將一疊疊金紙投入，煙霧幾乎籠罩了整座正殿。
    tainan_silian_yan: |
      四聯境各大廟宇聯手在街區中架起普渡棚，排開的供品一直延伸到老街的巷子裡。
