id: dashiye_festival
name:
  zh-TW: "大士爺祭典"
  en: "Lord Dashiye Festival"
description:
  zh-TW: "農曆七月，大士爺祭典盛大展開。民雄全境張燈結綵，家家戶戶普渡祈福，失源者的氣息也在此夜格外濃烈。"
  en: "The seventh lunar month — the Grand Festival of Lord Dashiye begins. Minxiong is festooned with lanterns. The presence of Specters is especially strong tonight."

trigger:
  type: "scheduled"
  schedule_time: "18:00-23:59"  # 每天傍晚至深夜舉行
  era: "japanese"               # 僅在日治時代以前的習俗（清領/日治均有）

duration_minutes: 360           # 持續 6 遊戲小時

effects:
  npc_event_flag: "dashiye_festival_active"

  site_desc_override:
    dashiye_temple:
      zh-TW: "大士爺廟燈火通明，鑼鼓喧天。四方信徒湧入，焚香祭拜，煙霧繚繞之間彷彿有無數眼睛正在注視著你。"
      en: "The temple blazes with lanterns and resounds with drums. Incense smoke fills the air. Countless eyes seem to watch from within the haze."
    ghost_house:
      zh-TW: "祭典之夜，鬼屋的氣息達到頂峰。空氣中流動著普渡食物的香氣，與腐土混雜在一起，說不清是安慰還是警告。"
      en: "On festival night, the haunted house's aura peaks. The scent of offerings mingles with damp earth — comfort or warning, you cannot tell."
    minxiong_market:
      zh-TW: "市場廣場已被改為普渡祭場，長桌擺滿三牲酒果，腳下的紅燭光搖曳不定，照亮每一張虔誠的臉。"
      en: "The market square has become the offering grounds. Long tables bear sacrificial food and fruit. Red candlelight flickers across reverent faces."
    minxiong_old_station:
      zh-TW: "月台邊有人搭起紙紮攤位，販賣精美的紙錢與紙製品。老站長不知去向，月台顯得出奇空曠。"
      en: "Paper offerings are sold near the platform. The old station master is nowhere to be seen. The platform feels unusually empty."

  # 祭典期間增強失源者共鳴效果（透過 global_event 讓 resonance_d 加成）
  resonance_bonus: 20
