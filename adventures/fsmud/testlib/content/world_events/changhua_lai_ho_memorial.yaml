id: changhua_lai_ho_memorial
name: 賴和文學音樂祭（媽祖醫生紀念日）
type: scheduled
era_active: modern
duration_days: 2
affected_sites:
  - changhua_lai_ho_clinic
  - changhua_city_site
  - changhua_confucian_temple
description: |
  每年舉辦的賴和文學音樂祭。彰化市區舉辦讀書會與音樂會，市民齊聚賴和紀念館，重讀他的經典新文學作品。
effects:
  site_desc_override:
    changhua_lai_ho_clinic: |
      紀念館門前擺滿了市民自發前來敬獻的野百合，館內迴盪著青年樂手彈唱的賴和詩句民謠。
    changhua_city_site: |
      市區老街掛起了文學布條，街道上傳出讀書會朗讀賴和散文的台語聲音，極具文化氣息。
