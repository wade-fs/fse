id: changhua_nanyao_procession
name: 南瑤宮彰化媽笨港進香
type: scheduled
era_active: null
duration_days: 3
affected_sites:
  - changhua_nanyao_temple
  - changhua_city_site
  - changhua_south_gate
description: |
  彰化南瑤宮著名的『笨港進香』。進香隊伍從彰化城出發，鑼鼓喧天，鞭炮齊鳴，大批信眾隨行，是中台灣最重要的宗教盛事之一。
effects:
  site_desc_override:
    changhua_nanyao_temple: |
      正殿前庭擠滿了來自各地的鑾轎與陣頭，進香的大旗在空中揮舞，宮前廣場人聲鼎沸。
    changhua_south_gate: |
      南門口十字路口被進香的人潮與長長的隨香隊伍完全佔滿，交通一度管制，鞭炮屑鋪滿了整條官道地磚。
