id: quest_tailor_mystery_customer_chiayi
title: "不老的旗袍客人"
settlement: chiayi_city
scope:
  - chiayi_city
era: modern
difficulty: 3
description: |
  旗袍裁縫師傅清月說，有個客人每年來取旗袍，從不量身，五十年沒有變過。
  更夫阿旺的故事說他看過街上一個穿旗袍的女人沒有影子。
  米店老闆娘說市場有個穿旗袍的女人問日本時代的老菜。
  這些描述是否指向同一個人？
objectives:
  - id: talk_tailor
    description: "向清月詢問那個神秘客人"
    npc: NPC_tailor_chiayi
    ask_topic: 神秘客人
  - id: cross_check_market
    description: "向市場阿桂嬤確認穿旗袍女人的描述"
    npc: NPC_market_granny_chiayi
    ask_topic: 傳言
  - id: visit_photo_studio
    description: "前往照相館一帶尋找線索（與民雄的照相館老闆娘連動）"
    site: qipao_tailor_chiayi
    action: look
  - id: memory_temple_lady
    description: "解鎖「問卜的女人」確認身份線索"
    memory: record_extra_pos_24
completion_reward:
  exp: 1100
  faction: chiayi_mystery
  reputation: 75
