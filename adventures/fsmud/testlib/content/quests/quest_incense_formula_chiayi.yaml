id: quest_incense_formula_chiayi
title: "失傳的迴瀾香"
settlement: chiayi_city
scope:
  - chiayi_city
era: modern
difficulty: 2
description: |
  百年香舖第四代阿隆說，他有一種叫「迴瀾」的香，
  是清代祭典用的，材料之一在戰後就進不來了。
  廟公阿全說，有老委員每年都在問有沒有存貨。
  你試圖追查這種香的配方和歷史，並找到尋訪者的身份。
objectives:
  - id: talk_incense_maker
    description: "向香舖第四代阿隆詢問迴瀾香的故事"
    npc: NPC_incense_maker_chiayi
    ask_topic: 傳言
  - id: talk_temple_keeper
    description: "向廟公阿全詢問老委員的身份"
    npc: NPC_city_god_keeper_chiayi
    ask_topic: 城隍
  - id: find_incense_formula
    description: "在香舖深處尋找配方記錄"
    site: incense_shop_chiayi
    action: search
completion_reward:
  exp: 900
  faction: chiayi_folk
  reputation: 60
