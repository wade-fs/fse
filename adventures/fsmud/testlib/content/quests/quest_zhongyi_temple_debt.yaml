id: quest_zhongyi_temple_debt
title: "武廟的祖傳借據"
settlement: tainan
scope:
  - tainan
era: modern
difficulty: 2
description: |
  武廟保存著一本幾十年前由老商人立下的古怪『承諾借據』。
  廟公阿勝透露，目前是其第三代孫子每年來武廟還一個小承諾。
  你將協助釐清這份長達三代的神秘契約內容。
objectives:
  - id: talk_temple_勝
    description: "向 廟公阿勝 詢問那本借據與商人的名字"
    npc: NPC_zhongyi_temple_keeper
    ask_topic: 借據
  - id: look_altar_secret
    description: "在 忠義路武廟 仔細觀察月老祠神龕周圍"
    site: tainan_zhongyi_temple
    action: look
  - id: talk_foodie_helper
    description: "在西市場向 美食導覽員小玉 詢問那名老商人的背景"
    npc: NPC_tainan_foodie_guide
    ask_topic: 傳言
completion_reward:
  exp: 1100
  faction: taiwan_folk_memory
  reputation: 75
