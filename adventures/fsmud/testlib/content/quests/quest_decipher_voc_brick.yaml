id: quest_decipher_voc_brick
title: "VOC磚上的義字"
settlement: tainan
scope:
  - tainan
era: dutch
difficulty: 4
description: |
  安平古堡的老城牆某塊磚上，同時刻有荷蘭東印度公司的VOC標誌與漢字『義』。
  導覽志工阿義與荷蘭學者Jan對此有不同的學術解讀。
  你將協助他們找到這塊磚的真正歷史含義。
objectives:
  - id: talk_dutch_scholar
    description: "向 Jan 詢問熱蘭遮城文書中關於本地工匠的記載"
    npc: NPC_dutch_researcher
    ask_topic: 文書
  - id: talk_rector_guide
    description: "向 志工阿義 詢問這塊磚在古堡牆體上的具體位置"
    npc: NPC_anping_fort_guide
    ask_topic: 傳言
  - id: look_fort_wall
    description: "在 安平古堡 仔細觀察那塊帶有漢字的荷蘭磚"
    site: tainan_anping_fort
    action: look
completion_reward:
  exp: 1700
  faction: siraya_memory
  reputation: 120
