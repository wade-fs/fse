rumors:
- 有人傳言，善化糖廠廢棄的舊煙囪在冷戰時期曾被作為軍事防空的秘密哨所。
- 聽說慶安宮神龕下的夾層裡，藏有沈光文當年親筆手書的《台灣輿圖》手稿殘卷。
