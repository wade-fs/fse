id: ghost_house
settlement: minxiong
canonical_name: 民雄鬼屋
is_heritage: false
base_description: |
  一棟荒廢的三層紅磚洋樓矗立在荒煙蔓草之中。
  巨大的榕樹氣根如蛛網般殘繞著斷垣殘壁，陽光穿過茂密的枝葉，灑落斑駁的光影。
  四周靜謐得有些詭異，隱約能聽到風吹過落葉的沙沙聲。
travel_arrive_text: "你沿著小徑走近那座傳說中的荒廢洋樓，四周的溫度似乎悄悄降了幾度。"
footprint: ghost_house_minxiong

names:
