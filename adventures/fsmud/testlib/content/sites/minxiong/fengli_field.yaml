id: fengli_field
settlement: minxiong
canonical_name: 鳳梨田
is_heritage: false
base_description: |
  大片菠蘿（鳳梨）在豔陽下閃著蠟質的光澤，
  葉緣的鋸齒尖銳，走進去要小心刮傷。
  工人用麻袋裝著採收的果實，扛在肩上走向路邊等候的牛車。
  鳳梨的甜酸氣味在熱空氣中揮散，引來了幾隻蒼蠅。
travel_arrive_text: "你走入鳳梨田，腳下的泥土鬆軟，空氣中瀰漫著濃郁的果香。"

names:
