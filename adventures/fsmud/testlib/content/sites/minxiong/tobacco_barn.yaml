id: tobacco_barn
settlement: minxiong
canonical_name: 菸樓
is_heritage: true
base_description: |
  一棟磚造的菸樓靜靜立在田間，屋頂的百葉氣窗半開著，
  是當年烘烤菸葉時排散濕氣的設計。
  角落裡還有幾個廢棄的烘乾架，菸草已久未入庫，
  但整棟建築被保存得完整，空氣中仍殘留淡淡的陳年菸草香。
travel_arrive_text: "你推開菸樓厚重的木門，一股陳年菸草的氣息迎面而來，帶著乾燥和歷史的味道。"

names:
  - era: qing
    name: 曬菸場
  - era: japanese
    name: 菸草乾燥場
  - era: postwar
    name: 公賣局菸葉收購站
  - era: modern
    name: 菸樓（廢棄）

rumors:
  - "有人說菸樓的地窖當年被用來藏物資，戰後的人把東西都搬走了，但地磚撬開後發現底下還有一層。"

connections:
  - rural_village
  - farmhouse
