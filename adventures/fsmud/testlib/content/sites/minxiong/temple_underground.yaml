id: temple_underground
settlement: minxiong
canonical_name: 大士爺廟地下陣法
is_heritage: false
is_dungeon: true
base_description: |
  潮濕的石室在搖曳的符火中顯得幽深難測。
  四面牆壁刻滿了密密麻麻的陣符，部分已剝落，冒出裂縫。
  三尊由鎮煞陣法固定的符文石座空空如也，原本鎮壓於此的「鎮符石」已不知散落何處。
  空氣中迴盪著低沉的哭嚎聲，彷彿有什麼東西在陰暗中徘徊。
travel_arrive_text: "你俯身鑽過鬆動的石磚縫隙，踩著狹窄的石階一路向下，進入了大士爺廟的地下陣法室。"

connections:
  - dashiye_temple

reveal_layers:
  # 一進來就能看到的陰鬼警告訊息
  - condition: all
    checks: []
    text: "$HIM$（陣法室內有強烈的陰氣壓迫感，你察覺至少有三尊怨靈在此盤據。搜索（search）四周或許能發現鎮符石的蹤跡。）$NOR$"

  # 找到至少一枚鎮符石後，出現的新線索
  - condition: all
    checks:
      - type: has_quest
        quest_id: temple_exorcism
        status: active
    text: "$CYN$（陣法室牆上的符文偶爾閃爍，似乎在指引著失落的鎮符石位置——角落的碎石堆、正中央陣眼的裂縫，以及東側坍塌的壁龕中。）$NOR$"
