rumors:
- 聽說清水斷崖眺望處在起大風的夜晚，玄武岩或大理石縫裡會傳出像戰士低吟的風聲。
- 有人傳言，在清水斷崖眺望處遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用急救箱。
