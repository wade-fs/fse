rumors:
- 聽說秀姑巒溪河口在起大風的夜晚，玄武岩或大理石縫裡會傳出像戰士低吟的風聲。
- 有人傳言，在秀姑巒溪河口遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用急救箱。
