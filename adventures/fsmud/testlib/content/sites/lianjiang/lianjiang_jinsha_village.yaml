id: lianjiang_jinsha_village
settlement: lianjiang
canonical_name: 津沙聚落古厝
base_description: 以金沙海灘聞名的閩東古村，石屋櫛比鱗次，老厝門額上刻有精緻的辟邪獅頭，空氣中瀰漫著老酒與海鹽味。
names:
