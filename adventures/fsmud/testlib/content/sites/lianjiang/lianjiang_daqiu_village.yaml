id: lianjiang_daqiu_village
settlement: lianjiang
canonical_name: 大坵島舊村落
base_description: 昔日繁榮、如今居民搬遷一空的荒廢石屋村落，大批野生梅花鹿在屋宇荒草與石牆間穿梭，海風呼嘯。
names:
