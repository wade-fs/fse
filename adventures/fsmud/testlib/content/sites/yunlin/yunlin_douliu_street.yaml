base_description: 雲林斗六的舊街市。街道兩側散佈著古老的木構與紅磚店鋪，是清代斗六門的行政與商業中心，漳泉移民在此交錯雜居。
travel_arrive_text: 你來到斗六老街口，四周十分嘈雜，古老屋簷下的陰影裡有許多挑夫在歇息。
