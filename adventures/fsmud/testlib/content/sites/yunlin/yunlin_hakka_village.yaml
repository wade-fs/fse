base_description: 斗六外圍的客家聚落，屋厝相連，防禦性極強。在漳泉械鬥頻繁的時代，這裡是客家移民團結共抗強鄰的堡壘。
travel_arrive_text: 你走進客家庄，四周的房舍多為土角厝與防衛性竹籬，村民說著流利的客家客語。
