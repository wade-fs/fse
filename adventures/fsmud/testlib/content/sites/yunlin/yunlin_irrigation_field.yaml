base_description: 清代漳州與泉州移民為爭奪灌溉水源而多次爆發械鬥的農田水圳旁。兩側水閘板斑駁陸離，泥地裡曾掩埋了無數械鬥死難者的骸骨。
travel_arrive_text: 你站在寬闊的灌溉水圳旁，圳水湍急，兩旁是無垠的稻田，水閘口殘留著幾座無名小墳。
