id: beigang_ancient_ferry
settlement: yunlin
canonical_name: 笨港古渡口
is_heritage: true
base_description: 昔日笨港溪畔的重要渡口，是閩台對渡與貨物集散的港埠。清代「笨港砂防」時期，更是北港防禦的交通咽喉。
travel_arrive_text: 溪水緩緩流過，舊石階沒入泥沙中。站在古渡口舊址，彷彿還能聽見清代商船靠岸時水手的呼喊聲。
