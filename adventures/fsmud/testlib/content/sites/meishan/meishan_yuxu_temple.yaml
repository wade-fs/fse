rumors:
- 碧湖山的茶農說，在大霧封山的清晨，茶園梯田的深處能隱隱聽到昔日山胞採茶的虛幻歌聲。
- 聽說瑞里紫藤古徑的樟腦灶遺址地底下，還埋有二戰時期日軍撤退時藏匿的樟腦油鐵桶。
