rumors:
- 北埔老茶工說，金廣福公館的防禦地道，能一路通往後山的竹林深處以備突圍。
- 聽說玻璃工藝館在深夜，能聽到日治時期日本皇族在此度假時所彈奏的鋼琴聲幻音。
