rumors:
- 聽說玻璃工藝館在深夜，能聽到日治時期日本皇族在此度假時所彈奏的鋼琴聲幻音。
- 城隍廟的老食客說，七月城隍出巡時，神轎經過的街角，深夜偶爾能聽到虛幻的鎖鏈碰撞聲。
