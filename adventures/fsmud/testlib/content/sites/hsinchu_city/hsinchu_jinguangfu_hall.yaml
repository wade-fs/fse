rumors:
- 有人傳言，姜阿新洋樓的暗夾層裡，藏有日治後期為防範徵收而藏匿的純金製茶秤。
- 北埔老茶工說，金廣福公館的防禦地道，能一路通往後山的竹林深處以備突圍。
