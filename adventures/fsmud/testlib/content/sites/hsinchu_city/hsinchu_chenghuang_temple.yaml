id: hsinchu_chenghuang_temple
settlement: hsinchu_city
canonical_name: 新竹都城隍廟
base_description: 全台官位最高的都城隍廟，香火鼎盛，廟前的貢丸米粉市集人聲鼎沸，是新竹信仰與飲食的核心地標。
names:
