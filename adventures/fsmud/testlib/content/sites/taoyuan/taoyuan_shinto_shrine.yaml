rumors:
- 聽說桃園神社在起大風的夜晚，玄武岩或檜木縫裡會傳出像戰士低吟的風聲。
- 有人傳言，在桃園神社遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用罐頭箱。
