id: yancheng
settlement: kaohsiung
canonical_name: 鹽埕
is_heritage: true
base_description: |
  高雄鹽埕區，舊日的港市精華地帶。
  清代以曬鹽業起家，日治時期隨著港口繁榮成為高雄的商業中心，
  如今老店面仍在，但繁華的痕跡已沉入安靜的街巷間。
travel_arrive_text: 你走進鹽埕區，舊時騎樓的柱廊還在，老裁縫店與茶行之間夾著一家咖啡館，新舊在這裡安靜共存。
names:
- era: qing
  name: 鹽埕埔
- era: japanese
  name: 鹽埕町
- era: modern
  name: 鹽埕區
rumors:
  - "鹽埕老街有一間從日治時代傳下來的布店，第三代老闆說他從沒更換過那台舊式裁縫機，但修理師傅說機器的零件型號是從來沒見過的款式。"
connections:
