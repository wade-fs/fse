rumors:
- 老樸樹其中一棵的樹洞，有人說裡面藏著一批清代文書，是當年義民軍的聯絡信件，沒有人取出來，怕驚擾了樹神。
settlement: kaohsiung
travel_arrive_text: 你走入樸子腳舊聚落，幾棵老樸樹的樹冠遮蔽了整條巷子，老廟的屋瓦在陽光下金亮。
