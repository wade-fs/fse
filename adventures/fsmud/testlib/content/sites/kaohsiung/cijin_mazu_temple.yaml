- era: japanese
  name: 旗津天后宮 (japanese)
rumors:
- 廟裡最老的那塊石碑，碑文裡有一個字被後來的人填補過——老廟祝說原來那個字是個地名，那個地方現在已不存在，沒有人知道在哪裡。
settlement: kaohsiung
travel_arrive_text: 你走入旗津天后宮，廟埕上的榕樹參天，香火裊裊，海上的媽祖庇佑著來往的漁船。
