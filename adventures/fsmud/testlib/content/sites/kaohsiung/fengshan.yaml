base_description: 高雄鳳山聚落，鄰近下淡水溪（高屏溪）。清領時期設有鳳山縣治，是南部防務與行政的重要中心，城牆周圍環繞著寬闊的護城河。
travel_arrive_text: 你來到了鳳山街市，街道兩旁店鋪林立，遠處可見舊縣城的城牆輪廓。
