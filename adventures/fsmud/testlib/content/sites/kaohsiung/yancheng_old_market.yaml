rumors:
- 市場最深處有個賣醬菜的老阿嬤，她說她的漬物秘方是從媽祖夢裡學來的，從不外傳，但曾有人說吃了她的醬菜夢見了已故的親人。
settlement: kaohsiung
travel_arrive_text: 你走進鹽埕市場，攤位間走道狹窄，老攤主叫賣的台語腔調帶著老高雄的韻味。
