base_description: '旗山光復路，與老街平行的另一條老街廊，

  這裡是旗山客家移民最初落腳的地方，

  舊式三合院夾在現代建築之間，仍然可以聞到客語歌謠的氣息。

  '
canonical_name: 旗山光復路
