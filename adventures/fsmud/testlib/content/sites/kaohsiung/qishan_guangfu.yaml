rumors:
- 路上有棟三合院，正廳供著一塊沒有神像的神主牌，牌上的名字是空白的，鄰居說那家人已搬走五十年，但牌位前的香從來沒有熄過。
settlement: kaohsiung
travel_arrive_text: 你走上旗山光復路，兩旁的屋簷低矮，牆縫裡長著野草，某家門口擺著一盆紅色的九重葛，開得很盛。
