rumors:
- 城隍廟的鐘鼓，在農曆七月每逢正午的時刻會自己發出聲響，廟公說這是城隍出巡的前奏，但沒有人真的見過神轎出去。
settlement: kaohsiung
travel_arrive_text: 你走進鳳山城隍廟，廟內森嚴的塑像俯視而下，地方的恩怨糾葛似乎都在這裡有了最後的仲裁。
