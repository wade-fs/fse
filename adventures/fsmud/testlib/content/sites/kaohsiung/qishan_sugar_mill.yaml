rumors:
- 老工人說每到甘蔗收穫季的夜晚，廠區深處會傳來機器運轉的聲音，但廠房早已廢棄二十年了。
settlement: kaohsiung
travel_arrive_text: 你走進旗山糖廠舊址，廠房的紅磚在陽光下泛著溫暖的光，煙囪已不再冒煙，但糖蜜的甜香彷彿還殘留在空氣裡。
