base_description: '旗山糖廠，日治時代建設的製糖工廠，是南台灣糖業帝國的一環。

  廠區內保有舊日的廠房建築，窄軌小火車的遺跡仍在，訴說著蔗糖黃金年代的繁華。

  '
canonical_name: 旗山糖廠
