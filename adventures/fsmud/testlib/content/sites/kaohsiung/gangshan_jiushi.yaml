rumors:
- 市場一個賣滷味的老兵，說他的配方裡有一味是從中國帶來的香料，那個香料已經在台灣找不到，他的存貨只剩下最後一點，夠再滷幾百鍋。
settlement: kaohsiung
travel_arrive_text: 你走進岡山舊市場，眷村滷味的香氣撲面而來，攤主用帶著外省腔的台語對你打招呼。
