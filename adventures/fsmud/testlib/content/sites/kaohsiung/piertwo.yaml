rumors:
- 駁二最老的那棟倉庫裡，藝術家說深夜工作時偶爾能聽見木箱被搬動的聲音，但從來看不見人。
settlement: kaohsiung
travel_arrive_text: 你走入駁二藝術特區，倉庫的鐵軌貫穿廣場，塗鴉與裝置藝術佔據了每一面牆，海風從港口方向吹來。
