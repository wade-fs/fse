base_description: '高雄舊港倉庫改建的藝術特區，是台灣最具規模的文創園區之一。

  舊倉庫的紅磚牆上掛著裝置藝術，貨運鐵道旁是咖啡館與獨立書店，

  工業遺跡與當代藝術在這裡奇妙地融合。

  '
canonical_name: 駁二藝術特區
