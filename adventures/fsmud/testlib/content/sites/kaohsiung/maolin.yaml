base_description: '高雄茂林區，魯凱族的傳統領域，深山峽谷間的原住民聚落。

  紫蝶幽谷每年冬天吸引數以萬計的紫斑蝶越冬，是台灣最壯觀的生態奇觀之一。

  魯凱族的石板屋與百合花文化，在這裡仍然鮮活。

  '
