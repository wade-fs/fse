rumors:
- 部落的老人說，茂林峽谷深處有一個只有魯凱族巫師才知道的岩洞，岩洞裡刻著部落遷徙的歷史，用的是沒有外人學過的符號。
settlement: kaohsiung
travel_arrive_text: 你走入茂林峽谷，溪水碧藍，兩岸峭壁夾著天空，魯凱族的石板屋就散佈在山腰的聚落裡。
