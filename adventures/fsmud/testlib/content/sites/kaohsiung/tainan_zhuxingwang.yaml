base_description: 朱一貴攻佔台南府城後所設的短暫自治首府。他在這裡登基，自稱『義王』，年號『永和』。雖然自治僅維持了短短數月，卻是台灣民變史上的奇蹟。
travel_arrive_text: 你站在這座曾作為行宮的古老院落前，紅磚牆面在陽光下顯得斑駁，昔日的喧囂已化為歷史的塵埃。
