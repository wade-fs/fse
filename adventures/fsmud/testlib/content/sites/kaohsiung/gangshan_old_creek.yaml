base_description: '流貫岡山的阿公店溪，清代是阿公店聚落的灌溉命脈。

  溪畔的農田孕育了整個岡山的稻米與甘蔗，

  朱一貴事件的義軍當年就是沿著這條溪谷集結的。

  '
