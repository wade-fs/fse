rumors:
- 溪邊有個釣魚的老人說，每年農曆三月，溪水有時候會變成淡紅色，持續幾個小時，附近的人說那是朱一貴的人馬還在渡溪。
settlement: kaohsiung
travel_arrive_text: 你站在阿公店溪橋上，溪水不急不緩地流過，兩岸的老榕樹把水面遮蔽成蔭。
