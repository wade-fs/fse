base_description: '旗山區文化中心，是這個山城的文化聚點。

  定期舉辦客語推廣活動、在地藝術展覽，以及每年的香蕉文化節。

  這裡收藏了旗山地區的文史資料，是了解這片土地歷史的重要入口。

  '
