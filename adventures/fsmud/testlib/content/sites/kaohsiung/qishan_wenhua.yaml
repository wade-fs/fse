rumors:
- 文化中心地下室的舊檔案室，有人說看過幾本裝訂成冊的日治時代農事日誌，裡面記錄的天氣數據跟現在的氣象完全吻合，好像有人一直在寫。
settlement: kaohsiung
travel_arrive_text: 你走進旗山文化中心，大廳裡掛著舊日香蕉農的黑白照片，穿著圍裙的農人對著鏡頭微笑。
