base_description: '三鳳宮，高雄最重要的民間信仰中心之一，主祀中壇元帥哪吒太子。

  廟宇規模宏大，香火鼎盛，廟前的年貨大街每年農曆新年前後人山人海，

  是高雄市民生活中不可缺少的信仰地標。

  '
