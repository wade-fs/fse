rumors:
- 廟裡有個老乩童，說他替哪吒問事幾十年了，有次問到一個問題哪吒不肯回答，從那天起他就不再問那類的問題了，他說那個問題是關於某個人的前世。
settlement: kaohsiung
travel_arrive_text: 你來到三鳳宮廟埕，巨大的神像在廟頂俯視下方，廟前的街道上攤販林立，香菸繚繞。
