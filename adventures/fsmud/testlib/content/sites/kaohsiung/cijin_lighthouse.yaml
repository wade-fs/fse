id: cijin_lighthouse
settlement: kaohsiung
canonical_name: 旗津燈塔
is_heritage: true
base_description: |
  旗津島南端的燈塔，建於清同治年間，是台灣最早的西式燈塔之一。
  白色的塔身在陽光下發亮，海峽的船隻以此為導航標誌已超過百年。
travel_arrive_text: 你攀上旗津燈塔丘，海風強勁，台灣海峽的蔚藍在腳下延伸，燈塔的白色塔身在晴空下格外耀眼。
names:
- era: qing
  name: 旗後燈塔
- era: japanese
  name: 高雄燈台
- era: modern
  name: 旗津燈塔
rumors:
  - "老船員說，日治時期某年颱風夜，燈塔的燈突然熄滅，但海面上還是有光在指引船隻——那晚沒有一艘船沉沒，後來沒有人能解釋那道光從何而來。"
connections:
- qijin
