rumors:
- 楠梓加工區最老的廠房，牆上有一塊用水泥封住的缺口，老員工說那是當年某個工人被機器夾住的位置，之後就封掉了，但有人說那個缺口每年都會重新出現裂縫。
settlement: kaohsiung
travel_arrive_text: 你進入楠梓，工廠的煙囪與住宅大樓混雜在一起，工業區的邊界和市區的界線在這裡模糊了。
