base_description: '高雄楠梓區，台灣最重要的石化工業區所在地。

  舊農業聚落與現代工廠並存，楠梓加工出口區是台灣經濟奇蹟的起點之一，

  幾十年前大批農家子弟在這裡從農夫變成了工廠作業員。

  '
