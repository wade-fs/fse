id: lotus_pond
settlement: kaohsiung
canonical_name: 蓮池潭
is_heritage: true
base_description: |
  左營蓮池潭，台灣最著名的宗教景觀之一。龍虎塔矗立湖心，
  春秋閣掩映荷花間，廟宇與水景交融，是民間信仰的聖地。
travel_arrive_text: 你來到蓮池潭畔，龍虎塔的倒影在微風中搖曳，香煙裊裊從廟口飄出。
names:
- era: qing
  name: 蓮花潭
- era: japanese
  name: 蓮池
- era: modern
  name: 蓮池潭
rumors:
  - "每年農曆七月，有漁民說在潭中看見龍形水光，那是地底蓮花開放的訊號，今年的運勢就看那天晚上。"
connections:
- zuoying
