base_description: '鳳山的核心商業街區，舊縣城的商業傳統在現代化的街道上延續。

  眷村聚落留下的外省小吃與在地的台菜攤位交錯分布，

  每到傍晚，整條街就成了鳳山市民的飯廳。

  '
