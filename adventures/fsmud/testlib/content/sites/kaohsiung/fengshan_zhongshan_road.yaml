rumors:
- 中山路某家老字號沙茶麵，說它的湯底配方被一個外省老兵帶來，那個配方本來要帶去中國的，但老兵回不去了，所以那個味道就留在這裡了。
settlement: kaohsiung
travel_arrive_text: 你走上鳳山中山路，傍晚時分攤子開始擺出來，羊肉爐的熱氣與滷肉飯的香氣在街上飄散。
