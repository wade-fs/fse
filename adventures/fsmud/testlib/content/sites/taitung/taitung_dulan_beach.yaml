rumors:
- 聽說都蘭黑色沙灘在起大風的夜晚，玄武岩或花崗岩縫裡會傳出像戰士低吟的風聲。
- 有人傳言，在都蘭黑色沙灘遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用急救箱。
