id: taitung_dulan_sugar
settlement: taitung
canonical_name: 都蘭紅糖廠舊址
base_description: 日治時期設立的都蘭赤糖工廠，紅磚煙囪巨大，廠區木造倉庫如今保留為藝術創作空間。
names:
- era: "v0.1"
  name: 舊日治都蘭紅糖廠舊址
- era: "v2.0"
  name: 台東都蘭紅糖廠舊址
- era: "modern"
  name: 都蘭紅糖廠舊址
connections:
- chishang
rumors:
- 聽說都蘭紅糖廠舊址在起大風的夜晚，玄武岩或花崗岩縫裡會傳出像戰士低吟的風聲。
- 有人傳言，在都蘭紅糖廠舊址遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用急救箱。
