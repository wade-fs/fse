id: taitung_dapo_pond
settlement: taitung
canonical_name: 池上大坡池沼澤
base_description: 池上地區的天然大內陸沼澤，曾是阿美族人捕魚與採集菱角的聖地，水草豐美，常有水鳥群飛。
names:
- era: "v0.1"
  name: 舊日治池上大坡池沼澤
- era: "v2.0"
  name: 台東池上大坡池沼澤
- era: "modern"
  name: 池上大坡池沼澤
connections:
- chishang
rumors:
- 聽說池上大坡池沼澤在起大風的夜晚，玄武岩或花崗岩縫裡會傳出像戰士低吟的風聲。
- 有人傳言，在池上大坡池沼澤遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用急救箱。
