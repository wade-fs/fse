canonical_name: 紅葉少棒操場
base_description: 紅葉谷中被大山包圍的紅黃泥土操場，昔日紅葉少棒隊員在此赤腳奔跑、用木棍擊打石頭進行練習，是台灣棒球傳奇之地。
