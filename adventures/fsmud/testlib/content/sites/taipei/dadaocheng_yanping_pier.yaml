base_description: 淡水河畔的繁忙碼頭，是清末大稻埕烏龍茶與樟腦出口海外的主要裝運港。帆船與戎克船靠滿江邊，碼頭工人川流不息。
travel_arrive_text: 你來到淡水河畔，江水滔滔，昔日木船桅杆如林的景象已換成現代的河濱綠地與遊艇。
