base_description: 藏身於迪化街巷弄深處的百年老茶館，沒有招牌，只有熟客才知道入口，裡頭保存著清代至今的各種珍稀老茶。
travel_arrive_text: 你穿過一道不起眼的木門，迎面而來的是壓抑的茶香與昏黃的油燈光，老掌櫃正在安靜地泡著一壺老茶。
