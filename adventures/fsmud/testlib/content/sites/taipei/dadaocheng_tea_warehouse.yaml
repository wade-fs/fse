is_heritage: true
base_description: 大稻埕鼎盛時期的茶葉精製與存放倉庫。空氣中瀰漫著焙茶的濃郁炭香，紅磚與巴洛克立面的街屋見證了洋行洋商買辦茶葉的輝煌時代。
travel_arrive_text: 你走進幽深的老茶行，一排排巨大的竹編茶籠整齊排列，焙茶灶正冒著熱氣。
