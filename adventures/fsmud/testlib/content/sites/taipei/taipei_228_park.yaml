base_description: 昔日的「台北公園」，1947年二二八事件在此爆發。公園內保留了日治時期的台灣博物館，中央立有二二八紀念碑。
travel_arrive_text: 公園裡老榕樹濃蔭遮天，台灣博物館的綠色圓頂在陽光下熠熠生輝，一旁的紀念碑讓人沉默思索。
