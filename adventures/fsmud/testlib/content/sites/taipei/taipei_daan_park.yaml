base_description: 台北市最大的都市公園，面積廣達26公頃，內有音樂廣場、生態湖與多種鳥類，是市民日常休憩的城市綠肺。
travel_arrive_text: 茂密的樹木濾去了城市的喧囂，鳥鳴聲清脆悅耳，慢跑者、遛狗的市民在小徑上悠然而過。
