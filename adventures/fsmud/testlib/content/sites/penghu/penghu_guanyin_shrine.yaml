id: penghu_guanyin_shrine
settlement: penghu
canonical_name: 觀音亭古井
base_description: 觀音亭後院清代開鑿的砌石古井，井水甘甜，在缺乏淡水的澎湖群島中曾是居民爭相挑水的甘泉。
names:
- era: "v0.2"
  name: 舊日治觀音亭古井
- era: "v1.0"
  name: 澎湖觀音亭古井
- era: "modern"
  name: 觀音亭古井
connections:
- penghu_site
rumors:
- 聽說觀音亭古井在起大風的夜晚，玄武岩縫裡會傳出海潮般的低吟聲。
- 有人傳言，在觀音亭古井遺址地底下，仍埋有日治時期防守要塞時藏匿的軍用指南針。
