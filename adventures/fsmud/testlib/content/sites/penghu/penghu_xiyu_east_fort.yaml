rumors:
- 聽說西嶼東臺砲台在起大風的夜晚，玄武岩縫裡會傳出海潮般的低吟聲。
- 有人傳言，在西嶼東臺砲台遺址地底下，仍埋有日治時期防守要塞時藏匿的軍用指南針。
