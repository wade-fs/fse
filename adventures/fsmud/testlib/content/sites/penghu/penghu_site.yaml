rumors:
- 聽說在馬公港對渡的老碼頭石板路底下，還埋有明代沈有容部隊遺留下來的黃銅鐵砲彈。
- 有人傳言，在起霧的清晨，馬公舊港面會浮現出清代戎克船入港的虛幻桅杆倒影。
