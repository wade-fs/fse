id: maobitou
settlement: hengchun
canonical_name: 貓鼻頭
is_heritage: false
base_description: |
  恆春半島西南岬角。因有一塊崩落的珊瑚礁岩形似蹲仆的貓而得名，
  是台灣海峽與巴士海峽的分界點。
travel_arrive_text: 你站在觀景台上，腳下是波濤洶湧的裙礁海岸，形似貓咪的巨石在海浪沖刷中安然矗立。
names:
- era: qing
  name: 貓鼻頭山
- era: japanese
  name: 貓鼻頭岬
- era: modern
  name: 貓鼻頭
rumors:
  - "礁岩裂縫中曾有一處淡水泉，傳說喝了那泉水的人，在海上一生都不會迷失方向。"
connections:
