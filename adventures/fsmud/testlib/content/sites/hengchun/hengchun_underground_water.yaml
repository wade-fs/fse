  恆春古城下方的隱秘地下水脈與儲水古道。
  建城之初為防範長期圍城而暗中挖掘，水質清冽，如今已被遺忘在古城地底的深處。
travel_arrive_text: You descend into a wet underground stone corridor. The water flows slowly around your feet, reflecting your flashlight beam.
