id: gankou_tea
settlement: hengchun
canonical_name: 港口茶園
is_heritage: false
base_description: |
  恆春半島特有的港口茶種植區，靠近港口溪出海口。
  因受海風與烈日洗禮，茶葉帶有一股獨特的鹹味與濃郁的茶香，回甘極強。
travel_arrive_text: 你走在低矮的茶園間，海風帶著鹹濕，茶樹葉片厚實，遠處的太平洋波濤清晰可見。
names:
- era: qing
  name: 港口溪茶山
- era: japanese
  name: 港口茶園
- era: modern
  name: 港口茶山
rumors:
  - "老茶農說第一代茶樹種子是清代一位商人從福建帶來的，種在海邊原本長不出，後來用特定山泉澆灌才活了下來。"
connections:
