id: manzhou_house
settlement: hengchun
canonical_name: 敬聖亭與古厝
is_heritage: true
base_description: |
  滿州鄉內保存完好的清代敬聖亭（惜字亭）與漢人百年古厝。
  展示了邊疆拓墾時期，漢人先民對文字的敬重與宗族文化的傳承。
travel_arrive_text: 你站在古樸的紅磚敬聖亭前，亭身已被風雨剝蝕，斑駁的古意與背後的老厝相得益彰。
names:
- era: qing
  name: 蚊蟀庄惜字亭
- era: japanese
  name: 滿州古厝
- era: modern
  name: 滿州尤家古厝
rumors:
  - "敬聖亭內曾有人發現過清朝秀才親筆抄寫的聖諭手稿，但因年代久遠，一碰就化為了灰燼。"
