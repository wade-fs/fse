id: hengchun_west_gate
settlement: hengchun
canonical_name: 恆春西門
is_heritage: true
base_description: |
  恆春古城西門（白沙門），是昔日通往白沙港與貓鼻頭的要道。
  城門結構保存完好，周邊居民常在城牆根的樹蔭下納涼，充滿了南國生活氣息。
travel_arrive_text: 你來到西門，城門的磚拱已被兩側的現代樓房夾在中間，老街的摩托車穿行在狹窄的城門洞中。
names:
- era: qing
  name: 恆春縣城西門（白沙門）
- era: japanese
  name: 西門通
- era: modern
  name: 恆春西門
rumors:
  - "西門磚石的夾縫裡，偶爾有小孩子能摸到清代的鐵質銅錢，但帶回家後隔天就會變成普通的瓦片。"
