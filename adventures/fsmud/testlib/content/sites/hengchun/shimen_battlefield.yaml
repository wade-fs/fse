base_description: |
  牡丹社事件的戰役現場。兩側陡峭的石門峽谷形势險要，
  排灣族戰士曾在此據險阻擊進犯的日軍，展開慘烈對決。
travel_arrive_text: 你站在石門峽谷的中間，兩側如刀劈般的岩壁直插天際，谷底的溪水流過，戰火的硝煙早已被海風吹散。
