id: hengchun_north_gate
settlement: hengchun
canonical_name: 恆春北門
is_heritage: true
base_description: |
  恆春古城北門（拱辰門），背依三台山，面向北方平野，是昔日防範原住民出草的重要邊防哨所。
  如今這裡地處偏僻，野草蔓生，最能展現古城原始的滄桑感。
travel_arrive_text: 你來到北門外，北門的石牌坊依然矗立，城牆長滿了雜草，遠處的三台山青翠欲滴。
names:
- era: qing
  name: 恆春縣城北門（拱辰門）
- era: japanese
  name: 北門外庄
- era: modern
  name: 恆春北門
rumors:
  - "傳說北門外的那條老路，清代深夜常有官兵點著火把巡邏的幻影，走到三台山腳下就消失不見。"
connections:
