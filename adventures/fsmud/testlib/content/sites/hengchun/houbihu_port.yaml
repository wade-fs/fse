id: houbihu_port
settlement: hengchun
canonical_name: 後壁湖漁港
is_heritage: false
base_description: |
  恆春半島最大的漁港，也是著名的浮潛與水上活動中心。
  這裡的海鮮市場提供新鮮的現撈生魚片，是遊客品嚐海鮮的必訪之地。
travel_arrive_text: 你來到繁忙的後壁湖碼頭，遊艇與漁船穿梭，空氣中瀰漫著海水的鹹味與現烤海鮮的香氣。
names:
- era: qing
  name: 後壁湖海灣
- era: japanese
  name: 後壁湖港
- era: modern
  name: 後壁湖漁港
rumors:
  - "老船長說後壁湖外海的珊瑚礁區，曾有一隻巨大的海龜常年護送漁船進港，被漁民視為海神使者。"
connections:
