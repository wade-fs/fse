base_description: |
  恆春東門外的出火地質景觀。泥板裂縫中漏出的天然氣被點燃，
  形成了「火從泥中出」的奇特景致，終年不熄。
travel_arrive_text: 你來到出火景區，夜色中地面的火光跳躍，帶著硫磺的氣息，照亮了周圍的紅土。
names:
