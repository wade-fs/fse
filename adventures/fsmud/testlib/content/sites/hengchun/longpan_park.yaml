id: longpan_park
settlement: hengchun
canonical_name: 龍磐公園
is_heritage: false
base_description: |
  恆春半島東側的石灰岩台地。
  因雨水溶蝕形成了崩崖、滲穴、石灰岩洞等奇特景觀，視野開闊，是著名的觀星與日出聖地。
travel_arrive_text: 你站在陡峭的龍磐崩崖邊緣，腳下是深邃的太平洋，強勁的落山風幾乎讓你站立不穩。
