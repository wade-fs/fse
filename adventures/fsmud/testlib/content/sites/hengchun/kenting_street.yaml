id: kenting_street
settlement: hengchun
canonical_name: 墾丁大街
is_heritage: false
base_description: |
  恆春半島最繁華的商業街區。
  白天是寧靜的濱海大道，傍晚則搖身一變成為熱鬧的夜市，各類南國美食與文創攤位林立。
travel_arrive_text: 你走在墾丁大街上，霓虹燈閃爍，熱情洋溢的音樂迴盪，遊客身著花襯衫穿梭其間。
names:
- era: qing
  name: 墾丁寮
- era: japanese
  name: 墾丁移民村
- era: modern
  name: 墾丁大街
rumors:
  - "老居民說大街中段的大榕樹，是當年開墾先民最早搭建寮舍的地標，樹根下埋有祈福的紅磚。"
connections:
- nanwan_beach
- kenting_forest
