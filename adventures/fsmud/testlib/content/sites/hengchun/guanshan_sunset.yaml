id: guanshan_sunset
settlement: hengchun
canonical_name: 關山夕照
is_heritage: false
base_description: |
  恆春半島西側的高地，以「關山夕照」聞名。
  山頂有一塊巨大的珊瑚礁石「飛來石」，相傳為神仙所留。
travel_arrive_text: 你登上關山頂，落日正緩緩沉入台灣海峽的水平面，整片天空被染成萬道紅霞，極為絢麗。
names:
- era: qing
  name: 關山高地（飛來石）
- era: japanese
  name: 關山夕照眺望台
- era: modern
  name: 關山夕照
rumors:
  - "飛來石下刻有模糊的梵文，傳說是清代一位行腳僧人為了鎮壓海中妖獸而親手刻上去的。"
connections:
