id: kenting_forest
settlement: hengchun
canonical_name: 墾丁國家森林遊樂區
is_heritage: true
base_description: |
  台灣唯一的熱帶植物園與珊瑚礁高地森林。
  擁有發達的石灰岩溶洞景觀，如仙洞、銀葉板根、垂榕谷，奇景天成。
travel_arrive_text: 你走進茂密的熱帶季風林中，巨大的銀葉板根如屏風般立在地上，林間鳥鳴幽幽。
names:
- era: qing
  name: 龜仔角社後山
- era: japanese
  name: 恆春熱帶植物園
- era: modern
  name: 墾丁國家森林遊樂區
rumors:
  - "仙洞裡的鐘乳石造型千奇百怪，老遊客說如果能聽到鐘乳石水滴落在手心的聲音，便能獲得一整年的好運。"
