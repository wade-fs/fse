id: sheding_park
settlement: hengchun
canonical_name: 社頂自然公園
is_heritage: false
base_description: |
  以珊瑚礁地質著稱的自然公園。內有大峽谷、小峽谷與迎風門，
  是排灣族社頂部落（龜仔角社）的傳統領域。
travel_arrive_text: 你穿行在陡峭呈一線天的珊瑚礁峽谷中，清涼的山風從狹縫中吹來，石壁上長滿了蕨類。
names:
- era: qing
  name: 龜仔角山林
- era: japanese
  name: 社頂原野
- era: modern
  name: 社頂自然公園
rumors:
  - "迎風門的風聲有著特別的音調，部落長老說那是以前英法聯軍船隻經過時的海笛聲。"
connections:
- hengchun_south_gate
- sheding_cave
