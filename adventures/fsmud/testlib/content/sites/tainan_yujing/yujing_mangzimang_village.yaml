rumors:
- 有人傳言，竹圍江家古厝的地下暗道深處，還埋有當年抗日義軍沒來得及取走的黃金。
- 老果農說，望明綠色隧道最古老的那株土芒果樹，在深夜會散發出淡淡的紅色微光。
