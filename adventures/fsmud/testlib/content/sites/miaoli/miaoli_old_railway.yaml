base_description: 清代首任巡撫劉銘傳規劃建設的台灣鐵路苗栗段。殘存的枕木被雜草覆蓋，生鏽的鐵軌延伸向遠方，見證了台灣近代化鐵路史的開端。
travel_arrive_text: 你站在荒廢的舊鐵軌旁，兩旁高山連綿，古老的隧道路口已被青苔遮蔽。
