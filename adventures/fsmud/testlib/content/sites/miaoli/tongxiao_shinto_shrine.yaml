base_description: 建於日治昭和年間的通霄神社。座落在虎頭山公園半山腰，保有鳥居、石燈籠與參道，戰後主殿被改建為忠烈祠，是日式與中式風格並存的歷史見證。
canonical_name: 通霄神社
connections:
- miaoli_site
id: tongxiao_shinto_shrine
is_heritage: true
names:
- era: qing
  name: 虎頭山邊防哨
- era: japanese
  name: 通霄神社
- era: modern
  name: 通霄神社
rumors:
- 神社旁的石燈籠，每逢農曆七月十五的深夜，會有溫暖的黃光微微亮起，隨後自動熄滅。
settlement: miaoli
travel_arrive_text: 你沿著石燈籠夾道的參道拾級而上，通霄神社的鳥居矗立在夕陽的光暈中，顯得格外安靜。
