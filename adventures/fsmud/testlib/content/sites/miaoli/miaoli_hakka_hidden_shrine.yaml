base_description: 深藏在苗栗山林幽谷中的古老土地公石祠。石祠古樸精小，已被老榕樹的樹根所包裹，四周綠苔密布，是早期客家先民開墾山林時建立的守護結界。
canonical_name: 山林伯公隱密祠
connections:
- miaoli_hakka_yi_min
hidden: true
id: miaoli_hakka_hidden_shrine
is_heritage: true
names:
- era: qing
  name: 山林石壁伯公
- era: japanese
  name: 山頂伯公祠
- era: modern
  name: 山林伯公隱密祠
rumors:
- 山裡的獵人說，如果迷路時能找到這座石祠並敬獻一炷香，就能安全走出大山。
settlement: miaoli
travel_arrive_text: 你撥開繁茂的野草與藤蔓，找到了一座隱沒在榕樹根系中的小石祠，裊裊山霧在石祠周圍環繞。
