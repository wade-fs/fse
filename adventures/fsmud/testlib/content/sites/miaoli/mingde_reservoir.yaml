base_description: 明德水庫，位於後龍溪支流老田寮溪上。群山環抱，湖水碧綠，湖心有日新島等小島，是以灌溉為主的平原湖泊景觀。
canonical_name: 明德水庫
connections:
- miaoli_site
id: mingde_reservoir
is_heritage: false
names:
- era: qing
  name: 老田寮溪谷
- era: japanese
  name: 老田寮水庫預定地
- era: modern
  name: 明德水庫
rumors:
- 水庫下淹沒的舊村落遺址，據說在枯水期水位極低時，能隱約看見水底石砌院落的殘留輪廓。
settlement: miaoli
travel_arrive_text: 你走上明德水庫大壩，湖面水平如鏡，倒映著兩岸的青山，遊艇在湖面上劃出白色的波紋。
