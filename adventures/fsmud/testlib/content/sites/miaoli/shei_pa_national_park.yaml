base_description: 雪霸國家公園的一部分，屬於泰雅族部落的傳統領域。高山密林，可以遠眺雪山聖稜線，冬季積雪靄靄，景觀極其壯麗。
canonical_name: 雪霸雪見遊憩區
connections:
- dakeng_aboriginal_village
id: shei_pa_national_park
is_heritage: false
names:
- era: qing
  name: 泰雅北勢群大山
- era: japanese
  name: 雪見高地
- era: modern
  name: 雪見遊憩區
rumors:
- 泰雅族長老說，雪山聖稜線的雲霧厚度與方向，能預示今年半島上所有部落的獵物多寡。
settlement: miaoli
travel_arrive_text: 你來到海拔兩千公尺的雪見台地，高聳的柳杉林直指藍天，遠處雪山群峰的大雪在陽光下熠熠生輝。
