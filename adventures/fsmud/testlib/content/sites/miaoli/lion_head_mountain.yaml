base_description: 橫跨苗栗與新竹的佛教信仰名山。獅頭山古道兩旁古木參天，分布著許多利用天然岩洞興建的佛寺，如勸化堂、舍利洞等。
canonical_name: 獅頭山古道
connections:
- miaoli_site
id: lion_head_mountain
is_heritage: true
names:
- era: qing
  name: 獅頭山石壁道
- era: japanese
  name: 獅頭山登山道
- era: modern
  name: 獅頭山古道
rumors:
- 勸化堂後方的石壁上，據說在特定月光照耀下會顯現出蓮花的形狀。
settlement: miaoli
travel_arrive_text: 你攀登在獅頭山的石階古道上，山霧在林間穿梭，遠處傳來悠揚的晨鐘與誦經聲。
