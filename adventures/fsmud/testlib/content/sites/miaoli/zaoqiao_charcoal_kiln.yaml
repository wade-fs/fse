base_description: 造橋鄉昔日的木炭燒製產業遺址。傳統的紅土圓拱窯室，利用當地的相思樹燒製優質木炭，是戰後初期供應全台燃料的重要能源基地。
canonical_name: 造橋炭窯遺址
