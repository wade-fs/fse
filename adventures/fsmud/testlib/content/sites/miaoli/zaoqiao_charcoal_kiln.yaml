rumors:
- 炭窯旁的老相思樹，據說在雨夜會散發出一種特殊的木焦油香，能讓人心情平靜。
settlement: miaoli
travel_arrive_text: 你走進造橋的老炭窯，紅土拱頂已被柴煙燻得漆黑，窯室內安靜異常，有一股陳年的木柴焦炭味。
