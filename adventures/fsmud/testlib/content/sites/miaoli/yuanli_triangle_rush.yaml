rumors:
- 老一辈人說，佩戴用清晨第一道陽光曬乾的藺草編成的草帽，能防止野外的瘴氣侵襲。
settlement: miaoli
travel_arrive_text: 你走進藺草編織學堂，空氣中飄散著曬乾藺草的草本清香，老編織工手速極快，草絲在指尖飛舞。
