- era: modern
  name: 頭份義民廟
rumors:
- 中元祭典的黑豬肉，據說在祭祀過義民爺後，吃下能保佑來年身體健壯，無病無災。
settlement: miaoli
travel_arrive_text: 你走進頭份義民廟，正殿供奉著「義民爺」神位，莊嚴肅穆，殿內懸掛著清代官府頒贈的「萬古流芳」匾額。
