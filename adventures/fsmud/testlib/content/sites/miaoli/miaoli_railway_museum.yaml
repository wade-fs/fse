rumors:
- 館內的1號蒸汽火車頭，在深夜常有維護工人說聽見氣壓閥微弱的漏氣聲，彷彿它還活著。
settlement: miaoli
travel_arrive_text: 你來到鐵道文物館，一列黑色的巨大阿里山蒸汽火車頭陳列在鐵軌上，散發著機油與歲月的鋼鐵氣息。
