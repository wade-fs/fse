base_description: 苗栗深山處的原住民泰雅族部落。四周群山環抱，古樹參天。在清領晚期『開山撫番』政策推動下，這裡曾是原住民抵禦清軍與樟腦工人的最前線。
travel_arrive_text: 你越過深邃的峽谷吊橋，走進長滿山櫻花的部落，幾座古老的高腳茅草屋隱現林間。
