rumors:
- 聽說鰲鼓濕地的蘆葦叢深處，藏有二戰時期日本海軍自殺特攻艇的秘密基地遺跡。
- 朴子溪口的漁夫傳言，在起大霧的早晨，能看見清代的戎克船無聲地駛入河口。
