id: lukang_woodcarving_workshop
settlement: lukang
canonical_name: 鹿港傳統木雕工坊
is_heritage: false
base_description: |
  這間工坊散發著濃郁的檜木與樟木香氣。
  工作台上擺滿了各種尺寸的鑿刀、圓鏟與木槌，
  老匠師正在為大天后宮修復的神轎雕刻一條騰飛的雲龍。
  這裡代表著鹿港最核心的工藝傳承——大木作與小木作的巔峰。
travel_arrive_text: "你走進木雕工坊，木屑飛揚，老匠師鑿擊木頭的清脆聲像是在刻劃時間的痕跡。"

names:
  - era: qing
    name: 鹿港雕刻舖
  - era: japanese
    name: 鹿港木彫工作所
  - era: modern
    name: 傳統木雕工坊

rumors:
  - "老木雕師傅說他那把最舊的鑿刀是他的曾祖父傳下來的，那把刀已經磨得極短，但刀刃還是非常銳利。"
connections:
