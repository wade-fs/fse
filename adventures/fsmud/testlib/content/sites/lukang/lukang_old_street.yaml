id: lukang_old_street
settlement: lukang
canonical_name: 鹿港老街
is_heritage: true
base_description: |
  紅磚鋪設的蜿蜒巷道兩旁，矗立著古老的街屋與斑駁的門楣。
  空氣中飄散著線香的檀香氣，以及百年老鋪剛出爐的綠豆糕甜香。
  這裡曾是「一府二鹿」時期貿易商行（泉郊、廈郊）的集中地，
  紅磚道下還埋著清代的石板路基。
travel_arrive_text: "你漫步走進了鹿港老街，斑駁的紅磚牆與木雕門楣訴說著「一府二鹿三艋舺」的風華歲月。"

names:
  - era: qing
    name: 鹿港船頭街肆
  - era: japanese
    name: 鹿港街老街
  - era: modern
    name: 鹿港老街

rumors:
  - "老街的某些地磚在雨後會呈現不同的色澤，當地人說那是當年壓艙石鋪路留下的痕跡，每一塊壓艙石都來自一艘渡海的商船。"
connections:
  - lukang_tianhou_temple
  - lukang_longshan_temple
  - lukang_mazu_folk_arts_museum
  - lukang_banyue_well
  - lukang_woodcarving_workshop
reveal_layers:
  - condition: "all"
    checks:
      - type: "career_rank"
        career: "artisan"
        rank: 1
    text: "老街的一角，一位老工匠正在木雕工坊裡揮汗如雨地雕刻著精細的廟宇神像與花鳥屏風。"
    npc: "NPC_lukang_master_woodcarver"
