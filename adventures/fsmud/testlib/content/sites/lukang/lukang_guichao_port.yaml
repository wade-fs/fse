id: lukang_guichao_port
settlement: lukang
canonical_name: 舊鹿港溪渡頭
is_heritage: true
base_description: |
  曾經是「二鹿」繁榮的核心——港口的舊渡頭，如今河道已淤積成一條淺水溝，
  兩側建了河濱步道。但水泥欄杆下方，
  還殘留著幾塊清代花崗岩建造的繫船石，
  是那個萬船雲集的年代唯一的實體見證。
travel_arrive_text: "你站在舊渡頭旁，摸著風化粗糙的花崗岩繫船石，耳邊彷彿還能聽到當年水手的吆喝聲。"

names:
  - era: qing
    name: 鹿港港渡頭
  - era: japanese
    name: 舊鹿港溪渡頭
  - era: modern
    name: 舊鹿港溪渡頭遺址

rumors:
  - "舊渡頭淤泥深處曾出土過幾枚大正時期的鐵路道釘，有文史工作者懷疑當年日本政府曾計畫將縱貫線引入鹿港，但最終放棄了。"
