id: lukang_shi_feng
settlement: lukang
canonical_name: 十宜樓（跑馬樓）
is_heritage: true
hidden: true
base_description: |
  一座跨越老街巷道上空的精緻木結構空中閣樓，連接著兩側的豪宅。
  昔日是鹿港的文人墨客吟風弄月、對弈琴彈的優雅會所。
  在這裡可以同時眺望老街的屋頂與遠方的港口夕陽。
travel_arrive_text: "你抬頭看著那座精緻的空中閣樓，想像當年文人在樓上舉杯對弈、詩琴唱和的風雅。"

names:
  - era: qing
    name: 十宜樓
  - era: japanese
    name: 十宜樓（跑馬樓）
  - era: modern
    name: 十宜樓

rumors:
  - "十宜樓的木質窗櫺有一處雕花暗藏著一組詩句，是清代某位著名文人在此喝醉後，用小刀親自刻下的狂草，內容與國破家亡的預言有關。"
connections:
