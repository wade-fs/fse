id: lukang_longshan_temple
settlement: lukang
canonical_name: 鹿港龍山寺
is_heritage: true
base_description: |
  格局宏偉且古樸典雅的龍山寺，其山門、八卦藻井與五門殿展現出全台最頂尖的閩南建築與木雕藝術。
  幽靜的後殿天井裡，偶爾有幾聲磬音迴盪，帶有一種出世的淡雅與寧靜。
  這裡的梁柱與斗拱結構，是幾代木雕大師與匠師的心血結晶。
travel_arrive_text: "你來到了鹿港龍山寺，古樸莊嚴的殿宇與沉靜的氛圍帶走了一切喧囂。"

names:
  - era: qing
    name: 鹿港龍山寺
  - era: japanese
    name: 龍山寺
  - era: modern
    name: 鹿港龍山寺（國定古蹟）

rumors:
  - "龍山寺的八卦藻井是全台最大的木結構藻井，沒有用任何一根鐵釘，完全以榫卯卡住。老匠師說，藻井中心藏有一張當年建廟師傅留下的木雕符，用來鎮火煞。"
connections:
  - lukang_old_street
  - lukang_banyue_well
