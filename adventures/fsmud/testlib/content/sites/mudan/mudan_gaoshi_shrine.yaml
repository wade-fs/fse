id: mudan_gaoshi_shrine
settlement: mudan
canonical_name: 高士神社
is_heritage: true
base_description: 重建於山頂的白色鳥居與小神社，俯瞰著美麗的八瑤灣，象徵著地方部落與歷史記憶的交織。
travel_arrive_text: 你站在高聳的白色鳥居下，居高臨下，遠處藍色的八瑤灣美景一覽無遺。
names:
- era: japanese
  name: 高士祠堂
- era: modern
  name: 高士神社
connections:
- mudan_stone_gate
rumors:
- 有人說高士神社背後的高地，在日治時期曾埋藏了一面銅鏡，用來祈求八瑤灣航道的安全。
