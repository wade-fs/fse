base_description: 牡丹水庫是屏東最大的水庫，群山環繞，大壩雄偉，主要供給恆春半島的用水。
travel_arrive_text: 你來到雄偉的牡丹水庫大壩前，碧綠的湖水在群山抱擁中顯得格外寧靜。
