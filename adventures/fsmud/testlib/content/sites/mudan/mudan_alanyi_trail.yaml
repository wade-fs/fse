base_description: 台灣少數保留原始自然風貌的海岸線古道，是昔日原住民遷徙與貿易的重要通道。
travel_arrive_text: 站在古道入口的鵝卵石灘上，海浪拍擊著海岸發出巨大的聲響，前方是險峻的臨海懸崖。
