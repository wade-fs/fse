canonical_name: 牡丹社排灣族部落
is_heritage: true
base_description: 深藏在恆春半島山林中的排灣族部落。以石板屋為主體結構，家屋門前雕刻著百步蛇與祖靈像。這裡的人們世世代代守護著祖靈的獵場與山林規矩。
travel_arrive_text: 你沿著陡峭山路走進部落，四周是一座座古樸的石板屋，空氣中瀰漫著木柴燃燒的煙味。
