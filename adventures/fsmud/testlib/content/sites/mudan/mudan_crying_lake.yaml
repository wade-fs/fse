base_description: 哭泣湖在排灣族語中代表「水流匯集之地」，湖畔圍繞著茂密的野薑花，風景秀麗而帶有一一絲神祕感。
travel_arrive_text: 靜謐的湖面反射著天空的微光，成群的野薑花散發著淡雅的香氣，宛如世外桃源。
