id: changhua_old_well_babu
settlement: changhua_city
canonical_name: 巴布薩族大肚社舊址
is_heritage: false
base_description: |
  彰化平原在漢人開墾前是平埔族巴布薩族（Babuza）的傳統領域。
  這裡保留了一處古老的水潭遺址，四周長滿了野蘆葦。
  傳說這是巴布薩族人早年狩獵梅花鹿與進行祭儀的場所，
  如今隱藏在現代工廠區的夾縫中。
travel_arrive_text: "你穿過工廠區的窄巷，找到這處長滿蘆葦的水潭，水面安靜地反照著天空。"

names:
  - era: qing
    name: 半線社草澤
  - era: japanese
    name: 大肚社地界
  - era: modern
    name: 巴布薩族大肚社舊址

rumors:
  - "水潭的泥沙底曾出土過西拉雅、巴布薩風格的陶獸陶片，證明在漢人進城前，平埔族人在這裡有過發達的陶藝與村落生活。"
connections:
  - changhua_city_site
  - changhua_west_gate
