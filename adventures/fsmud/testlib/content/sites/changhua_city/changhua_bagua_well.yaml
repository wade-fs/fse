id: changhua_bagua_well
settlement: changhua_city
canonical_name: 八卦山麓古井（無影井）
is_heritage: false
base_description: |
  位於八卦山麓的古老石砌水井，井水清澈見底。
  傳說在特定的夏至正午，陽光直射井底時，井口卻不會在水面反出井欄的倒影，
  因而被稱為「無影井」。井水至今仍甘甜可口。
travel_arrive_text: "你找到無影井，俯身看著清澈的井水，井壁的青苔在陰影中呈現深綠色。"

names:
  - era: qing
    name: 八卦山無影井
  - era: japanese
    name: 無影井
  - era: modern
    name: 八卦山麓古井（無影井）

rumors:
  - "老一輩的彰化人說，林爽文之役時，有義軍將領將一枚金質印信丟入井底以防落入官兵手中，至今仍深埋在井泥底。"
connections:
  - changhua_bagua_mountain
  - changhua_city_site
