id: changhua_city_site
settlement: changhua_city
canonical_name: 彰化市區（孔廟前街）
is_heritage: true
base_description: |
  彰化古城的心臟地帶。街道寬闊，兩側是連綿的木造與紅磚街屋。
  清代與日治初期的商旅、挑夫在街道上穿梭，叫賣著肉圓與涼圓。
  孔廟紅牆高聳，給這片喧囂的街市帶來了一絲莊嚴。
travel_arrive_text: "你來到了彰化市的核心街區，市集的喧囂與孔廟的香煙交織在一起。"

names:
  - era: qing
    name: 彰化縣城中街
  - era: japanese
    name: 彰化街
  - era: modern
    name: 彰化市區（孔廟前街）

rumors:
  - "孔廟前街的石板底下，據說埋有清代防禦林爽文起義時挖掘的地下壕溝，雖然早就被土填平，但雨後某些石板會微微下陷。"
connections:
