id: changhua_east_gate
settlement: changhua_city
canonical_name: 彰化東門遺址（樂耕門）
is_heritage: true
base_description: |
  彰化縣城東門的舊址，城牆與城門早已在日治時期的市區改正中被拆除，
  現在是一處繁忙的十字路口。路旁保留了一塊石製界碑，
  上面刻著模糊的「東門」字樣。
travel_arrive_text: "你站在東門遺址的街角，四周是穿梭的機車，唯有路邊的舊界碑提醒你這裡曾是城界。"

names:
  - era: qing
    name: 台灣府彰化縣城東門（樂耕門）
  - era: japanese
    name: 東門圓環
  - era: modern
    name: 彰化東門遺址

rumors:
  - "東門拆除時，據說有一塊寫著『民胞物與』的城門匾額被當地紳商暗中運走，藏在彰化某個老街屋的閣樓裡。"
connections:
  - changhua_bagua_mountain
  - changhua_city_site
