id: changhua_bagua_mountain
settlement: changhua_city
canonical_name: 八卦山砲台遺址
is_heritage: true
base_description: |
  俯瞰整個彰化平原的軍事戰略高地。
  這裡曾是1895年乙未戰爭中，義軍與日本近衛師團決戰的血腥戰場。
  殘存的砲台土基和壕溝掩映在雜草中，
  立著一塊抗日烈士紀念碑，默默看著山下繁華的現代市景。
travel_arrive_text: "你沿著石階爬上八卦山，山頂的風很大，山下的彰化平原一覽無遺。"

names:
  - era: qing
    name: 八卦山寨
  - era: japanese
    name: 八卦山東門砲台
  - era: modern
    name: 八卦山砲台遺址（紀念公園）

rumors:
  - "山頂的古砲台土基旁，據說在深夜能隱約聽到刺刀撞擊與低沉的軍號聲，是當年乙未戰役死難將士不散的英魂。"
connections:
  - changhua_city_site
  - changhua_bagua_well
  - changhua_east_gate
