rumors:
- 聽說淡水紅毛城的地下暗牢裡，藏有十七世紀西班牙總督遺留的金銀十字架與航海日誌。
- 有人傳言，滬尾砲台的地下兵房通道在陰雨天的深夜，能隱隱聽到清代湘軍士兵的操練聲。
