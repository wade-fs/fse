rumors:
- 坪林茶農說，在坪林老拱橋下的深潭裡，深夜偶爾能看見日治時期反抗樟腦公賣的義士靈魂。
- 聽說石碇吊腳樓在溪水暴漲的颱風夜，屋底的石柱會發出像古琴彈奏般的奇特風聲。
