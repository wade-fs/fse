rumors:
- 有人傳言，滬尾砲台的地下兵房通道在陰雨天的深夜，能隱隱聽到清代湘軍士兵的操練聲。
- 老金丁說，九份金瓜石本山五坑深處，有一條被封死但長滿純金金砂結晶的古老礦脈。
