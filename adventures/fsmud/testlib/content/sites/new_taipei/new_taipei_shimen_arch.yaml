rumors:
- 三峽老街的雕刻師說，三峽祖師廟門口那對大石獅在除夕夜的子時，雙眼會發出淡淡紅光。
- 聽說烏來避難石窟的石壁上，刻有泰雅族先民防範日軍討伐時所繪製的大羅蘭獵場地圖。
