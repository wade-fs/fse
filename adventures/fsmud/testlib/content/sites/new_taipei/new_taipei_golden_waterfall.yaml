rumors:
- 有人傳言，金山金包里老街的舊藥鋪地底下，埋有清代防範海盜襲擊而藏匿的銀元罐。
- 聽說鶯歌老街最古老的那座蛇窯在每年開窯之夜，火光中會浮現出傳說中窯神開光的幻影。
