rumors:
- 有人傳言，淡水海關碼頭的舊繫船柱下，壓有清代開港時由洋商代表捐贈 of 英國古銅幣。
- 八里海岸的船夫說，八里左岸沙灘在退潮最深時，能看見唐山過台灣先民木船沉沒的焦黑桅杆。
