canonical_name: 文台寶塔
base_description: 明代洪武年間興建的花崗岩石塔，立於海岸巨石之上，曾是出海商船的航路指標，石塔古樸堅實。
names:
- era: "v1.0"
  name: 舊日治文台寶塔
- era: "v3.0"
