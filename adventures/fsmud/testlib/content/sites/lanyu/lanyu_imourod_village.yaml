rumors:
- 聽說青青草原崖壁下的玄武岩洞穴裡，藏有昔日達悟先民防禦外敵時使用的純木製盾牌。
- 聽說東清灣地下避難道最深處的珊瑚礁夾縫裡，藏有明代海盜沉船遺留的西班牙銀幣。
