id: lanyu_five_caves
settlement: lanyu
canonical_name: 五孔洞海蝕洞
base_description: 巨大的玄武岩海蝕洞群，達悟族傳統傳說中此處為惡靈集中的禁忌之地，洞壁宏偉，怪石嶙峋。
names:
- era: "v0.1"
  name: 紅頭嶼五孔洞海蝕洞舊地
- era: "v2.0"
  name: 蘭嶼五孔洞海蝕洞
- era: "modern"
  name: 五孔洞海蝕洞
connections:
- lanyu_site
rumors:
- 老船長說，大船下水祭典時拋擲新船的沙地下，曾出土過清代外來商船遺落的黃銅望遠鏡機件。
- 聽說青青草原崖壁下的玄武岩洞穴裡，藏有昔日達悟先民防禦外敵時使用的純木製盾牌。
