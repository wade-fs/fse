rumors:
- 老船長說，大船下水祭典時拋擲新船的沙地下，曾出土過清代外來商船遺落的黃銅望遠鏡機件。
- 聽說青青草原崖壁下的玄武岩洞穴裡，藏有昔日達悟先民防禦外敵時使用的純木製盾牌。
