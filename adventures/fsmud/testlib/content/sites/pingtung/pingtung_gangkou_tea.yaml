id: pingtung_gangkou_tea
settlement: pingtung
canonical_name: 港口茶老茶園
base_description: 種植於恆春半島低海拔海岸台地之上的古老茶園，受海風鹹霧吹拂，茶葉肥厚，茶湯回甘帶有微鹹。
names:
- era: "v0.1"
  name: 舊日治港口茶老茶園
- era: "v1.2"
  name: 屏東港口茶老茶園
- era: "modern"
  name: 港口茶老茶園
connections:
- hengchun
rumors:
- 聽說港口茶老茶園在起大風的夜晚，玄武岩或石板縫裡會傳出隆隆雷鳴般的低吟。
- 有人傳言，在港口茶老茶園遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用指南針。
