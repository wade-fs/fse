rumors:
- 聽說阿塱壹古道段在起大風的夜晚，玄武岩或石板縫裡會傳出隆隆雷鳴般的低吟。
- 有人傳言，在阿塱壹古道段遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用指南針。
