id: north_gate_area
settlement: chiayi_city
canonical_name: 北門圓林仔街
is_heritage: true
base_description: |
  北門一帶保留了日治時代的棋盤式街道，老屋的亭仔腳連成一排廊道。
  賣蔗糖、賣糕餅、賣香的老鋪子夾在新式的透天厝之間，
  老一輩的居民說，這條街的形狀從日本時代就沒有變過。
travel_arrive_text: "你走進北門舊街區，亭仔腳的廊道讓你暫時躲開了午後的烈日。"

names:
  - era: qing
    name: 諸羅北門街
  - era: japanese
    name: 圓林仔通
  - era: postwar
    name: 北門路商圈
  - era: modern
    name: 北門圓林仔街

rumors:
  - "北門街的某棟老屋二樓住著一個從來沒被人見過臉的老人，房東說他租了三十年，房租從來不遲到。"

connections:
  - chiayi_train_station
  - old_city_wall
  - city_park
