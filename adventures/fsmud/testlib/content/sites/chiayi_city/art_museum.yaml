id: art_museum
settlement: chiayi_city
canonical_name: 嘉義市立美術館（畫都）
is_heritage: true
base_description: |
  嘉義被稱為「畫都」，因為日治時代出了陳澄波等一批台灣西洋畫家。
  美術館的白牆上掛著油畫，窗口透進的自然光讓畫面的色彩靈動。
  有一幅畫的角落簽了日文，但畫的是諸羅山的夕陽——那個時代的矛盾就夾在這兩件事之間。
travel_arrive_text: "你走進美術館，陽光透過高窗落在地板上，四周出奇地安靜。"

names:
  - era: japanese
    name: 嘉義美術展覽所
  - era: postwar
    name: 嘉義社教館
  - era: modern
    name: 嘉義市立美術館

rumors:
  - "館藏裡有一幅沒有標示作者的畫，策展人說那幅畫在二二八後就一直掛在這裡，從來沒有人來認領。"

connections:
