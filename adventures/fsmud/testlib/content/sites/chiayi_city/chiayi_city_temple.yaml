id: chiayi_city_temple
settlement: chiayi_city
canonical_name: 嘉義城隍廟
is_heritage: true
base_description: |
  城隍廟的正殿高聳入雲，屋脊上燕尾翹起，琉璃剪黏在午後陽光下閃著色澤。
  廟埕前的石獅子已被香火薰成暗褐色。廟側的長廊掛滿求來的籤詩，
  偶有問卜的婦人在廊下靜靜解讀，眉頭輕鎖。
  城隍爺管的是陰間秩序，但信眾來這裡，帶著活人的焦慮。
travel_arrive_text: "你走進城隍廟，廟內一陣檀香撲鼻，燈光昏黃，神像的眼神似乎落在你身上片刻。"
footprint: temple_chiayi_city

