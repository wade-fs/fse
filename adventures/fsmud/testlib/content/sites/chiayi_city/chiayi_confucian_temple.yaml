id: chiayi_confucian_temple
settlement: chiayi_city
canonical_name: 嘉義孔廟
is_heritage: true
base_description: |
  孔廟的大成殿紅牆黃瓦，前庭的旗桿底座刻著「禮義廉恥」四字。
  教諭祭孔的時節，各校師生排排站，用台語唸祭文，
  聲音在古老的院落裡迴盪，帶著一種複雜的官方莊嚴。
travel_arrive_text: "你踏進孔廟的前庭，腳步放輕了，也說不清楚為什麼。"

names:
  - era: qing
    name: 諸羅縣文廟
  - era: japanese
    name: 嘉義孔廟
  - era: postwar
    name: 嘉義市孔子廟
  - era: modern
    name: 嘉義孔廟

rumors:
  - "孔廟的大門最後一道檻曾在日本時代被迫降低高度，說是要讓人不用低頭就能進入，老人說那是對聖人的不敬。"

connections:
  - chiayi_city
  - old_city_wall
