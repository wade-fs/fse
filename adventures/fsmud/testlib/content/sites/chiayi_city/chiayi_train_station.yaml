id: chiayi_train_station
settlement: chiayi_city
canonical_name: 嘉義火車站
is_heritage: true
base_description: |
  折衷主義風格的站體正面立著四根巨柱，米黃色的外牆在陽光下顯得莊重。
  月台另一側停著阿里山森林鐵路的小火車，紅色車廂比縱貫線的列車矮了整整一截。
  人力車夫在出口等客，旁邊的站前廣場擺著幾攤水果，鳳梨和芒果堆成小山。
travel_arrive_text: "你踏出嘉義火車站，站前廣場的人聲立刻把你淹沒，遠處傳來阿里山小火車的汽笛聲。"
