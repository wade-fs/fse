id: qipao_tailor_chiayi
settlement: chiayi_city
canonical_name: 旗袍裁縫鋪
is_heritage: false
base_description: |
  這間縫紉鋪子從日本時代就在這條巷子裡，師傅的手法是本省與外省風格的混合體。
  牆上貼著幾張款式圖，一半是旗袍，一半是台式大襟衫。
  縫紉機的聲音從早到晚沒有停過。
travel_arrive_text: "你走進裁縫鋪，師傅抬頭看你一眼，點點頭，繼續縫他的布料。"

names:
  - era: japanese
    name: 洋裁仕立屋
  - era: postwar
    name: 旗袍縫製行
  - era: modern
    name: 旗袍裁縫鋪

rumors:
  - "裁縫師傅說有個老客人每年來取一件旗袍，但從來不量身，每次拿走的都剛好合身，師傅說那客人五十年沒有變過。"

