id: chenghuang_well
settlement: chiayi_city
canonical_name: 城隍廟旁古井
is_heritage: false
hidden: true
base_description: |
  城隍廟東側的巷弄裡藏著一口古井，井欄的石頭已被水桶繩索磨出深深的溝痕。
  現在加了鐵蓋，但每逢清明，廟方仍會開井祭拜。
  附近居民說，這口井的水在颱風過後特別甘甜。
travel_arrive_text: "你找到那口古井，俯身往下看，水面反出一個小小的天空。"

names:
  - era: qing
    name: 諸羅城隍廟義井
  - era: japanese
    name: 城隍廟境內井
  - era: modern
    name: 城隍廟旁古井

rumors:
  - "老廟公說這口井在日本人來以前就有了，清代有人在井底發現過一個銅製的符令，後來供在廟裡，現在不知道在哪個神龕。"

connections:
  - chiayi_city_temple
