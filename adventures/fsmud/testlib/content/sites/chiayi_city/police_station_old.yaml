id: police_station_old
settlement: chiayi_city
canonical_name: 嘉義警察署舊址
is_heritage: true
hidden: true
base_description: |
  磚紅色的建築正面有著規整的拱廊，屋頂的馬薩式屋頂是日治官廳的標準配備。
  玄關的石柱被磨得光滑，是幾十年的腳步踩出來的。
  二二八期間，這裡是衝突的核心地點之一。
travel_arrive_text: "你站在舊警察署前，建築本身說不了話，但牆上的彈孔痕跡還在。"

names:
  - era: japanese
    name: 嘉義警察署
  - era: postwar
    name: 嘉義市警察局
  - era: modern
    name: 嘉義警察署舊址（文化資產）

rumors:
  - "警察署地下室的檔案室在二二八後被清理過，有人說清理前有人把部分檔案帶走，至今不知去向。"

