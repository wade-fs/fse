id: noodle_stall_chiayi
settlement: chiayi_city
canonical_name: 火雞肉飯老攤
is_heritage: false
base_description: |
  攤子就是一個兩輪推車，老闆娘把飯盛進小碗，澆一匙雞油、鋪幾條手撕火雞肉，
  再挖一小匙蔥酥，動作像刻在手裡的反射。
  每天早上六點開攤，兩個小時賣完，年年如此，沒有例外。
travel_arrive_text: "你來到老攤，隊伍已經排了十幾個人，隊伍移動得很快，每個人都知道要點什麼。"

names:
  - era: japanese
    name: 鶏肉料理屋台
  - era: postwar
    name: 火雞肉飯推車
  - era: modern
    name: 火雞肉飯老攤

rumors:
  - "老攤旁邊的大樹有個樹洞，老闆娘說每天收攤前她都會把一碗飯放在樹洞旁，五十年了，從來沒有忘記過，說是給「老主顧」的。"

connections:
  - chicken_rice_alley
