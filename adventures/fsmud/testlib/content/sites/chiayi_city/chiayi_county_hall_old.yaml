id: chiayi_county_hall_old
settlement: chiayi_city
canonical_name: 嘉義縣廳舊址
is_heritage: true
base_description: |
  縣廳的石階寬闊，正面的石柱一字排開，有一種讓人仰視的官廳氣勢。
  現在建築已改作他用，但石柱留著，柱頭的龍形雕飾在風化後模糊了線條，
  卻更顯古拙。
travel_arrive_text: "你站在縣廳舊址前，石柱的高度讓你不由自主地抬起頭。"

names:
  - era: qing
    name: 諸羅縣署
  - era: japanese
    name: 嘉義廳廳舍
  - era: postwar
    name: 嘉義縣政府
  - era: modern
    name: 嘉義縣廳舊址（保存建築）

rumors:
  - "舊縣廳的某個房間，地板比周圍低了幾公分，有人說那是清代官員秘密藏公文的坑道入口，後來被填起來了。"

connections:
  - old_city_wall
  - chiayi_city
