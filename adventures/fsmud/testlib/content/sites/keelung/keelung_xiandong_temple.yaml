rumors:
- 老巡軌員說，獅球嶺隧道深處的紅磚牆壁上，深夜有時能聽見劉銘傳開山義工的鐵鎬敲擊聲。
- 聽說二二八事件期間，有市民將被追捕的學生藏在奠濟宮媽祖神像後方的夾層中才得以倖免。
