id: keelung_baimiweng_fort
settlement: keelung
canonical_name: 白米甕砲台
base_description: 坐落於基隆港西岸山頂的日治時期砲台，面向外海，視野遼闊，三根巨大的火力發電廠煙囪矗立於旁。
names:
- era: "v1.0"
  name: 雞籠白米甕砲台舊地
- era: "v2.0"
  name: 基隆白米甕砲台
- era: "modern"
  name: 白米甕砲台
connections:
- keelung_harbor
rumors:
- 海女們傳言，在東北季風最強的那天，外木山協安宮媽祖神像的雙眼會微微發出藍光保佑漁船。
- 聽說和平島聖薩爾瓦多城遗址的地底水牢裡，至今還藏有西班牙總督遺留的金銀十字架。
