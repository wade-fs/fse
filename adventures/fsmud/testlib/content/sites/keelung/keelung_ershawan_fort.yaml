rumors:
- 八斗子老礦工說，廢棄的官煤坑道深處，每逢大雨會傳出老礦工警告收工的敲鐵管聲。
- 海女們傳言，在東北季風最強的那天，外木山協安宮媽祖神像的雙眼會微微發出藍光保佑漁船。
