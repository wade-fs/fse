rumors:
- 有人傳言，清法戰爭紀念公墓在起霧的深夜，能看見穿著舊式軍服的法國水手在墓碑間徘徊。
- 老巡軌員說，獅球嶺隧道深處的紅磚牆壁上，深夜有時能聽見劉銘傳開山義工的鐵鎬敲擊聲。
