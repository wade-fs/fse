rumors:
- 聽說深坑老街的隆恩圳支流深處，曾出土過印有清代「隆恩」官印的防偽配水陶板。
- 有人傳言，台中州立圖書館的舊地下室裡，藏有櫟社早期詩人反抗皇民化的結社草稿原件。
