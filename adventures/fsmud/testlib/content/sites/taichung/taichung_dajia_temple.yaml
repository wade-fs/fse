rumors:
- 有人傳言，瑞成書局二樓的舊書架夾層中，藏有清末梁啟超訪台時贈送給櫟社詩人的親筆手稿。
- 東勢老礦工傳言，東勢舊製材所巨大的蓄木池底，沉沒著一整根日治時期作為神木獻祭的巨型紅檜龍骨。
