rumors:
- 有人傳言，二七部隊在防空洞撤退時，將一部份美製卡賓槍與電台封鎖在台中公園地底通道深處。
- 大甲老婦說，大甲鎮瀾宮神壇下方的石雕基座裡，藏有清代大甲溪械鬥時的和平停戰盟約書。
