rumors:
- 老司機說，在大霧封山的夜晚，二萬坪車庫的軌道上會隱隱傳出老蒸汽火車行進的鐵軌撞擊聲。
- 聽說姊妹潭在滿月之夜的午夜，潭面上會浮現出傳說中兩姊妹梳妝的幻影。
