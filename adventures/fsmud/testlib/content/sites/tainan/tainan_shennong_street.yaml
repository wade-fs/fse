id: tainan_shennong_street
settlement: tainan
canonical_name: 神農街（五條港舊址）
is_heritage: true
base_description: |
  五條港是清代台南最重要的商業水路，貨船從鹿耳門進入，
  沿著五條水道進入府城。神農街是五條港文化最完整保留的一條，
  現在改成文創街區，老厝的亭仔腳下開著選物店，
  但街道的寬度和方向，還是清代水道的輪廓。
travel_arrive_text: "你走進神農街，老厝的建築和文創店的招牌形成一種奇特的和諧，你在這裡分不清楚過去和現在的邊界。"

names:
  - era: qing
    name: 五條港水道
  - era: japanese
    name: 神農街市街
  - era: modern
    name: 神農街（五條港文化園區）

rumors:
  - "神農街的地磚下面是填掉的水道，有人說雨後在某個地方可以聽到地下有流水聲，但那條水道封閉了幾百年了，那個聲音是什麼，說法不一。"
connections:
  - tainan_grand_mazu_temple
  - anping_harbor
