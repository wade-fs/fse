id: tainan_silian_yan
settlement: tainan
canonical_name: 四聯境廟群
is_heritage: true
base_description: |
  台南的廟宇密度是全台最高的，四聯境是指舊城區幾個廟宇組成的聯合境主體系。
  每座廟的信仰各有主神，但聯境的組織讓他們共同管理地方事務。
  這個由廟宇構成的「自治」體制，是清代台南城市管理的核心機制。
travel_arrive_text: "你走進四聯境廟區，香煙在幾座廟之間流動，你說不清楚自己在哪個廟的範圍裡。"

names:
  - era: qing
    name: 四聯境廟群
  - era: japanese
    name: 四聯境（市街調整後）
  - era: modern
    name: 四聯境廟群（台南舊城文化圈）

rumors:
  - "聯境廟的組織從清代延續至今，每個廟都有帳冊記錄歷任爐主的名字，最老的帳冊在某個廟的地窖裡，從來沒有公開展示過。"
connections:
  - tainan_confucian_temple
  - tainan_old_street
  - wu_fei_temple
