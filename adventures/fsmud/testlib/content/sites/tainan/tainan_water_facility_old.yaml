id: tainan_water_facility_old
settlement: tainan
canonical_name: 台南水道（山上花園水道博物館）
is_heritage: true
base_description: |
  日治時代建的台南水道，是台灣最早的自來水系統。
  機房的英式紅磚建築和精密的機械設備被完整保存，
  現在是水道博物館。那些鑄鐵管道從明治年間開始就沒有換過，
  工程師說只要不出問題，就讓老管道繼續服務。
travel_arrive_text: "你走進水道機房，巨大的鋼鐵水泵發出低沉的轟鳴，明治時代的機器還在工作。"

names:
  - era: japanese
    name: 台南水道淨水場
  - era: postwar
    name: 台灣省自來水廠台南廠
  - era: modern
    name: 山上花園水道博物館

rumors:
  - "工程師說，水道主管裡有一截從明治四十年就沒有換的鑄鐵管，還在輸水，說要換，但總是有更緊急的事情，就一直放著。"
connections:
  - tainan_old_market
