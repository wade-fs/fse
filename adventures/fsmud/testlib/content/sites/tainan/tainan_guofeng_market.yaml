id: tainan_guofeng_market
settlement: tainan
canonical_name: 歸仁舊糖廠（仁德糖廠）
is_heritage: true
base_description: |
  台糖歸仁糖廠的廠房現在改成文化園區，老式的製糖機器和蒸汽鍋爐被保存展示。
  廠房旁邊的五分車鐵道還在，假日會開動一小段，讓人搭著窄軌小火車
  在廠區繞一圈，速度很慢，但車廂的重量和軌道的顛簸感是真實的。
travel_arrive_text: "你搭上五分車，車廂很小，速度比走路快不了多少，但那個行進的感覺，是糖廠工人幾十年的日常。"

names:
  - era: japanese
    name: 歸仁製糖所
  - era: postwar
    name: 台糖仁德糖廠
  - era: modern
    name: 仁德糖廠文化園區

rumors:
  - "五分車的駕駛員說，廠區有一台老機車沒有展示，說是需要整修，但停在角落的那台機車，引擎還是完好的，只是沒有人去問。"
connections:
  - tainan_old_market
