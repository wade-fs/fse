id: tainan_confucian_temple
settlement: tainan
canonical_name: 台南孔廟（全台首學）
is_heritage: true
base_description: |
  台灣第一座孔廟，清代的「全台首學」。大成殿的屋脊燕尾高翹，
  院子裡有明代種下的老榕樹，根系已經把地磚拱起。
  廟學制度在這裡延伸了幾百年，每個時代換一種語言教書，
  但孔廟還是孔廟，老榕樹還是老榕樹。
travel_arrive_text: "你走進孔廟，陽光被大榕樹的樹冠過濾成碎影，落在台灣最早的學堂遺址上。"

names:
  - era: koxinga
    name: 明倫堂（鄭氏時期）
  - era: qing
    name: 全台首學
  - era: japanese
    name: 台南孔廟
  - era: modern
    name: 台南市孔廟

rumors:
  - "孔廟的某塊石碑背面有幾個字，是清代一個秀才刻的，說他夢見孔子坐在這棵榕樹下，但孔子說的話他寫不出來，只有那幾個字留下來：「不在紙上」。"
connections:
  - tainan_chihkan_tower
  - tainan_silian_yan
  - five_concubines_temple
