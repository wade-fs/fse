id: tainan_yongle_market
settlement: tainan
canonical_name: 永樂市場（布市）
is_heritage: false
base_description: |
  台南府城最早的布料市場，日治時代就形成了布商的聚集。
  現在仍有幾十家布行在這裡，台南的服裝設計師說，
  要找特定的布料，來永樂就對了。
  舊時代的布商用算盤，算了幾十年，
  算盤換成計算機，位置一直沒換。
travel_arrive_text: "你走進永樂市場，各種布料的顏色和質地在每個攤位前展開，像一個可以觸摸的色彩圖書館。"

names:
  - era: japanese
    name: 台南永樂市場
  - era: postwar
    name: 布行街
  - era: modern
    name: 台南永樂市場

rumors:
  - "布市最老的那家說，他有一疋布是從清代留下來的，是某個訂單剩下的布頭，沒有人來取貨，就一直放著，現在已經脆了，但顏色還在。"
connections:
  - tainan_old_market
  - tainan_old_street
