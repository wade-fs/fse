id: wu_fei_temple
settlement: tainan
canonical_name: 延平郡王祠（鄭成功廟）
is_heritage: true
base_description: |
  清代從沈葆楨奏請建立的鄭成功廟，原本是日本時代的開山神社，
  戰後改回延平郡王祠。建築是和式神社格局，供奉的卻是漢人英雄，
  這種混搭是台灣歷史雜糅的完美標本。
travel_arrive_text: "你走進延平郡王祠，神社的石燈籠和漢式的神龕並列，是台灣歷史最直白的展示。"

names:
  - era: koxinga
    name: 鄭成功祭祀場所
  - era: japanese
    name: 開山神社
  - era: postwar
    name: 延平郡王祠
  - era: modern
    name: 延平郡王祠（台南市定古蹟）

rumors:
  - "神社時代的石燈籠戰後沒有移走，說是文物，但有些燈籠上還可以看到日文的奉納文字，和旁邊中文的解說牌放在一起，讓人一時語塞。"
connections:
  - tainan_silian_yan
  - five_concubines_temple
