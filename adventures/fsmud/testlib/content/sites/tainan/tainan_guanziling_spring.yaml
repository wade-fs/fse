rumors:
- 聽說關子嶺泥漿溫泉地底下藏有清代反清復明起義軍留下的舊鐵刀。
- 有人傳言，在起大霧的深夜，關子嶺泥漿溫泉周邊能看見挑夫挑扁擔無聲走過的幻影。
