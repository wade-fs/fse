id: tainan_old_market
settlement: tainan
canonical_name: 台南西市場（大菜市）
is_heritage: true
base_description: |
  日治時代建的大菜市，大跨距的鋼鐵屋頂讓整個市場在一個寬闊的空間裡展開。
  台南的食材在這裡匯集：虱目魚、蚵仔、關廟麵、玉井芒果。
  每個攤位都是一個家族的命脈，有些攤位的位置從日治時代就固定下來，
  幾十年沒有動過。
travel_arrive_text: "你走進西市場，鋼鐵屋頂把戶外的熱氣擋了一半，市場的涼意和食物的香氣迎面而來。"

names:
  - era: japanese
    name: 台南西市場
  - era: postwar
    name: 大菜市
  - era: modern
    name: 台南西市場（大菜市）

rumors:
  - "市場最深處有一攤從日治時代就在的碗粿，老闆說攤位號碼是「01」，說第一個入駐的攤位就是他們家，那個牌子還掛著。"
connections:
  - tainan_old_street
  - tainan_xilaya
