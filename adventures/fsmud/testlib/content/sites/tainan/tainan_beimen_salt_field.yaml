id: tainan_beimen_salt_field
settlement: tainan
canonical_name: 七股鹽田（台灣鹽業遺址）
is_heritage: true
base_description: |
  台南是台灣最重要的鹽業產地，七股的鹽田綿延幾十公里。
  鹽工用木耙把鹽晶從鹽田底部刮起，堆成白色的小山，
  在陽光下閃著讓人瞇眼的光。現在機械採鹽取代了人工，
  但幾個保存的舊鹽田還維持傳統採法，讓人看到這片土地最基礎的生計。
travel_arrive_text: "你走到鹽田邊，腳下的土地因為含鹽而呈現一種異樣的白色，空氣裡有海水和礦物的混合氣味。"

names:
  - era: dutch
    name: 台江鹽場
  - era: qing
    name: 七鯤鯓鹽場
  - era: japanese
    name: 七股製鹽場
  - era: modern
    name: 七股鹽田（觀光鹽場）

rumors:
  - "老鹽工說，鹽田裡有一個位置的鹽結晶特別純，純到透明，一般鹽是白色的，但那個位置的鹽是水晶色，他說那是地下有什麼東西在影響，但也說不清楚是什麼。"
connections:
  - anping_harbor
  - tainan_old_market
