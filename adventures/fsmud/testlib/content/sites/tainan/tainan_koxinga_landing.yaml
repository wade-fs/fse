id: tainan_koxinga_landing
settlement: tainan
canonical_name: 鄭成功登陸處（鹿耳門）
is_heritage: true
base_description: |
  永曆十五年（1661），鄭成功率領兩萬五千名士兵從鹿耳門水道登陸台灣，
  開始了對荷蘭東印度公司的圍攻。登陸點現在是一片草地，
  立著一塊解說碑，描述那場改變台灣命運的登陸。
  碑的背面沒有字，但有人在碑後方的草地上放了一小束花。
travel_arrive_text: "你站在鹿耳門登陸點，草地看起來普通，但腳下的土地見過一場改變台灣的海上大軍。"

names:
  - era: dutch
    name: 北線尾淺灘（荷蘭防線）
  - era: koxinga
    name: 鄭成功鹿耳門登陸點
  - era: qing
    name: 鹿耳門港
  - era: modern
    name: 鄭成功登陸紀念地

rumors:
  - "有歷史學者說，鄭成功選擇鹿耳門是因為荷蘭人認為那條水道太淺，大船進不去，是一個被放棄防守的缺口。鄭成功在漲潮時帶著船隊，剛好通過。"
connections:
  - anping_harbor
  - tainan_anping_fort
