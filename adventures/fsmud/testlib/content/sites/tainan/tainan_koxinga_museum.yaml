id: tainan_koxinga_museum
settlement: tainan
canonical_name: 台南延平王博物館（鄭成功紀念館）
is_heritage: true
base_description: |
  博物館陳列著關於鄭成功的文物、複製品和歷史文件。
  鄭成功是複雜的人物：在中國是抗清英雄，在台灣是「開台聖王」，
  在荷蘭的歷史書裡是驅逐殖民者的武力勢力。
  博物館試圖呈現這個人物的多面向，但每個展示牌的角度，
  都洩露了策展者的立場。
travel_arrive_text: "你走進博物館，展示的方式讓你注意到，「鄭成功」這個名字在不同的歷史框架裡，是完全不同的人。"

names:
  - era: koxinga
    name: 鄭成功行館
  - era: japanese
    name: 開山神社文物館
  - era: modern
    name: 台南延平王博物館

rumors:
  - "館內有一幅鄭成功的畫像，是歐洲人畫的，鄭成功的臉是歐洲人的臉，穿著漢服。旁邊另一幅是日本人畫的，是日本武士的臉，穿著漢服。同一個人，三種面孔。"
connections:
  - wu_fei_temple
  - tainan_koxinga_landing
