id: tainan_zhongyi_temple
settlement: tainan
canonical_name: 忠義路武廟（赤崁武廟）
is_heritage: true
base_description: |
  台南關帝廟（武廟）的香火比赤崁樓還盛，信眾說關公比很多官更管用。
  廟裡有一個「月老祠」，紅線牽的對象不只是男女，還有很多事業上的緣分。
  廟公說，有人把一張紙條塞進神龕縫隙，寫著一個名字，後來那個人真的出現了。
  這件事每年都有不同版本在流傳。
travel_arrive_text: "你走進武廟，廟裡人比外面多，每個人都在說各自的事，聲音疊著聲音，形成一種只有廟裡才有的氛圍。"

names:
  - era: qing
    name: 赤崁街武廟
  - era: japanese
    name: 台南武廟
  - era: modern
    name: 忠義路武廟

rumors:
  - "廟裡有一本借據，說是幾十年前一個商人欠了武廟的神明一個承諾，後來承諾沒有兌現，他的後代每年來還一個小承諾，說要還到還清為止。"
connections:
  - tainan_chihkan_tower
  - tainan_old_street
