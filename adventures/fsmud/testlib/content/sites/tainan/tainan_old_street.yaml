id: tainan_old_street
settlement: tainan
canonical_name: 台南老街（府城中街）
is_heritage: false
base_description: |
  台南的老街不是觀光打造的，是真實活著的街道。
  賣碗粿的、賣蚵仔麵線的、賣舊書的，和咖啡廳、設計工作室並列，
  互不排斥，構成一種台南特有的日常。
  老街的窄巷每隔幾步就有一個小廟或神龕，
  是信仰密度最高的街區之一。
travel_arrive_text: "你走進台南老街，每走幾步就看到一個神龕或廟門，香煙和咖啡香交替出現。"

names:
  - era: qing
    name: 府城中街
  - era: japanese
    name: 台南市街
  - era: modern
    name: 台南老街

rumors:
  - "老街最窄的那條巷子裡有一個神龕，神龕的主神是個沒有名字的「好兄弟」，說是幾百年前某個在巷子裡倒下的旅人的靈，附近居民每天都會給他換水。"
connections:
  - tainan_grand_mazu_temple
  - tainan_silian_yan
  - tainan_old_market
