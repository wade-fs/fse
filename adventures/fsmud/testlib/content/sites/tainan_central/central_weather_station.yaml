- tainan_central_site
rumors:
- 有人傳言，台南舊測候所地下的水封密室深處，還保存著日治時期遺留的防空用備用水銀罐。
- 老茶莊掌櫃說，泮宮石坊最基座的那塊青斗石雕麒麟座下，埋有一枚清代乾隆年間防震用的銅錢。
