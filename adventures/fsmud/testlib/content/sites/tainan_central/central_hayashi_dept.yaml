rumors:
- 聽說重慶寺神案地底夾層裡，藏有清代男女信眾為求復合而寫下的血盟誓書拓本。
- 有人傳言，台南舊測候所地下的水封密室深處，還保存著日治時期遺留的防空用備用水銀罐。
