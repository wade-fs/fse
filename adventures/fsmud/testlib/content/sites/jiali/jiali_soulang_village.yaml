rumors:
- 老工頭說，蕭壠糖廠地下避難通道深處，依然保留著二戰時期日軍遺留的電報機與舊發電機箱。
- 聽說北頭洋走沙跑場的沙地下，曾出土過西拉雅先民防範海盜襲擊時所用的純銅箭頭。
