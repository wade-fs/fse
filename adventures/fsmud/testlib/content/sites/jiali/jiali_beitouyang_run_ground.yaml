rumors:
- 有人傳言，佳興老街最古老的那座土角厝的紅磚煙囪下，埋有建庄時用以辟邪的玄天上帝鐵牌。
- 聽說佳里金唐殿大殿夾層的地板下，藏有清代閩粵墾民大械鬥時簽署的停戰血盟書。
