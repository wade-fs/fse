id: duck_soup_alley
settlement: singang
canonical_name: 鴨肉羹巷
is_heritage: false
base_description: |
  這條巷弄只有三家店，但全部賣鴨肉羹，三家都說自己是正宗。
  湯頭是雞鴨混熬的，勾了薄芡，鴨肉絲鋪在上面，
  淋幾滴烏醋，撒一把芹菜末。
  這是新港人的早餐和下午茶，也是廟會之後必吃的東西。
travel_arrive_text: "你走進鴨肉羹巷，三家店的鍋子都在滾，你得做個選擇。"

names:
  - era: qing
    name: 笨港鴨肉店街
  - era: japanese
    name: 新港鴨肉料理通
  - era: modern
    name: 鴨肉羹巷

rumors:
  - "最老的那家說，鴨肉羹的湯底是連續熬了三十年沒有換過的，每天補新的材料進去，老湯從來沒有清空。"

connections:
  - singang_market
  - singang
