id: beimen_creek_old
settlement: singang
canonical_name: 笨港溪舊河道
is_heritage: true
base_description: |
  一條河道痕跡穿過農田，現在是一條幾乎乾涸的排水溝，
  兩岸的土堤上長著雜草。但如果你蹲下來看，
  溝底的泥土裡偶爾會露出黑色的碎磚，是清代笨港的遺跡。
  乾隆年間的大洪水就是沿著這條河道改道，
  把繁華的笨港分成兩個聚落，一個在北、一個在南。
travel_arrive_text: "你站在舊河道旁，看著這條幾乎不像河的溝，想像當年洪水的力量。"

names:
  - era: dutch
    name: 新港溪（Soulang River）
  - era: qing
    name: 笨港溪
  - era: japanese
    name: 笨港溪（廢河道）
  - era: modern
    name: 笨港溪舊河道

rumors:
  - "附近農民說每次深耕，都會從土裡翻出幾塊清代的磚頭或陶片，攢了幾十年，現在放在家裡當門擋。"

connections:
  - xilaya_stone_site
  - singang
