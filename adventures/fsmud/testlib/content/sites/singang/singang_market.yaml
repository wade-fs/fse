base_description: |
  這裡在新港奉天宮前方，市場內人聲鼎沸，充滿了在地活力。
  空氣中飄散著新港鴨肉羹、蒸餃與粉圓冰的香味。
  農民與小販在此熱情招呼，是體驗在地生活最直接的場所。
travel_arrive_text: "你走進了熱鬧的新港市場，瞬間被美食的香氣與攤販的吆喝聲包圍。"
