id: NPC_historian_singang
name:
  zh-TW: "新港文史工作者阿明"
settlement: singang
home_site: xilaya_stone_site
role: scholar
hint:
  zh-TW: "戴著眼鏡、手持記事本的中年男人，說話條理清晰，對每一個歷史細節都有不尋常的熱情。"
responses:
  "新港文書":
    zh-TW: "新港文書是台灣最珍貴的原住民歷史文件，用羅馬字寫的西拉雅語，記錄了清代漢人向西拉雅族購買土地的契約。那些契約現在散在國內外各個博物館，要完整看到全部，得跑好幾個城市。"
  "西拉雅":
    zh-TW: "西拉雅族在清代被認為是「熟番」，漢化程度較深，因此反而在歷史上更容易被忽視。他們的文化沒有完全消失，但在很多地方是以隱藏的方式存活著，比如廟裡的某些儀式，比如那個竹藝圖案。"
  "荷蘭":
    zh-TW: "荷蘭東印度公司在台灣建立了第一個系統性的行政管理，但更重要的是他們帶來了文字教育。西拉雅族因此是台灣歷史上第一個有自己書面文字的族群。這件事應該更廣為人知。"
  "傳言":
    zh-TW: "廟裡的石碑？我知道它的存在，但廟方不讓我拍照，只讓我看了幾分鐘。碑上的文字是荷蘭時代的羅馬字，我只看清楚了幾個字，但那幾個字已經讓我研究了三年。"
