id: NPC_changhua_nanyao_keeper
name:
  zh-TW: "南瑤宮老乩童阿喜叔"
settlement: changhua_city
home_site: changhua_nanyao_temple
role: temple_keeper
hint:
  zh-TW: "七十多歲的老乩童，眼神清明，對南瑤宮的各進殿宇與媽祖靈驗事蹟十分熟悉。"
responses:
  "媽祖":
    zh-TW: "我們南瑤宮的媽祖是『彰化媽』，靈驗得很。南瑤宮最特別的是它的觀音殿，你看看那歐式立柱和日式木結構，這在台灣是唯一的。這是我們老匠師的氣魄，管你什麼總督，神明的殿堂就是要最大氣。"
  "匠師刻字":
    zh-TW: "（嘿嘿笑）你問柱子上的字？那是大正年間重建觀音殿時，木雕施師傅的師兄刻的。在一個洋式柱頭的內側，刻了三個極小的日文字『馬鹿野郎』。那時候日本官員天天來指手畫腳，匠師不敢明著罵，就刻在神明眼底下，讓神明公斷。"
  "歷史":
    zh-TW: "南瑤宮在清代和日治時期是彰化人團結的核心。每次有大事情，大家都要在媽祖面前燒香商量。神明不只是拜的，神明是我們彰化人的主心骨。"
  "傳言":
    zh-TW: "宮裡有一面老鼓，據說是清代林爽文之役時，城內居民用來報警防守的。大鼓敲響，整個彰化城都聽得到，現在這面鼓存在庫房，不輕易展示。"
