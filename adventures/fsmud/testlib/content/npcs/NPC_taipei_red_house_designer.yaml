settlement: taipei
home_site: taipei_101_ximending_red_house
role: artist
hint:
  zh-TW: 穿著設計師外套、手拿黑色素描本的年輕女子，正在展位布置作品。
responses:
  紅樓:
    zh-TW: 紅樓是台灣最早的公設市場，現在轉型成文創空間，讓老建築有了全新的靈魂，超美的。
  設計:
    zh-TW: 我的作品融合了台灣傳統圖騰與現代設計語言，希望讓更多人看到台灣的美學。
