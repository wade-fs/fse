id: npc_new_taipei_temple_art_master
name:
  zh-TW: "李雕刻師"
settlement: new_taipei
home_site: "new_taipei_sanxia_temple"
role: "工藝師"
hint:
  zh-TW: "三峽祖師廟重建的木雕師傅，手藝精湛，一刀一劃雕琢出廟殿的神聖木雕。"
responses:
  "歷史":
    zh-TW: "新北市的歷史，是一半靠著淡水海風吹，一半靠著金瓜石火藥炸出來的。"
  "文化":
    zh-TW: "不論是平溪高空的天燈，還是三峽祖師廟的木雕，都是前人一筆劃刻出來的根。"
