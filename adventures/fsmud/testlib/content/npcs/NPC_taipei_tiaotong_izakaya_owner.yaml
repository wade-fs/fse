id: NPC_taipei_tiaotong_izakaya_owner
name:
  zh-TW: 條通居酒屋老闆山田先生
settlement: taipei
home_site: taipei_101_zhongshan_north_road
role: innkeeper
hint:
  zh-TW: 身穿日式圍裙、頭綁布巾的日本男子，親切地在吧台後為客人斟酒。
responses:
  條通:
    zh-TW: 條通在日治時代是日本人的居住區，我祖父那時候就在這裡開店，我是第三代了，台灣已經是我的家。
  居酒屋:
    zh-TW: 居酒屋文化是台日交流的橋樑，台灣客人和日本遊客坐在一起喝酒聊天，語言不通也能交到朋友。
