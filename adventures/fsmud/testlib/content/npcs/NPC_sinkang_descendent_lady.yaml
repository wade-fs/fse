id: NPC_sinkang_descendent_lady
name:
  zh-TW: "西拉雅後裔阿春嬤"
settlement: singang
home_site: singang
role: elder
hint:
  zh-TW: "穿著素色棉麻衣的老婦人，眼神清明，說話時常常夾著幾個外來語無法翻譯的詞，最後解釋說那是西拉雅語。"
responses:
  "西拉雅":
    zh-TW: "我說我是西拉雅人，很多人說你哪有，你跟我們長得一樣。但我阿嬤告訴我，我們是Sinkang社的後代，新港這個名字就是Sinkang的漢字音譯。"
  "祖靈":
    zh-TW: "我們西拉雅有阿立祖，是女性的神靈，放在甕裡，放在家的某個角落。現在很多人不拜了，但我家還有一個甕，我每天早上放一杯水，那是阿立祖喜歡的。"
  "媽祖":
    zh-TW: "（微笑）你問我媽祖和阿立祖哪個好？兩個都好。我早上拜阿立祖，廟會去拜媽祖，她們都不介意，我覺得。"
  "傳言":
    zh-TW: "竹藝那個紋樣？那個我認識，我阿嬤說那個叫「靈圖」，是Sinkang社用來召喚祖靈的圖案，不是用來裝飾的。那個竹藝師傅把它織出來，我有點擔心，但我沒有去阻止，或許祖靈早就想回來了。"
