id: NPC_city_park_elder
name:
  zh-TW: "公園老棋手阿山"
settlement: chiayi_city
home_site: city_park
role: elder
hint:
  zh-TW: "每天下午在大榕樹下擺棋盤的老人，象棋棋子被摸得油光發亮，說話帶著洞悉一切的淡然。"
responses:
  "公園":
    zh-TW: "這個公園以前是神社，神社拆了才變公園。那些石燈籠沒人搬，就留著。現在孩子在石燈籠旁邊跑，不知道那是什麼，也好，就這樣吧。"
  "下棋":
    zh-TW: "下棋是一個人坐著等另一個人的方式。你說要等誰？不重要，重要的是等著本身。我在這裡等了三十年，每天都有人來坐下來，每天都不一樣。"
  "傳言":
    zh-TW: "地窖？我聽說過。我年輕的時候挖過，在石階旁邊挖了兩尺，挖到一個鐵蓋，鏽死了，用了三個人也打不開。後來被人說是破壞古蹟，就填回去了，現在草長過去了，你看不到了。"
