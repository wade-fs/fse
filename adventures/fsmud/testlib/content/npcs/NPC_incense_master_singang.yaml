id: NPC_incense_master_singang
name:
  zh-TW: "香藝師傅阿福"
settlement: singang
home_site: incense_workshop
role: craftsman
hint:
  zh-TW: "五十多歲的男人，手指染著深棕色的香料色，說話緩慢，思考時習慣閉著眼睛。"
responses:
  "香":
    zh-TW: "新港的香和嘉義的香不一樣。嘉義偏沉木系，新港用的是在地的藥材和花材，氣味比較清甜，適合廟用。我家做香做了四代了，現在是第五代。"
  "西拉雅香":
    zh-TW: "（睜開眼睛）你從哪裡聽說這個？那是我在嘗試復原的東西，荷蘭傳教士的紀錄裡有一段描述，說西拉雅人在祭典時燃燒某種香草，那個香草現在我知道是什麼，但量太少了，還沒辦法大量製作。"
  "竹藝":
    zh-TW: "竹藝師傅和我是朋友，我用他的竹管做香架，他有時候用我的香做氣息測試，看竹子的氣味和香會不會衝突。我們都在做跟記憶有關的事。"
  "傳言":
    zh-TW: "西拉雅香的配方？有一半我知道，另一半我懷疑寫在廟後花園那些石柱附近的地下。我沒有去挖，那是古蹟。"
