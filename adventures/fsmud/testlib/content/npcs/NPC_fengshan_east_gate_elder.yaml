id: NPC_fengshan_east_gate_elder
name:
  zh-TW: 鳳山城門旁老伯仔榮義
settlement: kaohsiung
home_site: fengshan_east_gate
role: civilian
hint:
  zh-TW: 八十幾歲的老人，每天早上在東便門的老榕樹下打太極拳，對鳳山的歷史有自己的一套說法，不一定符合教科書。
responses:
  城門:
    zh-TW: 這個城門，我小時候還是完整的，後來拆了，只留這個門洞。說是為了讓路，其實就是沒人在乎。現在說要保存，但那些磚已經拿走了，你保存個什麼？保存的是一個洞。
  護城河:
    zh-TW: 以前這裡有護城河，我爸小時候還在裡面游泳。後來填掉蓋馬路，說是進步。進步的結果是什麼，就是現在這個水泥地，看不見河也看不見城。
  老榕樹:
    zh-TW: 這棵榕樹，比我老，比我爸老，比我阿公也老。這棵樹見過城門完整的時候，見過日本人，見過國民黨，見過每一代在這裡打太極拳的老人。我只是最新的一個，樹說不定在等下一個。
