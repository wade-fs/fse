id: NPC_tainan_archaeology_student
name:
  zh-TW: "南大考古學生小明"
settlement: tainan
home_site: tainan_xilaya
role: student
hint:
  zh-TW: "戴著草帽、手拿記錄板的大學生，說話帶著學術的精確，但偶爾會因為太興奮而說出術語。"
responses:
  "西拉雅":
    zh-TW: "西拉雅的考古遺址在台南很分散，因為他們是半農半獵的民族，聚落不固定。新市仔社這裡是他們最大的定居點，但現在地面上的遺跡幾乎都消失了，主要靠文書記錄和荷蘭時代的地圖重建。"
  "阿立祖":
    zh-TW: "阿立祖是西拉雅族的祖靈信仰，主要表現形式是一個甕，裡面放祖先的象徵物，放在家的某個角落供奉。台南現在還有幾個西拉雅後裔家庭保留這個傳統，但沒有公開說。"
  "地層":
    zh-TW: "台南的地層很複雜，因為台江內海淤積的歷史，讓不同時期的文物在不尋常的深度出現。有時候日治時代的文物出現在比荷蘭時代文物更深的地層，不是地層搞錯了，是因為地面高度在歷史過程中改變了。"
  "傳言":
    zh-TW: "土地公廟的阿立祖神龕？我知道那個廟，我去看過，那個神龕確實是後來放進去的，和廟的建築風格不符，是西拉雅式的甕形神龕，放在土地公旁邊。廟公說是一個老太太放的，已經放了幾十年，從來沒有動過。"
