id: NPC_qishan_local_writer
name:
  zh-TW: 旗山在地作家阿中
settlement: kaohsiung
home_site: qishan
role: artist
hint:
  zh-TW: 四十多歲的在地作家，寫的是旗山和周邊山城的故事，出版過幾本描寫南部農村生活的小說，平日常在咖啡館裡寫作。
responses:
  旗山:
    zh-TW: 我在旗山長大，離開過十幾年，後來回來了。回來的原因很複雜，但說簡單一點，是因為我在別的地方找不到寫這裡的感覺。旗山的空氣、光線、人說話的方式，只有在這裡才找得到。
  寫作:
    zh-TW: 我寫的是這裡的人的故事。不是什麼大事，就是日常的事——農人和天氣的關係，年輕人為什麼離開，老人怎麼對待那些離開的人。這些故事在大城市沒有市場，但我不是為了市場寫，是為了記錄。
  香蕉:
    zh-TW: 香蕉在旗山是一個關鍵詞。不只是農業，而是一個時代的象徵——繁榮過、沒落過、被替代過。我寫過一篇故事，是一個香蕉農在最後一片蕉田被拆掉那天，站在那裡說的話。那篇讓很多旗山老人說，「對，就是這樣」。
