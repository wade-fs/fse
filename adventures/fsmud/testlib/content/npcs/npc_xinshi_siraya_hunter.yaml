id: npc_xinshi_siraya_hunter
name:
  zh-TW: "西拉雅新港社後裔"
settlement: xinshi
home_site: "xinshi_old_street"
role: "citizen"
hint:
  zh-TW: "熱心於西拉雅文化復振的新市庄民，對新港文書的字體與契字頗有研究。"
responses:
  "歷史":
    zh-TW: "這片土地曾是新港社的獵場，祖先留下的新港文書就是漢人與西拉雅族在此開墾、立約的珍貴鐵證。"
  "山海":
    zh-TW: "雖然新市如今科技廠房林立，但當風吹過田野，依然能聞到昔日獵場與甘蔗林的香氣。"
