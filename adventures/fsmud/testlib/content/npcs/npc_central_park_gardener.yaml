id: npc_central_park_gardener
name:
  zh-TW: "林老園丁"
settlement: tainan_central
home_site: "central_taishang_park"
role: "管理員"
hint:
  zh-TW: "守護湯德章公園多年的老園丁，熟悉圓環內每一株老鳳凰木的生長與開花狀況。"
responses:
  "歷史":
    zh-TW: "中西區的歷史，就是從泮宮石坊下的第一碗老茶與孔廟的鐘聲開始的。"
  "文化":
    zh-TW: "不論是重慶寺的醋矸，還是測候所的胡椒管，都是我們府城先民在大浪中討生活的根。"
