id: npc_hualien_temple_priest
name:
  zh-TW: "慶修院老法師"
settlement: hualien
home_site: "hualien_qingxiu_temple"
role: "廟祝"
hint:
  zh-TW: "慶修院的年邁主事法師，精通真言宗頌經儀軌，守護著八十八尊古老石佛。"
responses:
  "歷史":
    zh-TW: "花蓮的歷史，是一面由大理石峽谷抵禦強風，一面由太平洋黑潮與原民先靈歌聲寫成的山海長卷。"
  "山海":
    zh-TW: "不論是太魯閣的長春祠，還是太巴塱的祖靈屋，都是我們花蓮人在風浪中討生活的根。"
