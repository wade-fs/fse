id: npc_lianjiang_niujia_elder
name:
  zh-TW: "曹長老"
settlement: lianjiang
home_site: "lianjiang_niujia_village"
role: "長老"
hint:
  zh-TW: "牛角村的蔡氏宗族耆老，熟知閩東漁民在大陸沿海對渡與白馬尊王信仰歷史。"
responses:
  "歷史":
    zh-TW: "連江的歷史，是一面由花崗岩坑道抵禦砲火，一面由天后宮媽祖衣冠塚香火寫成的戰地長卷。"
  "戰地":
    zh-TW: "不論是芹壁石屋的標語，還是北海地下水道，都是我們連江人在砲火與風浪中求生存的根。"
