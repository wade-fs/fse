id: npc_taitung_zhiben_shaman
name:
  zh-TW: "排灣族女巫"
settlement: taitung
home_site: "taitung_zhiben_slatehouse"
role: "祭司"
hint:
  zh-TW: "知本部落排灣族女巫，熟悉百步蛇圖騰神話與跟祖靈溝通的祭祀儀軌。"
responses:
  "歷史":
    zh-TW: "台東的歷史，是一面由都蘭大山抵禦海風，一面由太平洋黑潮與原民先靈歌聲寫成的山海長卷。"
  "山海":
    zh-TW: "不論是卑南的古遺址，還是紅葉的操場，都是我們台東人在風浪中討生活的根。"
