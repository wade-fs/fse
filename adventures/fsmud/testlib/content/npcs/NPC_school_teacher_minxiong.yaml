id: NPC_school_teacher_minxiong
name:
  zh-TW: "公學校老師德仔先"
  en: "Public School Teacher Tek-A-Sian"
hint:
  zh-TW: "身材清瘦、戴著圓框眼鏡的男人，手中隨時捏著一支粉筆，說話斟酌用字，帶著儒雅書生氣。"
  en: "A slim man wearing round glasses, always holding a piece of chalk, choosing words carefully when speaking with a scholarly air."
settlement: minxiong
home_site: school
responses:
  "學校":
    zh-TW: "公學校是給台灣孩子讀的，和日本人讀的「小學校」不同。同樣是讀書，待遇不一樣，這件事讓我思考了很久。"
    en: "Public school was for Taiwanese children, different from the 'elementary school' for Japanese. Same education, different treatment — I thought about this for a long time."
  "日語":
    zh-TW: "（壓低聲音）我教的是日語，但私下也教漢文。那時候漢文不准公開教，但語言是一個民族的根，我不能讓孩子們忘了。"
    en: "(lowering voice) I taught Japanese officially, but privately taught Chinese characters too. Chinese writing was banned from open teaching at the time, but language is the root of a people — I couldn't let the children forget."
  "皇民化":
    zh-TW: "皇民化運動時，我被要求把台灣孩子當日本孩子教。改日本名，說國語，拜神社。我照做了，但每一個字都像在吞刀。"
    en: "During the Kominka movement, I was required to teach Taiwanese children as if they were Japanese. Change to Japanese names, speak the national language, worship at the shrine. I complied, but every word felt like swallowing a blade."
  "漢文":
    zh-TW: "你想學漢文？現在時代不同了，可以公開教了。不過真正的古文，詩詞，那是另一回事。你若有心，我可以帶你讀幾段。"
    en: "You want to learn classical Chinese? Times are different now, we can teach it openly. But true classical writing, poetry — that's another matter. If you're serious, I can guide you through a few passages."
  "傳言":
    zh-TW: "孩子們說學校廁所後面的圍牆有聲音，說是從地下來的。我去聽了，是水管振動聲，不是鬼。但孩子們還是不信，唉。"
    en: "The children say there are sounds coming from behind the school toilet wall, from underground. I went to listen — it's pipe vibrations, not ghosts. But the children still won't believe me. Sigh."
