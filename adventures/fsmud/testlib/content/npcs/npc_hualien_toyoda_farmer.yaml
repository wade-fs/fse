id: npc_hualien_toyoda_farmer
name:
  zh-TW: "吉野老農夫"
settlement: hualien
home_site: "hualien_toyoda_village"
role: "農夫"
hint:
  zh-TW: "日治吉野移民村的台籍老農，熟悉昔日總督府推廣吉野米與薄荷種植的歷史。"
responses:
  "歷史":
    zh-TW: "花蓮的歷史，是一面由大理石峽谷抵禦強風，一面由太平洋黑潮與原民先靈歌聲寫成的山海長卷。"
  "山海":
    zh-TW: "不論是太魯閣的長春祠，還是太巴塱的祖靈屋，都是我們花蓮人在風浪中討生活的根。"
