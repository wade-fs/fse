id: NPC_dashu_pineapple_farmer
name:
  zh-TW: 大樹鳳梨農阿榮伯
settlement: kaohsiung
home_site: dashu
role: civilian
hint:
  zh-TW: 六十幾歲的鳳梨農，手掌粗厚，說起鳳梨的事能說上三個小時不重複，對農業政策頗有微詞。
responses:
  鳳梨:
    zh-TW: 大樹的鳳梨，台灣最好的之一。土質和日照的條件剛好，這邊的鳳梨甜度比別的地方高，纖維也細。你說進口的比較便宜，便宜不等於好，你吃過你就知道。
  農業:
    zh-TW: 做農的人，靠天吃飯，也靠市場吃飯。天氣不好，沒收成；市場不好，賣不掉。兩頭都不確定，就是農民的日子。我做了幾十年，習慣了，但年輕人不願意做，我能理解，我自己也不想讓我的小孩做。
  糖廠:
    zh-TW: 大樹這裡以前有糖廠，我爸爸在糖廠工作，那時候整個大樹都是糖廠的人。後來糖廠關了，大家就改種鳳梨，反正土地是一樣的，種什麼看市場。現在種鳳梨，下一代不知道種什麼。
