id: temple_keeper
name:
  zh-TW: "廟祝阿榮伯"
  en: "Keeper Ah-Rong"
hint:
  zh-TW: "一位面容慈祥但眉宇緊鎖的中年廟祝，正在清掃廟埕。"
  en: "A kind-faced but frowning middle-aged temple keeper sweeping the courtyard."
responses:
  "廟":
    zh-TW: "大士爺廟在民雄已有三百年歷史，打貓時代就有了。每到農曆七月，附近的孤魂野鬼都由大士爺收服，非常靈驗。"
    en: "The Dashiye Temple has stood in Minxiong for 300 years, since the Damao era. During the seventh lunar month, the great deity pacifies wandering spirits."
  "怨靈":
    zh-TW: "最近地底傳來異聲，不太對勁。鎮煞陣法的石陣有了裂縫，我懷疑有三尊怨靈鑽了進去。只是地底危險，一個人下去很冒險。"
    en: "Strange sounds have been coming from underground. The ward stone formation has cracked, and I fear three vengeful spirits have slipped through. But it's dangerous down there alone."
  "任務":
    zh-TW: "我這裡有件棘手的事。鎮煞陣法底下有三枚鎮符石散落了，被怨靈干擾而失去法力。你若能組個隊，到大士爺廟地下取回那三枚鎮符石（ward_stone），老夫自有重謝。"
    en: "I have a difficult task. Three ward stones in the underground formation have been scattered and drained of power by vengeful spirits. If you form a party and retrieve all three, I will reward you handsomely."
  "地下":
    zh-TW: "供桌下方那塊鬆動的石磚…若你手上有廟委的委託，且帶著同伴，應該就能看出端倪。組好隊後再仔細 look 一遍。"
    en: "Look at the loose stone slab beneath the offering table. If you hold our commission and travel with companions, you should be able to find the way. Form a party and look carefully."
  "鎮符石":
    zh-TW: "鎮符石是廟委秘法鑄製的，上面有大士爺的符文。被怨靈玷污後，暫時失去法力，但本質未壞，取回後我能重新開光。"
    en: "The ward stones were cast with secret temple arts and bear the runes of the Great Deity. Defiled by the spirits, they've lost their power, but I can re-consecrate them once retrieved."
