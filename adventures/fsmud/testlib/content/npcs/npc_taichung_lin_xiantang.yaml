id: npc_taichung_lin_xiantang
name:
  zh-TW: "林獻堂"
settlement: taichung
home_site: "taichung_wufeng_lin_mansion"
role: "地方領袖"
hint:
  zh-TW: "霧峰林家領袖，創立台灣文化協會，主導台灣議會設置請願運動，為台灣自治運動先驅。"
responses:
  "歷史":
    zh-TW: "台中的歷史，是一面由縱貫鐵路牽引，一面由大甲媽祖與二七部隊寫成的長卷。"
  "文化":
    zh-TW: "不論是南屯的打鐵聲，還是櫟社詩人們在望月亭下的低吟，都是我們中台灣的根。"
