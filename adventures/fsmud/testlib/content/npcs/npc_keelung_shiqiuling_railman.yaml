id: npc_keelung_shiqiuling_railman
name:
  zh-TW: "老巡軌員"
settlement: keelung
home_site: "keelung_shiqiuling_tunnel"
role: "鐵路工"
hint:
  zh-TW: "退休的縱貫鐵路巡軌員，熟悉獅球嶺隧道的滲水與鐵道石壁故事。"
responses:
  "歷史":
    zh-TW: "基隆港口的風雨就沒停過，西班牙人、法國人、日本人來了又走，只有雨水留了下來。"
  "中元祭":
    zh-TW: "放水燈是為了引路，讓那些在黑水溝裡遇難的孤魂野鬼有條回家的路。"
