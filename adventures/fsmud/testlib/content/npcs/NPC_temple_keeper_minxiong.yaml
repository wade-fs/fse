id: NPC_temple_keeper_minxiong
name:
  zh-TW: "廟祝阿榮伯"
  en: "Temple Keeper A-Rong"
hint:
  zh-TW: "身穿白色道袍、頭戴方巾的老人，手持香掃在廟埕之間來回走動。"
  en: "An elderly man in a white Taoist robe and square hat, sweeping the temple grounds with incense broom."
settlement: minxiong
home_site: dashiye_temple
responses:
  "廟":
    zh-TW: "大士爺廟歷史久了，從打貓時代就守著這片地。廟裡每塊石頭都有它的故事。"
    en: "The Dashiye Temple has a long history, guarding this land since the Dakao era. Every stone in this temple has a story."
  "大士爺":
    zh-TW: "大士爺是掌管孤魂的鬼王，七月普渡由祂主持。你看那尊神像，每年燒過又重塑，火裡新生，才能鎮住那些四處漂蕩的魂魄。"
    en: "Dashiye is the ghost king who oversees wandering souls. He presides over the Ghost Festival every July. That statue is burned and reborn each year — only through fire can wandering spirits be quelled."
  "普渡":
    zh-TW: "農曆七月，全民雄都要普渡。準備牲禮、糖果、金紙，擺在廟埕或門口。忘記拜的，我阿公說，夜裡會聽到敲門聲。"
    en: "In the seventh lunar month, all of Minxiong holds the Ghost Festival. Prepare offerings, sweets, and spirit money. My grandfather said those who forget will hear knocking at their door at night."
  "傳言":
    zh-TW: "鬼屋那邊最近又有人說看到白影。我說那是榕樹影子，老人家不信。唉，人心惶惶，才是真正的問題。"
    en: "People say they've seen a white figure near the haunted house again. I say it's the banyan tree's shadow, but the elders don't believe me. Sigh, troubled hearts are the real problem."
  "皇民化":
    zh-TW: "那段時間，廟差點被拆了。日本人說拜神是迷信，要我們拜天照大神。阿公把神像藏在牆縫裡才保住。"
    en: "During that time, the temple nearly got torn down. The Japanese said worshipping gods was superstition and wanted us to worship Amaterasu. Grandfather hid the statues in the walls to preserve them."
