id: NPC_qijin_schoolteacher
name:
  zh-TW: 旗津小學退休老師陳春英
settlement: kaohsiung
home_site: cijin_old_street
role: teacher
hint:
  zh-TW: 七十多歲的退休教師，在旗津小學教了三十年書，對旗津的每個家庭都很熟，說起任何一戶人家都能講出三代的事。
responses:
  旗津:
    zh-TW: 我在旗津教書三十年，教過的孩子有的做漁民，有的去讀大學，有的去了外地，有的回來了。每隔幾年，有個當年的學生來看我，他長大了，但我還是記得他五歲的樣子——這是當老師最奇妙的地方。
  孩子:
    zh-TW: 旗津的孩子，從小就知道海。他們說起海是很自然的，像說自己家的後院。出去讀書的，回來說台北有多繁榮，但說起海，說起魚，說起那個氣味，他們眼神還是不一樣的。
  島嶼:
    zh-TW: 旗津是個島，要搭船才能去高雄市區。小時候，那個搭船的動作，就把旗津和高雄分開了。後來通了隧道，可以騎車過去，但是老人說好像少了一件事——那個等船的片刻，是旗津特有的時間。
