id: npc_kinmen_broadcaster_girl
name:
  zh-TW: "張播音員"
settlement: kinmen
home_site: "new_kinmen_beishan_broadcaster"
role: "播音員"
hint:
  zh-TW: "昔日在北山播音牆負責對大陸心戰喊話的退休播音員，嗓音清脆。"
responses:
  "歷史":
    zh-TW: "金門的歷史，是一面由花崗岩坑道抵禦砲火，一面由浯島城隍香火寫成的戰地長卷。"
  "戰地":
    zh-TW: "不論是北山洋樓的彈孔，還是翟山水路坑道，都是我們金門人在砲火中求生存的根。"
