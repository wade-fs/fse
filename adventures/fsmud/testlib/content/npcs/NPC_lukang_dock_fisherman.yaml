id: NPC_lukang_dock_fisherman
name:
  zh-TW: "舊渡頭老漁民阿木"
settlement: lukang
home_site: lukang_guichao_port
role: fisherman
hint:
  zh-TW: "六十多歲，在已經淤積的舊鹿港溪邊整理釣具，皮膚被海風吹得粗糙，眼神裡有一種看透興衰的淡然。"
responses:
  "渡頭":
    zh-TW: "這裡以前是我們鹿港的港口，大船從大陸載布、載糖來，在這裡卸貨。現在呢？淤積成一條小溝了。你看這幾塊繫船石，以前是綁大船的，現在只能綁我這艘釣魚的小竹筏，這就叫歷史。"
  "繫船石":
    zh-TW: "這幾塊繫船石是清代的花崗岩，是從福建當壓艙石運過來的。非常重，水沖不走、風化不了，是這片港口曾經繁榮唯一的證據了。我每天來摸摸它，覺得它比我還寂寞。"
  "道釘":
    zh-TW: "大正時期的道釘？對，我年輕時在泥巴裡挖到過兩枚，是那種大火車用的。我聽我爺爺說，那時候日本人本來要鐵路過鹿港的，但我們鹿港的郊商怕鐵路破壞風水，也怕外地人來搶生意，聯手反對，鐵路這才繞到了彰化。鹿港就這樣慢慢沒落了。"
  "傳言":
    zh-TW: "聽說溪底深處有一艘清代的沉船，裝滿了泉州來的瓷器。每次大水過後，泥沙被沖走，有漁民說看到過木製的桅杆頂端露出水面，但沒人真的去挖，淤泥太深了。"
