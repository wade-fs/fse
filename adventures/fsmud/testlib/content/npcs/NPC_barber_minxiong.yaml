id: NPC_barber_minxiong
name:
  zh-TW: "剃頭師傅文水"
  en: "Barber Wen-Shui"
hint:
  zh-TW: "圍裙上帶著一絲皂沫的中年男人，站在理髮椅旁磨剃刀，眼神銳利。"
  en: "A middle-aged man with a touch of soap on his apron, standing beside the barber chair sharpening a razor, with piercing eyes."
settlement: minxiong
home_site: barbershop
responses:
  "剃頭":
    zh-TW: "來，坐下，剃個頭再走。我這手藝是跟我阿爸學的，阿爸是跟日本師傅學的。三代傳下來，這把剃刀算老了。"
    en: "Come, sit down, get a haircut before you leave. I learned this craft from my father, who learned it from a Japanese master. Passed down three generations, this razor is old."
  "八卦":
    zh-TW: "剃頭師傅消息靈通，這是行規。今仔日最夯的就是，李家的三子考上嘉義中學！整條街都知道，李老爸昨天請客，雞腳醋請了三桌。"
    en: "Barbers hear everything — that's the trade. Today's hot news: the third son of the Li family passed the Chiayi Middle School exam! The whole street knows. Father Li treated three tables to vinegar chicken feet yesterday."
  "日本時代":
    zh-TW: "我阿爸說，日本時代也有剃頭店，那時候規定留什麼髮型，說什麼外觀要整齊。什麼時代都是頭毛管最嚴。"
    en: "My father said there were barbershops in the Japanese era too. They regulated which hairstyles were allowed, said appearances must be tidy. Every era controls hair the most strictly."
  "傳言":
    zh-TW: "（放低聲音）你要聽？好，隔壁照相館的老闆娘最近不對勁，每天打烊以後還留在店裡，窗口還有燈光，但外面看不到人影。"
    en: "(lowering voice) You want to hear? Okay — the photo studio owner next door has been acting strange. She stays in the shop after closing every day. The light's on, but you can't see anyone through the window."
  "照相館":
    zh-TW: "那個照相館開了快三十年了，老闆娘的照片拍得很好，聽說以前有幫日本軍官拍過照。戰後就只拍一般人了，這我不太懂。"
    en: "That photo studio has been open for nearly thirty years. The owner takes good photos — I heard she once photographed Japanese military officers. After the war she just photographed regular people. I don't understand much about that."
