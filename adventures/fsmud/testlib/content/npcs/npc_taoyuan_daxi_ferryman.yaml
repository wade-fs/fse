id: npc_taoyuan_daxi_ferryman
name:
  zh-TW: "蔡擺渡"
settlement: taoyuan
home_site: "taoyuan_daxi_old_pier"
role: "擺渡人"
hint:
  zh-TW: "大嵙崁溪舊渡口的老擺渡人，懂得如何看溪水漲落來引導渡船通過激流。"
responses:
  "歷史":
    zh-TW: "桃園的歷史，是一面由大圳與古城牆抵禦強風，一面由桃園神社與眷村大合院寫成的開墾長卷。"
  "山海":
    zh-TW: "不論是角板山的古防空洞，還是大溪的巴洛克老街，都是我們桃園人在風浪中討生活的根。"
