id: npc_lianjiang_daqiu_ranger
name:
  zh-TW: "林守林員"
settlement: lianjiang
home_site: "lianjiang_daqiu_village"
role: "巡山員"
hint:
  zh-TW: "大坵島的野生梅花鹿守護人，熟悉島上石屋聚落的興衰與野鹿習性。"
responses:
  "歷史":
    zh-TW: "連江的歷史，是一面由花崗岩坑道抵禦砲火，一面由天后宮媽祖衣冠塚香火寫成的戰地長卷。"
  "戰地":
    zh-TW: "不論是芹壁石屋的標語，還是北海地下水道，都是我們連江人在砲火與風浪中求生存的根。"
