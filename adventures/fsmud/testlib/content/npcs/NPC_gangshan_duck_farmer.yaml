id: NPC_gangshan_duck_farmer
name:
  zh-TW: 岡山鴨農老李
settlement: kaohsiung
home_site: gangshan_duck_pond
role: civilian
hint:
  zh-TW: 六十多歲的老農，皮膚黝黑，帽沿壓低，手上有一條用來驅趕鴨群的竹竿。對朱一貴的故事如數家珍，說起來頗有自豪。
responses:
  鴨:
    zh-TW: 我們岡山養鴨，最少也有三百年了。朱一貴那個人，就是養鴨出身的，那池塘就在前面。你知道嗎，據說朱一貴的鴨子聽得懂命令，能排成陣式，這就是他後來能帶兵的原因——你笑什麼，這是真的。
  朱一貴:
    zh-TW: 朱一貴的鴨子傳說，我阿公跟我說過，我阿公的阿公也這樣說。說他養的鴨排成圓陣，看到他就鳴叫，像士兵看見將軍一樣。我家的鴨子沒那麼厲害，但性格也比外地的鴨聰明。
  阿公店:
    zh-TW: 阿公店就是岡山的舊名，你查地圖找不到，但老人都知道。「阿公店」是說有個老人在這裡開了間小店，讓南北旅人歇腳，後來這個地名就留下來了。
