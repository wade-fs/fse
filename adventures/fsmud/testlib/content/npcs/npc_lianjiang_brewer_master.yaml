id: npc_lianjiang_brewer_master
name:
  zh-TW: "黃老工頭"
settlement: lianjiang
home_site: "lianjiang_baba_tunnel"
role: "釀酒師"
hint:
  zh-TW: "八八坑道酒窖的退休老釀酒師，對馬祖老酒的紅麴發酵與窖藏工法瞭若指掌。"
responses:
  "歷史":
    zh-TW: "連江的歷史，是一面由花崗岩坑道抵禦砲火，一面由天后宮媽祖衣冠塚香火寫成的戰地長卷。"
  "戰地":
    zh-TW: "不論是芹壁石屋的標語，還是北海地下水道，都是我們連江人在砲火與風浪中求生存的根。"
