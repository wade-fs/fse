id: wu_tang_xing
name:
  zh-TW: "吳湯興"
  en: "Wu Tang-xing"
hint:
  zh-TW: "身穿布衣，腰懸柴刀與火繩槍的抗日義軍首領，眼神剛毅不屈。"
  en: "The leader of the anti-Japanese volunteer army, wearing plain clothes, looking resolute."
responses:
  "八卦山":
    zh-TW: "此山乃是守衛彰化城與全台灣的最後屏障，我等客家與閩南子弟在此歃血為盟，誓死與日軍死戰到底！"
    en: "This mountain is the last shield for Changhua. We swear to fight the Japanese army to the death here!"
  "日軍":
    zh-TW: "近衛師團兵力雖強，大砲雖利，但我們有必死之決心！縱然戰死至最後一人，也絕不投降！"
    en: "Although the guards division is strong, we have the determination to die! Even if we die to the last man, we will never surrender!"
