id: npc_kinmen_sapper_veteran
name:
  zh-TW: "老工兵"
settlement: kinmen
home_site: "kinmen_zhaishan_tunnel"
role: "鐵路工"
hint:
  zh-TW: "參與開鑿翟山坑道的退休老工兵，聽力因昔日炸藥開山而受損，熟悉坑道歷史。"
responses:
  "歷史":
    zh-TW: "金門的歷史，是一面由花崗岩坑道抵禦砲火，一面由浯島城隍香火寫成的戰地長卷。"
  "戰地":
    zh-TW: "不論是北山洋樓的彈孔，還是翟山水路坑道，都是我們金門人在砲火中求生存的根。"
