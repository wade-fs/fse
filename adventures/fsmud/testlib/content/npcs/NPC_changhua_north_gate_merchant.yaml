id: NPC_changhua_north_gate_merchant
name:
  zh-TW: "北門口黑木店鋪老闆阿昌"
settlement: changhua_city
home_site: changhua_north_gate
role: merchant
hint:
  zh-TW: "四十多歲的雜貨店老闆，店鋪是日治時期留下的黑木造老屋，話多，對北門口的商旅歷史如數家珍。"
responses:
  "北門":
    zh-TW: "北門叫共辰門，面向北邊，是通往台中平原的通道。清代的大官和行腳商人，從北邊來全都要從北門進城。所以北門口以前是旅社、馬廄最集中的地方。"
  "登記簿":
    zh-TW: "大正年間的登記簿？（神情驚訝）你怎麼知道這件事？那是我在我店鋪閣樓的舊木箱裡找到的，是我祖父那一代留下來的客商名冊。裡面記了好多南北往來行腳商人的名字、籍貫和帶的貨物，非常珍貴，我不輕易給人看。"
  "黑木老屋":
    zh-TW: "我這間店是明治三十八年蓋的，用的是阿里山的杉木。外牆刷了防腐的黑焦油，所以看起來是黑色的。這種黑木屋以前整條北門街都是，現在只剩我這兩間了。"
  "傳言":
    zh-TW: "登記簿的最後一頁，有一個用紅墨水畫的圓圈，裡面寫著一個名字和一個字：『林正雄 待』。我不知道這個林正雄是誰，但在好幾個聚落的登記簿裡似乎都出現過這個名字，像是在找人。"
