id: NPC_cijin_boat_repairman
name:
  zh-TW: 旗津修船工人老吳
settlement: kaohsiung
home_site: qijin
role: civilian
hint:
  zh-TW: 六十多歲的修船工人，手上布滿油漆和木屑，修了幾十年的漁船，對每一種船的木料和工法都很熟悉。
responses:
  修船:
    zh-TW: 修船這個工作，最重要的是聽聲音。木船的每一處都有聲音，有沒有問題，用錘子敲一下就知道了。那個聲音，是實的還是空的，我一下就聽出來，但說要怎麼教，我教了幾個徒弟，沒有人學得到那個耳朵。
  木船:
    zh-TW: 現在的漁船大多是玻璃纖維的，木船越來越少。木船好修，費工，但壽命長，養它，它就活得久。玻璃纖維的船省工，但一旦有問題，就是換整塊，不是修。我覺得這兩種船，就是兩種對東西的態度。
  旗津:
    zh-TW: 旗津的漁業，我小時候是最旺的，後來慢慢衰退。漁民的孩子不做漁了，做觀光、做餐廳。我不說好不好，但我自己沒有孩子繼承這個手藝，等我做不動了，這個技術就沒了，就這樣。
