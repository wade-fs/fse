id: npc_hengchun_ancient_temple_abbot
name:
  zh-TW: "恆春古廟老廟祝"
settlement: hengchun
home_site: "hengchun"
role: "citizen"
hint:
  zh-TW: "守護恆春半島古廟多年的釋本空大師，正為大殿內破損的清代黃銅古香爐發愁。"
responses:
  "歷史":
    zh-TW: "這尊黃銅古爐陪伴了廟宇無數個風雨年頭，現在爐耳裂開了，非得有上好的純黃銅料才能補好。"
  "山海":
    zh-TW: "恆春落山風大，海浪也急，唯有神壇前一柱清香能讓浮躁的心安定下來。"
