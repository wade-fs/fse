id: NPC_medicine_seller_chiayi
name:
  zh-TW: "藥材行老闆達仔"
settlement: chiayi_city
home_site: chiayi_old_hospital
role: merchant
hint:
  zh-TW: "胖臉和藹的中年男人，圍裙上有一股藥草混合的特殊氣味，話多，笑聲大。"
responses:
  "藥材":
    zh-TW: "中藥西藥我都賣，嘉義的人很實際，什麼有效就用什麼，不分中西。我說你要先看病，再吃藥，但很多人是先吃藥再看病，習慣了。"
  "日本時代":
    zh-TW: "日本人帶來西醫，但台灣人的漢方藥也沒消失，兩個一起用，那時候很常見。反正都是為了活著，管他什麼方法。"
  "傳言":
    zh-TW: "舊醫院手術室的字？我聽說有人拍了照片，有人傳出來，我看過，是日文漢字混著，寫的是某個人的名字和一個日期，我念給你聽……"
