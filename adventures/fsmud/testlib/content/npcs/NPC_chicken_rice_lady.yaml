id: NPC_chicken_rice_lady
name:
  zh-TW: "老攤雞肉飯老闆娘阿梅"
settlement: chiayi_city
home_site: noodle_stall_chiayi
role: vendor
hint:
  zh-TW: "六十歲左右的婦人，圍裙整潔，手腳俐落，臉上常帶一種淡然的平靜。"
responses:
  "雞肉飯":
    zh-TW: "我賣雞肉飯四十年，我媽賣了三十年，我媽的阿嬤在日本時代就賣了。那時候不叫火雞肉，只叫雞肉，後來換成火雞是因為火雞肉比較便宜，肉比較多。"
  "秘訣":
    zh-TW: "秘訣就是雞油。雞油要新鮮的，當天煉，隔夜的有腥味。米要好米，飯粒飽滿，不能太軟。就這樣，沒有什麼秘方。"
  "老主顧":
    zh-TW: "那個樹洞旁邊的碗？我媽說要放，我就放。問我什麼原因，我說不清楚，我媽說老主顧還在，就繼續放。"
