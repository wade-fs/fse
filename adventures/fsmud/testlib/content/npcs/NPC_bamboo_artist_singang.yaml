id: NPC_bamboo_artist_singang
name:
  zh-TW: "竹藝師傅阿珠"
settlement: singang
home_site: bamboo_craft_studio
role: craftsman
hint:
  zh-TW: "三十多歲的年輕女性，短髮，手指有幾道乾裂的細紋，說話直接、自信，對工藝充滿自豪。"
responses:
  "竹藝":
    zh-TW: "新港的竹藝傳統比你想像的古老，西拉雅族就有竹編，荷蘭人來了之後，傳教士把他們看到的圖案記錄下來。我從那些記錄復原了幾個圖案，但還有一個叫「新港紋」的，我還在研究。"
  "新港紋":
    zh-TW: "那個紋樣的複雜度超出我的預期，它不只是幾何圖形，裡面有方向性，像是地圖，或者某種儀式的空間描述。我不確定，但它不只是裝飾。"
  "歷史":
    zh-TW: "新港是西拉雅族最重要的聚落，荷蘭人選這裡設立第一個學校，教西拉雅族讀書寫字。那些字後來叫「新港文書」，是台灣最早的原住民文字記錄。"
  "傳言":
    zh-TW: "竹藝工坊的那個圖案？對，就是我說的那個。我把它掃描下來，放大，發現它的形狀和奉天宮廟埕的平面圖幾乎一樣。我不知道這代表什麼，但感覺很重要。"
