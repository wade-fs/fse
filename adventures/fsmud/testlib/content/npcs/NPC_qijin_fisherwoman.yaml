id: NPC_qijin_fisherwoman
name:
  zh-TW: 旗津漁婦阿蓮
settlement: kaohsiung
home_site: qijin
role: civilian
hint:
  zh-TW: 五十多歲的女人，手指關節因長年修補魚網而腫大，說話直接，眼睛看你時不閃避。
responses:
  漁獲:
    zh-TW: 現在的海，不像以前了。我爸那一代，船出去三天回來魚堆得像山。現在要去更遠的地方，還不一定有魚。海裡什麼都不一樣了，但你跟官員說，他們說你是在說謊。
  天后宮:
    zh-TW: 媽祖是真的有在保佑的。我丈夫出去那次颱風，那條船本來要沉，他說他看見一個穿紅衣的女人站在船頭。船回來了，所有人都回來了。
  旗津:
    zh-TW: 旗津現在都是觀光客，老居民越來越少。年輕人走了，留下來的都是老人。我不走，我爸在這裡死的，我也要在這裡死。
