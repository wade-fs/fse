id: NPC_market_vendor_minxiong
name:
  zh-TW: "市場阿嬤"
  en: "Market Granny"
hint:
  zh-TW: "頭戴斗笠，菜攤後精神奕奕叫賣的老婦人。"
  en: "A lively old woman behind a vegetable stall wearing a bamboo hat."
responses:
  "菜":
    zh-TW: "今仔日的菜真新鮮！民雄的番薯、芋頭都是今早摘的，你要買否？"
    en: "The vegetables are fresh today! Sweet potatoes and taro from Minxiong, harvested this morning!"
  "民雄":
    zh-TW: "民雄的土地肥沃，種什麼都好。你看那糖廠遺址旁的農田，還是最好的地！"
    en: "Minxiong soil is fertile, anything grows well here. The fields near the sugar factory ruins are the best!"
  "天氣":
    zh-TW: "今仔日天好！這樣的天氣，番薯賣得好，我心情也好。"
    en: "The weather is great today! Good weather means sweet potatoes sell well, and I'm in good spirits."
  "傳言":
    zh-TW: "你問傳言？我聽說最近鬼屋附近有奇怪的聲音，晚上不要去。"
    en: "Rumors? I heard strange noises near the haunted house recently. Don't go at night."

schedule:
  default_site: "minxiong_market"
  routines:
    - time: "05:00-14:00"
      location: "minxiong_market"
      action_msg: "正在菜攤後大聲叫賣著。"
    - time: "14:00-17:00"
      location: "noodle_stand"
      action_msg: "正端著碗歇腳吃麵。"
    - time: "17:00-05:00"
      location: "minxiong_market"
      action_msg: "正在收攤，整理剩餘的蔬菜。"
