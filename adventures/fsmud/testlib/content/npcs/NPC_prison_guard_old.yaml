id: NPC_prison_guard_old
name:
  zh-TW: "舊監獄老導覽員阿賢"
settlement: chiayi_city
home_site: chiayi_prison_old
role: guide
hint:
  zh-TW: "穿著文化園區背心的退休老人，腰板挺直，說起監獄歷史神情複雜，時有長停頓。"
responses:
  "監獄":
    zh-TW: "這個扇形設計叫邊沁式監獄，一個守衛可以看到所有廊道。日本人把西方的監控哲學帶來台灣，用在這個地方。現在變成觀光景點，設計的目的和現在的用途，差距很大。"
  "囚犯":
    zh-TW: "這裡關過各式各樣的人，抗日的義士、走私犯、政治犯、普通罪犯。二二八之後，這裡很滿。我不說更多了。"
  "傳言":
    zh-TW: "某個牢房的牆壁上的那首詩？我知道你在說哪個。我第一次發現的時候是五年前，現在已經有人給它拍了照，但沒有人知道是誰刻的，也沒有人認出那個人。"
