id: npc_kinmen_brewer_master_hong
name:
  zh-TW: "洪大師"
settlement: kinmen
home_site: "kinmen_brewery_old_factory"
role: "釀酒師"
hint:
  zh-TW: "高粱舊酒廠的退休首席釀酒師，對純糧固態發酵與窖藏寶月神泉水釀酒極有心得。"
responses:
  "歷史":
    zh-TW: "金門的歷史，是一面由花崗岩坑道抵禦砲火，一面由浯島城隍香火寫成的戰地長卷。"
  "戰地":
    zh-TW: "不論是北山洋樓的彈孔，還是翟山水路坑道，都是我們金門人在砲火中求生存的根。"
