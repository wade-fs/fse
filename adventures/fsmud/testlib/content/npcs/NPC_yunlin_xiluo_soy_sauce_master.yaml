name:
  zh-TW: 醬油大師莊師傅
responses:
  濁水溪:
    zh-TW: 濁水溪夾帶的泥沙很肥沃，不僅種出的米好吃，釀出的水質也特別甘冽，是西螺醬油的靈魂。
  醬油:
    zh-TW: 西螺的黑豆醬油全靠這濁水溪的優質水質，和我們祖傳的釀造古法。在大木桶裡曝曬一百八十天，味道才夠醇。
