id: NPC_meinong_tofu_maker
name:
  zh-TW: 美濃客家板豆腐師傅阿全伯
settlement: kaohsiung
home_site: meinong
role: artisan
hint:
  zh-TW: 六十多歲的豆腐師傅，每天凌晨三點就開始工作，手臂上有豆汁的痕跡，說話慢條斯理，但說到豆腐就快起來了。
responses:
  豆腐:
    zh-TW: 美濃客家板豆腐，和市面上賣的不一樣。我們的豆腐是壓出來的，水分少，豆味重，切開來的斷面是黃的，不是白的。你煎、炒、紅燒都好，因為夠紮實，不會散掉。
  豆漿:
    zh-TW: 做豆腐最重要的是豆漿。豆子要泡多久，磨多細，這個決定了豆漿的品質，豆漿的品質決定了豆腐的品質。我用的黃豆是台灣產的，比較香，進口的便宜，但味道不一樣，我不用。
  凌晨:
    zh-TW: 我每天三點起床，五點豆腐做好，六點送到市場。幾十年都是這樣。你問我累不累，我說習慣了，但是現在年紀大了，有時候四點才起床，豆腐就晚一點，市場的人說今天怎麼了，我說我睡過頭了，他們說你也有睡過頭的時候。
