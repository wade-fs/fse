id: NPC_taipei_228_researcher
name:
  zh-TW: 二二八紀念館研究員
settlement: taipei
home_site: taipei_101_228_park
role: scholar
hint:
  zh-TW: 穿著簡單的學術人員，正在公園紀念碑旁記錄訪問口述歷史的老人。
responses:
  二二八:
    zh-TW: 口述歷史是最珍貴的一手資料，隨著親歷者凋零，這項工作越來越迫切，我要在他們離開前把記憶留下來。
  和解:
    zh-TW: 歷史的和解需要正視，不是遺忘。立紀念館、定假日，是讓台灣社會共同記得這段傷痛，避免重蹈覆轍。
