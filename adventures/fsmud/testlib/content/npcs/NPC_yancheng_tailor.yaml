id: NPC_yancheng_tailor
name:
  zh-TW: 鹽埕裁縫師阿嬤文英
settlement: kaohsiung
home_site: yancheng
role: artisan
hint:
  zh-TW: 八十多歲的老裁縫師，坐在日治時代的縫紉機前，眼神還很銳利，看你的布料能一眼說出是哪裡產的。
responses:
  裁縫:
    zh-TW: 我這台機器，是昭和年間我丈夫的爸爸買的，用到現在還沒壞。你問我有沒有換過零件？換過幾次小的，但主要的機構一樣。修理師傅說這台機器的型號他從來沒見過，我說那是因為這台從日本帶來，是給台灣做的特別款。
  鹽埕:
    zh-TW: 鹽埕以前是高雄最繁榮的地方，那時候大新百貨在這裡，電影院在這裡，最好的布料店在這裡。我十幾歲來這裡學做衣服，整個街區都亮著燈，從早亮到晚。現在不一樣了，但燈還是亮著。
  布料:
    zh-TW: 那個年代的布料，工法和現在不一樣。現在的棉布，洗十次就軟掉了；我留著的幾塊老布，幾十年了，摸起來還是紮實的。那是手工織的，一公分一公分，不是機器的。
