id: npc_fish_market_auctier
name:
  zh-TW: "魚市場拍賣人阿振"
settlement: tainan
home_site: tainan_fish_market
role: auctioneer
hint:
  zh-TW: "身材壯碩，嗓門極大，在魚市場拍賣時可以一分鐘喊出二十個數字，閒下來說話卻很輕聲。"
responses:
  "魚市場":
    zh-TW: "拍賣是一門藝術，你要同時看三件事：買家的眼神、魚的狀態、今天的行情。這三件事加在一起，一秒鐘決定要不要喊那個數字。我做了三十年，現在閉著眼睛也知道那條魚值多少。"
  "虱目魚":
    zh-TW: "虱目魚是台南的魚，全台灣最會養虱目魚的人在台南。清代就開始養了，荷蘭人走了以後，鄭成功要養兵，就叫士兵學養魚，養的就是虱目魚，容易養、生長快，是最好的選擇。"
  "烏魚":
    zh-TW: "烏魚每年十一月二月之間過台灣海峽，那幾天是台南漁民的黃金時間，每年都是大賭，運氣好，那幾天的收入夠過一年，運氣壞，什麼都沒有。"
  "傳言":
    zh-TW: "你說第三格西南角的透明鹽？那是另一個市場的人在說的，但如果你問我，今天早上的海魚和鹽的關係，我告訴你，海魚的鮮甜程度和今天鹽田的水質有關，我不用科學解釋，但我的舌頭知道。"
