id: NPC_lao_zhou
name:
  zh-TW: 苦力老周
settlement: miaoli
home_site: miaoli_old_railway
role: laborer
hint:
  zh-TW: 修築鐵路的苦力老兵，皮膚被曬得像黑炭，雙手長滿了厚厚的老繭，肩膀上有被扁擔壓出的血印。
responses:
  鐵路:
    zh-TW: 巡撫老爺說這叫火車鐵軌。我們天天用鐵鎚砸石頭、鋪枕木。不少兄弟沒死在戰場上，倒死在工地的熱病和落石底下了。
  撫番代價:
    zh-TW: 山裡的泰雅族人反抗得厲害，因為我們砍了他們的樟腦樹。官兵天天跟他們打仗，聽說燒了好幾個部落，作孽啊……
  汗水:
    zh-TW: 這鋼軌底下的每一根枕木，都浸透了我們苦力的汗水。只求完工後能拿到工錢回家娶媳婦。
