id: npc_hualien_lumber_master
name:
  zh-TW: "黃老林警"
settlement: hualien
home_site: "hualien_linshan_lumber"
role: "巡山員"
hint:
  zh-TW: "林田山舊林場的退休巡山林警，熟悉蒸汽集材機操作與昔日林場繁盛生活。"
responses:
  "歷史":
    zh-TW: "花蓮的歷史，是一面由大理石峽谷抵禦強風，一面由太平洋黑潮與原民先靈歌聲寫成的山海長卷。"
  "山海":
    zh-TW: "不論是太魯閣的長春祠，還是太巴塱的祖靈屋，都是我們花蓮人在風浪中討生活的根。"
