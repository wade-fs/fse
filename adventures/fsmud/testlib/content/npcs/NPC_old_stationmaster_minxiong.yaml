id: NPC_old_stationmaster_minxiong
name:
  zh-TW: "老站長"
  en: "Old Station Master"
hint:
  zh-TW: "坐在長椅上的退休老人，眼神深邃。"
  en: "A retired old man sitting on the bench, looking thoughtful."

# P20：標準對話（所有人可見）
responses:
  "車站":
    zh-TW: "民雄老車站以前是甘蔗鐵路和縱貫線的交會點。那時候黑煙滾滾，可熱鬧了。"
    en: "The old Minxiong station used to be the junction of the sugar railway and the main line. It was very busy back then."
  "糖鐵":
    zh-TW: "對啊，糖業鐵路（糖鐵）！以前民雄有條糖業鐵路直通糖廠，那條鐵路承載了許多人的回憶。你如果去「民雄老街」找糖業鐵路遺址，或許能找到「糖鐵踏印」。"
    en: "Yes, the sugar railway! There used to be one going straight to the sugar factory. If you search for the ruins in Minxiong Old Street, you might find the sugar railway footprint."
  "任務":
    zh-TW: "唉，年紀大了，我就想再看一眼以前糖業鐵路的痕跡。如果你能找到「糖鐵踏印」（sugar_railway_minxiong），再來跟我聊聊（ask 老站長 糖鐵），我會告訴你更多故事。"
    en: "I'm old, and I just want to see the trace of the sugar railway again. If you can find the 'sugar_railway_minxiong' footprint and tell me (ask master about sugar), I will tell you more stories."

# P20：好感層級對話 (relationship_dialogues)
# 格式：各層級鍵名下的 {話題: 台詞}
# 較高層級的台詞在玩家達到該層後「累積解鎖」，覆蓋或新增話題
relationship_dialogues:
  # 熟識（好感25+）：認得你了，話多一些
  familiar:
    "你好":
      zh-TW: "哦，是你啊，最近在這一帶看到你幾次了。民雄這個地方，不是每個外地人都願意待的。"
      en: "Oh, it's you again. I've seen you around here a few times. Not every outsider is willing to stay in Minxiong."
    "以前":
      zh-TW: "以前啊……糖業全盛時，這個車站一到收成季節，月台上都是工人和甘蔗。現在安靜多了。"
      en: "Back in the day... During the sugar industry's peak, the platform was full of workers and sugarcane during harvest season. It's much quieter now."

  # 朋友（好感50+）：分享日常，給予任務線索
  friend:
    "鬼屋":
      zh-TW: "你也聽說那棟老宅的事？我年輕的時候，有個糖廠的工頭住在那裡。後來出了些事，大家就不提了。那宅子現在沒人敢靠近。"
      en: "You've heard about that old house too? When I was young, a sugar factory foreman lived there. Something happened, and people stopped talking about it. No one dares go near it now."
    "家人":
      zh-TW: "我有個兒子，跑去台北打拼，很少回來。每次打電話都說快回了，結果……唉。民雄留不住年輕人啊。"
      en: "I have a son who went to Taipei to make a living. He rarely comes back. Every time he calls, he says he'll be back soon, but... Sigh. Minxiong can't keep the young ones."
    "你自己":
      zh-TW: "我啊？做了三十年車站的事，退休後就守著這個椅子。這裡的一草一木，我都認識。"
      en: "Me? I worked at the station for thirty years. After retirement, I just sit on this bench. I know every plant and tree around here."

  # 信任（好感75+）：拜託私事，給予特殊協助
  trusted:
    "日記":
      zh-TW: "（壓低聲音）你真的想知道那棟宅子的事？我其實還留著一本……是老工頭留下來的日記。我一直不敢交出去，也不敢看。你如果有心，拿去吧。"
      en: "(lowering voice) Do you really want to know about that house? I actually still have... a diary left by the old foreman. I've never dared hand it over, or even read it. If you're serious, take it."
    "拜託":
      zh-TW: "有件事我一直掛在心裡……那年糖廠關閉前，有個工人失蹤了。沒人調查，就這樣算了。如果你有機會深入那片舊廠區，能不能幫我查查？"
      en: "There's something that's been on my mind... A worker disappeared just before the sugar factory closed. Nobody investigated, it was just dropped. If you get a chance to go into the old factory area, could you look into it for me?"

  # 知己（好感90+）：吐露心聲，解鎖深層記憶
  intimate:
    "秘密":
      zh-TW: "（嘆氣）好吧，我告訴你一件從沒跟任何人說過的事。那個工頭，就是我父親……他在那棟宅子裡看見了他不該看的東西。他沒有失蹤，是我把他帶走的。我不知道那個決定對不對，但那是我能保護他的唯一辦法。"
      en: "(sighing) Alright, I'll tell you something I've never told anyone. That foreman... was my father. He saw something in that house that he shouldn't have. He didn't disappear - I took him away. I don't know if that decision was right, but it was the only way I could protect him."
    "真相":
      zh-TW: "真相？我父親說，那棟宅子的地下室，有人曾經被關在那裡很久很久……那個人的名字，已經沒有人記得了。這就是為什麼那塊地方一直有怨氣。"
      en: "The truth? My father said that in the basement of that house, someone had been kept there for a very, very long time... No one remembers that person's name anymore. That's why there's always been resentment in that place."

