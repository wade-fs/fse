id: NPC_kaohsiung_228_survivor
name:
  zh-TW: 高雄二二八倖存者老謝
settlement: kaohsiung
home_site: kaohsiung_station
role: civilian
hint:
  zh-TW: 九十多歲的老人，說起1947年的事，聲音變得很輕，眼神望向遠處，像是在看那個年代的某個角落。
responses:
  二二八:
    zh-TW: 我那年十幾歲。高雄的事，和台北不一樣。高雄是有打仗的，真的打。要塞司令彭孟緝，他下令的。我有個鄰居哥哥，那天在火車站附近，後來就沒有回來。他的媽媽等到死都沒有等到消息。
  高雄車站:
    zh-TW: 那年的事，車站是重要的地方。人在車站聚集，軍隊也在車站。很多人說要去那裡，後來才知道危險。我爸那天說你不要出去，我聽了他的話，所以我在這裡說這些話。不聽的人，很多沒有辦法說了。
  現在:
    zh-TW: 現在的年輕人，知道那年的事嗎？我不確定。我說給我兒子聽，他說他知道，書上有寫。我說書上寫的是一回事，我親眼看見的又是一回事，這兩件事不一樣，但都重要。
