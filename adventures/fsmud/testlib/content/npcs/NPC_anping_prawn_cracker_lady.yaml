id: NPC_anping_prawn_cracker_lady
name:
  zh-TW: "安平蝦餅老闆娘阿鳳"
settlement: tainan
home_site: tainan_anping
role: vendor
hint:
  zh-TW: "在老街開了三十年蝦餅店的婦人，手速極快，說話也快，同時可以炸餅和回答客人的問題。"
responses:
  "蝦餅":
    zh-TW: "安平蝦餅不是外地人以為的那種蝦味薯片，是真正的麵糊加蝦，下去油鍋炸，剛起鍋的最香，放涼了就不一樣了。我做了三十年，每批的配方都一樣，但每天的味道都有一點點不同，因為蝦不一樣、油溫不一樣、天氣不一樣。"
  "安平":
    zh-TW: "安平人和台南市區的人是不同的文化，安平人以前是靠海的，脾氣直，說話大聲，不太拐彎抹角。現在安平觀光了，變了一點，但骨子裡還是那樣。"
  "榕樹屋":
    zh-TW: "榕樹屋？就在老街尾巴，你往裡走就看到了。屋主搬走之後，樹就開始長，現在已經把房子包起來了，有人說應該砍樹，有人說應該讓樹繼續長，到現在還在說，樹一直在長。"
  "傳言":
    zh-TW: "你說老街最深處那個小廟？那個延平王廟比普通的大，裡面的像也比普通的精，但是是私廟，沒有對外的牌匾。有人說那個廟的主人是鄭成功後裔，但從來沒有人公開說過。"
