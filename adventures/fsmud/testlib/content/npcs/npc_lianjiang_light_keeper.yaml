id: npc_lianjiang_light_keeper
name:
  zh-TW: "東犬守燈人"
settlement: lianjiang
home_site: "lianjiang_dongquan_light"
role: "管理員"
hint:
  zh-TW: "東犬燈塔的年邁守護人，每天傍晚點亮白塔燈，熟悉清末海關稅務歷史。"
responses:
  "歷史":
    zh-TW: "連江的歷史，是一面由花崗岩坑道抵禦砲火，一面由天后宮媽祖衣冠塚香火寫成的戰地長卷。"
  "戰地":
    zh-TW: "不論是芹壁石屋的標語，還是北海地下水道，都是我們連江人在砲火與風浪中求生存的根。"
