id: NPC_railway_engineer_chiayi
name:
  zh-TW: "阿里山鐵路老技師阿義"
settlement: chiayi_city
home_site: alishan_railway_depot
role: engineer
hint:
  zh-TW: "穿著磨舊工作服的中年男人，手掌粗厚，工具帶上掛著各式扳手，說話帶著山地口音。"
responses:
  "鐵路":
    zh-TW: "阿里山的鐵路是奇蹟，從海拔三十公尺的嘉義爬到兩千多公尺的阿里山，螺旋線、之字形，都是日本工程師想出來的。當年我阿公說光是勘測就死了好多人。"
  "機車":
    zh-TW: "調度場那台Shay機車跟了我三十年，她現在不跑了，但我每天還是來保養她，機油、螺絲，都要定期確認，就算不跑，也要讓她有尊嚴。"
  "傳言":
    zh-TW: "你說調度場最深處那節車廂？那我就是不知道裡面有什麼，我知道的是，鑰匙在我師父的師父那一代就找不到了，車廂鎖著，我沒有試著開過。"
