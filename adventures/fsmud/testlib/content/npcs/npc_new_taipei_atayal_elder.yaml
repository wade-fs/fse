id: npc_new_taipei_atayal_elder
name:
  zh-TW: "高長老"
settlement: new_taipei
home_site: "new_taipei_ulai_atayal_village"
role: "原民耆老"
hint:
  zh-TW: "烏來泰雅族部落長老，精通泰雅族文面傳統與大羅蘭山區的獵人禁忌。"
responses:
  "歷史":
    zh-TW: "新北市的歷史，是一半靠著淡水海風吹，一半靠著金瓜石火藥炸出來的。"
  "文化":
    zh-TW: "不論是平溪高空的天燈，還是三峽祖師廟的木雕，都是前人一筆劃刻出來的根。"
