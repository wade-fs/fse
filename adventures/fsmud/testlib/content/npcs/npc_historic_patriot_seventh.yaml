id: npc_hamasing_railway_dispatcher
name:
  zh-TW: "哈瑪星火車老調度員"
settlement: kaohsiung
home_site: "kaohsiung_harbor"
role: "citizen"
hint:
  zh-TW: "昔日高雄港驛（哈瑪星鐵道）的退休調度員洪叔，正急著尋找戰爭空襲中掩埋的運轉銅牌。"
responses:
  "歷史":
    zh-TW: "當年哈瑪星是南部火車調度樞紐，那塊銅牌刻著大正年間的運轉規程，是鐵道老工人的魂啊。"
  "山海":
    zh-TW: "鐵軌沿著海堤一路鋪設，當年香蕉碼頭滿滿都是挑夫與冒著白煙的蒸汽火車。"
