id: NPC_traveling_merchant
name:
  zh-TW: "行腳商人"
  en: "Traveling Merchant"
hint:
  zh-TW: "背著大包小包、汗流浹背的商人，走遍各地販售雜貨。"
  en: "A merchant sweating under a heavy pack, traveling from town to town selling goods."
responses:
  "嘉義":
    zh-TW: "嘉義城的市集可大了！我每個月都要跑一趟，賣布料、香料，順便帶些民雄的番薯糕過去。"
    en: "The market in Chiayi City is huge! I make the trip monthly to sell fabric and spices, and bring Minxiong sweet potato cakes."
  "新港":
    zh-TW: "新港的媽祖廟香火旺，每逢祭典，那邊的生意特別好做。我這個月底要去。"
    en: "The Mazu temple in Singang has strong incense. Business is especially good during festivals. I'm heading there at the end of this month."
  "消息":
    zh-TW: "我這走四方的人，什麼消息都聽得到。你想知道什麼？"
    en: "I travel everywhere, so I hear all kinds of news. What do you want to know?"
  "傳言":
    zh-TW: "聽說八卦山那邊最近有奇怪的部隊動向，不知道是誰家的兵馬。還有，鹿港的師傅說有個神秘的木雕委託找上門了。"
    en: "I heard there are strange troop movements near Bagua Mountain. Also, a master craftsman in Lukang got a mysterious woodcarving commission."

schedule:
  default_site: "minxiong_market"
  # 行腳商人的週期性跨聚落移動
  routines:
    - time: "06:00-10:00"
      location: "minxiong_market"
      action_msg: "正在民雄市場叫賣雜貨，汗水直流。"
    - time: "10:00-14:00"
      location: "minxiong_old_station"
      action_msg: "在車站月台等候，準備前往下一個城鎮。"
    - time: "14:00-18:00"
      location: "chiayi_train_station"
      action_msg: "在嘉義車站卸貨，清點商品。"
    - time: "18:00-06:00"
      location: "singang_market"
      action_msg: "趁夜市熱鬧，擺攤兜售香料。"
