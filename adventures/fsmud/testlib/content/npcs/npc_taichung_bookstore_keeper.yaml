id: npc_taichung_bookstore_keeper
name:
  zh-TW: "莊掌櫃"
settlement: taichung
home_site: "taichung_ruicheng_bookstore"
role: "店家"
hint:
  zh-TW: "瑞成書局的老掌櫃，在二戰期間暗中為學生提供漢文書籍與抗日進步雜誌。"
responses:
  "歷史":
    zh-TW: "台中的歷史，是一面由縱貫鐵路牽引，一面由大甲媽祖與二七部隊寫成的長卷。"
  "文化":
    zh-TW: "不論是南屯的打鐵聲，還是櫟社詩人們在望月亭下的低吟，都是我們中台灣的根。"
