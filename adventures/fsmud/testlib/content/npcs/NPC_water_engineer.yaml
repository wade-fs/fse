id: NPC_water_engineer
name:
  zh-TW: "台南水道老工程師"
settlement: tainan
home_site: tainan_water_facility_old
role: engineer
hint:
  zh-TW: "快退休的工程師，白髮蒼蒼，修水道修了三十年，對鑄鐵管的壽命有一種超越科學的直覺。"
responses:
  "水道":
    zh-TW: "明治時代建的水道，到現在還在工作的部分，是工程學的奇蹟，也是台灣人的幸運。日本工程師用的材料和工法，比我們後來的還嚴格，我不太想承認，但是事實。"
  "老管道":
    zh-TW: "那截老鑄鐵管，我確認過，從明治四十年到現在，超過一百年，輸水量還是符合規格。換的話要開挖，開挖的費用和對交通的影響，比繼續用的代價高很多，所以一直放著。但我估計，她還可以再撐二十年。"
  "機器":
    zh-TW: "機房的那些大型水泵，有幾台是在運作的，有幾台是展示的，外觀一樣，但運作的那些你靠近，能感覺到地板的震動。震動很輕，但那是百年前的機器在工作，那個感覺和現代機器的震動不一樣。"
  "傳言":
    zh-TW: "水道有沒有秘密通道？我沒有發現。但有一個機房的某面牆，我每次靠近，那面牆後面有一種低頻的聲音，不是水聲，不是機器聲，是一種說不清楚的振動。我做工程三十年，找不到合理解釋。"
