id: npc_tainan_spring_hotel_owner
name:
  zh-TW: "黃老闆娘"
settlement: tainan
home_site: "tainan_guanziling_spring"
role: "店家"
hint:
  zh-TW: "關子嶺百年泥漿溫泉旅館的老闆娘，熟知日治時期總督府官員來此療養的八卦。"
responses:
  "歷史":
    zh-TW: "府城的歷史，是一面由紅磚古城牆抵禦海風，一面由各大古廟的裊裊香煙寫成的山海長卷。"
  "文化":
    zh-TW: "不論是迎王大典的火光，還是孔廟的明倫堂，都是我們台南先民在海浪中討生活的根。"
