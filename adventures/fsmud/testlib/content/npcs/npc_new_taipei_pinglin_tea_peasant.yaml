id: npc_new_taipei_pinglin_tea_peasant
name:
  zh-TW: "黃茶農"
settlement: new_taipei
home_site: "new_taipei_pinglin_tea_association"
role: "農夫"
hint:
  zh-TW: "種植坪林包種茶的老茶農，擅長手工發酵與揉捻，使茶湯散發花香。"
responses:
  "歷史":
    zh-TW: "新北市的歷史，是一半靠著淡水海風吹，一半靠著金瓜石火藥炸出來的。"
  "文化":
    zh-TW: "不論是平溪高空的天燈，還是三峽祖師廟的木雕，都是前人一筆劃刻出來的根。"
