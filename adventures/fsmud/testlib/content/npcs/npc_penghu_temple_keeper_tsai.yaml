id: npc_penghu_temple_keeper_tsai
name:
  zh-TW: "蔡廟祝"
settlement: penghu
home_site: "penghu_queen_temple"
role: "廟祝"
hint:
  zh-TW: "天后宮的老廟祝，熟悉沈有容退荷碑與媽祖在清法戰爭中顯靈保佑先民的傳說。"
responses:
  "歷史":
    zh-TW: "澎湖的歷史，是一半靠著天後宮媽祖庇佑，一半靠著玄武岩跟強烈東北季風寫下來的。"
  "海洋":
    zh-TW: "不論是西嶼的砲台，還是七美的雙心石滬，都是我們澎湖先民在大海中討生活的根。"
