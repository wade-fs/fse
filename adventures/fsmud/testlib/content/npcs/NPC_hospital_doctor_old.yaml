id: NPC_hospital_doctor_old
name:
  zh-TW: "舊醫院老醫師陳文中"
settlement: chiayi_city
home_site: chiayi_old_hospital
role: doctor
hint:
  zh-TW: "白髮蒼蒼的老醫師，仍習慣穿著白色大褂，雙手背在身後，說話條理清晰，偶爾會用日語說出醫學名詞再翻譯。"
responses:
  "醫學":
    zh-TW: "日本時代的醫療比你想像中進步，但只對日本人和少數精英台灣人開放。一般台灣農民生病了，往往靠草藥和廟醫，直到戰後才逐漸改善。"
  "二二八":
    zh-TW: "（搖頭）那幾天，醫院收了很多傷患，但我只是年輕的實習生，我沒有資格說自己懂那件事。我只知道，有幾個人被帶進來，又被帶走，後來就沒有回來。"
  "傳言":
    zh-TW: "手術室的那幾個字？那不是傳言。我見過，年輕的時候。後來新主任說要粉刷，我沒有說反對，但我記得那幾個字，一直記得。"
