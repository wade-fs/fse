id: npc_penghu_weir_master_pan
name:
  zh-TW: "潘師傅"
settlement: penghu
home_site: "penghu_double_heart_weir"
role: "工藝師"
hint:
  zh-TW: "七美雙心石滬的修復大師，懂得如何用玄武岩以無水泥堆疊技術重築石滬。"
responses:
  "歷史":
    zh-TW: "澎湖的歷史，是一半靠著天後宮媽祖庇佑，一半靠著玄武岩跟強烈東北季風寫下來的。"
  "海洋":
    zh-TW: "不論是西嶼的砲台，還是七美的雙心石滬，都是我們澎湖先民在大海中討生活的根。"
