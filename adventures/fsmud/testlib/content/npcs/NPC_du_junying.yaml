hint:
  zh-TW: 客家義軍領袖，身材高大，面容冷峻，腰間佩戴著客家鐵刀。
responses:
  朱一貴:
    zh-TW: 阿貴是有膽識，但府城那些閩南紳商排擠我們客家兄弟！天下是大家一起打的，憑什麼好處都歸他們？
  裂痕:
    zh-TW: 閩粵本是一家，但分贓不公，兄弟鬩牆，這場大事怕是走不遠了……
  知縣公文:
    zh-TW: 鳳山知縣跑得比兔子還快，他的大印和公文被我們截獲了。公文上全是催繳稅糧的命令，真是不把百姓當人。
