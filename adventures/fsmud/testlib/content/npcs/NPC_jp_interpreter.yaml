id: NPC_jp_interpreter
name:
  zh-TW: 田中翻譯官
settlement: mudan
home_site: mudan_japanese_landing
role: interpreter
hint:
  zh-TW: 身穿日軍制服的年輕翻譯官，戴著眼鏡，神色緊張，手中拿著一本沾了泥土的記事本。
responses:
  登陸:
    zh-TW: 海浪太大了，我們的士兵很多人都在吐。車城的居民看我們的眼神充滿了敵意，這片山林實在太潮濕、太恐怖了。
  番社:
    zh-TW: 西鄉都督命令我們查明牡丹社的具體位置。但是山裡的瘴氣和那些神出鬼沒的獵人，讓我們的偵察隊傷亡慘重。
  翻譯:
    zh-TW: 我奉命與車城和番社溝通，但雙方的語言隔閡太深。這場戰爭，本來可以避免的……
