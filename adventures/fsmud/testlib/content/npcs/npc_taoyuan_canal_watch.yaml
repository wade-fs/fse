id: npc_taoyuan_canal_watch
name:
  zh-TW: "江巡水"
settlement: taoyuan
home_site: "taoyuan_canal_first_gate"
role: "巡水員"
hint:
  zh-TW: "負責桃園大圳第一導水路流防的資深水利員，熟悉水閘門操作與防洪調配。"
responses:
  "歷史":
    zh-TW: "桃園的歷史，是一面由大圳與古城牆抵禦強風，一面由桃園神社與眷村大合院寫成的開墾長卷。"
  "山海":
    zh-TW: "不論是角板山的古防空洞，還是大溪的巴洛克老街，都是我們桃園人在風浪中討生活的根。"
