id: npc_hsinchu_canal_manager
name:
  zh-TW: "葉水利"
settlement: hsinchu_city
home_site: "hsinchu_hsinchu_canal_ditch"
role: "水利人員"
hint:
  zh-TW: "負責隆恩圳配水閘門巡視的老水利工，對水圳分配與農田地界瞭若指掌。"
responses:
  "歷史":
    zh-TW: "新竹九降風吹了幾百年，吹乾了米粉與柿餅，也吹開了這座竹塹城的城樓。"
  "文化":
    zh-TW: "不論是北埔的客家膨風茶，還是城隍廟的都城隍出巡，都是新竹人的根。"
