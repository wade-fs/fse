id: NPC_228_museum_staff
name:
  zh-TW: "二二八紀念館館員阿敏"
settlement: tainan
home_site: tainan_228_memorial
role: guide
hint:
  zh-TW: "四十多歲的女性，在紀念館工作十五年，說到那些信件時聲音會不自覺地變輕。"
responses:
  "二二八":
    zh-TW: "台南的二二八規模不如台北或嘉義，但每個地方都有自己的傷痕。台南的傷痕更私密，因為事件後的恐怖讓很多人選擇永遠不說，那些沉默持續了幾十年。"
  "信件":
    zh-TW: "那些手寫的信是被捕者在獄中寫的，寫給家人，有些送到了，有些沒有送到。你問我那些字跡為什麼還那麼清晰？因為被珍藏著，幾十年，那些信被放在最好的位置，最安全的地方。"
  "台南地址":
    zh-TW: "那個地址，有研究者去找過，現在是公寓，住戶是三十幾歲的年輕夫妻，他們不知道這件事。我考慮過要不要告訴他們，但我不確定那樣做對他們是好事還是壞事。"
  "傳言":
    zh-TW: "你說紀念館的某個展示品看起來被人摸過？那個手印是真的，展示的是玻璃後面，手印在玻璃外面，而且每隔一段時間就會重新出現，即使擦乾淨。我沒有靈異的解釋，但我也沒有科學的解釋。"
