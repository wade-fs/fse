id: NPC_rice_shop_owner_minxiong
name:
  zh-TW: "米店老闆娘秋菊"
  en: "Rice Shop Owner Chiu-Chu"
hint:
  zh-TW: "站在一排大米缸前用力量米的壯碩婦人，圍裙沾著米糠，聲音洪亮，說話爽快。"
  en: "A robust woman vigorously measuring rice before a row of large rice urns, apron dusted with rice bran, voice loud and manner direct."
settlement: minxiong
home_site: rice_shop
responses:
  "米":
    zh-TW: "要買米？民雄的米好，這你要信我。嘉南平原出來的，水甜土肥，米粒飽滿。一斤多少？你自己說要幾斤。"
    en: "Buying rice? Trust me — Minxiong rice is good. From the Jianan Plain, sweet water, fertile soil, full grains. Price per catty? Tell me how many you want."
  "戰爭":
    zh-TW: "戰爭那幾年米管制，每戶只能配給那一點點，哪夠吃？我阿母藏了一缸米在地窖，才撐過那最難的時候。"
    en: "During the war years rice was rationed — each household only got a tiny amount, barely enough. My mother hid a urn of rice in the cellar, which is how we survived the hardest time."
  "農事":
    zh-TW: "民雄種稻一年兩收，忙季一到，連孩子都要下田。現在機器多了，輕鬆一點，但年輕人不願做了，都去工廠或城市。"
    en: "Minxiong grows two rice crops a year. When the busy season comes, even children work the fields. More machines now makes it easier, but young people don't want to do it anymore — all going to factories or cities."
  "鬼屋":
    zh-TW: "那棟房子以前的主人我認識，劉家的阿嬤每個月來買米，很慷慨的人，從不欠帳。後來人就不見了。說她是鬼，我不信。是戰亂，不是鬼。"
    en: "I knew the previous owners of that house. Liu family's grandmother came to buy rice every month — a generous person who never owed money. Then she disappeared. People call her a ghost — I don't believe it. It was war, not ghosts."
  "傳言":
    zh-TW: "傳言嗎？今天早上有人說在市場看到一個穿旗袍的女人，問了幾家糕餅店，問的菜都是日本時代的老菜。問完就走了，沒有人認識她。"
    en: "Rumors? This morning someone said they saw a woman in a qipao at the market, asking several pastry shops about dishes — all old recipes from the Japanese era. Then she just left. Nobody recognized her."
