id: npc_lianjiang_qingfan_merchant
name:
  zh-TW: "曹掌櫃"
settlement: lianjiang
home_site: "lianjiang_qingfan_port"
role: "商人"
hint:
  zh-TW: "青帆港老街的雜貨鋪老闆，熟悉昔日清末與日治時期英美商船與鴉片貿易歷史。"
responses:
  "歷史":
    zh-TW: "連江的歷史，是一面由花崗岩坑道抵禦砲火，一面由天后宮媽祖衣冠塚香火寫成的戰地長卷。"
  "戰地":
    zh-TW: "不論是芹壁石屋的標語，還是北海地下水道，都是我們連江人在砲火與風浪中求生存的根。"
