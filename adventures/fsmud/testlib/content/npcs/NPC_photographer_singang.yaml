id: NPC_photographer_singang
name:
  zh-TW: "廟會攝影師阿志"
settlement: singang
home_site: singang
role: artist
hint:
  zh-TW: "四十歲左右，單眼相機掛在脖子上，在廟埕間穿梭，身手靈活，捕捉信眾最真實的表情。"
responses:
  "廟會":
    zh-TW: "奉天宮的廟會是台灣最大的之一，信眾從全台灣來，有些人步行幾天就為了來進香。你拍廟會，拍的不是儀式，是人，拍的是那種非常純粹的相信。"
  "信仰":
    zh-TW: "我不是很有信仰的人，但我拍廟會拍了十五年，我見過的事情讓我說不清楚信仰到底是什麼。我只知道，那種表情是真的，那種眼淚是真的。"
  "西拉雅":
    zh-TW: "有一年廟會，我看到一個老太太做了一個動作，和廟裡其他信眾都不一樣，她把香舉過頭，往後仰，像一種很古老的儀式。我拍了下來，後來有學者告訴我那是西拉雅族的傳統祭拜動作。"
  "傳言":
    zh-TW: "那個老太太？我找了她好幾年，廟裡沒有人認識她，那張照片是我最有名的一張，但我不知道那個人是誰。"
