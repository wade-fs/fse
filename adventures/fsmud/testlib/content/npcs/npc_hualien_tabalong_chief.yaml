id: npc_hualien_tabalong_chief
name:
  zh-TW: "巴奈頭目"
settlement: hualien
home_site: "hualien_tabalong_house"
role: "頭目"
hint:
  zh-TW: "阿美族太巴塱大社的世襲頭目，熟悉阿美族豐年祭儀與祖靈屋的木雕故事。"
responses:
  "歷史":
    zh-TW: "花蓮的歷史，是一面由大理石峽谷抵禦強風，一面由太平洋黑潮與原民先靈歌聲寫成的山海長卷。"
  "山海":
    zh-TW: "不論是太魯閣的長春祠，還是太巴塱的祖靈屋，都是我們花蓮人在風浪中討生活的根。"
