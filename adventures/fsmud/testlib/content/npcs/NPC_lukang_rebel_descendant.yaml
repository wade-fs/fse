id: NPC_lukang_rebel_descendant
name:
  zh-TW: "防禦隘門老守衛阿德"
settlement: lukang
home_site: lukang_yi_crossing
role: guard
hint:
  zh-TW: "六十多歲的老人，家族幾代都居住在隘門旁，對當年的社會動亂防禦機制有深厚的研究與獨到的家族口述。"
responses:
  "隘門":
    zh-TW: "這道隘門叫車路口隘門，是清代鹿港的防禦核心。鹿港以前有幾十個隘門，像個迷宮一樣。外地土匪進來，我們隘門一關，他們在巷子裡轉圈，我們就從屋頂丟石頭，這叫『關門打狗』。"
  "石鎖孔":
    zh-TW: "你說鎖孔裡的斷刃？那是真的，我阿公親口跟我說的。光緒年間最後一次大械鬥，有一隊人要強衝隘門，門衛正要鎖門，鎖被石頭卡住。一個年輕人用他的柴刀插進去卡死門栓，他自己被砍傷，但門保住了。那截斷刃到現在還在裡面拔不出來。"
  "歷史":
    zh-TW: "鹿港人以前是很有骨氣的，不只防土匪，日本軍隊進城的時候，我們隘門也關了幾天，直到大勢已去才開。那幾天的抵抗，雖然沒有上戰場那麼大，但也是鹿港人的態度。"
  "傳言":
    zh-TW: "隘門頂上以前放著一面鐵盾，上面刻著八卦，說是當年抗清義軍留下來的，後來被日本人收走了，不知道現在在哪個博物館裡。"
