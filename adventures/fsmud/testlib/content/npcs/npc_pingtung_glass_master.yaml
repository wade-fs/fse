id: npc_pingtung_glass_master
name:
  zh-TW: "阿秀姐"
settlement: pingtung
home_site: "pingtung_rinari_village"
role: "工藝師"
hint:
  zh-TW: "排灣族的手工琉璃珠工藝大師，精通百步蛇紋與船之眼紋琉璃珠的燒製。"
responses:
  "歷史":
    zh-TW: "屏東的歷史，是一面由石板屋與恆春古城城牆抵禦海風，一面由東港迎王大典的火光與排灣族祖靈寫成的山海長卷。"
  "山海":
    zh-TW: "不論是牡丹社的古戰場，還是萬金聖母教堂，都是我們屏東人在風浪中討生活的根。"
