id: npc_pingtung_luan_cook
name:
  zh-TW: "張掌櫃"
settlement: pingtung
home_site: "pingtung_wanluan_street"
role: "店家"
hint:
  zh-TW: "萬巒老街傳統客家豬腳鋪掌櫃，熟知慢火燉煮中藥豬腳的百年秘方。"
responses:
  "歷史":
    zh-TW: "屏東的歷史，是一面由石板屋與恆春古城城牆抵禦海風，一面由東港迎王大典的火光與排灣族祖靈寫成的山海長卷。"
  "山海":
    zh-TW: "不論是牡丹社的古戰場，還是萬金聖母教堂，都是我們屏東人在風浪中討生活的根。"
