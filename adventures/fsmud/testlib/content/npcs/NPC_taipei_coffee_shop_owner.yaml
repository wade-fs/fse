id: NPC_taipei_coffee_shop_owner
name:
  zh-TW: 永康街咖啡館主
settlement: taipei
home_site: taipei_101_yongkang_street
role: vendor
hint:
  zh-TW: 穿著圍裙的年輕老闆正在手沖咖啡，咖啡香瀰漫整間小店。
responses:
  永康街:
    zh-TW: 永康街每家店都有自己的個性，不是連鎖店，是老闆把心血放進去經營的，來這裡消費就是支持在地文化。
  台北:
    zh-TW: 台北有很多好咖啡館，但這條街的氛圍最特別，是文青和親子並存的奇妙化學反應。
