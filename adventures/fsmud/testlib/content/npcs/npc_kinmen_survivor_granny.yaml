id: npc_kinmen_survivor_granny
name:
  zh-TW: "林阿嬤"
settlement: kinmen
home_site: "kinmen_qionglin_tunnel"
role: "市民"
hint:
  zh-TW: "經歷過八二三砲戰的在地阿嬤，熟知在防空洞中躲避數十萬發砲彈的驚險往事。"
responses:
  "歷史":
    zh-TW: "金門的歷史，是一面由花崗岩坑道抵禦砲火，一面由浯島城隍香火寫成的戰地長卷。"
  "戰地":
    zh-TW: "不論是北山洋樓的彈孔，還是翟山水路坑道，都是我們金門人在砲火中求生存的根。"
