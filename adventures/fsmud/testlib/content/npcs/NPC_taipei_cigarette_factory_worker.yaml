id: NPC_taipei_cigarette_factory_worker
name:
  zh-TW: 松山菸廠老女工
settlement: taipei
home_site: taipei_101_songshan_cultural_park
role: worker
hint:
  zh-TW: 白髮蒼蒼的老阿嬤坐在樹蔭下，望著昔日工廠的紅磚牆，眼中滿是回憶。
responses:
  菸廠:
    zh-TW: 我在這裡工作了三十年，每天和同事一起包菸、聊天，感情好得像家人一樣，現在成文創園區，感覺很奇妙。
  日本時代:
    zh-TW: 工廠是日本人建的，裡面設備很先進，當時能進菸廠工作是很光榮的事。
