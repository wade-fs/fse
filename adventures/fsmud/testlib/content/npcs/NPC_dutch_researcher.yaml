id: NPC_dutch_researcher
name:
  zh-TW: "荷蘭學者研究台南歷史的Jan先生"
settlement: tainan
home_site: tainan_anping
role: scholar
hint:
  zh-TW: "荷蘭籍的台灣史研究者，說台語帶著荷蘭腔，研究VOC時代的台灣已經二十年。"
responses:
  "荷蘭":
    zh-TW: "我研究VOC是因為我是荷蘭人，我想知道我的祖國在這片土地上做了什麼。答案很複雜。有商業天才，有殖民剝削，有文化交流，有武力威脅，都有。台灣人對荷蘭的印象比我預期的好，我有時候覺得應該更複雜一點。"
  "台江":
    zh-TW: "台江內海現在在哪裡？在你腳下，在那條路的底下，在那棟房子的地基下面。它消失了，但沒有消失，只是換了形狀。這是台灣土地變化最直觀的例子。"
  "文書":
    zh-TW: "VOC留下了大量的文書，現在在荷蘭海牙的國家檔案館。那些文書裡有台灣的農作物記錄、人口調查、貿易數字，是那個時代最詳細的台灣記錄。我花了五年讀那些文書，知道的台灣比很多台灣人多，這讓我感到奇怪。"
  "傳言":
    zh-TW: "密道傳說？荷蘭人的確有建密道的習慣，我查過熱蘭遮城的原始圖面，但那份圖面在海牙的版本有一頁是缺的，我懷疑那一頁就是地下室的配置圖。"
