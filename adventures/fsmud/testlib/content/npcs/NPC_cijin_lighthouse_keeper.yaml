id: NPC_cijin_lighthouse_keeper
name:
  zh-TW: 旗津燈塔前任管理員老邱
settlement: kaohsiung
home_site: cijin_lighthouse
role: official
hint:
  zh-TW: 六十多歲的退休燈塔管理員，平日還是喜歡回到燈塔散步，與現任管理員熟識。說起燈塔的事頭頭是道，說起那場颱風就停頓一下。
responses:
  燈塔:
    zh-TW: 這座燈塔，1883年就有了，我是第九任管理員，接手的時候燈塔已經是用電的，但舊設備還在倉庫。那個古早的石油燈芯，我還看過，大概有一個人高，轉動一圈就照亮整個海峽。
  颱風:
    zh-TW: 那年颱風——我不說是哪年——燈光在最糟的時候斷了。整個海峽都黑了，沒有其他的光源。然後有一艘船說它還是進港了，問它怎麼找到的，船長說看見一道光，位置對，就跟著進來。我查過，那個方向沒有其他的光源。
  海峽:
    zh-TW: 你站在燈塔頂，往西看——就是那個方向——晴天的時候，遠遠可以看見一條影子，有人說那是中國，有人說那是雲，我在這裡幾十年，我說是雲和中國都有，看你那天的心情。
