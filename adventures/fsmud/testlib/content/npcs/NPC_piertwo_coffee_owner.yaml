id: NPC_piertwo_coffee_owner
name:
  zh-TW: 駁二咖啡店主人阿雅
settlement: kaohsiung
home_site: piertwo
role: merchant
hint:
  zh-TW: 三十多歲的女性，在駁二開了一家咖啡店，店裡收集了很多關於高雄港的舊照片，說起港的事比當地老人還熟。
responses:
  駁二:
    zh-TW: 我在這裡開店五年了，見過各種來這裡的人——本地人、觀光客、藝術家、老漁民。每個人看見的是不同的地方。藝術家說這裡有氛圍，老漁民說這裡以前是倉庫，觀光客說這裡很有感覺，本地人說這裡很貴。
  舊照片:
    zh-TW: 我收集了幾十張老照片，都是這個港口不同年代的樣子。有日治時代的，有五六十年代的，有黑白的，有彩色的。我把它們掛在牆上，讓來喝咖啡的人看，因為我覺得這個港口的歷史需要有人記得。
  高雄:
    zh-TW: 高雄其實是一個讓人感到意外的城市。很多外地人來，說沒想到這麼漂亮，沒想到這麼好吃，沒想到人這麼直接好相處。我說因為高雄一直被低估，所以它不需要表演，就是它本來的樣子。
