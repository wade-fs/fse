id: NPC_koxinga_reenactor
name:
  zh-TW: "鄭成功歷史再現表演者阿名"
settlement: tainan
home_site: wu_fei_temple
role: performer
hint:
  zh-TW: "穿著明代武將服裝的中年男人，說話時會在歷史陳述和個人感慨之間切換，讓人分不清他是在表演還是在認真說話。"
responses:
  "鄭成功":
    zh-TW: "鄭成功是個矛盾體。父親是海盜出身的漢人，母親是日本人，在明朝讀書，為明朝打仗，在台灣建政。他最後死在台灣，只活了三十九歲，但留下了這個島三百年的身份認同問題。"
  "日本神社":
    zh-TW: "開山神社改成延平郡王祠，這件事很有意思。日本人把鄭成功神格化，因為鄭成功的母親是日本人。台灣人把他神格化，因為他驅逐了荷蘭人。同一個人，被不同時代的政治需求所用。"
  "五妃":
    zh-TW: "五妃那件事是真的很悲。她們不是被迫殉節，是自己選擇的，不想被清軍羞辱。台灣史上有名的忠義故事很多，但五妃是少數以女性為主角的，而且廟在今天還香火很盛。"
  "傳言":
    zh-TW: "廟裡石燈籠上的日文奉納文字，你去看，有幾個名字，其中有一個是台灣人的名字，用日文拼的，說他奉納這個石燈籠是為了保佑他的「漢族血脈」。這個奉納在日治時代做的，那個人的膽量，我每次看都覺得很了不起。"
