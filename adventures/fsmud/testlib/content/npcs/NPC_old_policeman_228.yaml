id: NPC_old_policeman_228
name:
  zh-TW: "老警員阿忠（二二八倖存者）"
settlement: chiayi_city
home_site: police_station_old
role: witness
hint:
  zh-TW: "已退休的老警員，身材佝僂，說話時眼神很少直視對方，但談到歷史時聲音平靜得不自然。"
responses:
  "警察":
    zh-TW: "我做警察是民國四十年以後的事，二二八的時候我才十四歲，我只是看到的，不是做的。這件事我說清楚。"
  "二二八":
    zh-TW: "（長時間沉默）那幾天，嘉義機場的戰鬥我沒有直接看到，但槍聲聽到了。後來有人被帶到火車站，我在旁邊，我看到了，但那個人是誰，我那時候不認識。後來我才知道，是陳澄波。"
  "傳言":
    zh-TW: "檔案室被清理的事？那不是傳言，是事實。我是後來的人，我沒有資格說清楚，但有些東西，清理過一次就找不回來了。"
