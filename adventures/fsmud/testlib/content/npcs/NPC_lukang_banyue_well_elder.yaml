id: NPC_lukang_banyue_well_elder
name:
  zh-TW: "半邊井旁老太太春花"
settlement: lukang
home_site: lukang_banyue_well
role: survivor
hint:
  zh-TW: "八十多歲的老婦人，坐在半邊井旁的石凳上，戴著老花鏡在縫補衣服，神情和藹，樂於向旅客講述過去的故事。"
responses:
  "半邊井":
    zh-TW: "這口井以前可熱鬧了，半邊在外頭，挑水的小販、路過的挑夫，都在這裡打水喝，順便聊聊八卦。這井是我們祖先留給這個社會的情意，現在乾了，但情意還在。"
  "械鬥":
    zh-TW: "我阿公說，以前鹿港有很多隘門，就是防械鬥的。泉州人和漳州人打，這邊街和那邊街打，隘門一關，誰也進不來。但半邊井的人從來不參與打架，大家都要喝水，井前不見刀兵。"
  "西拉雅":
    zh-TW: "你問我們祖先？我們這支是從福建泉州來的，但在這裡住了幾代，有沒有本地原住民的血，阿公沒說。但我阿公的甕，確實放在家裡的角落，裡面有些特別的土，說是不忘本。"
  "傳言":
    zh-TW: "聽說井底下確實有一塊寫著字的舊磚，是我曾祖父建井時放進去的，寫的不是字，是一句泉州老家的俗語：『一口井，兩家人，同甘共苦到子孫。』"
