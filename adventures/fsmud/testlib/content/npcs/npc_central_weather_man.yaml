id: npc_central_weather_man
name:
  zh-TW: "黃老氣象員"
settlement: tainan_central
home_site: "central_weather_station"
role: "研究員"
hint:
  zh-TW: "在胡椒管測候所工作三十年的退休氣象觀測員，能根據雲影與落山風判斷降雨。"
responses:
  "歷史":
    zh-TW: "中西區的歷史，就是從泮宮石坊下的第一碗老茶與孔廟的鐘聲開始的。"
  "文化":
    zh-TW: "不論是重慶寺的醋矸，還是測候所的胡椒管，都是我們府城先民在大浪中討生活的根。"
