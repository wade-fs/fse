id: NPC_lingya_night_market_boss
name:
  zh-TW: 六合夜市木瓜牛奶阿玉
settlement: kaohsiung
home_site: lingya_nightmarket
role: merchant
hint:
  zh-TW: 五十多歲的女性，在六合夜市擺攤賣木瓜牛奶已三十年，動作熟練到不需要看就能準確量出每種份量，說話時不停手。
responses:
  木瓜牛奶:
    zh-TW: 我的木瓜牛奶，配方是我媽傳的，我媽是從她媽那裡學的。說穿了就是新鮮木瓜加牛奶，但比例不一樣，哪個部位的木瓜甜度不一樣，這些細節就是這杯和那杯的差別。
  觀光客:
    zh-TW: 夜市越來越多觀光客，說的話我都聽不懂，比比劃劃就知道要什麼。倒是不少台灣人不來了，說太觀光化了。我說那你去哪裡買，他說他家附近的小攤——我說那就是另一個夜市嘛，只是沒有牌子。
  三十年:
    zh-TW: 三十年前我剛出來做這個，收入不穩，家人說去工廠比較好。我說工廠是別人的，這個攤位是我的。做了三十年，工廠倒了幾間，我的攤還在，我說我選對了。
