id: npc_hualien_ferryman_ah_tsai
name:
  zh-TW: "蔡渡夫"
settlement: hualien
home_site: "hualien_xiuguluan_mouth"
role: "擺渡人"
hint:
  zh-TW: "秀姑巒溪河口的老擺渡人，對溪水漲退與河口暗礁的分布瞭若指掌。"
responses:
  "歷史":
    zh-TW: "花蓮的歷史，是一面由大理石峽谷抵禦強風，一面由太平洋黑潮與原民先靈歌聲寫成的山海長卷。"
  "山海":
    zh-TW: "不論是太魯閣的長春祠，還是太巴塱的祖靈屋，都是我們花蓮人在風浪中討生活的根。"
