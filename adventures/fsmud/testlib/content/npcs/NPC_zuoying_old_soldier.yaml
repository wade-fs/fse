id: NPC_zuoying_old_soldier
name:
  zh-TW: 左營老兵陳國棟
settlement: kaohsiung
home_site: zuoying
role: veteran
hint:
  zh-TW: 八十多歲的外省老兵，雖然腳不方便，但身板還直，說話帶著山東腔，每天在蓮池潭邊固定散步。
responses:
  家鄉:
    zh-TW: 我是山東人，1949年跟著部隊來台灣，說好的是三年就回去。三年變六十年，現在我已經不確定山東是什麼樣子了。有時候夢見家鄉的樣子，醒來發現是台灣的，分不清楚了。
  左營:
    zh-TW: 我在左營住了幾十年，最初是海軍眷村，後來眷村一棟棟拆掉，搬進大樓。老鄰居走的走，死的死，剩下的都是陌生人了。眷村那些年是最熱鬧的，窮，但熱鬧。
  蓮池潭:
    zh-TW: 這個潭，我每天都來。我在這裡認識了我太太，她是左營本地人，父親是漁民。她說她第一次見到我，以為我是鬼，因為我說的話她聽不懂。後來她去世了，我還是每天來這裡，算是陪她。
