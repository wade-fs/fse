id: NPC_photo_studio_owner_minxiong
name:
  zh-TW: "照相館老闆娘秀蓮"
  en: "Photo Studio Owner Hsiu-Lien"
hint:
  zh-TW: "穿著整潔旗袍的中年女性，頭髮梳得一絲不苟，雙手保養得白皙，視線落在相機後方，讓人難以猜透心思。"
  en: "A middle-aged woman in a neat qipao with impeccably styled hair and well-kept pale hands. Her gaze falls behind the camera, her thoughts unreadable."
settlement: minxiong
home_site: photo_studio
responses:
  "照相":
    zh-TW: "要拍照？坐好，不要動。光線進來的時候，我會說「按下去」，你就不要動。一次拍好，不補拍。"
    en: "Want a photo taken? Sit still, don't move. When the light comes in, I'll say 'press it', and you hold still. One take, no retakes."
  "相片":
    zh-TW: "每一張相片都是那一刻的魂。人死了，但相片留著，魂還沒走。我替很多人拍過最後一張相，他們後來就走了。"
    en: "Every photograph is the soul of that moment. The person dies, but the photo remains — the soul lingers. I've taken the last photo for many people, and they left soon after."
  "日本時代":
    zh-TW: "（沉默片刻）那時候的相片，我大多燒了。留著沒有好處。你懂我意思嗎？"
    en: "(a moment of silence) Most photos from that era, I burned. Nothing good comes from keeping them. You understand what I mean?"
  "軍官":
    zh-TW: "（眼神警覺）誰說的？剃頭仔又在說閒話。那是以前的事，現在不談。"
    en: "(eyes wary) Who told you that? The barber gossips again. That was the past, we don't talk about it now."
  "傳言":
    zh-TW: "傳言？我只知道，那間鬼屋的柱子上，有人最近刻了新字。不是原本就有的，是新的。你去看，大概是小孩玩鬧，也可能不是。"
    en: "Rumors? All I know is that someone recently carved new words on the pillar of the haunted house. Not the original ones — new ones. Go see for yourself. Probably kids playing, maybe not."
