id: npc_new_taipei_gold_worker
name:
  zh-TW: "老金丁"
settlement: new_taipei
home_site: "new_taipei_shengping_theater"
role: "礦工"
hint:
  zh-TW: "在九二一事件前即在金瓜石坑道採金的老金丁，雙手粗糙，滿嘴採金切語。"
responses:
  "歷史":
    zh-TW: "新北市的歷史，是一半靠著淡水海風吹，一半靠著金瓜石火藥炸出來的。"
  "文化":
    zh-TW: "不論是平溪高空的天燈，還是三峽祖師廟的木雕，都是前人一筆劃刻出來的根。"
