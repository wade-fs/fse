id: NPC_lukang_foodie_guide
name:
  zh-TW: "糕餅老鋪老顧客阿梅"
settlement: lukang
home_site: lukang_pastry_shop
role: survivor
hint:
  zh-TW: "六十多歲的老婦人，每天下午都來餅鋪買兩塊綠豆椪，對鹿港各家餅鋪的口味比對自己孩子的脾氣還清楚。"
responses:
  "糕餅":
    zh-TW: "吃綠豆椪要配鹿港的沉香茶。餅的甜和茶的苦，在嘴裡剛好合起來。現在外地人吃餅配咖啡，我覺得那是不懂吃。我們鹿港人吃的是精緻，是規矩。"
  "餅鋪":
    zh-TW: "這家餅鋪是我從小吃到大的，他們的綠豆椪，豬油的香味很純，因為是每天早上新鮮煉的，不放防腐劑。我帶去給台北的孫子吃，孫子說阿嬤這個餅會說話，真的會說話。"
  "傳承":
    zh-TW: "阿修這個孩子不錯，肯留下來做餅。現在的孩子都去新竹當工程師了，但工程師能做出這麼好吃的綠豆椪嗎？做餅是積德，讓人吃得開心、拜得虔誠，這才是事業。"
  "傳言":
    zh-TW: "聽說以前大天后宮的神明過生日，各大餅鋪要比賽做一個比人還大的綠豆椪送去，切開來裡面還藏著一尊木雕的小媽祖，誰做的最好，那年誰的生意就最好。這是我阿公說的，不知道是不是真的。"
