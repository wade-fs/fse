id: NPC_lukang_temple_keeper
name:
  zh-TW: "天后宮廟公阿全"
settlement: lukang
home_site: lukang_tianhou_temple
role: temple_keeper
hint:
  zh-TW: "五十多歲的中年男人，說話聲音宏亮，隨時都在打掃廟殿，對每個神明匾額的來歷瞭若指掌。"
responses:
  "黑面二媽":
    zh-TW: "我們天后宮的二媽是開基神像，當年從湄洲請來的。她的臉原本是粉紅色的，被兩百年的香火天天燻，才成了現在的黑金色。這黑金色，就是信眾的願力。"
  "行郊":
    zh-TW: "清朝的時候，天后宮就是我們鹿港八郊的總部。商人要在港口做生意、定契約，都要來媽祖面前立誓，誰要是敢說謊，媽祖會收回他的商運，這比官府的印信還管用。"
  "掉包":
    zh-TW: "（壓低聲音）皇民化那時候，日本人要燒神像。我祖父和施師傅的曾祖父連夜用樟木雕了一尊假的二媽，擦上舊油漆送過去，真身就藏在老街布商的棉花捆裡，這才保了下來。"
  "傳言":
    zh-TW: "廟裡每到除夕夜，黑面二媽的配劍會發出極細微的嗡嗡聲，有人說是媽祖在點兵，保佑新的一年鹿港平安，我也聽過幾次，像金屬的震動聲。"
