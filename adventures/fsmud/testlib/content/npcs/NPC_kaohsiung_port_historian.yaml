id: NPC_kaohsiung_port_historian
name:
  zh-TW: 高雄港史研究者吳教授
settlement: kaohsiung
home_site: kaohsiung_harbor
role: researcher
hint:
  zh-TW: 六十多歲的大學退休教授，專研高雄港開發史，出版過幾本港史書籍，在港區附近常常拍照和記錄。
responses:
  打狗:
    zh-TW: 打狗這個名字，來自平埔族馬卡道族的部落名「Takao」，漢字音譯而來。後來日本人來，覺得打狗這個名字不吉利，就改成了「高雄」——同樣是Takao的音，換了個有氣魄的漢字寫法。
  港口歷史:
    zh-TW: 高雄港從荷蘭時代就有貿易記錄了。清代開口岸後，打狗港成為南台灣最重要的輸出港，糖、米、樟腦，從這裡出去，換來各種輸入品。那個時代的港口，比現在更有人情味，因為每一艘船都是手工操作的，需要人。
  沉船:
    zh-TW: 我研究港史，也研究沉船。高雄港灣裡有幾艘有記錄的沉船，最老的可以追溯到荷蘭時代。有幾艘是清法戰爭期間的，還有幾艘是二戰期間美軍轟炸沉的。這些沉船是活的歷史，但政府對水下文化遺址的保護非常不足。
