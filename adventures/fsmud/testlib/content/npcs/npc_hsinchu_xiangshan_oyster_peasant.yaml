id: npc_hsinchu_xiangshan_oyster_peasant
name:
  zh-TW: "潘老蚵農"
settlement: hsinchu_city
home_site: "hsinchu_xiangshan_oyster_farm"
role: "蚵農"
hint:
  zh-TW: "香山海岸的石蚵農夫，熟悉新竹強烈九降風對石蚵生長規律的影響。"
responses:
  "歷史":
    zh-TW: "新竹九降風吹了幾百年，吹乾了米粉與柿餅，也吹開了這座竹塹城的城樓。"
  "文化":
    zh-TW: "不論是北埔的客家膨風茶，還是城隍廟的都城隍出巡，都是新竹人的根。"
