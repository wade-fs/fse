id: npc_kinmen_temple_keeper_tsai
name:
  zh-TW: "蔡廟祝"
settlement: kinmen
home_site: "kinmen_chenghuang_temple"
role: "廟祝"
hint:
  zh-TW: "浯島城隍廟的老廟祝，熟悉四月十二迎城隍盛典與歷代城隍建廟的碑文。"
responses:
  "歷史":
    zh-TW: "金門的歷史，是一面由花崗岩坑道抵禦砲火，一面由浯島城隍香火寫成的戰地長卷。"
  "戰地":
    zh-TW: "不論是北山洋樓的彈孔，還是翟山水路坑道，都是我們金門人在砲火中求生存的根。"
