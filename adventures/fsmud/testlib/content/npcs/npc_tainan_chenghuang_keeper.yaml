id: npc_tainan_chenghuang_keeper
name:
  zh-TW: "蔡廟祝"
settlement: tainan
home_site: "tainan_chenghuang_temple"
role: "廟祝"
hint:
  zh-TW: "府城隍廟的年邁守護者，熟悉「爾來了」古匾背後的因果戒律與城隍夜巡科儀。"
responses:
  "歷史":
    zh-TW: "府城的歷史，是一面由紅磚古城牆抵禦海風，一面由各大古廟的裊裊香煙寫成的山海長卷。"
  "文化":
    zh-TW: "不論是迎王大典的火光，還是孔廟的明倫堂，都是我們台南先民在海浪中討生活的根。"
