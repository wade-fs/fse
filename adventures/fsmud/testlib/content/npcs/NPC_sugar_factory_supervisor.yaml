id: NPC_sugar_factory_supervisor
name:
  zh-TW: "糖廠監督員阿坤"
settlement: chiayi_city
home_site: sugar_refinery_north
role: supervisor
hint:
  zh-TW: "體型結實的中年男人，藍色工作服口袋插著計算尺，說話有生意人的精明，但眼神偶有一絲不安。"
responses:
  "糖廠":
    zh-TW: "北廠現在產量下滑了，不是機器的問題，是甘蔗供應少了。農民改種鳳梨、改種蔬菜，因為利潤比較高。台灣糖業的時代，在我這個世代差不多到頭了。"
  "日本時代":
    zh-TW: "你說日本時代糖廠怎樣？那時候農民沒有選擇，土地就是要種甘蔗，價格也是糖廠訂，叫做「保証價格」，實際上是壓價。但廠是有的，工作是有的，人是活著的。"
  "傳言":
    zh-TW: "那個格子我知道，從我接手的第一天前任就跟我說，那個格子不要開。我問為什麼，他說不知道，前任的前任跟他說的。就這樣傳下來了。"
