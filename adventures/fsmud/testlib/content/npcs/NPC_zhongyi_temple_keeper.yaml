id: NPC_zhongyi_temple_keeper
name:
  zh-TW: "忠義路武廟廟公阿勝"
settlement: tainan
home_site: tainan_zhongyi_temple
role: temple_keeper
hint:
  zh-TW: "五十多歲，在武廟做廟公二十年，對每個信眾的問題有標準答案，但偶爾會說出讓人意想不到的實話。"
responses:
  "關公":
    zh-TW: "關公管的是義氣、信義、武力、財運，所以文武商都來拜。台南武廟的關公特別靈，不是因為這尊神比較強，是因為台南人拜的心比較誠，神靈感應的是心，不是廟的大小。"
  "月老":
    zh-TW: "月老不只管男女緣分，也管事業緣分、朋友緣分、機遇緣分。那個紙條縫進神龕的事？我看過幾次，不同的人，不同的名字，後來的故事我不知道，但每次看到紙條，我都沒有取出來，我覺得不應該干涉。"
  "借據":
    zh-TW: "你說那份借據？那是真的，我代保管的，是一個老商人的後代每年來，帶一個小禮物，說是還一個承諾。今年來的是第三代，孫子，說他不知道具體欠了什麼，但他阿公說要還到神明說夠了為止。我每年看到他，都沒有說什麼。"
  "傳言":
    zh-TW: "廟裡有個角落，是我每次去都覺得特別靜的地方，不是安靜，是那種讓人心跳慢下來的靜。我問老廟公，他說那個角落以前有一個神龕，後來被移走了，移走的原因他說不清楚，但那種靜留下來了。"
