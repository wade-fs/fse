id: NPC_taipei_jilin_bookseller
name:
  zh-TW: 台北舊書攤主
settlement: taipei
home_site: taipei_101_zhongshan_north_road
role: vendor
hint:
  zh-TW: 坐在堆滿書冊的小攤後面的老先生，正戴著老花眼鏡翻閱一本泛黃的舊雜誌。
responses:
  舊書:
    zh-TW: 每一本書都有前一個主人的故事，我喜歡在書頁裡找到他們留下的筆記和夾藏的信件，每次都有驚喜。
  台北:
    zh-TW: 台北以前有很多舊書攤，現在越來越少了，但書是有靈魂的東西，不會真的消失。
