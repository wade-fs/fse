id: NPC_dongmen_gate_elder
name:
  zh-TW: "東門城邊的老攤販阿德仔"
settlement: tainan
home_site: tainan_dongmen
role: vendor
hint:
  zh-TW: "在圓環旁邊賣甘蔗汁幾十年的老人，城門的歷史他比導覽手冊懂得更多。"
responses:
  "東門城":
    zh-TW: "這個城門是清代的，但周圍的城牆都拆了，只剩這一個門。日本時代拆城牆建圓環，現在圓環的車流就繞著這個門轉，你說這個門知不知道自己還在？"
  "甘蔗汁":
    zh-TW: "我在這裡賣甘蔗汁四十年了，城門那時候還不是觀光景點，就是一個大家繞過去的障礙物。後來變成古蹟，開始有人來看，我的生意才慢慢好起來，你說古蹟養活了我。"
  "磚洞":
    zh-TW: "城門那個洞？是真的，你去看，在城門磚牆的中間偏上，有一個手指頭大的洞，洞裡有一根乾掉的稻草，說是鳥巢，但鳥好多年沒來了，稻草還在，可能是那隻鳥的最後一窩。"
  "傳言":
    zh-TW: "清代守城兵丁你說他無聊在磚上鑿洞，我不確定，但那個洞的位置不是無聊亂鑿的，它剛好在城門對外的視角，可以看到遠處的路，像是一個瞭望孔，只是太小了，沒有實際用途。"
