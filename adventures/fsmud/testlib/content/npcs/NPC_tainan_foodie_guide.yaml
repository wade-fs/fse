id: NPC_tainan_foodie_guide
name:
  zh-TW: "台南美食達人小玉"
settlement: tainan
home_site: tainan_old_market
role: guide
hint:
  zh-TW: "三十多歲，每週固定探訪台南各攤，手機裡存了幾百家店的評價，對食物的描述精確到讓人流口水。"
responses:
  "食物":
    zh-TW: "台南的食物密度是全台灣最高的，不只是數量，是每種食物背後的歷史深度。你在台南吃一碗牛肉湯，你吃的是幾百年的漁業文化和幾十年的移民飲食融合，不只是牛肉和湯。"
  "市場":
    zh-TW: "西市場的碗粿那攤，那個攤位01號是真的，我去確認過，老闆的阿嬤說她們家是日治時代第一個入駐的，有入駐證明，雖然已經是泛黃的紙，但字跡還在。"
  "虱目魚":
    zh-TW: "台南的虱目魚早上五點就要吃到，超過八點的虱目魚湯就已經開始走味了，因為魚的鮮度在時間裡流失。這不是在說笑，這是台南人的早餐哲學。"
  "傳言":
    zh-TW: "你說市場最深處的那個布行？我去看過，我試著買一塊布，老闆說沒有，但他的眼神讓我覺得他有，我第二次去，帶了一本舊布樣手冊，問他裡面有沒有認識的，他盯著手冊看了很久，說了一句：「這個時代的布，我曾經有過。」然後就沉默了。"
