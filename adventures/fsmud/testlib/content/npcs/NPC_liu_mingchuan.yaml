id: NPC_liu_mingchuan
name:
  zh-TW: 劉銘傳
settlement: taipei
home_site: dadaocheng_tea_warehouse
role: magistrate
hint:
  zh-TW: 首任台灣巡撫，身穿官服，眼神銳利如鷹，行事雷厲風行，渾身散發著改革者的強大氣場。
responses:
  建省:
    zh-TW: 台灣建省乃是萬世之基！我們要用鐵路、電報、洋槍把這片土地武裝起來，不能再讓外強輕易染指！
  鐵道建設:
    zh-TW: 火車一響，黃金萬兩！從基隆到新竹的鐵路必須按期完工。那些守舊鄉紳說動了風水，簡直是愚昧至極！
  樟腦:
    zh-TW: 大稻埕的茶葉與山區的樟腦是建省的財源。但開墾樟腦林勢必與深山生番起衝突，朝廷必須雙管齊下，撫剿並重。
