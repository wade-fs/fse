id: NPC_zhu_yigui
name:
  zh-TW: 朱一貴
settlement: kaohsiung
home_site: gangshan_duck_pond
role: rebel_leader
hint:
  zh-TW: 身著粗布衣，手拿竹竿，眼神堅毅。他擅長養鴨，傳說能像帶兵一樣指揮鴨群。
responses:
  起義:
    zh-TW: 官逼民反！清廷官吏橫徵暴斂，台灣百姓苦不堪言。我等在岡山誓師，要為天下百姓討回公道！
  鴨母王:
    zh-TW: 呵呵，不過是些聽話的鴨子罷了。但人若能像鴨群般團結一心，縱有清軍鐵騎，又何懼之有？
  自治:
    zh-TW: 我們佔領府城後，尊奉朱明，減免苛稅。百姓要的是安居樂業，不是滿清的公文 and 鞭子！
