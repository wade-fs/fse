id: NPC_taipei_songshan_art_curator
name:
  zh-TW: 松山文創園區策展人
settlement: taipei
home_site: taipei_101_songshan_cultural_park
role: artist
hint:
  zh-TW: 穿著時髦、說話充滿熱情的年輕策展人，正在佈置即將開幕的設計展。
responses:
  菸廠:
    zh-TW: 這棟工廠的建築語彙本身就是一件藝術品，我們的挑戰是讓新的創作和老空間對話，而不是衝突。
  設計:
    zh-TW: 台灣的設計力很強，只是需要更多舞台展現給全世界看，松山文創就是其中一個重要的窗口。
