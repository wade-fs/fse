id: NPC_meinong_hakka_singer
name:
  zh-TW: 美濃客家山歌歌手秀菊
settlement: kaohsiung
home_site: meinong
role: performer
hint:
  zh-TW: 六十多歲的婦人，是美濃有名的客家山歌演唱者，聲音渾厚，唱起山歌來有種讓人想起曠野和遠山的感覺。
responses:
  客家山歌:
    zh-TW: 客家山歌是在田裡唱的，不是舞台上唱的。你在田裡唱，聲音要傳得遠，要傳給隔壁田的人聽。所以山歌的聲音是大的、開的，把心情都放出去。在舞台上唱，我覺得少了一半的魂。
  美濃:
    zh-TW: 美濃的客家人，講的是四縣腔，和桃竹苗那邊有一點不一樣。我們這裡比較保守，老人家到現在還是全客語，年輕人就開始混了。我教山歌，也是希望讓他們多學一點，不是說一定要會，但是知道就好。
  歌詞:
    zh-TW: 我唱的歌詞，有些是我阿嬤教的，我阿嬤說那是她阿嬤教的。那個傳遞的鏈，我不知道從哪裡開始——也許是從廣東帶來台灣的，幾百年前，某個人帶著幾首歌渡海，那些歌到現在還在。
