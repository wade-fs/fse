id: NPC_salt_worker_tainan
name:
  zh-TW: "七股老鹽工阿海"
settlement: tainan
home_site: tainan_beimen_salt_field
role: worker
hint:
  zh-TW: "黝黑精瘦，木耙比他還高，站在鹽田邊的動作讓人感覺他和那片白色是同一個世界的東西。"
responses:
  "鹽田":
    zh-TW: "鹽田要看天，雨季不能曬鹽，乾季才是好日子。現在機械採鹽了，我這種手工採鹽的快沒有市場了，但我繼續做，是因為手工鹽和機械鹽的味道真的不一樣，你試過就知道。"
  "荷蘭":
    zh-TW: "台南的鹽田是荷蘭時代建的，荷蘭人懂鹽，他們在歐洲就靠鹽貿易起家。這片鹽場後來給鄭成功，給清朝，給日本人，現在給台糖，但鹽還是一樣的鹽，從海水來，到廚房去。"
  "透明鹽":
    zh-TW: "透明的鹽晶？那個位置我知道，在第三個鹽格的西南角。那個鹽不只透明，放在手心溶化，舌頭嚐到的味道比普通鹽還甘。我不知道為什麼，我去問過地質學家，他說他也不知道，可能是地下有特殊的礦泉水滲入。"
  "傳言":
    zh-TW: "每次颱風來之前，鹽田的鹽會變成一種奇怪的粉紅色，只有幾個小時，然後恢復白色。老鹽工說那是海裡的生物跑上來了，但我觀察了幾十年，找不到什麼生物，就是變色，然後恢復。"
