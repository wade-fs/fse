id: npc_taitung_dulan_carver
name:
  zh-TW: "巴奈大叔"
settlement: taitung
home_site: "taitung_dulan_village"
role: "工藝師"
hint:
  zh-TW: "都蘭部落的阿美族老木雕師，擅長用粗獷的線條雕刻祖靈像與製作樹皮衣。"
responses:
  "歷史":
    zh-TW: "台東的歷史，是一面由都蘭大山抵禦海風，一面由太平洋黑潮與原民先靈歌聲寫成的山海長卷。"
  "山海":
    zh-TW: "不論是卑南的古遺址，還是紅葉的操場，都是我們台東人在風浪中討生活的根。"
