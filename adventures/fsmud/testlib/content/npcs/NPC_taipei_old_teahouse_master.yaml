id: NPC_taipei_old_teahouse_master
name:
  zh-TW: 大稻埕隱世老茶人
settlement: taipei
home_site: taipei_101_hidden_old_teahouse
role: artisan
hint:
  zh-TW: 枯瘦的老人安靜地坐在油燈前泡茶，動作緩慢而精確，彷彿時間在他身邊停止流動。
responses:
  老茶:
    zh-TW: 這壺是光緒年間的老凍頂，放了一百多年，苦盡甘來，每一口都是時間的味道。
  茶道:
    zh-TW: 泡茶是和自己對話，外面的世界再喧嚷，坐下來一壺茶的功夫，心就靜了。
