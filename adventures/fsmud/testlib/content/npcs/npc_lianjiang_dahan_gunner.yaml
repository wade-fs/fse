id: npc_lianjiang_dahan_gunner
name:
  zh-TW: "砲兵老張"
settlement: lianjiang
home_site: "lianjiang_dahan_stronghold"
role: "守衛"
hint:
  zh-TW: "大漢據點要塞的退休砲兵，熟悉巨型防空高砲的操作與海防防禦體系。"
responses:
  "歷史":
    zh-TW: "連江的歷史，是一面由花崗岩坑道抵禦砲火，一面由天后宮媽祖衣冠塚香火寫成的戰地長卷。"
  "戰地":
    zh-TW: "不論是芹壁石屋的標語，還是北海地下水道，都是我們連江人在砲火與風浪中求生存的根。"
