id: NPC_changhua_west_gate_elder
name:
  zh-TW: "西門古厝老居民阿吉伯"
settlement: changhua_city
home_site: changhua_west_gate
role: elder
hint:
  zh-TW: "七十多歲的老人，家族在西門舊址旁住了五代，對西門通往鹿港的貿易歷史非常熟悉。"
responses:
  "西門":
    zh-TW: "西門叫慶豐門，通往鹿港。清朝的時候，鹿港來的洋貨、布料，全都要從西門進彰化城。所以西門口以前是商號、客棧最密集的街道，熱鬧得很。"
  "基石縫隙":
    zh-TW: "你說銅錢和斷鐵劍？那是真的。光緒年間最後一次大械鬥，西門口是主戰場，兩邊的人在城門下肉搏。那半截鐵劍是我祖父在城牆基石縫裡摳出來的，生鏽得厲害，我現在放在家裡辟邪。"
  "械鬥":
    zh-TW: "彰化的械鬥是為了搶水源、搶商路。西門是通往鹿港的咽喉，誰控制了西門，誰就控制了商路的稅收。所以那時候西門的防守是最嚴密的，城門栓比東門還粗一倍。"
  "傳言":
    zh-TW: "西門遺址的古厝，每逢陰雨天的黃昏，牆角會滲出一種暗紅色的水。老一輩人都說那是當年械鬥死難者的血滲進了地基，洗不掉的，但現在科學說是鐵質氧化，哈哈。"
