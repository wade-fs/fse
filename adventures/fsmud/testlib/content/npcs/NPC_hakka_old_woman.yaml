id: NPC_hakka_old_woman
name:
  zh-TW: 客家老婦
settlement: yunlin
home_site: yunlin_hakka_village
role: elder
hint:
  zh-TW: 滿臉皺紋的客家老阿婆，穿著藍衫，雙手顫抖地捧著一本殘缺不全的族譜。
responses:
  族譜:
    zh-TW: 這是我們張氏家族從廣東帶過來的族譜。上次庄子被放火，大堂燒毀了，我冒死把這族譜搶了出來。這是我們在台灣的根，不能丟啊。
  轉移族譜:
    zh-TW: 年輕人都去參加義民軍守隘口了。如果庄子守不住，請好心人幫忙把這本族譜送到苗栗義民廟的親族那裡去，老婆子感激不盡。
  客家庄:
    zh-TW: 我們客家人在平原人少，常被閩南大庄欺負。只有拜義民爺、大家抱成一團，才能活下來。
