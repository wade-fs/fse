id: npc_taichung_plow_shop_peasant
name:
  zh-TW: "高農夫"
settlement: taichung
home_site: "taichung_willow_river_bank"
role: "農夫"
hint:
  zh-TW: "柳川兩岸種植水稻與稻米的佃農，熟悉隆恩圳與柳川分水灌溉的規律。"
responses:
  "歷史":
    zh-TW: "台中的歷史，是一面由縱貫鐵路牽引，一面由大甲媽祖與二七部隊寫成的長卷。"
  "文化":
    zh-TW: "不論是南屯的打鐵聲，還是櫟社詩人們在望月亭下的低吟，都是我們中台灣的根。"
