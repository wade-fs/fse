id: npc_new_taipei_train_driver_chen
name:
  zh-TW: "陳司機"
settlement: new_taipei
home_site: "new_taipei_jingtong_station"
role: "司機"
hint:
  zh-TW: "平溪支線火車的退休老司機，熟悉蒸汽火車沿著基隆河谷攀爬的每個彎道。"
responses:
  "歷史":
    zh-TW: "新北市的歷史，是一半靠著淡水海風吹，一半靠著金瓜石火藥炸出來的。"
  "文化":
    zh-TW: "不論是平溪高空的天燈，還是三峽祖師廟的木雕，都是前人一筆劃刻出來的根。"
