id: NPC_confucian_teacher
name:
  zh-TW: "孔廟老師仁義先生"
settlement: chiayi_city
home_site: chiayi_confucian_temple
role: scholar
hint:
  zh-TW: "穿著中式對襟褂子的清瘦老人，手捧一本繁體線裝書，說話文雅，喜歡引用古文。"
responses:
  "孔廟":
    zh-TW: "諸羅縣文廟從清代就在了，嘉義人重視教育，清代的舉人比例在台灣很高。這個傳統不是偶然的，是幾百年累積下來的。"
  "教育":
    zh-TW: "日本時代的教育是有目的的，教你說日語、敬天皇。但讀書人知道，字面上服從，心裡要留著自己的根。我的老師就是那樣的人。"
  "傳言":
    zh-TW: "孔廟大門的高度被日本人降低過，這是真的，不是傳言。你量量看那個門檻，不到正常高度，是刻意的，說是現代化，其實是別的意思。"
