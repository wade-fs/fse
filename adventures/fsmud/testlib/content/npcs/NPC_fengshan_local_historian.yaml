id: NPC_fengshan_local_historian
name:
  zh-TW: 鳳山文史工作者阿嘉
settlement: kaohsiung
home_site: fengshan
role: historian
hint:
  zh-TW: 四十多歲的鳳山在地文史工作者，出版過鳳山縣誌的現代版，常常在鳳山各古跡導覽，說話有條理，但對古蹟保護的不作為頗為憤慨。
responses:
  鳳山歷史:
    zh-TW: 鳳山是台灣歷史上最重要的縣份之一，但現在被忽視了。台南有古都光環，高雄有港口光環，夾在中間的鳳山，兩個都沾不到，但它有清代的縣治、有民變的戰場、有保存下來的城門，這些都是一級的歷史資產。
  民變:
    zh-TW: 鳳山縣在清代，是民變最集中的地方——朱一貴、林爽文、蔡牽，每一次都牽扯到鳳山。這不是偶然，是因為這裡是清廷在南台灣控制的核心，反抗也就從這裡爆發。這裡的城門，每塊磚都見過那些時代。
  古蹟:
    zh-TW: 我最痛心的是，鳳山的古蹟保護一直沒有到位。東便門勉強保存了，但周邊的環境一直是問題。政府的預算在台南，在台北，鳳山的古蹟就在夾縫裡熬著，靠我們幾個人在這裡叫喊。
