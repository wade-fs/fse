id: npc_hsinchu_temple_keeper_tseng
name:
  zh-TW: "曾道長"
settlement: hsinchu_city
home_site: "hsinchu_chenghuang_temple"
role: "廟祝"
hint:
  zh-TW: "都城隍廟的老廟祝，熟悉城隍爺威靈顯赫與七月開鬼門、城隍賑孤的各種儀軌。"
responses:
  "歷史":
    zh-TW: "新竹九降風吹了幾百年，吹乾了米粉與柿餅，也吹開了這座竹塹城的城樓。"
  "文化":
    zh-TW: "不論是北埔的客家膨風茶，還是城隍廟的都城隍出巡，都是新竹人的根。"
