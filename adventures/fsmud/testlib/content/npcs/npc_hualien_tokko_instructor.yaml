id: npc_hualien_tokko_instructor
name:
  zh-TW: "日籍教官後代"
settlement: hualien
home_site: "hualien_pine_garden"
role: "文人"
hint:
  zh-TW: "曾駐守松園別館的日軍神風特攻隊教官後代，熱心收集特攻隊員留下的訣別遺書。"
responses:
  "歷史":
    zh-TW: "花蓮的歷史，是一面由大理石峽谷抵禦強風，一面由太平洋黑潮與原民先靈歌聲寫成的山海長卷。"
  "山海":
    zh-TW: "不論是太魯閣的長春祠，還是太巴塱的祖靈屋，都是我們花蓮人在風浪中討生活的根。"
