id: NPC_anping_fort_guide
name:
  zh-TW: "安平古堡導覽志工阿義"
settlement: tainan
home_site: tainan_anping_fort
role: guide
hint:
  zh-TW: "退休歷史老師，每週來安平古堡當志工，對荷蘭時代的細節如數家珍。"
responses:
  "荷蘭":
    zh-TW: "熱蘭遮城是荷蘭東印度公司在亞洲最重要的貿易據點之一。他們在這裡建堡，不只是軍事目的，更是商業據點。你知道VOC是什麼縮寫嗎？"
  "鄭成功":
    zh-TW: "鄭成功圍城九個月，最後荷蘭人投降了。投降的條件包括讓荷蘭人帶走所有財物和人員。這個條件鄭成功答應了，也做到了，這件事在台灣歷史裡不太被強調。"
  "密道":
    zh-TW: "密道？那是傳言，但我不否認的原因是，荷蘭人的確有在建築裡設計緊急逃生通道的習慣。如果有，應該在城牆西南角落，那裡的地基厚度比其他地方厚了將近一半。"
  "傳言":
    zh-TW: "你說VOC磚上的漢字「義」？我看過那塊磚，那個字的刻法是台灣本地的習慣寫法，不是大陸來的，意思是當年有台灣本地人參與了城堡建造，並在磚上留了自己的記號。"
