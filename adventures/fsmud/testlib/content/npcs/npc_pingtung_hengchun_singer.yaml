id: npc_pingtung_hengchun_singer
name:
  zh-TW: "陳老歌手"
settlement: pingtung
home_site: "hengchun"
role: "市民"
hint:
  zh-TW: "恆春半島著名的老月琴彈唱歌手，能用蒼涼的月琴聲吟唱「思想起」古調。"
responses:
  "歷史":
    zh-TW: "屏東的歷史，是一面由石板屋與恆春古城城牆抵禦海風，一面由東港迎王大典的火光與排灣族祖靈寫成的山海長卷。"
  "山海":
    zh-TW: "不論是牡丹社的古戰場，還是萬金聖母教堂，都是我們屏東人在風浪中討生活的根。"
