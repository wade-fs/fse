id: npc_hualien_sakizaya_elder
name:
  zh-TW: "潘耆老"
settlement: hualien
home_site: "hualien_takuhowan_monument"
role: "原民耆老"
hint:
  zh-TW: "撒奇萊雅族耆老，致力於恢復與傳承加禮宛戰役中撒奇萊雅族抗清的歷史真相。"
responses:
  "歷史":
    zh-TW: "花蓮的歷史，是一面由大理石峽谷抵禦強風，一面由太平洋黑潮與原民先靈歌聲寫成的山海長卷。"
  "山海":
    zh-TW: "不論是太魯閣的長春祠，還是太巴塱的祖靈屋，都是我們花蓮人在風浪中討生活的根。"
