id: NPC_taipei_beitou_museum_curator
name:
  zh-TW: 北投溫泉博物館館長
settlement: taipei
home_site: taipei_101_beitou_museum
role: scholar
hint:
  zh-TW: 穿著整齊的館長正在為訪客講解老浴場的歷史，語氣中充滿對文化資產的熱愛。
responses:
  公共浴場:
    zh-TW: 這座建於1913年的公共浴場，原本是讓一般民眾也能享受溫泉的設施，設計優美至今仍讓人讚嘆。
  修復:
    zh-TW: 當年被廢棄後差點被拆除，是北投國小的學生們發起連署，才把它保存下來，孩子們的力量令人感動。
