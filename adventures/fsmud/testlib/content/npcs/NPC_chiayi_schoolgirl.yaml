id: NPC_chiayi_schoolgirl
name:
  zh-TW: "公學校女學生阿玲"
settlement: chiayi_city
home_site: chiayi_confucian_temple
role: student
hint:
  zh-TW: "十五歲左右的少女，穿著黑白制服，說話帶著學生氣的好奇，對歷史問題格外認真。"
responses:
  "學校":
    zh-TW: "我在嘉義女中讀書，學校是日本時代蓋的，但我們現在讀的是中文課本。老師說要認識台灣歷史，但課本很薄，好多事情都只有一兩行。"
  "歷史":
    zh-TW: "你知道陳澄波嗎？他是我們嘉義人，我在美術館看過他的畫，老師說他在二二八走了，但課本上沒有寫這件事，我是自己去查的。"
  "傳言":
    zh-TW: "我聽同學說孔廟的某塊石板下面有字，是清代秀才刻的，寫的是諸羅縣的一個秘密，她說是在一本舊書裡看到的。我去找那塊石板，但不確定哪一塊。"
