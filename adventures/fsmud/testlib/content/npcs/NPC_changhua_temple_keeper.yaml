id: NPC_changhua_temple_keeper
name:
  zh-TW: "孔廟管理員阿福"
settlement: changhua_city
home_site: changhua_confucian_temple
role: temple_keeper
hint:
  zh-TW: "六十多歲的老頭，戴著斗笠，清掃孔廟庭院，說話聲音慢吞吞，對孔廟的木雕與格局如數家珍。"
responses:
  "孔廟":
    zh-TW: "彰化孔廟是清代道光年間重修的，規格是全台數一數二的。大成殿的斗拱和梁架，是當年特地請泉州大師雕刻好，用船載運壓艙石運過來的。這紅牆，也是清代的手工磚。"
  "械鬥":
    zh-TW: "清朝的時候，彰化是分类械鬥最兇的地方。泉州人打漳州人，客家人也參一腳。但不管外面怎麼打，誰也不敢衝進孔廟動手，聖人面前，大家還是要留一分規矩。"
  "彈孔":
    zh-TW: "（指著柱子）就在那裡，那一塊刷了新漆的木頭，摸起來有一處凹陷，就是當年八卦山決戰的彈孔。我們沒有挖出來，就讓它留在梁柱裡，也是歷史的見證。"
  "傳言":
    zh-TW: "聽說孔廟大成殿底下的石板，埋著一個清代的鎮水石符，因為彰化以前常鬧水災。修繕時有人想去挖，但老主委說動了風水孔廟會塌，就一直沒人敢碰。"
