id: npc_penghu_hobe_soldier_wang
name:
  zh-TW: "王哨兵"
settlement: penghu
home_site: "penghu_xiyu_west_fort"
role: "守衛"
hint:
  zh-TW: "駐守西嶼西臺砲台的清代湘軍老兵後裔，熟悉巨砲的操作與地下通道歷史。"
responses:
  "歷史":
    zh-TW: "澎湖的歷史，是一半靠著天後宮媽祖庇佑，一半靠著玄武岩跟強烈東北季風寫下來的。"
  "海洋":
    zh-TW: "不論是西嶼的砲台，還是七美的雙心石滬，都是我們澎湖先民在大海中討生活的根。"
