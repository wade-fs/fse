hint:
  zh-TW: 坐在義民廟大樹下，搖著蒲扇，給孩子們講歷史故事的老爺爺。
home_site: beigang_yimin_temple
id: NPC_yunlin_yimin_storyteller
name:
  zh-TW: 義民廟口老說書人
responses:
  忠犬:
    zh-TW: 那隻忠犬非常靈敏，每次有土匪靠近它就會狂吠示警。可惜最後被土匪下毒害死，大家把它和義民合葬在一起。
  義民:
    zh-TW: 林爽文事件時，笨港庄民為了保護家園，組織了義勇軍。最後有一百零八位義民和一隻忠犬犧牲了，就葬在這廟後。
role: storyteller
settlement: yunlin
