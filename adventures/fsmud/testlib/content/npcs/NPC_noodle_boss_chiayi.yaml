id: NPC_noodle_boss_chiayi
name:
  zh-TW: "米糕老闆阿進"
settlement: chiayi_city
home_site: central_market
role: vendor
hint:
  zh-TW: "瘦長的中年男人站在灶前，用大勺子分裝米糕，動作快準狠，說話也是一樣節奏。"
responses:
  "米糕":
    zh-TW: "嘉義米糕和台南米糕不一樣，我們的是乾式的，糯米蒸透後拌豬油，上面鋪魯肉和香菇，再加一小匙蒜泥。這是我阿嬤傳下來的比例，一點都不能差。"
  "市場":
    zh-TW: "東市場每個攤位都有故事，隔壁賣魚的從我小時候就在那裡，再隔壁賣豆腐的換了三代了，但還在同樣的位置。位置是這個市場的財產。"
  "傳言":
    zh-TW: "那個布行？我也很奇怪，他們在賣布的時代我沒有看到他們賣布，我問過，他說是倉儲，不是零售。他說話很少，但人沒有問題，就是奇怪。"
