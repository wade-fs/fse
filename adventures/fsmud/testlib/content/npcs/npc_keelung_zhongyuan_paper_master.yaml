id: npc_keelung_zhongyuan_paper_master
name:
  zh-TW: "陳師傅"
settlement: keelung
home_site: "keelung_zhubutan_altar"
role: "工藝師"
hint:
  zh-TW: "基隆中元祭的紙紮燈籠大師，傳承百年的水燈頭與紙紮王船手藝。"
responses:
  "歷史":
    zh-TW: "基隆港口的風雨就沒停過，西班牙人、法國人、日本人來了又走，只有雨水留了下來。"
  "中元祭":
    zh-TW: "放水燈是為了引路，讓那些在黑水溝裡遇難的孤魂野鬼有條回家的路。"
