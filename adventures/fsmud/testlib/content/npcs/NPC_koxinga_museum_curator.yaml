id: NPC_koxinga_museum_curator
name:
  zh-TW: "延平王博物館策展人小芬"
settlement: tainan
home_site: tainan_koxinga_museum
role: scholar
hint:
  zh-TW: "三十多歲的女策展人，對鄭成功的詮釋問題有強烈的自覺，說話帶著策展人的反省習慣。"
responses:
  "鄭成功":
    zh-TW: "鄭成功在博物館裡最難處理的問題，是他同時屬於幾個不同的歷史框架，而且每個框架都對他有所需要。我們試圖呈現這個複雜性，但每一個選擇本身都是一種立場。"
  "畫像":
    zh-TW: "那三幅畫像我特意放在一起，就是要讓人看到同一個人在不同文化眼光下的不同形象。荷蘭人的記錄說他『體格壯碩、眼神威嚴』，日本的畫說他是武士，中國的畫說他是英雄。哪個才是真實的鄭成功？"
  "文物":
    zh-TW: "館內最珍貴的文物不是複製品，是那幾份原件，是清代留下的關於台灣移交的文書。那些文書裡有荷蘭人的手寫字，也有鄭成功方的漢字，都在同一份文件上，是兩個文明的交接記錄。"
  "傳言":
    zh-TW: "開山神社時代的石燈籠你說有一個台灣人的名字？那個名字我查過，是一個台南本地的商人，他在日治時代捐獻了那個石燈籠，說是為了祈求漢族血脈繁衍。這個動作在當時的政治氛圍下是很大膽的，那個人的名字值得被記住。"
