id: NPC_cijin_cannon_researcher
name:
  zh-TW: 旗後砲台歷史研究員林靜怡
settlement: kaohsiung
home_site: cijin_cannon
role: researcher
hint:
  zh-TW: 四十多歲的歷史研究員，手裡總是拿著田野調查筆記本，是研究清代台灣軍事設施的專家，在砲台附近發現過幾件重要的文物。
responses:
  砲台:
    zh-TW: 旗後砲台是1875年沈葆禎籌建的，那個時代台灣開始近代化，引進西式的防禦工事。這座砲台的設計師是英國人，所以你仔細看，那個格局和台灣傳統的廟宇防禦完全不一樣——它的計算是西方的。
  沈葆禎:
    zh-TW: 沈葆禎來台灣只有短短幾年，但他做的事情對台灣影響深遠。砲台、燈塔、開山撫番政策——這些都是他的決定。他離開台灣後沒多久就死了，但台灣記住了他。
  法軍:
    zh-TW: 清法戰爭時，法軍嘗試攻打打狗港，就是被這座砲台擋住的。那場守衛，守備的清軍沒有多少人，但地形和砲台給了很大的優勢。法軍的戰艦沒能進港，算是台灣防禦史上難得的一次成功。
