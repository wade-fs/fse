id: NPC_writer_reporter_chiayi
name:
  zh-TW: "地方記者阿文"
settlement: chiayi_city
home_site: art_museum
role: journalist
hint:
  zh-TW: "手上永遠夾著一個小記事本的中年男人，眼睛習慣性地掃視四周，說話時問的比說的多。"
responses:
  "嘉義":
    zh-TW: "嘉義是個有話說的地方，只是說的方式不一樣。有的人用畫說，有的人用廣播說，有的人用刻字說，有的人就是沉默地說。"
  "歷史":
    zh-TW: "嘉義歷史最讓我著迷的是，每一個大事件後面都有一批消失的人，那些人消失了，但他們留下的東西還在，到處都是，只是要知道去哪裡找。"
  "調查":
    zh-TW: "我在調查一件事，是關於二二八期間一個廣播員說的最後一句話。你如果知道任何線索，告訴我，我不會說是誰告訴我的。"
