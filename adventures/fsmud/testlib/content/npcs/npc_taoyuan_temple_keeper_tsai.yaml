id: npc_taoyuan_temple_keeper_tsai
name:
  zh-TW: "蔡廟祝"
settlement: taoyuan
home_site: "taoyuan_jingfu_temple"
role: "廟祝"
hint:
  zh-TW: "景福宮的資深守廟人，熟悉開漳聖王建廟歷史與開漳大祭的儀軌。"
responses:
  "歷史":
    zh-TW: "桃園的歷史，是一面由大圳與古城牆抵禦強風，一面由桃園神社與眷村大合院寫成的開墾長卷。"
  "山海":
    zh-TW: "不論是角板山的古防空洞，還是大溪的巴洛克老街，都是我們桃園人在風浪中討生活的根。"
