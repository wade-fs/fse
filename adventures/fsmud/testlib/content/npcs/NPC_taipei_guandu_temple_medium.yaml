id: NPC_taipei_guandu_temple_medium
name:
  zh-TW: 關渡宮乩童
settlement: taipei
home_site: taipei_101_guandu_temple
role: priest
hint:
  zh-TW: 穿著神衣、眼神出神的乩童，廟會期間進入神靈附體狀態，成為信眾與神明溝通的媒介。
responses:
  媽祖:
    zh-TW: 媽祖娘娘從湄洲渡海來台，庇佑著所有在水上討生活的人，她的慈悲無邊無際。
  廟會:
    zh-TW: 關渡宮每年的媽祖遶境是北台灣最盛大的廟會，信徒從全島各地趕來，場面非常壯觀。
