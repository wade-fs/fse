id: NPC_taipei_temple_incense_maker
name:
  zh-TW: 艋舺手工線香師傅
settlement: taipei
home_site: taipei_101_qingshan_temple
role: artisan
hint:
  zh-TW: 手指沾滿紅色香料的老師傅，正在廟旁的小作坊裡搓製長條手工線香。
responses:
  線香:
    zh-TW: 手工線香和機器做的不一樣，原料是真正的天然香料，燒起來的味道純粹，神明也分辨得出來。
  廟宇:
    zh-TW: 台灣廟宇文化是我們的根，每個節慶、每個儀式都有它的意義，不能只當旅遊景點看待。
