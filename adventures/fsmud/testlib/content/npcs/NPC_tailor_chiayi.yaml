id: NPC_tailor_chiayi
name:
  zh-TW: "旗袍裁縫師傅清月"
settlement: chiayi_city
home_site: qipao_tailor_chiayi
role: craftsman
hint:
  zh-TW: "穿著剪裁合身旗袍的中年女性，拿著針線，眼神精準，說話簡潔，動作優雅不失效率。"
responses:
  "旗袍":
    zh-TW: "旗袍是從上海傳來的，但嘉義的版本不一樣，剪裁比較寬鬆，是台灣熱帶氣候改良的。我做的旗袍，穿起來要舒服，不只是好看。"
  "日本時代":
    zh-TW: "那時候流行和服，旗袍被認為是中國的東西，不好賣。但廟裡的女信眾還是要旗袍，所以我祖母改口說是「南方式洋裁」，才繼續做。"
  "神秘客人":
    zh-TW: "你說每年那個客人？她從來不量身，但每件旗袍都合身。我自己猜，她每次拿走的都是同樣的尺寸，只是款式不同。問她名字，她說你直接叫我阿嬤就好。"
