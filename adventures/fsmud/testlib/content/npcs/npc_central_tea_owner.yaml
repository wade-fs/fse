id: npc_central_tea_owner
name:
  zh-TW: "陳老茶莊掌櫃"
settlement: tainan_central
home_site: "central_pangong_gate"
role: "店家"
hint:
  zh-TW: "泮宮石坊旁百年老茶莊的老闆，熱心於向路過遊客講述石坊麒麟刻字與老茶焙製法。"
responses:
  "歷史":
    zh-TW: "中西區的歷史，就是從泮宮石坊下的第一碗老茶與孔廟的鐘聲開始的。"
  "文化":
    zh-TW: "不論是重慶寺的醋矸，還是測候所的胡椒管，都是我們府城先民在大浪中討生活的根。"
