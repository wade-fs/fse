id: NPC_dai_chaochun
name:
  zh-TW: 戴潮春
settlement: changhua_city
home_site: changhua_confucian_temple
role: rebel_leader
hint:
  zh-TW: 手搖摺扇，面容儒雅，但眼神中透著深沉心機的八卦會首領。
responses:
  八卦會:
    zh-TW: 彰化平原各庄結拜八卦會，是為了在械鬥與官府剝削下求生。我們以宗族為骨幹，官府也奈何不得。
  四年圍城:
    zh-TW: 這座半線城，我們圍了四年。城裡的米糧雖然斷了，但只要各庄源源不斷支持我們，我們就能一直撐下去。
