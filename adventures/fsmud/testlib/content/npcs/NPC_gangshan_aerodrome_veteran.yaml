id: NPC_gangshan_aerodrome_veteran
name:
  zh-TW: 岡山空軍退役飛行員李中校
settlement: kaohsiung
home_site: gangshan_aerodrome
role: veteran
hint:
  zh-TW: 六十幾歲的退役空軍中校，在岡山空軍官校待了三十年，現在住在岡山，偶爾來基地附近散步，說起飛行的事眼睛還會發光。
responses:
  飛行:
    zh-TW: 我第一次單飛，起飛的那一刻，整個世界安靜下來了。不是說沒有聲音——引擎聲還是在——是說那個聲音變成了背景，你就是那架飛機，飛機就是你，和地面的聯繫消失了一瞬間。我做了三十年，每次起飛那個瞬間還是一樣。
  岡山:
    zh-TW: 岡山空軍官校，訓練出幾百個飛行員。很多人說空軍是精英，我說空軍是家庭，在這裡的人互相依靠，因為飛行是高風險的，你不信任身邊的人，就不能飛。
  台海:
    zh-TW: 台海的天空，我飛了幾十年，那片空氣裡的張力從來沒有完全消失過。你在空中，有時候對面有一架飛機，你們的距離很近，近到能看見對方的機型，但你們不會說話，只是各自飛回自己的方向。
