id: npc_central_chongqing_nun
name:
  zh-TW: "釋妙空尼師"
settlement: tainan_central
home_site: "central_chongqing_temple"
role: "神職人員"
hint:
  zh-TW: "重慶寺的年邁住持尼師，慈悲溫和，專門引導感情受挫的信眾如何轉動醋矸欲挽回。"
responses:
  "歷史":
    zh-TW: "中西區的歷史，就是從泮宮石坊下的第一碗老茶與孔廟的鐘聲開始的。"
  "文化":
    zh-TW: "不論是重慶寺的醋矸，還是測候所的胡椒管，都是我們府城先民在大浪中討生活的根。"
