id: NPC_gangshan_tian_di_hui_elder
name:
  zh-TW: 岡山天地會舊址管理人阿旺伯
settlement: kaohsiung
home_site: gangshan_tian_di_hui
role: historian
hint:
  zh-TW: 七十幾歲的地方文史老人，自稱是天地會舊址附近地主的後代，對這片土地的歷史有強烈的情感與研究。
responses:
  天地會:
    zh-TW: 天地會在台灣的活動，不只是反清，也是民間互助的組織。在岡山這一帶，天地會的人幫助移民新來的客家人和閩南人調解糾紛，算是私人的法院。後來清廷禁了，就轉入地下，變成各種名目的兄弟會。
  朱一貴:
    zh-TW: 有人說朱一貴和天地會有關係，有人說沒有。我的看法是：那個年代的組織都有重疊，朱一貴的人脈就是這些民間組織構成的，你說他是天地會的，說他不是，都對。
  遺址:
    zh-TW: 這塊地，我祖父就說是舊時集會的地方。那時候有一棵百年老榕樹在中間，民國時代颱風吹倒了，根還在地底下。挖地基的工人說挖到很多瓦片和銅錢，那些東西後來不知道去哪了，沒有人記錄下來。
