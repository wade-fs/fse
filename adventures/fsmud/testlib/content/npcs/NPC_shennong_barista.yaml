id: NPC_shennong_barista
name:
  zh-TW: "神農街咖啡店主阿勇"
settlement: tainan
home_site: tainan_shennong_street
role: craftsman
hint:
  zh-TW: "三十多歲，把日治時代的老厝改成咖啡廳，對老建築的保存方式有自己的堅持。"
responses:
  "老厝":
    zh-TW: "這棟厝有一百多年了，我改造的時候把所有的舊磚都保留下來，只換掉危險的部分。老磚是台灣的記憶，你換掉它，記憶就斷了，就算外觀一樣，感覺也不對了。"
  "神農街":
    zh-TW: "神農街底下是五條港的舊水道，我在裝修時挖地基，挖到了幾塊清代的船板，已經腐爛了，但木頭的紋理還在。那幾塊木頭我留著，放在店的某個地方，有興趣可以找找看。"
  "地井":
    zh-TW: "地板下的古井？那是真的，我的咖啡廳地板有一個玻璃窗，可以看進去。那口井乾涸了，但井壁上有青苔，說明歷史上這裡有水。有客人看著那個玻璃窗看了半個小時，說他看到了什麼，但我問他看到什麼，他說不知道怎麼說。"
  "傳言":
    zh-TW: "雨後聽到地下水聲？我聽過，那是神農街最奇怪的事。水道封閉了幾百年，但每逢大雨，你趴在某個位置的地面上，可以聽到下面有水流的聲音，不大，但確實存在。"
