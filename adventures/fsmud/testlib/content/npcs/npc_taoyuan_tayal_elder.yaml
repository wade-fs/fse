id: npc_taoyuan_tayal_elder
name:
  zh-TW: "瓦歷斯長老"
settlement: taoyuan
home_site: "taoyuan_jiaobanshan_villa"
role: "長老"
hint:
  zh-TW: "角板山泰雅族大社的世襲長老，精通角板山開山撫番與日治樟腦開採的衝突歷史。"
responses:
  "歷史":
    zh-TW: "桃園的歷史，是一面由大圳與古城牆抵禦強風，一面由桃園神社與眷村大合院寫成的開墾長卷。"
  "山海":
    zh-TW: "不論是角板山的古防空洞，還是大溪的巴洛克老街，都是我們桃園人在風浪中討生活的根。"
