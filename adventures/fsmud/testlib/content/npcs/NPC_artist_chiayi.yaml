id: NPC_artist_chiayi
name:
  zh-TW: "林阿祥（畫家）"
settlement: chiayi_city
home_site: art_museum
role: artist
hint:
  zh-TW: "穿著沾滿油彩的寬鬆棉麻衫，頭髮凌亂，眼鏡片厚重，說話緩慢而精確。"
responses:
  "繪畫":
    zh-TW: "嘉義為什麼是畫都？因為陳澄波。他用西洋技法畫台灣的山水和人物，畫的不是異國風情，是腳踩的土地。他死在二二八，那件事讓嘉義的畫都名字有了另一層意思。"
  "陳澄波":
    zh-TW: "（神情凝重）他是被帶到火車站前槍殺的，示眾，讓所有人看。那年他正在談判，試圖讓雙方停火。那件事後，嘉義的藝術圈沉默了好多年。"
  "傳言":
    zh-TW: "美術館那幅無名畫？我去看過，畫風跟陳澄波不一樣，但構圖和用光的方式……我不敢確定，但那幅畫讓我站在前面站了兩個小時。"
