id: NPC_old_woman_228_family
name:
  zh-TW: "二二八家屬老太太春梅"
settlement: chiayi_city
home_site: chiayi_city_temple
role: survivor
hint:
  zh-TW: "八十多歲的老婦人，穿著樸素，坐在廟前長凳上，手持念珠，說話聲音很輕，需要靠近才聽得清楚。"
responses:
  "城隍廟":
    zh-TW: "我每天都來，來了七十年了。我先生二二八那年走的，走之前說他去談判，會回來。他沒有回來，但我每天還是來，在廟裡等一等，然後回家。"
  "先生":
    zh-TW: "他叫林正雄，是嘉義的醫生，他說他能說得上話，能讓兩邊都聽他的。後來聽說他是其中一個被帶走的人，後來就沒有了。"
  "傳言":
    zh-TW: "（沉默）你說傳言。我說實話，我七十年沒有聽說過他的下落，也沒有收到任何通知。七十年，他應該在城隍爺那裡了，所以我每天來。"
