id: NPC_county_hall_guard
name:
  zh-TW: "舊縣廳門衛老伯"
settlement: chiayi_city
home_site: chiayi_county_hall_old
role: guard
hint:
  zh-TW: "在舊縣廳改建的文化機構擔任警衛，六十幾歲，對建築如數家珍，對訪客有問必答。"
responses:
  "縣廳":
    zh-TW: "清代的縣署在這個位置，日本人蓋廳舍，也在這個位置，國民政府接收，縣政府還在這個位置。這塊地的命運就是做官府用的。"
  "歷史":
    zh-TW: "諸羅縣那時候管的範圍很大，比現在的嘉義縣市加起來還大。你知道諸羅為什麼改叫嘉義？就是因為林爽文之役，城裡的人守住了，皇帝說你們很「義」，就改名了。"
  "傳言":
    zh-TW: "地板低了的那個房間？我知道，我帶你去看。但你不能挖，你只能看，那個坑在哪裡，我用走的方式讓你感覺，腳踩下去有點空洞感，就是那裡。"
