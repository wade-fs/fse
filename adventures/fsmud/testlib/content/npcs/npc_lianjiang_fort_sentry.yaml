id: npc_lianjiang_fort_sentry
name:
  zh-TW: "鐵堡哨兵"
settlement: lianjiang
home_site: "lianjiang_iron_fort"
role: "守衛"
hint:
  zh-TW: "駐守鐵堡多年的退伍老兵，懂得如何提防深夜海霧中摸哨的蛙人，精通暗哨部署。"
responses:
  "歷史":
    zh-TW: "連江的歷史，是一面由花崗岩坑道抵禦砲火，一面由天后宮媽祖衣冠塚香火寫成的戰地長卷。"
  "戰地":
    zh-TW: "不論是芹壁石屋的標語，還是北海地下水道，都是我們連江人在砲火與風浪中求生存的根。"
