id: NPC_chihkan_archivist
name:
  zh-TW: "赤崁樓文物研究員小玲"
settlement: tainan
home_site: tainan_chihkan_tower
role: scholar
hint:
  zh-TW: "三十多歲的研究員，戴著厚邊框眼鏡，在文物室整理檔案，說話精確到近乎挑剔。"
responses:
  "赤崁樓":
    zh-TW: "普羅民遮城和熱蘭遮城是一套系統，一個在商業區，一個在軍事要塞。赤崁這邊主要是行政功能，荷蘭人在這裡處理本島事務。"
  "石馬":
    zh-TW: "九隻石馬是清代的，不是荷蘭時代的。上面的碑文是清代台灣道的記錄。但你有沒有注意到，九隻石馬的姿勢不完全相同，有一隻的頭是轉向左邊的，其他都是向前。"
  "地下":
    zh-TW: "荷蘭地基的部分，從現有的建築分析，至少有兩米深是完整保存的。地基裡有沒有文書，我無法確認，但荷蘭人的習慣是把重要文件封在建築結構裡保存，這是有歷史記錄的。"
  "傳言":
    zh-TW: "石馬中那隻轉頭的，有民間傳說說它每年祭孔前夕會動一下，我當然不信，但我確認過那隻石馬的基座和其他的不一樣，感覺像是後來安放上去的。"
