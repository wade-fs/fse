id: NPC_kaohsiung_fishmarket_vendor
name:
  zh-TW: 高雄港口魚市攤主陳大頭
settlement: kaohsiung
home_site: kaohsiung_harbor
role: merchant
hint:
  zh-TW: 五十多歲的魚販，早上三點就在魚市叫賣，聲音大到隔兩條街都聽得見，但談起魚的事就變得很仔細，輕聲細語。
responses:
  魚:
    zh-TW: 我每天三點到碼頭，看哪條船進來，買哪個漁獲。你要問我哪種魚最好吃，我說看季節。春天的午仔魚，夏天的鰹魚，秋天的烏魚，冬天的白帶魚——季節對，什麼魚都是最好的；季節不對，再好的魚也差。
  捕魚:
    zh-TW: 高雄的漁業已經不像以前了。捕魚的區域越來越遠，成本越來越高，漁民越來越少。我的岳父是漁民，他說這一行的問題不是魚少，是海的問題——暖化、污染，魚的位置在移動，漁民的技術跟不上。
  港口:
    zh-TW: 港口是這個城市的心臟。你在這裡站一個下午，就能看見這個城市的呼吸——貨船進進出出，魚市的喊聲，渡輪的汽笛，修船廠的敲打聲，這些聲音合在一起，就是高雄。
