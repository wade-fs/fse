id: NPC_lukang_museum_guide
name:
  zh-TW: "民俗文物館導覽小美"
settlement: lukang
home_site: lukang_mazu_folk_arts_museum
role: guide
hint:
  zh-TW: "二十多歲的年輕女性，說話流暢、親切，對洋樓建築的細節和辜家的歷史十分熟悉。"
responses:
  "洋樓":
    zh-TW: "民俗文物館原名『大和洋樓』，是鹿港辜家的祖厝，一九一九年落成。它融合了巴洛克和閩南風格，是日治時期台灣最豪華的私人豪宅之一，也是鹿港近代化和家族崛起的象徵。"
  "文物":
    zh-TW: "館內收藏了大量鹿港的日常民俗用品，從新娘的轎子、精細的木雕嫁妝，到古老的織布機。你看這些東西，能感覺到當年鹿港人的生活品質是非常精緻的，不只是有錢，是有文化。"
  "皮箱":
    zh-TW: "地下室那只鎖著的皮箱？我們館方也知道，但因為那屬於辜家的私人遺物，我們沒有權力強行打開。但有傳言說，那是辜顯榮當年去台北代表迎接日本軍隊進城前，用來裝重要信件與約定文書的皮箱。"
  "傳言":
    zh-TW: "洋樓二樓的陽台，有遊客說在黃昏時曾看到一個穿著日式西裝的男士背影站在那裡看著老街方向，轉頭就不見了。我們都說那是老屋主的靈魂在看著他建立的家業。"
