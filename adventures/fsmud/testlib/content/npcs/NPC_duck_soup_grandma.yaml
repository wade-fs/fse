id: NPC_duck_soup_grandma
name:
  zh-TW: "鴨肉羹阿嬤"
settlement: singang
home_site: duck_soup_alley
role: vendor
hint:
  zh-TW: "矮小精壯的老婦人，手持大杓，站在滾著湯的大鍋旁，眼睛永遠盯著鍋裡的狀態。"
responses:
  "鴨肉羹":
    zh-TW: "我家的湯是笨港時代傳下來的，那時候新港還叫笨港。我阿嬤說，湯從沒有清空過，只是每天補料進去。你說這是真的嗎？我相信，因為這個湯就是和別家不一樣。"
  "笨港":
    zh-TW: "笨港就是舊新港，清朝時候的大港口，船從大陸來，停在笨港溪口。後來溪流改道，港口淤積，人就分成兩邊走。這邊是新港，那邊是北港。"
  "廟":
    zh-TW: "媽祖是從笨港時代就有的，但是後來分家了，北港供奉一尊，新港供奉一尊，兩邊都說自己才是正宗的媽祖。這件事我問了一輩子，答案我不說。"
  "傳言":
    zh-TW: "三十年老湯？這是真的，不是傳言。但老湯裡還有什麼，那才是秘密。我阿嬤說裡面有一塊她媽媽的骨灰，說這樣祖先就一直在湯裡護佑。我不確定，但我不敢清湯底。"
