id: NPC_qishan_temple_keeper
name:
  zh-TW: 旗山天后宮廟祝阿秀伯
settlement: kaohsiung
home_site: qishan
role: temple_keeper
hint:
  zh-TW: 七十多歲的老廟祝，負責打理旗山天后宮，對旗山的歷史和地方人物瞭若指掌，見過幾代旗山人。
responses:
  媽祖:
    zh-TW: 旗山的媽祖，是山城的媽祖，不是海邊的媽祖。山裡的人也拜媽祖，求的是農作物的收成，求的是山路平安，和海邊的人求的東西不一樣，但媽祖都管。
  旗山人:
    zh-TW: 旗山人有個特點，就是很戀鄉。出去的人，大部分最後都回來了。我見過幾代人這樣，出去，回來，或者是沒有回來，但孩子回來了。這個地方不知道有什麼，就是讓人割捨不了。
  廟前:
    zh-TW: 廟前的老榕樹，幾十年了，我小時候就在這棵樹下玩。以前旗山最熱鬧的地方是這個廟埕，現在人少了，但廟還是廟，香煙還是每天有，只是少了一些聲音。
