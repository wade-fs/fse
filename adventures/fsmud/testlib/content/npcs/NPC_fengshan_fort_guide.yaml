id: NPC_fengshan_fort_guide
name:
  zh-TW: 鳳山舊城文史導覽員阿明
settlement: kaohsiung
home_site: fengshan_fort
role: guide
hint:
  zh-TW: 四十多歲的地方文史導覽員，帶著一頂防曬帽，手拿一本自己彙整的鳳山歷史資料夾，說話條理分明，對於細節特別在意。
responses:
  鳳山縣:
    zh-TW: 鳳山縣是清代台灣最重要的縣份之一，轄區從現在的高雄一路延伸。縣城搬過兩次——最初在左營（舊城），林爽文事件之後搬到現在的鳳山（新城）。這兩個地方都有城牆遺跡，都值得去看。
  林爽文:
    zh-TW: 林爽文事件在鳳山打得很慘。義軍佔領了鳳山，清廷的守備幾乎全滅。後來平定了，鳳山縣城在這個位置重建，加固城牆，加設砲台，就是現在我們能看到的那些遺跡。
  澄瀾砲台:
    zh-TW: 城邊的砲台，是台灣保存最完整的清代砲台之一。你去看，砲孔的角度是朝著溪流方向設計的，那條溪就是進攻者最可能選擇的通道。設計的人懂軍事，你能感受到那個防禦邏輯。
