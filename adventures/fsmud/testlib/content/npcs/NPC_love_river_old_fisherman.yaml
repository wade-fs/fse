id: NPC_love_river_old_fisherman
name:
  zh-TW: 愛河老釣客阿添伯
settlement: kaohsiung
home_site: love_river
role: civilian
hint:
  zh-TW: 七十幾歲的老人，每天早上在愛河邊釣魚，雖然很少有收穫，但他說他不是來釣魚的，是來坐著的。
responses:
  愛河:
    zh-TW: 以前這條河又臭又黑，我爸說我不許來這裡。後來清理了，變漂亮了，我就開始來了。那時候我媽已經過世，我每次來這裡坐著，就想到她說我爸說不許我來，現在我每天來，不知道她看見了會說什麼。
  釣魚:
    zh-TW: 我不真的在釣魚。魚竿是道具，讓人覺得我有事在做，不然只是個老人在河邊坐著，看起來很奇怪。有了魚竿，人家覺得正常。我這樣已經做了十幾年了，沒有人問過我為什麼不釣到魚。
  高雄:
    zh-TW: 高雄的人不說高雄，說「港都」。港都的人，說話直，動作快，有什麼說什麼，不喜歡拐彎抹角。我也是這樣，但我年紀大了，有時候說話之前會想一想，這樣說對方聽了好不好。以前不管這個。
