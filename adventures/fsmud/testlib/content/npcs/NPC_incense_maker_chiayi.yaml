id: NPC_incense_maker_chiayi
name:
  zh-TW: "百年香舖第四代阿隆"
settlement: chiayi_city
home_site: incense_shop_chiayi
role: craftsman
hint:
  zh-TW: "三十多歲的年輕男人，身上有淡淡的沉香味，做事謹慎，對古老配方有一種近乎執著的尊重。"
responses:
  "香":
    zh-TW: "我家的香從清代傳下來，每種香的配方都有它的用途。廟裡驅邪用的和祭祖用的不一樣，祭典用的和日常薰房用的不一樣。香是和神明、祖先說話的語言。"
  "日本時代":
    zh-TW: "日本人說香是迷信，要取締。我曾祖父改口說是醫療防疫用品，改了包裝，繼續賣。台灣人在那個時代非常會說謊，但都是為了存活。"
  "傳言":
    zh-TW: "那種老委員問的香？我知道，那是一個叫『迴瀾』的配方，是清代用在大型祭典的，材料之一在戰後進不來了。我有一小包最後的存貨，不知道要怎麼處理。"
