id: NPC_lukang_bamboo_weaver
name:
  zh-TW: "古香舖老鄰居老王"
settlement: lukang
home_site: lukang_incense_garden
role: craftsman
hint:
  zh-TW: "七十多歲的老竹編匠，在香舖隔壁劈竹子，和製香的阿義師傅是幾十年的老朋友，經常互相調侃。"
responses:
  "竹編":
    zh-TW: "我劈竹子劈了五十年，手上的繭厚到針都扎不進去。施師傅雕木頭，阿義製香，我編竹籃，我們這條街以前叫匠人街，每個人都有看家手藝。現在只剩我們幾個老骨頭了。"
  "香架":
    zh-TW: "阿義曬香用的竹架，全是我編的。竹架要輕，但要穩，不能有刺，否則會刮傷還沒乾的香。這需要用三年以上的孟宗竹，劈成薄片，編織成網。這是一門不起眼但很重要的手藝。"
  "西拉雅":
    zh-TW: "西拉雅？（大笑）阿義做那種香，說是要復原什麼儀式，我說他是想太多。但我們手藝人就是這樣，有一種奇怪的執著，明知道賺不了錢，但就是想把它做出來，不做出來，晚上睡不著。"
  "傳言":
    zh-TW: "聽說以前香舖的院子裡有一隻會聞香的貓，哪種沉香粉最純，牠就躺在哪個香架下面睡覺。阿義的爸爸那一代有這隻貓，貓死了以後，阿義的香就少了一點味道，哈哈，這是我笑他的。"
