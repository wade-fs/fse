id: NPC_pharmacist_minxiong
name:
  zh-TW: "藥舖老闆仁德"
  en: "Pharmacist Jen-Te"
hint:
  zh-TW: "穿著對襟褂子、坐在一排藥格後方的老人，鼻樑上掛著老花眼鏡，手上翻著一本厚厚的藥典。"
  en: "An elderly man in a traditional Chinese jacket, sitting behind rows of medicine drawers, reading glasses on his nose, thumbing through a thick pharmacopoeia."
settlement: minxiong
home_site: pharmacy
responses:
  "藥":
    zh-TW: "要買藥先說症狀。我不給人看藥名抓藥，那是西醫的做法。你說哪裡不舒服，我再說用什麼。"
    en: "Tell me your symptoms first before buying medicine. I don't dispense by name alone — that's the Western medicine way. Tell me where it hurts, then I'll tell you what to use."
  "傷寒":
    zh-TW: "民雄這邊以前傷寒很嚴重，日本人來了才改善了水道。那時候我阿公說，一個夏天就死了三戶人家的小孩，都是水出問題。"
    en: "Typhoid fever was serious here in Minxiong before. The Japanese improved the waterways when they came. My grandfather said one summer, three families lost children — all from contaminated water."
  "中藥":
    zh-TW: "中藥補身子，西藥治急症，我兩樣都備。但你年輕人現在都跑去嘉義看西醫，我這裡的老藥方快要失傳了。"
    en: "Chinese medicine nourishes the body, Western medicine treats emergencies — I stock both. But you young people all run to Chiayi for Western medicine. My old prescriptions are nearly lost."
  "鬼屋":
    zh-TW: "劉家的人我記得，劉老爺以前常來抓補藥。後來戰爭，全家人就不見了，沒有再來過。那棟房子，是有人的故事，不是鬼的故事。"
    en: "I remember the Liu family. Old Master Liu used to come for tonics. Then the war, and the whole family vanished — never came back. That house has a human story, not a ghost story."
  "傳言":
    zh-TW: "最近有人說水井裡的水變色了，帶點紅。我去看，其實是鐵鏽，老水管的問題。但謠言已經傳開了，說是鬼在哭。"
    en: "Recently people say the well water has turned reddish. I went to look — it's rust from old pipes. But the rumor has spread: they say it's a ghost crying."
