id: npc_tainan_matou_worshipper
name:
  zh-TW: "陳老信徒"
settlement: tainan
home_site: "tainan_matou_pond"
role: "市民"
hint:
  zh-TW: "麻豆代天府的老信眾，對五府千歲神靈保佑麻豆地區免受水患侵害的典故瞭若指掌。"
responses:
  "歷史":
    zh-TW: "府城的歷史，是一面由紅磚古城牆抵禦海風，一面由各大古廟的裊裊香煙寫成的山海長卷。"
  "文化":
    zh-TW: "不論是迎王大典的火光，還是孔廟的明倫堂，都是我們台南先民在海浪中討生活的根。"
