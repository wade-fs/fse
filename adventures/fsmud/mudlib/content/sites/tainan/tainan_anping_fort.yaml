id: tainan_anping_fort
settlement: tainan
canonical_name: 安平古堡
is_heritage: true
hidden: true
base_description: |
  荷蘭人在台江內海的沙洲上建起這座稜堡，磚石堆砌的城牆在台灣的潮濕氣候中
  染上了綠苔。站在塔頂俯瞰，可以看到台江的輪廓和遠處海面的船影。
  這裡是荷蘭殖民的起點，也是鄭成功收復台灣的終點之一，
  每一塊磚都見過不同旗幟的升落。
travel_arrive_text: "你爬上安平古堡的城牆，海風直接撲面，眼下是台南的城市輪廓，遠處是台灣海峽的藍灰色。"

names:
  - era: dutch
    name: 熱蘭遮城（Fort Zeelandia）
  - era: koxinga
    name: 安平城
  - era: qing
    name: 安平小砲台
  - era: japanese
    name: 安平古堡
  - era: modern
    name: 安平古堡（世界遺產候選）

rumors:
  - "荷蘭人在城堡地下建有密道，通向台江內海的停泊處。鄭成功佔領後封閉了密道入口，但入口在哪裡，清代就沒有人知道了。"
  - "城牆某個角落的磚頭上有荷蘭文縮寫，是VOC的標誌，但同一塊磚上面還有漢字刻的一個「義」字，是誰刻的，沒有人考證過。"
connections:
  - tainan_anping
  - tainan_chihkan_tower
  - anping_harbor
