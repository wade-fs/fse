id: tainan_fish_market
settlement: tainan
canonical_name: 台南魚市場（下港魚寮）
is_heritage: false
base_description: |
  清晨四點，魚市場的叫賣聲把整個港口區的空氣劃開。
  漁船靠港，魚貨卸下，拍賣以最快的速度進行。
  虱目魚、吳郭魚、烏魚子，是台南漁業最有代表性的品項。
  魚市場的節奏是台南最快的，比任何地方都要快。
travel_arrive_text: "你在清晨走進魚市場，空氣裡有魚腥和海鹽，人聲比你想像的吵，速度比你想像的快。"

names:
  - era: qing
    name: 台江魚市
  - era: japanese
    name: 台南魚市場
  - era: modern
    name: 台南魚市場（下港魚寮）

rumors:
  - "烏魚子在台南是高級食材，老漁民說，最好的烏魚子要在烏魚剛過台灣海峽的那幾天採，那幾天的魚卵最飽滿，但那幾天的海況最難捉摸，每年都是賭。"
connections:
