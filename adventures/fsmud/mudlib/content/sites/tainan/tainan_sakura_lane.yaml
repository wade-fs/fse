id: tainan_sakura_lane
settlement: tainan
canonical_name: 台南神農街文創巷弄
is_heritage: false
base_description: |
  老厝改建的選物店、咖啡廳、工作坊擠在窄巷裡，
  每家店的風格各不相同，但都有一個共同點：
  店面的磚牆是真實的老磚，不是仿製品，
  那些磚燒於清代，已經有一兩百年的歷史。
travel_arrive_text: "你走進文創巷弄，發現每家店的牆壁都有歲月的痕跡，那些痕跡是無法複製的質感。"

names:
  - era: qing
    name: 五條港雜貨街
  - era: japanese
    name: 神農街小商鋪
  - era: modern
    name: 神農街文創巷弄

rumors:
  - "某家選物店的地板下有一口乾涸的古井，老闆說他裝修時發現的，沒有填掉，在地板上開了一個小玻璃窗，讓人看得到，偶爾有客人蹲下去看，看到自己的臉。"
connections:
  - tainan_shennong_street
