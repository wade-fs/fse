id: tainan_hayashi_dept
settlement: tainan
canonical_name: 林百貨（五層樓仔）
is_heritage: true
hidden: true
base_description: |
  日治時代台南最繁榮的百貨公司，被稱為「五層樓仔」，
  開幕時引起全台南轟動，是第一個有電梯的建築。
  戰後長期廢棄，頂樓的神社遺跡一直留著，直到近年修復才開放。
  修復後的一樓依然是百貨，但頂樓神社位置設了一個觀景台，
  讓人站在荷蘭、漢人、日本人都曾踩過的視角，俯瞰台南。
travel_arrive_text: "你走進林百貨，一樓是精品，但你在意的是頂樓，那裡有一個更舊的故事。"

names:
  - era: japanese
    name: 林百貨（末廣町）
  - era: postwar
    name: 空軍廳舍
  - era: modern
    name: 林百貨（修復開放）

rumors:
  - "林百貨的電梯是台灣第一台，老台南人說那台電梯開動的聲音，是他們童年記憶裡台南最現代的聲音。"
connections:
  - tainan_old_street
  - tainan_old_market
