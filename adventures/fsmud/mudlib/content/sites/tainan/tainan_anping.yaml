id: tainan_anping
settlement: tainan
canonical_name: 安平老街
is_heritage: true
base_description: |
  熱氣蒸騰的安平老街保留了幾排日治時代的洋樓立面，
  一樓開著蝦餅店、古厝民宿、鹹魚攤。
  老街的盡頭是台江內海的舊岸線，已經被填海造陸推向遠方，
  但老屋門口的石階高度，還是當年面對海平面設計的高度。
travel_arrive_text: "你走進安平老街，蝦餅的焦香從幾家店同時飄出來，撲向每一個路過的人。"

names:
  - era: dutch
    name: 大員市鎮（Tayouan）
  - era: koxinga
    name: 安平鎮
  - era: qing
    name: 安平港街
  - era: japanese
    name: 安平老街（町家建築）
  - era: modern
    name: 安平老街

rumors:
  - "安平老街有一棟屋子，牆壁上的榕樹氣根把整棟房子包起來了，屋主幾十年前搬走了，樹還留著，現在叫「榕樹屋」，但樹比房子更早在這裡。"
  - "老街最深處的一個小廟，供奉的神明外地人看不懂，廟公說那是「延平王」，但廟的規格和氣場，比一般延平王廟大很多。"
connections:
  - tainan_anping_fort
  - tainan_xilaya
  - anping_harbor
