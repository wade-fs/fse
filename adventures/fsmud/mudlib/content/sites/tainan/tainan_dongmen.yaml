id: tainan_dongmen
settlement: tainan
canonical_name: 台南東門城（迎春門）
is_heritage: true
base_description: |
  清代台南府城的東門，是進入府城的主要通道之一。
  城牆早已拆除，只剩城門孤立在圓環中央，
  四條車道的車流繞著它轉，像是對一個歷史遺跡的無意識致敬。
  城門的磚縫裡長著幾叢野草，年年割了又長。
travel_arrive_text: "你站在圓環中央的城門旁，四面都是車流，城門一臉淡然，像是早就習慣了這種嘈雜。"

names:
  - era: qing
    name: 台灣府城東門（迎春門）
  - era: japanese
    name: 台南城門（殘存）
  - era: modern
    name: 台南東門城（迎春門）

rumors:
  - "城門正面的某塊磚有一個小洞，說是清代守城兵丁無聊時鑿的，鑿出一個鳥巢，洞還在，鳥每年都來。"
connections:
  - tainan_old_street
  - tainan_confucian_temple
