id: tainan_grand_mazu_temple
settlement: tainan
canonical_name: 台南大天后宮（鄭成功帶來的媽祖）
is_heritage: true
base_description: |
  清代康熙年間，寧靖王朱術桂的府邸改建成媽祖廟，成為全台最早的官建媽祖廟。
  廟裡有一尊傳說是鄭成功從福建帶來的古媽祖，神像的漆已脫落重漆了不知多少次，
  但骨架是清初的木頭，幾百年來沒有換過。
travel_arrive_text: "你走進大天后宮，廟的規格比你預期的大，正殿的金色讓人瞇起眼睛。"

names:
  - era: koxinga
    name: 寧靖王府
  - era: qing
    name: 台灣府天后宮
  - era: japanese
    name: 大天后宮
  - era: modern
    name: 台南大天后宮

rumors:
  - "廟裡那尊古媽祖的手指有一根是後來補上去的，老廟公說那根手指是鄭成功出海前折斷的，後來用另一塊木頭補上，補得太好，現在看不出來是哪根。"
connections:
  - tainan_chihkan_tower
  - tainan_old_street
