id: anping_harbor
settlement: tainan
canonical_name: 安平港（台江內海遺址）
is_heritage: true
base_description: |
  台江內海在清代大規模淤積，原本可以停泊大型帆船的海灣
  逐漸變成陸地。現在的安平港是疏浚後的人工水道，
  幾艘漁船靠在岸邊，海的氣味還在，但那個曾經讓荷蘭船隊停泊的海灣，
  已經是路上行人踩著的土地了。
travel_arrive_text: "你站在安平港邊，看著這條窄窄的水道，試著想像幾百年前這裡的水面廣度。"

names:
  - era: dutch
    name: 台江內海大員港
  - era: koxinga
    name: 安平水道
  - era: qing
    name: 台江淤積渡口
  - era: modern
    name: 安平漁港

rumors:
  - "台江內海淤積的速度讓清代官員措手不及，有記錄說某年颱風過後，整條水道一夕之間被泥沙填平了三分之一，漁民說那是媽祖在收回她的地盤。"
connections:
  - tainan_anping
  - tainan_anping_fort
