id: tainan_xilaya
settlement: tainan
canonical_name: 西拉雅新港社遺址（台南）
is_heritage: true
base_description: |
  這片平緩的平原草澤在荷蘭時代是西拉雅族新市仔社（Sinkan）的領域。
  檳榔樹與竹林交錯在高腳屋的聚落四周，梅花鹿群在草澤間奔跑。
  荷蘭人在這裡建立了第一個傳教站，帶來文字，也帶來了改變這片土地的力量。
  幾百年後，草澤消失，農田取而代之，但土地公廟的某個神龕裡，
  還放著一個西拉雅族的阿立祖。
travel_arrive_text: "你踏進這片歷史重疊的土地，草澤早已變成農田，但空氣裡還有一種說不清楚的古老氣息。"

names:
  - era: dutch
    name: 新市仔社（Sinkan）
  - era: koxinga
    name: 西拉雅農耕地
  - era: qing
    name: 台南新市仔
  - era: modern
    name: 台南新市區

rumors:
  - "土地公廟的阿立祖神龕是西拉雅後裔的阿嬤放在那裡的，說是讓兩個神明做鄰居，互相照顧，比較不孤單。"
