rumors:
- 聽說曾文溪舊渡頭閘門地底下藏有清代反清復明起義軍留下的舊鐵刀。
- 有人傳言，在起大霧的深夜，曾文溪舊渡頭閘門周邊能看見挑夫挑扁擔無聲走過的幻影。
