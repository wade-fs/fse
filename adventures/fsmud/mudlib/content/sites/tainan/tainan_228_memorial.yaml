id: tainan_228_memorial
settlement: tainan
canonical_name: 台南二二八紀念館
is_heritage: true
hidden: true
base_description: |
  台南的二二八事件規模不如嘉義或台北，但台南有自己的傷痕。
  紀念館的文物陳列裡，有幾張手寫的信，是被捕者在獄中寫給家人的，
  字跡在幾十年後依然清晰，像是寫完就放在那裡，等著被看到。
travel_arrive_text: "你走進紀念館，館內的燈光調得比戶外暗一些，讓那些文物顯得更清晰，也讓你看得更仔細。"

names:
  - era: qing
    name: 府城舊公所
  - era: postwar
    name: 台南事件記憶場所
  - era: modern
    name: 台南二二八紀念館

rumors:
  - "紀念館的一封信，收件人名字是真實的，地址也是台南的地址。有研究者去找那個地址，現在是一棟公寓，住戶不知道這件事。"
