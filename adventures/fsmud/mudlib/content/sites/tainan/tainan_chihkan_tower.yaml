id: tainan_chihkan_tower
settlement: tainan
canonical_name: 赤崁樓
is_heritage: true
base_description: |
  荷蘭東印度公司建的普羅民遮城廢墟上，清代蓋了海神廟和文昌閣。
  院子裡排著九隻石馬，承載著台灣史上最有名的碑文之一。
  赤崁樓是台灣歷史的交叉口：荷蘭的城牆、漢人的廟宇、
  日本時代的修整，全都疊加在同一片土地上。
travel_arrive_text: "你走進赤崁樓，幾百年的歷史層疊在這個空間裡，讓人一時不知道站的是哪個時代。"

names:
  - era: dutch
    name: 普羅民遮城（Fort Provintia）
  - era: koxinga
    name: 赤崁樓
  - era: qing
    name: 赤崁樓
  - era: japanese
    name: 赤嵌樓（整修）
  - era: modern
    name: 赤崁樓

rumors:
  - "赤崁樓的地基是荷蘭人建的，清代在上面蓋廟，但荷蘭地基的某個部分從來沒有被完全挖開，台南人說裡面有荷蘭人埋的文書。"
  - "院子裡的九隻石馬，據說其中一隻是後來補上去的，和其他八隻的石材不同，仔細看可以看出顏色差異。"
connections:
  - tainan_confucian_temple
  - tainan_anping_fort
  - tainan_grand_mazu_temple
