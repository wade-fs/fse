id: five_concubines_temple
settlement: tainan
canonical_name: 五妃廟（寧靖王的五位侍妾）
is_heritage: true
hidden: true
base_description: |
  台灣唯一供奉寧靖王五位侍妾的廟，她們在鄭成功撤出台灣前殉節而死。
  廟的規模不大，但香火不斷，信眾說她們的靈性比大廟的神還靈，
  或許是因為她們沒有選擇，只能把留下來的心意凝聚在這個地方。
travel_arrive_text: "你走進五妃廟，意外地安靜，廟很小，五座神龕整齊排列，每座前面都有一朵新鮮的花。"

names:
  - era: koxinga
    name: 五妃殉節之所
  - era: qing
    name: 五妃廟
  - era: modern
    name: 台南五妃廟（古蹟）

rumors:
  - "廟公說，五妃廟每年農曆某天，五座神龕的燭火會同時搖動三次，沒有風，但就是動，他在這裡守廟三十年，每年都看到，也不知道為什麼。"
connections:
  - tainan_confucian_temple
  - wu_fei_temple
