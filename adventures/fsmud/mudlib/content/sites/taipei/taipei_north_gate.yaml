base_description: 台北府城唯一保留原貌的城門，清代閩南式建築風格，承恩門之名意指「感承皇恩」，是台北建城的歷史見證。
travel_arrive_text: 清代式樣的城門在現代高架橋與車流之間矗立，灰色石磚上刻著歲月的痕跡，顯得格外滄桑。
