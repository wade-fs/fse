id: dadaocheng_xiahai_temple
settlement: taipei
canonical_name: 大稻埕霞海城隍廟
is_heritage: true
base_description: 台北香火最鼎盛的廟宇之一，主祀城隍爺，也是媒人廟，每逢月老祈願求姻緣，香客絡繹不絕。
travel_arrive_text: 你走入廟門，煙霧瀰漫，紅燭搖曳，信徒們在月老前虔誠祈求一段好姻緣。
names:
- era: japanese
  name: 大稻埕城隍廟
- era: modern
  name: 霞海城隍廟
connections:
- taipei_dadaocheng
rumors:
- 聽說城隍廟的月老紅線非常靈驗，但如果拿了超過一條，反而會招來複雜的爛桃花。
