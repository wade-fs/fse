base_description: 台北最具歷史的廟宇之一，建於1738年，主祀觀世音菩薩，香火鼎盛，雕刻精美，是艋舺信仰的核心。
travel_arrive_text: 龍山寺廟埕香煙繚繞，手持線香的善男信女們跪拜參禱，神韻莊嚴而令人動容。
