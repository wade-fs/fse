id: dadaocheng_tea_house
settlement: taipei
canonical_name: 大稻埕茶行洋樓
is_heritage: true
base_description: 維多利亞風格的磚造洋樓，曾是外國茶商進行福爾摩沙茶交易的地方，見證了台灣茶葉的黃金時代。
travel_arrive_text: 你推開重重的木門，一股烏龍茶與包種茶的清香撲鼻而來，吧台後方擺滿了各式茶罐。
