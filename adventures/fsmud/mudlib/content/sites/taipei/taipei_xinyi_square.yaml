base_description: 台北市政府前的寬闊廣場，重要節慶與跨年煙火在此舉行，是台北最具代表性的公共空間之一。
travel_arrive_text: 廣場上市民悠閒地散步，孩子在噴泉旁嬉戲，每到跨年夜這裡便聚集百萬人潮歡慶新年。
