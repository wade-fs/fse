base_description: 緊鄰基隆河畔的觀光夜市，有數百個攤位，以胡椒餅、藥燉排骨等傳統小吃聞名全台。
travel_arrive_text: 入口的城隍廟前香煙裊裊，夜市內人聲鼎沸，各攤的香氣四溢，在攤販的叫賣聲中挑選著心儀的小吃。
