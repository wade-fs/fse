base_description: 以中國宮殿式建築為外觀的著名飯店，外觀金碧輝煌，坐落在圓山上俯瞰全台北，是台灣的標誌性建築之一。
travel_arrive_text: 飯店的朱紅色廊柱與琉璃黃瓦在陽光下耀眼奪目，大廳內的華麗陳設讓人感受到復古的皇家氣派。
