base_description: 建於1913年的日式公共浴場，磚紅外牆與白色廊柱交織出典雅的英日式建築風格，現為溫泉文化的重要展館。
travel_arrive_text: 博物館的溫泉大浴池已乾涸，但木質走廊與彩色玻璃窗仍保留完好，讓你想像百年前的泡湯盛況。
