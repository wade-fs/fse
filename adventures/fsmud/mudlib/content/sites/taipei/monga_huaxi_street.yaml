base_description: 以蛇肉料理起家的老牌觀光夜市，騎樓下擺著一籠籠蛇，昔日充滿江湖氣息，如今已轉型為觀光景點。
travel_arrive_text: 夜市入口的霓虹燈閃爍，各式小吃攤傳來誘人的油炸香氣，熱鬧的叫賣聲此起彼落。
