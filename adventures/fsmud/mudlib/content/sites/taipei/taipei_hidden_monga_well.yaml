base_description: 藏在艋舺老街角落中的清代古井，相傳為早期平埔族人所鑿，至今仍有水，地方老人稱其為「番仔井」。
travel_arrive_text: 你在老巷弄中發現一口被灌木叢遮蔽的古井，井緣的石頭已磨得圓潤，俯身往下看，黑暗深處倒映著你的臉。
