canonical_name: 白沙灣海灘
base_description: 由純淨貝殼砂組成的月牙形美麗白沙灘，兩旁椰林隨海風搖曳，海潮平緩，是恆春先民捕魚要津。
names:
- era: "v0.1"
  name: 舊日治白沙灣海灘
- era: "v1.2"
  name: 屏東白沙灣海灘
- era: "modern"
  name: 白沙灣海灘
connections:
- hengchun
rumors:
- 聽說白沙灣海灘在起大風的夜晚，玄武岩或石板縫裡會傳出隆隆雷鳴般的低吟。
- 有人傳言，在白沙灣海灘遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用指南針。
