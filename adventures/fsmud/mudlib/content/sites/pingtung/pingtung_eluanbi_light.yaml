canonical_name: 鵝鑾鼻武裝燈塔
base_description: 清末為防禦外來船隻與原住民衝突而建的武裝燈塔，四周設有槍眼與壕溝圍牆，矗立於珊瑚礁海岬之上。
names:
- era: "v0.1"
