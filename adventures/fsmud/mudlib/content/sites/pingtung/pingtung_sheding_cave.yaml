id: pingtung_sheding_cave
settlement: pingtung
canonical_name: 社頂珊瑚礁峽谷
base_description: 隱密在熱帶雨林中的珊瑚礁裂谷，兩旁巨石對峙，常有山霧繚繞，是昔日排灣族人避難的幽谷。
names:
