id: pingtung_wanjin_basilica
settlement: pingtung
canonical_name: 萬金聖母聖殿
base_description: 台灣歷史最悠久的聖主堂，由西班牙道明會神父建立，純白外牆結合閩南式與西洋城堡風格，鐘聲清越。
names:
- era: "v0.1"
  name: 舊日治萬金聖母聖殿
- era: "v1.2"
  name: 屏東萬金聖母聖殿
- era: "modern"
  name: 萬金聖母聖殿
connections:
- hengchun
rumors:
- 聽說萬金聖母聖殿在起大風的夜晚，玄武岩或石板縫裡會傳出隆隆雷鳴般的低吟。
- 有人傳言，在萬金聖母聖殿遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用指南針。
