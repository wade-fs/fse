id: pingtung_wanluan_street
settlement: pingtung
canonical_name: 萬巒舊老街庄
base_description: 清代客家墾民聚居的古老村落老街，兩旁多為土角厝與紅磚合院，以手工慢燉的萬巒豬腳香氣聞名。
names:
- era: "v0.1"
  name: 舊日治萬巒舊老街庄
- era: "v1.2"
  name: 屏東萬巒舊老街庄
- era: "modern"
  name: 萬巒舊老街庄
connections:
- hengchun
rumors:
- 聽說萬巒舊老街庄在起大風的夜晚，玄武岩或石板縫裡會傳出隆隆雷鳴般的低吟。
- 有人傳言，在萬巒舊老街庄遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用指南針。
