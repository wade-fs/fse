rumors:
- 有人傳言，五孔洞深處暗道在深夜飛魚季期間，能聽到祖靈用達悟族古語傳授捕魚禁忌的虛幻耳語。
- 老船長說，大船下水祭典時拋擲新船的沙地下，曾出土過清代外來商船遺落的黃銅望遠鏡機件。
