base_description: 1874年日本遠征軍以保護琉球漁民為藉口登陸的地點。沙灘開闊，海浪拍打著礁石。當年日軍在此紮營，準備深入山林進攻排灣族部落。
travel_arrive_text: 你站在寬闊的沙灘上，海風強勁，遠處可見日軍當年設立臨時港口的軍事防波堤殘跡。
