base_description: 兩側高山夾峙的險要峽谷，中間僅有一條溪流穿過，是防守的天然屏障。1874年，排灣族戰士在此伏擊日軍，爆發了慘烈的石門之役。
travel_arrive_text: 你站在巍峨的石門峽谷口，兩側峭壁如削，溪水在谷底奔流，隱約能感受到當年的肅殺氣氛。
