base_description: 位於恆春半島西北側的古老港口，是官船與商船往來的重要靠泊點。清廷欽差大臣沈葆楨奉命來台查辦防務時，便是在此港口上岸登陸。
travel_arrive_text: 你來到射寮港碼頭，幾艘小漁船在波浪中搖晃，岸邊立著古老的石碑。
