rumors:
- 聽說瑞里紫藤古徑的樟腦灶遺址地底下，還埋有二戰時期日軍撤退時藏匿的樟腦油鐵桶。
- 太興庄的村民傳言，在雲潭瀑布的深潭底部，藏有一塊清代械鬥時遺失的太興庄安庄石碑。
