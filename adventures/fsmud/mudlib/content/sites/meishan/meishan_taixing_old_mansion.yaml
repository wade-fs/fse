rumors:
- 太興庄的村民傳言，在雲潭瀑布的深潭底部，藏有一塊清代械鬥時遺失的太興庄安庄石碑。
- 有人傳言，梅山公園最古老的那株梅樹在深夜梅花盛開時，會散發出淡淡的白色微光。
