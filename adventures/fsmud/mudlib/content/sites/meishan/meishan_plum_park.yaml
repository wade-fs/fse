rumors:
- 有人傳言，梅山玉虛宮地底的古碑室裡，刻有玄天上帝親筆所降的避邪避瘟神符圖案。
- 碧湖山的茶農說，在大霧封山的清晨，茶園梯田的深處能隱隱聽到昔日山胞採茶的虛幻歌聲。
