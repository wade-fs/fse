rumors:
- 有人傳言，梅山公園最古老的那株梅樹在深夜梅花盛開時，會散發出淡淡的白色微光。
- 聽說太平汗路古道中段的古榕樹下，埋有清代挑夫路過時遺落的銅錢罐。
