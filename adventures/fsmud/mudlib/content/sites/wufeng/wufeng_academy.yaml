id: wufeng_academy
settlement: wufeng
canonical_name: 萊園私塾
is_heritage: true
base_description: 林家大宅旁的私人花園與私塾。園中步移景異，小橋流水，曾是中部文人志士聚會、吟詩作對以及暗中討論台灣自主命運的文教聖地。
travel_arrive_text: 你漫步在清幽的萊園中，水榭歌台倒映在池水中，傳出低沉的書聲。
names:
- era: qing
  name: 林氏萊園
- era: japanese
  name: 萊園中學私塾
- era: modern
  name: 霧峰林家花園（萊園）
connections:
- wufeng_lin_mansion

rumors:
- 聽說五桂樓的夾層裡，藏有梁啟超當年手書但未公開的建言書。
- 有人在光復新村的防空壕深處，聽到了二戰時期防空警報的幻音。
