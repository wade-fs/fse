id: wufeng_lin_mansion
settlement: wufeng
canonical_name: 霧峰林家宅邸
is_heritage: true
base_description: 台灣最具影響力的地方豪族之一——霧峰林家的宅邸。建築群規模宏大，融閩南、洋式與唐式風格於一體，大花廳戲台雕工精絕，代表了地方豪族的財富與權力。
travel_arrive_text: 你來到宏偉的霧峰林家大宅前，高聳的燕尾脊與精緻的木雕令人驚嘆。
names:
- era: qing
  name: 阿草埔林家大厝
- era: japanese
  name: 霧峰林本源邸
- era: modern
  name: 霧峰林家宮保第園區
connections:
- wufeng_academy

rumors:
- 聽說五桂樓的夾層裡，藏有梁啟超當年手書但未公開的建言書。
- 有人在光復新村的防空壕深處，聽到了二戰時期防空警報的幻音。
