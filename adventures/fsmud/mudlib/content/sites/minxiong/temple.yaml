id: dashiye_temple
settlement: minxiong
canonical_name: 大士爺廟
is_heritage: false
base_description: |
  古老的廟宇石柱上雕刻著斑駁的神話神獸，香火的煙霧裊裊上升。
  信眾們在神前虔誠地投擲筊杯，祈求平安與豐收。
travel_arrive_text: "你走進大士爺廟的廟埕，空氣中瀰漫著濃郁的檀香與紙錢的微香。"

names:
  - era: qing
    name: 打貓大士爺廟
  - era: japanese
    name: 大士爺廟
  - era: modern
    name: 大士爺廟

connections:
  - minxiong_old_station
  - minxiong_market
  - waterway

reveal_layers:
  # 廟祝阿榮伯常駐廟埕（任何人都看得到）
  - condition: all
    checks: []
    text: "廟祝阿榮伯在廟埕一角來回打掃，偶爾抬頭望向正殿方向，眉頭深鎖。"
    npc: "temple_keeper"

  # 接了廟委委託且組隊，才看得到的秘境線索
  - condition: all
    checks:
      - type: has_quest
        quest_id: temple_exorcism
        status: active
      - type: in_party
    text: "$HIY$【線索顯現】你與隊友們互換了個眼神，都察覺供桌下方有塊石磚輕微鬆動，縫隙中透出一絲陰冷、詭異的青光。\n（輸入：enter 地下陣法，即可進入秘境。）$NOR$"

