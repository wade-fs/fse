id: school
settlement: minxiong
canonical_name: 民雄國小
is_heritage: false
base_description: |
  白色的校舍建築保留著日治時代的拱廊格局，
  迴廊下的水泥柱斑駁卻端正。
  操場邊的老榕樹是幾十年前種的，根系已蔓延到牆腳。
  下課的鈴聲會在整個老街迴響，是民雄不變的時鐘。
travel_arrive_text: "你走進校門，一陣粉筆灰的氣味迎面而來，混著今天午飯剩下的菜香。"

names:
  - era: qing
    name: 打貓義塾
  - era: japanese
    name: 打貓公學校
  - era: postwar
    name: 民雄國民學校
  - era: modern
    name: 民雄國小

rumors:
  - "孩子們說學校廁所後牆有地下的聲音，老師德仔先說是水管，但也有人說那是當年義塾私藏漢文書的地窖。"

