id: old_street
settlement: minxiong
canonical_name: 民雄老街
is_heritage: true
base_description: |
  石板路在晨光下反著光，兩側的木造店鋪緊緊相依，
  簷廊下掛著褪色的招牌——米店、藥鋪、布匹行。
  幾隻狗懶散地躺在騎樓陰影中，偶有腳踏車鈴聲劃過靜謐。
  這條街走過了打貓的繁榮、日本人的改造、戰後的蕭條，
  仍舊是民雄人日常生活的脊梁。
travel_arrive_text: "你踏上老街的石板路，歲月的紋路就刻在每一塊磚縫之間。"

names:
  - era: qing
    name: 打貓街
  - era: japanese
    name: 民雄庄老街
  - era: postwar
    name: 中正路老街
  - era: modern
    name: 民雄老街

rumors:
  - "據說老街某一棟店面的地磚下，埋著日治時代的一批銀元，藏的人已不在，埋的位置只剩一張沒有文字的地圖。"
  - "更夫阿旺說，每逢農曆初一十五，老街盡頭會多出一間沒有招牌的店鋪，天亮就消失，他打更三十年，看過五次。"

