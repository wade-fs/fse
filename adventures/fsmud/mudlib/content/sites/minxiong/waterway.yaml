id: waterway
settlement: minxiong
canonical_name: 灌溉水圳
is_heritage: false
base_description: |
  一條石砌的水圳沿著田埂蜿蜒，水流清澈而安靜。
  圳壁上的青苔生長了幾十年，偶爾有蜻蜓停在水草上。
  農忙時節，水圳的分水閘開了又關，整個平原靠它呼吸。
travel_arrive_text: "你走到水圳邊，流水聲讓這片土地顯得比剛才更活了。"

