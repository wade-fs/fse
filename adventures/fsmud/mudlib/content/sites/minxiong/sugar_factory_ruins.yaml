id: sugar_factory_ruins
settlement: minxiong
canonical_name: 民雄糖廠遺址
is_heritage: true
base_description: |
  一根斷裂的磚砌煙囪孤立在荒草之中，煙囪頂端長出了一棵榕樹。
  廠房的屋頂早已塌落，留下鏽蝕的鋼骨骨架，像是一具巨大的肋骨。
  地面上可以看到昔日糖鐵軌道的嵌痕，雜草在鐵軌縫隙間頑強生長。
  空氣中帶著一絲甜膩的腐朽氣味，是歷史留下的味道。
travel_arrive_text: "你走進廢墟，腳步踩過碎磚，每一聲脆響都彷彿在驚動什麼沉睡的東西。"

names:
  - era: qing
    name: 打貓糖廍
  - era: japanese
    name: 打貓製糖所
  - era: postwar
    name: 民雄糖廠
  - era: modern
    name: 民雄糖廠遺址

rumors:
  - "老工人阿水說，糖廠的地下室現在封著，但他聽到過從底下傳來的機器聲，像是有什麼東西還在運轉。"
  - "最近有人夜裡看到廢墟燈光，說有人拿著手電筒在那裡挖地，天亮前就消失了。"

connections:
  - outskirts
  - sugarcane_field
  - railway_side
