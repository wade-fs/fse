id: singang_farmhouse
settlement: singang
canonical_name: 笨港農家
is_heritage: false
base_description: |
  一棟三合院格局的磚造農家，正身和護龍圍成一個半開放的院落。
  院子裡曬著一捆稻草，牆角放著農具。
  老人坐在屋簷下的竹椅上，看著院子外的稻田，
  偶爾和路過的鄰居打個招呼，聲音不大，但每個字都聽得清楚。
  這是笨港平原最典型的農村生活場景，幾百年沒有大變過。
travel_arrive_text: "你走進農家的三合院，院子裡的安靜讓你放慢了腳步。"

names:
  - era: dutch
    name: 西拉雅農舍（Sinkang）
  - era: qing
    name: 笨港農家
  - era: japanese
    name: 新港庄農家
  - era: modern
    name: 笨港農家

rumors:
  - "農家的地窖裡有一口舊水甕，裡面存著阿立祖的香灰，是西拉雅後裔代代保存的，從來沒有動過。"

connections:
  - singang_rice_paddy
  - singang
