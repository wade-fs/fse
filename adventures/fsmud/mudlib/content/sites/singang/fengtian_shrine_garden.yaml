id: fengtian_shrine_garden
settlement: singang
canonical_name: 奉天宮後花園（舊社遺跡）
is_heritage: false
hidden: true
base_description: |
  廟的後方有一片不開放給一般信眾的花園，
  老榕樹的氣根垂到草地上，角落裡有幾根石柱，
  是荷蘭時代基督教堂的殘跡。
  傳教士就是在這片土地上，用新港語（羅馬字）
  教西拉雅族人讀書寫字，留下了「新港文書」。
travel_arrive_text: "你繞到廟的後方，找到那片不太顯眼的花園，幾根舊石柱靜靜地站在老榕樹旁。"

names:
  - era: dutch
    name: 新港教堂遺址
  - era: qing
    name: 天后宮後院
  - era: modern
    name: 奉天宮後花園

rumors:
  - "老廟公說，後花園的石柱下面有荷蘭人的地基，雨後泥土鬆了，有時候可以看到更深的石頭從地裡冒出來。"

connections:
  - singang
  - singang_school_old
