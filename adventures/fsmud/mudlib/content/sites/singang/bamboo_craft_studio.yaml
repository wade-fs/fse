id: bamboo_craft_studio
settlement: singang
canonical_name: 竹藝工作坊
is_heritage: false
base_description: |
  新港的竹藝是卑南、西拉雅混合本土技藝發展出來的工藝。
  工作坊裡堆著各種粗細的竹管，師傅用彎刀把竹子劈成薄片，
  眼睛不看手，靠的是幾十年的手感。
  完成的竹編品——籃子、帽子、燈籠骨架——
  掛在牆上排成一片，像一個竹子的圖書館。
travel_arrive_text: "你走進工作坊，竹子的清香和削竹的聲音讓這個地方充滿了安靜的生氣。"

names:
  - era: dutch
    name: 西拉雅竹編工藝場
  - era: qing
    name: 笨港竹藝所
  - era: japanese
    name: 新港竹細工作所
  - era: modern
    name: 竹藝工作坊

rumors:
  - "竹藝師傅說有一種竹編圖案叫「新港紋」，是西拉雅族的傳統紋樣，他在一本荷蘭時代的手稿上看過，試圖復原了十年，還差一點。"

connections:
  - singang_school_old
  - singang_market
