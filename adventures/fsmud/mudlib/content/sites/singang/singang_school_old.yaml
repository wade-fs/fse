id: singang_school_old
settlement: singang
canonical_name: 新港公學校舊址
is_heritage: true
base_description: |
  日治時代建的公學校，木造校舍的屋頂保留著，
  但教室已改成農會的倉庫。長廊的木柱被蟲蛀了一部分，
  柱腳有用水泥修補的痕跡。
  操場邊的牆壁上還可以看到模糊的石灰字跡，
  是日文的標語，字太模糊，只認得出最後兩個字：「奉仕」。
travel_arrive_text: "你走進舊校舍的長廊，木地板發出一聲長長的吱呀，提醒你這棟建築的年紀。"

names:
  - era: japanese
    name: 新港公學校
  - era: postwar
    name: 新港國民學校
  - era: modern
    name: 農會倉庫（舊公學校）

rumors:
  - "牆上那個「奉仕」的字，有老師說後面其實還有兩個字，只是被石灰蓋掉了，那兩個字是「奉公」。"

connections:
  - singang
  - bamboo_craft_studio
