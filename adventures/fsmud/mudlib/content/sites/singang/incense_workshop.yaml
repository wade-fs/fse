id: incense_workshop
settlement: singang
canonical_name: 香藝工坊
is_heritage: false
base_description: |
  新港以製香聞名，這間工坊是幾代傳下來的老字號。
  師傅把香粉和水混合，壓成細長的香條，
  再送上竹架晾曬。晴天的午後，整個院子都是線香的甜香。
  師傅說每種香的粗細、長短都有固定的用途，
  廟用的、家用的、大型祭典用的，都不一樣。
travel_arrive_text: "你走進香藝工坊，香粉的塵香撲面而來，院子裡的竹架上掛滿了一排排還在晾乾的線香。"

names:
  - era: dutch
    name: 西拉雅薰香儀式場所
  - era: qing
    name: 笨港製香所
  - era: japanese
    name: 新港香業工場
  - era: modern
    name: 香藝工坊

rumors:
  - "工坊師傅說有一種香叫「西拉雅香」，是仿照荷蘭時代傳教士記錄的原住民薰香儀式製作的，已停產，但配方還在。"

connections:
  - singang
  - singang_market
