id: xilaya_stone_site
settlement: singang
canonical_name: 新港社遺址（西拉雅石板墓）
is_heritage: true
hidden: true
base_description: |
  奉天宮廟埕側邊的草叢裡立著幾塊風化的石板，
  是荷蘭時代西拉雅族新港社的墓葬遺址。
  石板表面的刻紋已模糊，但幾何圖形的輪廓還依稀可辨。
  解說牌是新的，但石板是幾百年前埋下的。
travel_arrive_text: "你找到那幾塊石板，半掩在草叢中，用手撥開草，石板的重量讓你意識到它在這裡站了很久。"

names:
  - era: dutch
    name: 新港社石板墓群
  - era: qing
    name: 西拉雅舊址
  - era: modern
    name: 新港社遺址

rumors:
  - "有學者說新港社的石板墓群不只廟埕這幾塊，還有更多埋在附近農田的地下，農耕時偶爾會犁出石板。"

connections:
  - singang
  - beimen_creek_old
