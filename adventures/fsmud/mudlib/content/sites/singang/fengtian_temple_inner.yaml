id: fengtian_temple_inner
settlement: singang
canonical_name: 奉天宮正殿內殿
is_heritage: true
hidden: true
base_description: |
  這裡是奉天宮的心臟。媽祖神像高坐在神龕中央，
  龍袍的刺繡在燭光下熠熠發光，神龕前的供桌上
  堆疊著信眾帶來的花果和金紙。
  內殿後方的牆壁上掛著幾塊有年份的匾額，
  其中一塊是雍正年間的，邊緣已經發黑。
travel_arrive_text: "你通過重重香煙走進正殿，空氣變得更沉、更暖，充滿了幾百年信仰積累的重量。"

names:
  - era: dutch
    name: 新港社祭祀場所
  - era: qing
    name: 笨港天后宮分宮
  - era: japanese
    name: 新港奉天宮
  - era: modern
    name: 奉天宮正殿

rumors:
  - "殿內有一個神龕是空的，廟公說那是給「還沒有來的神明」留的位置，但問是哪位神明，廟公笑而不答。"

connections:
  - fengtian_shrine_garden
