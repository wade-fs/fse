id: singang
settlement: singang
canonical_name: 新港鄉
is_heritage: false
base_description: |
  這是一個以宗教與農業聞名的純樸小鎮。
  街道圍繞著奉天宮展開，空氣中帶著香火的甘甜與稻田的芬芳。
  小鎮上到處可見香藝工作坊與曬香的架子，紅色的香腳如花朵般綻放。
travel_arrive_text: "你沿著縣道行進，穿過綠意盎然的稻田，來到了媽祖信仰重鎮——新港鄉。"
