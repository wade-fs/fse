id: singang_rice_paddy
settlement: singang
canonical_name: 笨港平原稻田
is_heritage: false
base_description: |
  從奉天宮往外走五分鐘，城鎮邊界突然消失，
  眼前是一片平坦的稻田，延伸到遠處的嘉南平原。
  水田反著天光，白鷺鷥在田間踱步。
  農夫開著耕耘機的聲音從遠處傳來，是這個時代的農事節奏。
travel_arrive_text: "你走出村子，站在田埂上，嘉南平原在眼前展開，一望無際。"

names:
  - era: dutch
    name: 西拉雅農耕地
  - era: qing
    name: 笨港農田
  - era: japanese
    name: 新港庄水田
  - era: modern
    name: 笨港平原稻田

rumors:
  - "稻田深處有個廢棄的小土地公廟，廟身只有兩塊磚那麼高，農民說那是西拉雅時代留下來的，改不了，就保留著。"

connections:
  - singang
  - beimen_creek_old
