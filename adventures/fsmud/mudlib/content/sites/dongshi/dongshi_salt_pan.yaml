rumors:
- 有人傳言，先天宮王船祭火化後的灰燼中，如果能撿到未燒毀的樟木炭，能辟邪保平安。
- 聽說外傘頂洲的沉船裡，藏有當年鄭成功軍隊撤退時丟棄的避難銅錢罐。
