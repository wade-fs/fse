rumors:
- 朴子溪口的漁夫傳言，在起大霧的早晨，能看見清代的戎克船無聲地駛入河口。
- 有人傳言，先天宮王船祭火化後的灰燼中，如果能撿到未燒毀的樟木炭，能辟邪保平安。
