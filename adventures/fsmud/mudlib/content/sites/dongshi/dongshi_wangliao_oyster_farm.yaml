rumors:
- 有人傳言，網寮蚵殼厝的牆壁在東北季風最強的那天，會發出像海螺一般的低鳴聲。
- 老鹽工說，在廢棄的東石鹽田中，深夜有時能看見清代鹽警巡邏的燈火幻影。
