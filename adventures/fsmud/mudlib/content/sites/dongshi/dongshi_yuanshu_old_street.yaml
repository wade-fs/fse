rumors:
- 聽說外傘頂洲的沉船裡，藏有當年鄭成功軍隊撤退時丟棄的避難銅錢罐。
- 有人傳言，網寮蚵殼厝的牆壁在東北季風最強的那天，會發出像海螺一般的低鳴聲。
