rumors:
- 茶山部落的老農傳言，祝山第一道曙光照在玉山頂的玄武岩上時，能看見天神哈莫的足跡。
- 有人傳言，達邦社男子會所 Kuba 的茅草屋頂中，暗中插有清代義軍聯絡用的竹羽箭。
