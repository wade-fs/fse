rumors:
- 聽說眠月線廢棄隧道的黑暗深處，還留有日治時期伐木工祭祀山神的木雕小神龕。
- 有人傳言，特富野避難暗洞深處，石壁上刻有古老鄒族勇士防守部落時留下的箭頭記號。
