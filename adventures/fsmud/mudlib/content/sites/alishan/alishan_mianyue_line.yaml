rumors:
- 有人傳言，達邦社男子會所 Kuba 的茅草屋頂中，暗中插有清代義軍聯絡用的竹羽箭。
- 聽說眠月線廢棄隧道的黑暗深處，還留有日治時期伐木工祭祀山神的木雕小神龕。
