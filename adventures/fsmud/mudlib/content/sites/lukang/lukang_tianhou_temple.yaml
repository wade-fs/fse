id: lukang_tianhou_temple
settlement: lukang
canonical_name: 鹿港天后宮
is_heritage: true
base_description: |
  香煙裊裊的天后宮，正殿上高懸著清代各皇帝賜予的匾額。
  神龕內安座的是著名的「黑面二媽」，神像的手腳關節處已被香火薰得發亮。
  這裡不僅是鹿港的信仰中心，更是當年海商與行郊議事、公斷的總部。
travel_arrive_text: "你來到了鹿港天后宮，悠久的歷史氣息與繚繞的香煙令人肅然起敬。"

names:
  - era: qing
    name: 鹿港天后宮（官建媽祖廟）
  - era: japanese
    name: 天后宮
  - era: modern
    name: 鹿港天后宮

rumors:
  - "傳說黑面二媽的神像在日治時期皇民化運動時差點被強行沒收，是當地的匠師用木雕神像掉包，才保住了本尊。"
connections:
  - lukang_old_street
  - lukang_yi_crossing
