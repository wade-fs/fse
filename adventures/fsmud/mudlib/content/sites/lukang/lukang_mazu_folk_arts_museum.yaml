id: lukang_mazu_folk_arts_museum
settlement: lukang
canonical_name: 鹿港民俗文物館
is_heritage: true
base_description: |
  融合了文藝復興與巴洛克洋樓風格的宏偉豪邸，是日治時期鹿港望族顯榮家族的府邸。
  白色的圓拱廊和精細的洗石子裝飾，在陽光下格外顯眼。
  戰後改為民俗文物館，陳列著大量的漆器、木雕家具和早年的織物。
travel_arrive_text: "你來到了鹿港民俗文物館，華麗的洋樓結構與古樸的街屋交織出獨特的時代美感。"

names:
  - era: qing
    name: 顯榮商號店屋
  - era: japanese
    name: 顯榮邸（大和洋樓）
  - era: modern
    name: 鹿港民俗文物館

rumors:
  - "文物館地下一樓的庫房裡，有一箱從大和洋樓時期就一直鎖著的西式皮箱，鑰匙不見了，據說裡面是當年與日本總督談判的私密文件。"
connections:
  - lukang_old_street
  - lukang_yi_crossing
