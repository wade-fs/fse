id: lukang_pastry_shop
settlement: lukang
canonical_name: 傳統糕餅老鋪
is_heritage: false
base_description: |
  一進店門就能聞到豬油、綠豆沙與麥芽糖的甜香。
  木製模具在桌上敲擊發出有節奏的「叩叩」聲，
  綠豆椪、牛舌餅、鳳眼糕整齊擺放在紅色鐵盤上，
  是鹿港人茶點與祭祀的靈魂。
travel_arrive_text: "你走進糕餅鋪，甜甜的豬油與綠豆香氣讓你的味蕾瞬間活躍起來。"

names:
  - era: qing
    name: 糕餅鋪
  - era: japanese
    name: 鹿港製菓所
  - era: modern
    name: 傳統糕餅老鋪

rumors:
  - "糕餅老鋪的木模上雕刻著精細的蓮花與福字。老闆說，最老的那個「鳳眼」木模，是日治初期為了進貢日本皇室而由木雕大師親手雕刻的。"
connections:
  - lukang_old_street
  - lukang_tianhou_temple
