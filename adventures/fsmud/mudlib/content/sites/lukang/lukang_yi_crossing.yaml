id: lukang_yi_crossing
settlement: lukang
canonical_name: 鹿港隘門（車路口）
is_heritage: true
base_description: |
  矗立在街道中央的防禦性磚石城門，是清代鹿港為了防範強盜與分類械鬥而建。
  隘門上方寫著「門迎後車」字樣。每當夜晚鐘聲響起，
  隘門就會關閉，將街區內部與外界隔絕，保障住民的安全。
travel_arrive_text: "你站在古老的隘門下，看著窄小的拱門，想像當年居民在械鬥時關閉防禦的緊張氛圍。"

names:
  - era: qing
    name: 車路口隘門
  - era: japanese
    name: 隘門殘跡
  - era: modern
    name: 鹿港隘門

rumors:
  - "隘門的石鎖孔在清代大械鬥時被卡死過，據說是一個外地來的年輕人為了救人而用自己的佩刀卡住，佩刀至今還有一截斷刃卡在石縫深處。"
connections:
  - lukang_tianhou_temple
  - lukang_mazu_folk_arts_museum
