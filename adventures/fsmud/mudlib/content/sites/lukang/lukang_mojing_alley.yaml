id: lukang_mojing_alley
settlement: lukang
canonical_name: 摸乳巷
is_heritage: false
base_description: |
  兩側老屋牆壁夾成一條極其狹窄的紅色紅磚小巷，最窄處僅容一人通過。
  若是兩人迎面相遇，必須側身、吸氣才能擦肩而過。
  巷道有些陰暗，但紅磚上的磨損顯示著幾代居民走過這裡的頻率。
travel_arrive_text: "你走進極窄的摸乳巷，紅磚牆幾乎貼著你的肩膀，你不得不放慢腳步側身行進。"

names:
  - era: qing
    name: 君子巷
  - era: japanese
    name: 摸乳巷
  - era: modern
    name: 摸乳巷

rumors:
  - "有傳言說摸乳巷底下其實埋有一條清代逃生用的地道，通往外圍的河港，用來在亂軍進城時撤退。"
connections:
  - lukang_old_street
