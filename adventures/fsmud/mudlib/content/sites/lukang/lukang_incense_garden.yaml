id: lukang_incense_garden
settlement: lukang
canonical_name: 鹿港古香舖院落
is_heritage: false
base_description: |
  院子裡一排排竹架上整齊排列著紅色與棕色的線香，在烈日下晾乾。
  空氣中瀰漫著濃烈的沉香與藥粉香氣。
  百年老字號香舖至今仍堅持用純手工揉製沉香粉與楠木皮粉。
travel_arrive_text: "你走進香舖院落，濃郁的沉香氣息立刻將你包圍，院子裡一片紅色的香腳如花海般美麗。"

names:
  - era: qing
    name: 鹿港沉香坊
  - era: japanese
    name: 製香作業場
  - era: modern
    name: 古香舖院落

rumors:
  - "香舖的老闆說，他們家有一款配方叫「避邪神香」，是清代瘟疫流行時，媽祖顯靈指示的，配方一直保存在廟方的舊木盒裡。"
connections:
  - lukang_old_street
  - lukang_banyue_well
