id: lukang_banyue_well
settlement: lukang
canonical_name: 半邊井
is_heritage: true
base_description: |
  位於老街旁一棟古厝牆腳的奇特古井，井的一半在圍牆內，一半在圍牆外。
  這是當年古厝主人為了方便過路人與鄰居取水而設計的，
  是鹿港傳統社會人情與互助的最美象徵。井水已乾涸，但古老的井欄還保留著。
travel_arrive_text: "你來到半邊井前，看著那半個露在圍牆外的井欄，感受著幾百年前的人情溫度。"

names:
  - era: qing
    name: 瑤林街半邊井
  - era: japanese
    name: 半邊井
  - era: modern
    name: 鹿港半邊井

rumors:
  - "半邊井的井底深處據說有一塊刻有「同舟共濟」的舊磚，是建井時的主人親自刻下放進去的。"
connections:
  - lukang_old_street
  - lukang_longshan_temple
