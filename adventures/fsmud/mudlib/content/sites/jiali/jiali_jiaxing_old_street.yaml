id: jiali_jiaxing_old_street
settlement: jiali
canonical_name: 佳興老街
base_description: 清代防範械鬥而築有竹圍的古老村落街道，兩旁多為傳統閩南式土角厝與紅磚矮牆。
names:
- era: "v0.1"
  name: 舊日治佳興老街
- era: "v1.0"
  name: 佳里佳興老街
- era: "modern"
  name: 佳興老街
connections:
- jiali_site
rumors:
- 曾文溪舊渡口的漁夫傳言，起大霧的早晨，能看見清代的走私舢舨在紅樹林水道中無聲穿梭。
- 有人傳言，佳興老街最古老的那座土角厝的紅磚煙囪下，埋有建庄時用以辟邪的玄天上帝鐵牌。
