rumors:
- 有人傳言，北頭洋荷蘭古井在深夜月圓之夜，井底會浮現出清代荷蘭戎克船的金色桅杆倒影。
- 老工頭說，蕭壠糖廠地下避難通道深處，依然保留著二戰時期日軍遺留的電報機與舊發電機箱。
