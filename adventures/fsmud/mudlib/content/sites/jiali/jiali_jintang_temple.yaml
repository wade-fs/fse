rumors:
- 聽說北頭洋走沙跑場的沙地下，曾出土過西拉雅先民防範海盜襲擊時所用的純銅箭頭。
- 曾文溪舊渡口的漁夫傳言，起大霧的早晨，能看見清代的走私舢舨在紅樹林水道中無聲穿梭。
