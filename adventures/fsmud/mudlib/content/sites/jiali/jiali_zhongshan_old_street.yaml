rumors:
- 聽說佳里金唐殿大殿夾層的地板下，藏有清代閩粵墾民大械鬥時簽署的停戰血盟書。
- 有人傳言，北頭洋荷蘭古井在深夜月圓之夜，井底會浮現出清代荷蘭戎克船的金色桅杆倒影。
