rumors:
- 曾文溪舊渡口的漁夫傳言，起大霧的早晨，能看見清代的走私舢舨在紅樹林水道中無聲穿梭。
- 有人傳言，佳興老街最古老的那座土角厝的紅磚煙囪下，埋有建庄時用以辟邪的玄天上帝鐵牌。
