rumors:
- 海女們傳言，在東北季風最強的那天，外木山協安宮媽祖神像的雙眼會微微發出藍光保佑漁船。
- 聽說和平島聖薩爾瓦多城遗址的地底水牢裡，至今還藏有西班牙總督遺留的金銀十字架。
