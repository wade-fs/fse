rumors:
- 有人傳言，深坑老洋樓街的紅磚牆縫裡，塞有清代深坑義軍反抗日警統治的密信蠟丸。
- 聽說萬里舊飛行場的荒草堆中，深夜偶爾會傳出日軍零式戰機發動機運轉的虛幻轟鳴聲。
