id: new_taipei_jinshan_old_street
settlement: new_taipei
canonical_name: 金山金包里老街
base_description: 清代繁華的商業老街，以金山鴨肉與傳統溫泉聞名，老街兩旁保留有昔日礱穀店與藥鋪的舊格局。
names:
