rumors:
- 聽說石碇吊腳樓在溪水暴漲的颱風夜，屋底的石柱會發出像古琴彈奏般的奇特風聲。
- 有人傳言，金山金包里老街的舊藥鋪地底下，埋有清代防範海盜襲擊而藏匿的銀元罐。
