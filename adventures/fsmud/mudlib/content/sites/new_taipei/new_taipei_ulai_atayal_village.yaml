rumors:
- 聽說鶯歌老街最古老的那座蛇窯在每年開窯之夜，火光中會浮現出傳說中窯神開光的幻影。
- 平溪老街的村民說，平溪高架鐵梁橋在滿月之夜，火車經過時會帶起一道彩虹般的天燈光芒。
