rumors:
- 聽說雙溪老煤礦口的廢墟裡，每逢起霧會傳出老礦工們下坑前互道平安的敲鐵便當盒聲。
- 有人傳言，深坑老洋樓街的紅磚牆縫裡，塞有清代深坑義軍反抗日警統治的密信蠟丸。
