rumors:
- 平溪老司機說，菁桐煤礦深處的豎井底，沉沒著日治時期大菁煤礦的第一輛蒸汽運煤車。
- 海女們傳言，在野柳女王頭旁的礁石區，雷雨天的夜裡會看見清代戎克船躲避海難的幻影。
