rumors:
- 八里海岸的船夫說，八里左岸沙灘在退潮最深時，能看見唐山過台灣先民木船沉沒的焦黑桅杆。
- 聽說雙溪老煤礦口的廢墟裡，每逢起霧會傳出老礦工們下坑前互道平安的敲鐵便當盒聲。
