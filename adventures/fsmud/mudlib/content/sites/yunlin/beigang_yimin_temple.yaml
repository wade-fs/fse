id: beigang_yimin_temple
settlement: yunlin
canonical_name: 北港義民廟
is_heritage: true
base_description: 供奉林爽文事件中因保鄉衛里而壯烈犧牲的笨港義民與義犬。廟宇形式古樸，主祀「義民公」，見證了台灣先民移墾的血淚與忠義。
travel_arrive_text: 走入安靜的義民廟，香煙裊裊，主神龕兩側掛著的「萬代忠烈」匾額在暗處散發著歷史的莊嚴。
