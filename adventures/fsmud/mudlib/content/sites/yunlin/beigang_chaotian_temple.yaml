base_description: 台灣媽祖信仰的重鎮，始建於清康熙年間。廟宇建築雄偉，石雕與剪黏藝術極具特色，終年香火鼎盛，是地方的信仰與凝聚中心。
travel_arrive_text: 巍峨的廟門前終年飄散著香煙，鐘鼓聲與信徒的祈禱聲交織，令人感受到強烈的信仰力量。
