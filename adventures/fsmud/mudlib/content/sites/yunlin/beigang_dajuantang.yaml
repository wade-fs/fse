id: beigang_dajuantang
settlement: yunlin
canonical_name: 笨港縣丞署
is_heritage: true
base_description: 清乾隆年間為加強笨港治安全境而設立的縣丞衙門，是清廷在雲林早期最重要的行政與防務據點。
travel_arrive_text: 斑駁的老衙門地基上，殘留的抱鼓石與石碑記錄了清代官署的威嚴，令人發古之幽思。
names:
- era: qing
  name: 諸羅縣笨港分縣署
- era: japanese
  name: 北港臨時支廳舍
- era: modern
  name: 笨港縣丞署遺址
connections:
- beigang_chaotian_temple
rumors:
- 據說老街居民曾在舊衙門地基下，挖掘出刻有「笨港分縣」字樣的銅製大印殘件。
