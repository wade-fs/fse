- era: modern
  name: 虎尾糖廠
rumors:
- 據說糖廠煙囪下埋著第一任日籍廠長的武士刀，用來鎮壓製糖的鍋爐氣煞。
settlement: yunlin
travel_arrive_text: 巨大的煙囪高聳入雲，空氣中瀰漫著濃郁的甜糖蜜香，鐵軌縱橫交錯。
