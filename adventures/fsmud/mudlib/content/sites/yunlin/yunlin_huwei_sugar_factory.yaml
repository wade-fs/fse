base_description: 有「糖都」之稱的虎尾糖廠，建於日治時期，是台灣少數仍在運作並保留五分車運甘蔗的糖廠。
canonical_name: 虎尾糖廠
connections:
- yunlin_douliu_street
id: yunlin_huwei_sugar_factory
is_heritage: true
names:
