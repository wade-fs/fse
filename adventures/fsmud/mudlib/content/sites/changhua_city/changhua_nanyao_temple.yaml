id: changhua_nanyao_temple
settlement: changhua_city
canonical_name: 彰化南瑤宮
is_heritage: true
base_description: |
  彰化最重要的媽祖廟，其觀音殿建築罕見地融合了西方巴洛克、日式與閩南風格。
  正殿的龍柱石雕極盡精細，香煙裊裊中，媽祖神像威嚴俯瞰。
  這裡也是彰化最具代表性的行郊與社會網絡中心。
travel_arrive_text: "你走進南瑤宮，觀音殿那種中西日合璧的奇特風格讓你駐足良久。"

names:
  - era: qing
    name: 南瑤宮（官建媽祖廟）
  - era: japanese
    name: 南瑤宮（觀音殿重建）
  - era: modern
    name: 彰化南瑤宮

rumors:
  - "觀音殿的西洋立柱雕花中，藏有一組匠師在日治時期留下的秘密刻字，是用來嘲諷當時前來監工的日本官員的。"
connections:
  - changhua_city_site
  - changhua_south_gate
