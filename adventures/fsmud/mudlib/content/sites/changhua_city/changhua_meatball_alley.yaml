id: changhua_meatball_alley
settlement: changhua_city
canonical_name: 彰化肉圓老巷
is_heritage: false
base_description: |
  這條小巷裡聚集了數家傳承三代的彰化肉圓老店。
  番薯粉製成的外皮在溫油中慢火油炸至晶瑩剔透，
  包著結實的豬肉餡與香菇，淋上特製的甜辣醬與醬油。
  這是彰化人最直白的日常美食。
travel_arrive_text: "你轉進肉圓老巷，溫油炸肉圓的滋味立刻撲鼻而來，每家店的灶前都熱氣騰騰。"

names:
  - era: japanese
    name: 彰化肉圓屋台
  - era: postwar
    name: 肉圓街
  - era: modern
    name: 彰化肉圓老巷

rumors:
  - "最老的那家肉圓店老闆說，肉圓的番薯粉配方比例是他祖父在日治初期擺攤時，為了讓過路工人和挑夫能快速吃飽而研發的。"
connections:
  - changhua_city_site
  - changhua_south_gate
