id: changhua_north_gate
settlement: changhua_city
canonical_name: 彰化北門遺址（共辰門）
is_heritage: true
base_description: |
  彰化縣城北門舊址，通往台中平原的咽喉要道。
  如今是繁榮的商圈，城門早已拆除，僅剩北門口地名與幾間日治時代的舊木造商鋪，
  木頭外牆已被煤煙薰成深黑色。
travel_arrive_text: "你漫步在北門口舊街區，看著黑色的木造老店鋪，感受著老城門外的商旅歷史。"

names:
  - era: qing
    name: 彰化縣城北門（共辰門）
  - era: japanese
    name: 北門口
  - era: modern
    name: 彰化北門遺址

rumors:
  - "北門舊木造商鋪的閣樓裡，據說藏有一本大正年間的客商登記簿，記錄了當時南北往來的行腳商人名冊。"
connections:
  - changhua_city_site
