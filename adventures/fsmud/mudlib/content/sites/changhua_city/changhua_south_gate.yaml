id: changhua_south_gate
settlement: changhua_city
canonical_name: 彰化南門遺址（宣平門）
is_heritage: true
base_description: |
  彰化縣城南門舊址，通往嘉義與台南的南路起點。
  城門原址已不存，但南門口的舊街市仍保留了傳統菜市場的格局，
  大清早便充滿了喧囂的在地朝氣。
travel_arrive_text: "你走進南門口傳統市場，菜販的叫賣聲與鮮魚的腥氣撲面而來，極具生活感。"

names:
  - era: qing
    name: 彰化縣城南門（宣平門）
  - era: japanese
    name: 南門市場
  - era: modern
    name: 彰化南門遺址

rumors:
  - "南門市場的老魚攤下，地磚下有一處石板路面，據說是清代通往南路的官道石板遺留，因為太硬一直沒被挖掉。"
