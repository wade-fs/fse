id: changhua_lai_ho_clinic
settlement: changhua_city
canonical_name: 賴和醫院舊址（彰化賴和紀念館）
is_heritage: true
hidden: true
base_description: |
  日治時期著名文學家與醫師賴和行醫的診所舊址。
  賴和被稱為「台灣新文學之父」，他在這間診所裡一邊行醫一邊寫作，
  關懷底層人民的疾苦。診所內保留著他的聽診器與手稿真跡。
travel_arrive_text: "你走進賴和紀念館，看著泛黃的手稿和舊式醫療器具，感受到那位『媽祖醫生』的悲憫胸懷。"

names:
  - era: japanese
    name: 賴和醫院
  - era: postwar
    name: 賴和診所
  - era: modern
    name: 賴和醫院舊址（賴和紀念館）

rumors:
  - "賴和紀念館藏有一張他在大正年間寫的處方箋，背後用鉛筆寫著幾行新文學的詩句草稿，字跡模糊，但能看出是對弱勢者的同情。"
