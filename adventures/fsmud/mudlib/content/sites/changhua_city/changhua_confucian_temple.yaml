id: changhua_confucian_temple
settlement: changhua_city
canonical_name: 彰化孔子廟
is_heritage: true
base_description: |
  格局極其宏偉的孔子廟，紅牆黃瓦在古樹陰影下顯得莊嚴無比。
  櫺星門與大成殿的斗拱雕工精細，保留了清代中葉的閩南官建風格。
  這裡曾是中部文人學子切磋經義的聖地。
travel_arrive_text: "你走進彰化孔廟，高聳的櫺星門將外界的街市喧囂完全隔絕在外。"

names:
  - era: qing
    name: 彰化縣學文廟
  - era: japanese
    name: 彰化孔子廟
  - era: modern
    name: 彰化孔子廟

rumors:
  - "孔廟大成殿的一根梁柱上，有一個被石灰重新刷過的彈孔，據說是乙未戰爭八卦山決戰時，流彈飛入大成殿所留下的痕跡。"
connections:
  - changhua_city_site
  - changhua_west_gate
