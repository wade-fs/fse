id: changhua_west_gate
settlement: changhua_city
canonical_name: 彰化西門遺址（慶豐門）
is_heritage: true
base_description: |
  清代彰化縣城的西門舊址，是當年通往鹿港的主要商路起點。
  西門城樓雖已不存，但路旁的古厝牆腳還殘留了幾塊花崗岩的城牆基石，
  表面有風化後的凹凸紋路。
travel_arrive_text: "你找到西門遺址殘留的幾塊城牆基石，花崗岩的堅硬質感依然如昔。"

names:
  - era: qing
    name: 彰化縣城西門（慶豐門）
  - era: japanese
    name: 西門通
  - era: modern
    name: 彰化西門遺址

rumors:
  - "西門基石縫隙裡，曾有人發現過幾枚清初的銅錢和半截折斷的短鐵劍，懷疑是當年械鬥時留下的。"
connections:
  - changhua_confucian_temple
  - changhua_city_site
