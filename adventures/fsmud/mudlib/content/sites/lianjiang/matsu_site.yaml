rumors:
- 聽說在福澳港老街渡口的花崗岩石板底下，還埋有明代水師大兵登陸時遺落的黃銅頭盔。
- 有人傳言，在起霧的清晨，閩江口海面會浮現出清代走私戎克船入港的虛幻桅杆倒影。
