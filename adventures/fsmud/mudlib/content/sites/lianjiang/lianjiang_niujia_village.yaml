id: lianjiang_niujia_village
settlement: lianjiang
canonical_name: 復興牛角村聚落
base_description: 狀似牛角而得名的古老漁村，紅磚與花崗岩混砌的閩東封火山牆造型獨特，巷弄狹窄陡峭，石階層疊。
names:
