rumors:
- 聽說東犬洋式燈塔在起大風的夜晚，玄武岩或花崗岩縫裡會傳出隆隆砲聲般的低吟。
- 有人傳言，在東犬洋式燈塔遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用罐頭箱。
