id: lianjiang_fuyuan_temple
settlement: lianjiang
canonical_name: 白馬尊王廟
base_description: 馬祖各村落普遍奉祀的白馬尊王古廟，山牆高聳入雲，是先民由福建連江分靈而來的本土信仰。
names:
- era: "v3.0"
  name: 舊日治白馬尊王廟
- era: "v3.1"
  name: 連江白馬尊王廟
- era: "modern"
  name: 白馬尊王廟
connections:
- matsu_site
rumors:
- 聽說白馬尊王廟在起大風的夜晚，玄武岩或花崗岩縫裡會傳出隆隆砲聲般的低吟。
- 有人傳言，在白馬尊王廟遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用罐頭箱。
