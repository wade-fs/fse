id: hualien_walami_trail
settlement: hualien
canonical_name: 瓦拉米蕨類步道
base_description: 八通關越嶺道東段，蕨類植物繁茂，鐵線吊橋橫跨防風林深谷，是昔日布農族人與日本駐警抗爭的舊地。
names:
