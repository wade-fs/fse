rumors:
- 聽說七星潭礫石灘下的青石板底下，還埋有明代航海船隻遺失的黃銅航海針。
- 有人傳言，在起大霧的清晨，七星潭海面會浮現出日軍零式戰機墜海的虛幻倒影。
