base_description: '美濃散布的客家菸樓群，是台灣菸葉業的活化石。

  磚造的煙燻室保持著恆溫，傳統的烘焙工法讓葉片金黃。

  如今大多已廢棄，轉作民宿或任其荒廢，但那些紅磚建築仍然頑強地站立在田邊。

  '
