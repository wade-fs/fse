rumors:
- 有個菸樓的木梯上，幾十年來一直有個小孩手印，擦了又出現，村民說那是日治時代死在這裡的童工留下的。
settlement: kaohsiung
travel_arrive_text: 你走近美濃的菸樓群，紅磚牆透出一股陳年的煙葉香，老農說以前採收季節一整個村子都是這個味道。
