rumors:
- 廟裡的關帝像據說以前有兩把刀，但另一把在某次械鬥後失蹤了，老廟祝說那把刀還在鳳山某個角落，每隔幾年就有人說找到了，但拿來看都不對。
settlement: kaohsiung
travel_arrive_text: 你走進鳳山武廟，關帝手持青龍偃月刀的塑像威嚴肅穆，香煙在廟堂中瀰漫。
