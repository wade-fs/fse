base_description: '鳳山武廟，主祀關聖帝君，廟旁舊稱「五里亭」，是旅人往來高雄縣治的休憩站。

  清代趕路的商人在此歇腳，向關帝祈求旅途平安，

  廟前的石板路踩在腳下已有兩百年的歲月。

  '
canonical_name: 鳳山武廟（五里亭）
