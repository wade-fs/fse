base_description: '旗山老街，巴洛克風格的拱廊建築排列成行，是日治時期糖業繁榮的縮影。

  亭仔腳遮蔽了百年前同樣的陽光，老店鋪以香蕉製品聞名，

  糖廠的甜香至今瀰漫在老街的空氣裡。

  '
canonical_name: 旗山老街
