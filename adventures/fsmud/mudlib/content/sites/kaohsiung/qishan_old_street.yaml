rumors:
- 老街最後一間鋪子，曾有人說看見深夜有光從店內透出，開門進去卻是空屋——那是舊日糖業帳房的舊址，夜晚沒人敢靠近。
settlement: kaohsiung
travel_arrive_text: 你走進旗山老街，拱廊柱廊一字排開，牆面石材泛著歲月的褐黃。
