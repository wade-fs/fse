base_description: '高雄港內人跡罕至的舊漁業作業區，夜間幾乎無人進入。

  這裡仍停著幾艘廢棄的舊漁船，船體銹蝕，舷窗已不見，

  據說是五十年代某次意外後被棄置，從此沒有人願意接手。

  '
