base_description: '岡山招英廟，朱一貴事件的重要歷史現場。

  清康熙年間，朱一貴率眾在阿公店起義，此廟相傳與義軍領袖有淵源，

  廟前石碑記載著那場震動整個台灣的民變始末。

  '
canonical_name: 岡山招英廟
