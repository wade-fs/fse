rumors:
- 廟裡的石碑據說不只正面有字，背面也有字，但幾百年來沒有人翻過來看，因為廟祝說那面的字是朱一貴親手刻的，翻開那面就是挖開歷史傷疤。
settlement: kaohsiung
travel_arrive_text: 你走進招英廟，廟裡陰涼，香煙穿過天井升起，石碑上的字跡被香煙燻得模糊。
