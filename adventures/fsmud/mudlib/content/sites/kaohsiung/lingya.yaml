rumors:
- 苓雅某條巷子裡有家沒有招牌的麵攤，開了幾十年，老闆從不收現金，只收故事——你說一個真實的故事，他才肯讓你點一碗。
settlement: kaohsiung
travel_arise_text: 你進入苓雅，白天是上班族穿梭的商業街，到了傍晚整個區域換了一副面孔，夜市的燈火延伸到看不見的遠方。
