rumors:
- 坑道裡最深的那段，有人說用手電筒照過去看見有一段的牆壁是後來補砌的，顏色和材質都不同，補砌的時間不像是二戰時期，更像是戰後某個年代——沒有人知道為什麼。
settlement: kaohsiung
travel_arrive_text: 你在廢棄廠房的角落找到了坑道入口，昏暗的通道向下延伸，牆上的刻字在手電筒的光下若隱若現。
