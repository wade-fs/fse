base_description: '二戰時期日本軍方在楠梓工業區地下挖建的防空坑道，

  戰後大部分被填埋，但仍有幾段殘存的坑道入口。

  坑道牆壁上保有當年工人用炭筆刻下的文字，

  是那個時代被強迫勞動的見證。

  '
canonical_name: 楠梓地下坑道（舊防空壕）
