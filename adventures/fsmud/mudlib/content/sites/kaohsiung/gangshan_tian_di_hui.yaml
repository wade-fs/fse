base_description: 隱藏在岡山竹林深處的一處簡陋草寮。這是清領中期天地會暗中聯絡、歃血盟誓的秘密據點，香案上供奉著反清復明的神位。
travel_arrive_text: 你穿過密集的刺竹林，眼前出現一座不起眼的草寮，門口掛著暗號燈籠。
