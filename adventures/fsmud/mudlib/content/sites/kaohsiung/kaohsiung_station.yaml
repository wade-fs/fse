base_description: '高雄火車站，日治時期的帝冠式建築，是整個南台灣的鐵路樞紐。

  舊站體已遷移保存，新站建設期間舊站依然屹立，

  幾十年來多少離鄉背井的人從這裡出發，又有多少人從這裡回來。

  '
