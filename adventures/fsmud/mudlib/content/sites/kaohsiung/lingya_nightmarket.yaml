base_description: '高雄最著名的夜市，六合二路的夜晚熱鬧非凡。

  從木瓜牛奶到海產粥，每個攤位都有幾十年的歷史，

  這裡是高雄飲食文化的縮影，也是南部人夜晚的聚集地。

  '
