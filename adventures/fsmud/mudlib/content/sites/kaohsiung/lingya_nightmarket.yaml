rumors:
- 六合夜市最老的那個木瓜牛奶攤，說起它的歷史能扯到五十年前，但現在的老闆明明看起來才三十幾歲——有人說是秘方讓他不老，有人說根本換過人了。
settlement: kaohsiung
travel_arrive_text: 你走進六合夜市，攤位的燈光把整條街照得通亮，各種食物的香氣在夜風中混合。
