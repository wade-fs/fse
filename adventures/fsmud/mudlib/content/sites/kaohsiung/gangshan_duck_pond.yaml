id: gangshan_duck_pond
settlement: kaohsiung
canonical_name: 鴨母王養鴨地
is_heritage: true
base_description: 朱一貴起義前的隱居養鴨處。水塘波光粼粼，鴨群喧鬧。傳說朱一貴能以竹竿指揮鴨群，宛如行軍布陣，因此被稱為『鴨母王』。
travel_arrive_text: 你來到一處寬闊的水塘邊，無數鴨子在水面嬉戲，四周竹林環繞。
