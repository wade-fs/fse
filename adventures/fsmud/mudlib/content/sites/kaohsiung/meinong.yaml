id: meinong
settlement: kaohsiung
canonical_name: 美濃
is_heritage: false
base_description: |
  高雄美濃，台灣客家文化最完整的保存地之一。
  油紙傘工藝世代相傳，菸葉田與菸樓散布在平原上，
  客語在這裡還是日常用語，不只是博物館裡的展品。
travel_arrive_text: 你來到美濃，看見菸樓古樸的磚牆，遠處的油紙傘作坊傳來磨骨刷油的細碎聲音。
names:
- era: qing
  name: 瀰濃庄
- era: japanese
  name: 美濃庄
- era: modern
  name: 美濃區
rumors:
  - "美濃有個老油紙傘師傅，說他祖父傳下一把傘骨的紋路，那紋路是客家人的地圖，記錄的是清朝移民最初進入台灣時走的路線。"
connections:
