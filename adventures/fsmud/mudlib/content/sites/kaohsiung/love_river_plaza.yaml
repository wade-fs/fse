rumors:
- 濕地的老管理員說，改建之前這裡是個舊磚窯廠，工人說廠址的某個角落挖出過一批陶甕，甕裡裝著很多紙錢，沒有人知道是誰放的、什麼時候放的。
settlement: kaohsiung
travel_arrive_text: 你走入中都濕地，蘆葦的沙沙聲伴著遠處的船笛聲，一隻蒼鷺從水面飛起，消失在蘆葦叢後方。
