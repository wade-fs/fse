base_description: '愛河上游的中都濕地公園，昔日工業用地改建而成的生態公園。

  蘆葦叢中鷺鷥出沒，遠眺高雄港的工業煙囪，自然與工業的對比在此共存。

  '
canonical_name: 愛河之心（中都濕地）
