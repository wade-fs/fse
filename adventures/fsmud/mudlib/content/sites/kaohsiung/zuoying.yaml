id: zuoying
settlement: kaohsiung
canonical_name: 左營
is_heritage: true
base_description: |
  高雄左營，清代鳳山縣舊城所在地，城牆至今殘存。
  日治時期建設為海軍基地，戰後成為眷村聚集地。
  舊城門與蓮池潭在此共存，舊時軍港氣息猶在。
travel_arrive_text: 你走進左營，遠遠便看見蓮池潭的龍虎塔倒映水中，舊城的殘垣就在不遠處。
names:
- era: qing
  name: 鳳山縣舊城
- era: japanese
  name: 左營街
- era: modern
  name: 左營區
rumors:
  - "舊城北門的石塊，有幾塊是從打狗山採來的，摸起來和別的石頭手感不同——據說有工人說摸過之後會夢見清朝的工匠在城牆上趕工。"
  - "蓮池潭的龍口裡，每到深夜漲潮時會有低沉的聲音，漁民說那是地底下老官兵的嘆息。"
connections:
