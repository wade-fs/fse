base_description: '楠梓仙溪，高屏溪最重要的支流之一，發源自玉山南麓。

  那瑪夏（南沙魯）部落沿溪而居，卡那卡那富族的傳統領域就在這片溪谷中。

  八八風災的洪流曾在幾個小時內改變了這條溪的面貌。

  '
