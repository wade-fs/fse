rumors:
- 卡那卡那富族的長老說，溪流最深的那個潭，是族人舉行成年禮的地方，潭底有塊石頭，上面的紋路是族人的遷徙圖，但那塊石頭只在特定的時節才能看見。
settlement: kaohsiung
travel_arrive_text: 你來到楠梓仙溪畔，溪水清澈，溪石白淨，遠處的那瑪夏山村炊煙裊裊升起。
