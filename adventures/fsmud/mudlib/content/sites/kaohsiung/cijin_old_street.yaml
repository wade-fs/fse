rumors:
- 老街中段有棟廢棄的洋樓，是清末某個通事的宅第，門上的龍形浮雕和其他台灣傳統建築的龍紋都不一樣，沒有人說得出那個龍紋的出處。
settlement: kaohsiung
travel_arrive_text: 你走在旗津老街，石板路在午後的陽光下泛著光，一家家門面古樸的小店安靜地開著。
