base_description: '旗津老街，高雄最古老的聚落街道，閩南式的街屋一字排開。

  這裡是打狗最早的漢人聚落，每一棟老宅都藏著幾代人的故事，

  老街的盡頭就是面向海峽的沙灘，世代漁家的命運就在這條街與那片海之間。

  '
