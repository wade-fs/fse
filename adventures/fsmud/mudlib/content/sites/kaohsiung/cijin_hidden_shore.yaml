rumors:
- 某個漁民說他十年前在這裡的礁縫裡找到一個陶罐，罐子裡有幾枚清朝銅錢和一塊刻著字的石片，字跡不是漢字，也不像任何他見過的文字。
settlement: kaohsiung
travel_arrive_text: 你繞過旗津南端的防風林，找到了那片人跡罕至的礁岩海岸，腳下的礁石長滿了藤壺，遠處的海平線空曠而廣大。
