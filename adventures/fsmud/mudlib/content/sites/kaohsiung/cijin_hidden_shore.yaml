base_description: '旗津南端的隱秘礁岩海岸，少有遊客抵達。

  退潮時，礁岩間暴露出各種奇特的海洋生物，

  老漁民說這片礁岩下方有一個巨大的海底洞穴，

  颱風前幾天洞裡會發出低沉的轟鳴聲，比任何氣象預報都準確。

  '
canonical_name: 旗津西海岸（隱秘礁岩區）
