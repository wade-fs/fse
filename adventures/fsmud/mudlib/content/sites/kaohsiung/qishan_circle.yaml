rumors:
- 圓環中心的那棵老榕樹，樹幹上有個洞，老人說裡面住著土地公，有人塞錢進去求財，隔天錢會不見，但不是被人拿走的。
settlement: kaohsiung
travel_arrive_text: 你站在旗山圓環，四條街向四方延伸，賣早點的攤子已經收了，留下一地的菜葉碎屑。
