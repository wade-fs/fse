rumors:
- 有釣客說，愛河的深水處有時候能釣到一些完全不認識的魚種，那種魚放回水裡之後整個身體都變透明，消失在水中。
settlement: kaohsiung
travel_arrive_text: 你來到愛河邊，河水在傍晚的光線下泛著金色，情侶在河畔散步，天邊的夕陽映紅了半個天空。
