base_description: '高雄愛河，貫穿市中心的城市之河。

  日治時期稱為「高雄川」，後改名「愛河」，是高雄市民感情與記憶的載體。

  傍晚時分，兩岸燈光在水面倒映，遊船緩行，是高雄最浪漫的城市景致。

  '
