base_description: 清代鳳山縣城的殘存城牆與砲台。這裡曾多次在民變中易手，城磚上殘留著火燒與刀砍的痕跡，見證了政權的交替與戰火的無情。
travel_arrive_text: 你站在斷垣殘壁的舊城牆前，花崗岩壘砌的城基依然堅固，城樓早已不在。
