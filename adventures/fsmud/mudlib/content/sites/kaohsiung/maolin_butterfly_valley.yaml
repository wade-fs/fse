rumors:
- 魯凱族長老說，紫蝶幽谷是祖先靈魂的歸所，蝴蝶每年來，是因為要來看望還活著的子孫，所以不能隨意捕捉。
settlement: kaohsiung
travel_arrive_text: 你找到了茂林紫蝶幽谷的入口，林間的紫色翅膀遮蔽了陽光，你站在蝴蝶的波浪裡，呼吸都輕了。
