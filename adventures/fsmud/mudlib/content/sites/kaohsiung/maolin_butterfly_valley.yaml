base_description: '茂林國家風景區深處的紫斑蝶越冬棲地，是世界第二大越冬型蝴蝶谷。

  每年十一月至翌年三月，數十萬隻紫斑蝶棲滿林間，

  翅膀的搧動聲如細雨，那個場景讓每一個親歷的人說不出話來。

  '
canonical_name: 茂林紫蝶幽谷
