rumors:
- 布農族的長老說，荖濃溪的上游有塊巨石，石上的紋路記載著布農人最初來到這片山林的故事，但那塊石頭只有在特定的月光下才能看清楚。
settlement: kaohsiung
travel_arrive_text: 你走入桃源山區，荖濃溪的溪聲從谷底傳來，布農族的石板屋群掩映在霧氣之中。
