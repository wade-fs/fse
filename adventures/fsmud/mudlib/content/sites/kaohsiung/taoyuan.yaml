base_description: '高雄桃源區，布農族的家鄉，荖濃溪源頭附近的高山聚落。

  八八風災後部落曾整體遷移，如今重建的新部落與舊有的山林記憶並存，

  布農族的八部合音還在這裡的夜晚迴響。

  '
canonical_name: 桃源
