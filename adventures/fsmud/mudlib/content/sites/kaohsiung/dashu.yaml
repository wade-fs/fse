base_description: '高雄大樹區，以龍目井舊糖廠聞名，也是鳳梨的主要產地。

  荖濃溪在此與高屏溪匯流，沖積的平原養育了世代農家，

  糖廠的老鐵道仍延伸在田野間。

  '
