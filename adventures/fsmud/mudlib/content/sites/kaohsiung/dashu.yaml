rumors:
- 大樹舊糖廠的工人宿舍群，已廢棄多年，有人說在裡面看見日治時代女工的身影，手裡還拿著甘蔗刀。
settlement: kaohsiung
travel_arrive_text: 你來到大樹，四周是大片的鳳梨田，舊糖廠的高煙囪遠遠可見，空氣裡有一股鳳梨的甜香。
