rumors:
- 老人說，法軍進攻時有個砲兵明明已逃走，但事後仍被登記為殉職——另一說是他根本從砲台消失了，沒有人知道他去哪裡。
settlement: kaohsiung
travel_arrive_text: 你攀上旗後砲台，殘存的磚牆框出一片海景，台灣海峽就在眼前，砲孔對著百年前同樣的方向。
