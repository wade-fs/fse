base_description: '旗津旗後山上的清代砲台，1875年由沈葆禎籌建，用於守護打狗港入口。

  砲台以英式格局建造，磚砌的砲位仍可眺望整個台灣海峽，

  當年的砲聲早已湮沒，只有海風日夜穿越砲孔。

  '
