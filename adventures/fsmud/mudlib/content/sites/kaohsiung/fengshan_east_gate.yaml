base_description: '清嘉慶年間所建的鳳山新城城門殘跡，現存東便門（澄瀾砲台旁）。

  城牆以土石砌成，歷經朱一貴、林爽文等多次民變的砲火洗禮，

  是南台灣清代城防體系最具代表性的遺跡。

  '
canonical_ical_name: 鳳山縣新城東門
