base_description: '高雄市立文化中心，座落在市區中心的文化地標。

  藝術展覽、音樂演奏、戲劇表演在此輪番上演，

  中心前的廣場是高雄市民最熟悉的集會空間，

  重大的文化事件都在這裡留下了印記。

  '
