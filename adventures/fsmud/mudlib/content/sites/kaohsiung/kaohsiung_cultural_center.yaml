rumors:
- 文化中心演藝廳地下的老舊備用空間，過去是某個政治敏感年代的存放地，有工人說搬遷時看見過打包的文件箱，但那些箱子後來不知道去哪了。
settlement: kaohsiung
travel_arrive_text: 你來到高雄文化中心廣場，鳳凰木的樹蔭投下疏影，廣場上有孩子在溜滑板，也有老人在下棋。
