rumors:
- 海鮮街最老的那家店，說它的生蚵是從特定一塊礁石採的，那塊礁石長在打狗港最古老的沉船旁邊，老漁民說蚵的味道裡有股說不清楚的甘苦味。
settlement: kaohsiung
travel_arrive_text: 你走過旗津海鮮街，攤位上的活蝦在盆裡蹦跳，老闆拿著夾子對你揮舞，招呼聲此起彼落。
