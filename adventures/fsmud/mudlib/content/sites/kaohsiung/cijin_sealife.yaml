base_description: '旗津渡輪碼頭旁的海鮮餐廳聚集地，現撈仔的海鮮直接從旁邊的漁港卸下，

  海風帶著腥鹹，烤生蚵的炭香，是旗津最平民也最直接的味道。

  '
