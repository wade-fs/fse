base_description: '高雄內山的舊竹林聚落，幾乎被人遺忘的邊陲地帶。

  清代曾有樟腦採集工人在此設寮，後來隨著樟腦業衰退而廢棄，

  殘存的石砌牆基隱沒在竹林間，是一段沒有人記錄下來的歷史。

  '
