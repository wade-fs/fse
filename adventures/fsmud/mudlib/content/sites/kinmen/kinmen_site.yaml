rumors:
- 聽說在後浦老街渡口的花崗岩石板底下，還埋有明代施琅水師登陸時遺落的銅盔。
- 有人傳言，在起霧的清晨，料羅灣面會浮現出八二三砲戰時運補小艇搶灘的虛幻倒影。
