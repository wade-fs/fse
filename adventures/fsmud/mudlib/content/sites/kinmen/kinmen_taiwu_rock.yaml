rumors:
- 聽說毋忘在莒勒石在起大風的夜晚，玄武岩或花崗岩縫裡會傳出隆隆砲聲般的低吟。
- 有人傳言，在毋忘在莒勒石遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用罐頭箱。
