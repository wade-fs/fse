id: kinmen_qiu_monument
settlement: kinmen
canonical_name: 邱良功母節孝坊
base_description: 金門唯一的一等古蹟石牌坊，由泉州青斗石雕刻而成，牌坊下雕有精美的石獅，為旌表清代名將邱良功之母而立。
names:
- era: "v1.0"
  name: 舊日治邱良功母節孝坊
- era: "v3.0"
  name: 金門邱良功母節孝坊
- era: "modern"
  name: 邱良功母節孝坊
connections:
- kinmen_site
rumors:
- 聽說邱良功母節孝坊在起大風的夜晚，玄武岩或花崗岩縫裡會傳出隆隆砲聲般的低吟。
- 有人傳言，在邱良功母節孝坊遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用罐頭箱。
