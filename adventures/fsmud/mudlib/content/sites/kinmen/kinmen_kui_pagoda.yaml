canonical_name: 魁星樓
base_description: 馬公或金門老街的文教信仰點，奉祀魁星爺，清代文人在此開創文風，石雕香爐歷史悠久。
names:
- era: "v1.0"
  name: 舊日治魁星樓
- era: "v3.0"
  name: 金門魁星樓
- era: "modern"
  name: 魁星樓
connections:
- kinmen_site
rumors:
- 聽說魁星樓在起大風的夜晚，玄武岩或花崗岩縫裡會傳出隆隆砲聲般的低吟。
- 有人傳言，在魁星樓遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用罐頭箱。
