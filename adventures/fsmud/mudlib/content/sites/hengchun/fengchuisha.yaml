id: fengchuisha
settlement: hengchun
canonical_name: 風吹砂
is_heritage: false
base_description: |
  恆春半島著名的風積地質景觀。
  冬季強勁的落山風將沙子吹上懸崖，夏季雨水又將沙子沖刷下海，形成了獨特的沙河與沙瀑。
travel_arrive_text: 你來到風吹砂，強風捲起細沙打在臉上隱隱作痛，巨大的沙坡從公路旁一直延伸到下方的海岸。
names:
- era: qing
  name: 風吹沙原野
- era: japanese
  name: 風吹砂
- era: modern
  name: 風吹砂
rumors:
  - "沙坡深處有時會因風力吹襲而暴露出古老的陶罐碎片，有人說那是史前原住民留下的祭祀器皿。"
