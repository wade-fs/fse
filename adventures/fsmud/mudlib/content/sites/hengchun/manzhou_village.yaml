id: manzhou_village
settlement: hengchun
canonical_name: 滿州
is_heritage: false
base_description: |
  恆春半島東部的滿州鄉聚落，舊稱「蚊蟀埔」。
  四面環山，出產牧草與灰面鵟鷹，是排灣族與早期漢人開墾邊疆的重要交會點。
travel_arrive_text: 你來到滿州村落，四周是大片的牧草地，風吹草低，成群的牛羊散佈在山坡上。
names:
- era: qing
  name: 蚊蟀埔
- era: japanese
  name: 滿州庄
- era: modern
  name: 滿州鄉
rumors:
  - "每年國慶日前後，灰面鵟鷹集體飛過滿州天空，老居民說那是以前戰死沙場的勇士英靈在巡視家園。"
