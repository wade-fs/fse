base_description: 牡丹社事件後，清廷深感海防脆弱，由沈葆楨規劃興建的防禦城池。城牆採用當地硓𡏆石與磚石混建，是台灣目前保留最完整的清代城池。
travel_arrive_text: 你漫步在保存完好的古老城牆上，灰黑色的磚石散發著歲月的滄桑，城門洞深邃而堅固。
