  name: 鵝鑾鼻鼻頭山
- era: japanese
  name: 鵝鑾鼻遊園地
- era: modern
  name: 鵝鑾鼻公園
rumors:
  - "礁石谷深處的滄海亭，聽說有人曾在那裡撿到過日治時期的學生帽，但拿起來就碎成了灰塵。"
