id: eluanbi_park
settlement: hengchun
canonical_name: 鵝鑾鼻公園
is_heritage: false
base_description: |
  圍繞燈塔的珊瑚礁石林與熱帶植物園。步道縱橫，
  穿梭在奇特的珊瑚裂谷與百年巨木之間。
travel_arrive_text: 你漫步在崎嶇的珊瑚礁步道上，頭頂大頭茶花盛開，海浪的轟鳴聲從下方的礁岩處傳來。
names:
