id: nanwan_beach
settlement: hengchun
canonical_name: 南灣沙灘
is_heritage: false
base_description: |
  恆春半島最著名的沙灘之一，舊稱大板埒。
  這裡弧線優美，細沙潔白，是昔日捕鯨業的集散地，如今則是衝浪者的天堂。
travel_arrive_text: 你來到南灣海灘，蔚藍的波浪一波波推向金黃色的沙灘，海邊的陽傘林立，海風暖洋洋的。
names:
- era: qing
  name: 大板埒海灘
- era: japanese
  name: 大板埒捕鯨場
- era: modern
  name: 南灣海灘
rumors:
  - "老漁民說捕鯨場廢棄後，南灣的深海裡每到暴風雨前夕，還能聽見遠處巨鯨的長鳴。"
connections:
- hengchun_south_gate
- maobitou
