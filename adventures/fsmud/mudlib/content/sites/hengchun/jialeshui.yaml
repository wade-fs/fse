id: jialeshui
settlement: hengchun
canonical_name: 佳樂水
is_heritage: false
base_description: |
  恆春半島東海岸的地質奇觀，舊稱「佳落水」。
  因海岸線受波浪侵蝕與強風吹襲，形成了青蛙石、海將軍、蜂巢岩等各種造型奇特的礁岩。
travel_arrive_text: 你漫步在佳樂水礁岩海岸，洶湧的太平洋海浪猛烈拍打著岸邊的奇岩怪石，激起滔天巨浪。
names:
- era: qing
  name: 佳落水海岸
- era: japanese
  name: 佳落水奇岩
- era: modern
  name: 佳樂水風景區
rumors:
  - "海將軍巨石下方，據說在風浪最大的深夜，能看到一盞引路神燈在礁石間若隱若現。"
