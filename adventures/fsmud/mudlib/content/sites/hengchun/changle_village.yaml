id: changle_village
settlement: hengchun
canonical_name: 響林村
is_heritage: false
base_description: |
  恆春半島東側的丘陵村落，舊稱響林庄。
  四周山林青翠，溪水流過平壩，是清代開山撫番政策下閩南、客家與原住民交融的代表聚落。
travel_arrive_text: 你來到安靜的響林村，老舊的閩式紅磚三合院錯落分布在田野間，老人在大樹下乘涼。
