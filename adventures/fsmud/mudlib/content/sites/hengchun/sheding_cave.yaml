base_description: |
  社頂山林深處的隱秘鐘乳石洞穴。
  洞頂懸掛著千百年的鐘乳石，石筍從地面拔起，滴水聲在空曠的洞內迴響，
  曾是排灣族人躲避外敵的隱蔽所。
travel_arrive_text: 你側身擠進狭窄的岩縫，手電筒照亮了濕漉漉的鐘乳石壁，冰涼的地下水滴在你的肩膀上。
names:
- era: qing
  name: 龜仔角石穴
- era: japanese
  name: 社頂鍾乳洞
- era: modern
  name: 社頂鐘乳石洞
rumors:
  - "洞穴深處埋有一尊斷臂的石觀音像，據說是清代避難的難民留下來的，能保佑尋寶者安全歸來。"
