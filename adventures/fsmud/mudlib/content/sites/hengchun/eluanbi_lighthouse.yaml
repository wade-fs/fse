id: eluanbi_lighthouse
settlement: hengchun
canonical_name: 鵝鑾鼻燈塔
is_heritage: true
base_description: |
  台灣最南端的燈塔，建於清光緒年間。因防範當地原住民襲擊，
  燈塔四周築有壕溝與帶槍眼的圍牆，是世界上少見的武裝燈塔。
travel_arrive_text: 你站在蔚藍的天空下，白色的鵝鑾鼻燈塔高聳在青翠的草坡上，巴士海峽的強風吹拂著你的衣角。
names:
- era: qing
  name: 鵝鑾鼻砲台燈塔
- era: japanese
  name: 鵝鑾鼻燈台
- era: modern
  name: 鵝鑾鼻燈塔
rumors:
  - "燈塔舊倉庫的角落藏著一塊清代鐵牌，上面刻著洋人工程師的名字，摸起來冰冷異常。"
