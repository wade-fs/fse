id: hengchun_east_gate
settlement: hengchun
canonical_name: 恆春東門
is_heritage: true
base_description: |
  恆春古城東門（景照門），通往滿州與滿豐庄的要道。
  東門城牆的「搶孤」棚架是恆春每年中元祭典的歷史地標。
travel_arrive_text: 你站在東門城牆下，巨大的搶孤木質棚架直插雲霄，木柱上塗滿了黑色的牛油。
names:
