  name: 恆春縣城東門（景照門）
- era: japanese
  name: 東門外路
- era: modern
  name: 恆春東門
rumors:
  - "搶孤棚架最頂端的那面彩旗，曾有人看見無風自落，那年滿州莊必定會有大事發生。"
