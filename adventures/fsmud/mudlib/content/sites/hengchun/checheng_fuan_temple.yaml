id: checheng_fuan_temple
settlement: hengchun
canonical_name: 車城福安宮
is_heritage: true
base_description: |
  台灣最大、也是歷史最悠久的土地公廟。
  主祀福德正神，廟宇規模宏偉，香火鼎盛，其「自動吸紙錢」的八角金爐更是遠近馳名。
travel_arrive_text: 你來到車城福安宮，廟埕人潮洶湧，巨大的金爐前氣流旋轉，將金紙一張張吸入爐內，熱浪滾滾。
names:
- era: qing
  name: 車城福德廟
- era: japanese
  name: 車城庄福安宮
- era: modern
  name: 車城福安宮
rumors:
  - "相傳清代總兵曾親自來此求神庇佑，並留下了一面暗金色的令牌，至今仍密藏在神龕深處。"
connections:
- hengchun_north_gate
- sheliao_port
