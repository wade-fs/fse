base_description: 恆春古城的南城門（明都門）。磚造的城門結構宏偉，城門洞上方嵌有花崗岩門額，這裡曾是守衛城池、面向南海的前哨要塞。
travel_arrive_text: 你站在南門圓環旁，城門洞兩側斑駁的紅色漆面在陽光下十分醒目。
