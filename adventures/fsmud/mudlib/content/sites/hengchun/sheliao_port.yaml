id: sheliao_port
settlement: hengchun
canonical_name: 射寮港
is_heritage: true
base_description: |
  恆春半島西北側的古老港口，舊稱「射寮」。
  是牡丹社事件中，日軍最初登陸恆春半島以及清代海防重兵駐紮的重要歷史遺址。
travel_arrive_text: 你來到射寮港沙灘，海風吹來，防風林沙沙作響，沙灘上散落著一些廢棄的小漁船，往日的喧囂早已不見。
names:
- era: qing
  name: 射寮港口
- era: japanese
  name: 射寮港
- era: modern
  name: 射寮漁港
rumors:
  - "漁民說退潮時的沙灘深處，偶爾能看見二戰時留下的生銹鐵網，那是防範盟軍登陸的工事殘骸。"
connections:
- checheng_fuan_temple
- shimen_battlefield
