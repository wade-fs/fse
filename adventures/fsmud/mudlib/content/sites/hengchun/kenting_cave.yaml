id: kenting_cave
settlement: kenting_cave
canonical_name: 仙洞
is_heritage: true
hidden: true
base_description: |
  墾丁森林遊樂區內的巨型石灰岩溶洞「仙洞」。
  全長百餘公尺，洞內鐘乳石密布，壁面奇石千姿百態，在人工彩燈照耀下幻化萬千。
travel_arrive_text: 你走入深邃的仙洞，石灰岩壁散發著古老的潮濕氣味，各種形狀奇特的石筍在陰影中宛如仙人站立。
names:
- era: qing
  name: 龜仔角大仙洞
- era: japanese
  name: 恆春仙洞
- era: modern
  name: 墾丁仙洞
rumors:
  - "洞壁最深處有一處常年濕潤的石孔，相傳那是地底龍脈的呼吸口，會吹出溫暖的氣流。"
connections:
- kenting_forest
