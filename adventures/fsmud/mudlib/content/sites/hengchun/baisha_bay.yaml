id: baisha_bay
settlement: hengchun
canonical_name: 白沙灣
is_heritage: false
base_description: |
  由純白貝殼沙組成的幽靜海灣。
  兩側有珊瑚礁環抱，海水平靜，是李安導演電影《少年Pi的奇幻漂流》的取景地。
travel_arrive_text: 你來到白沙灣，貝殼沙在陽光下泛著銀光，清澈見底的海水輕柔地拍打著沙灘。
names:
- era: qing
  name: 白沙港角
- era: japanese
  name: 白砂灣
- era: modern
  name: 墾丁白沙灣
rumors:
  - "沙灘旁的防風林深處，有人曾挖出過生銹的鐵錨，那是十九世紀外國商船觸礁後留下的遺跡。"
connections:
- guanshan_sunset
- maobitou
