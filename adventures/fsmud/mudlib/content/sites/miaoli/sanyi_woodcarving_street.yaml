id: sanyi_woodcarving_street
is_heritage: false
names:
- era: qing
  name: 三叉河木器街
- era: japanese
  name: 三義木雕市街
- era: modern
  name: 三義木雕老街
rumors:
- 木雕老街上有些上了年紀的樟木雕刻，據說在梅雨季節的夜裡會散發出淡淡的綠色微光。
settlement: miaoli
travel_arrive_text: 你走入三義木雕老街，街道兩旁擺滿了巨大的樟木根雕，空氣中瀰漫著樟腦與檜木的獨特清香。
