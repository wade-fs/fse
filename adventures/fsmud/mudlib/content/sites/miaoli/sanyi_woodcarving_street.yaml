base_description: 三義著名的木雕產業聚集街區。自日治時期起，因樟樹資源豐富，木雕工藝在此蓬勃發展，街旁商鋪陳列著琳瑯滿目的木雕藝術品，木香四溢。
canonical_name: 三義木雕老街
connections:
