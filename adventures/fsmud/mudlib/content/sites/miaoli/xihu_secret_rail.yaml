rumors:
- 自行車道旁的老土地公廟，每到插秧季節，都會有農夫前來敬獻剛泡好的新茶。
settlement: miaoli
travel_arrive_text: 你沿著自行車道前行，綠油油的稻田在微風中翻滾，稻香撲鼻，遠處的客家農舍點綴在綠野間。
