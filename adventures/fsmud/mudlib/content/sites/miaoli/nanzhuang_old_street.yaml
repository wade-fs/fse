base_description: 南庄鄉的歷史核心街區。以「桂花巷」與老郵局著稱，展現了客家文化、泰雅族與賽夏族原住民文化在此交融共存的豐富歷史脈絡。
canonical_name: 南庄老街
connections:
- miaoli_site
id: nanzhuang_old_street
is_heritage: true
names:
- era: qing
  name: 南庄防邊隘勇線
- era: japanese
  name: 南庄街
- era: modern
  name: 南庄老街
rumors:
- 桂花巷深處的老水溝旁，有店家說深夜能聽見婦女們用客家話和泰雅語一邊洗衣一邊聊天的聲音。
settlement: miaoli
travel_arrive_text: 你漫步在狹窄的桂花巷中，紅磚路面油亮，兩旁的木造日式建築鱗次櫛比，桂花釀的香氣撲面而來。
