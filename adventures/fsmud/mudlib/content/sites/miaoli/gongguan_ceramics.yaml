rumors:
- 老窯工說，如果燒窯時看見爐火中浮現青綠色的火焰，那一窯燒出來的瓷器必定是極品。
settlement: miaoli
travel_arrive_text: 你參觀公館陶瓷工坊，巨大的紅磚窯室散發著餘溫，陶藝師傅正坐在拉坯機前專注地塑形。
