rumors:
- 老一輩果農說，大湖最早開墾時曾挖出過巨大的古生物化石，隨後又被埋回了地底。
settlement: miaoli
travel_arrive_text: 你走進大湖草莓田，空氣中瀰漫著淡淡的草莓甜香，果農們正在田間採收鮮紅的漿果。
