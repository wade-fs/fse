base_description: 竹南海岸線的大片黑松防風林。木麻黃與松樹林綿延數公里，阻擋了強烈的東北季風，林內幽靜，是沙灘與內陸之間的綠色屏障。
canonical_name: 竹南海濱防風林
connections:
- miaoli_site
id: zhunan_sea_park
is_heritage: false
names:
- era: qing
  name: 竹南沙丘防風林
- era: japanese
  name: 竹南海濱保安林
- era: modern
  name: 竹南海濱森林公園
rumors:
- 林務員說在防風林最深處的木麻黃樹幹上，曾發現過二戰時期日軍防空哨兵刻下的思鄉漢字。
settlement: miaoli
travel_arrive_text: 你走進竹南海濱防風林，陽光透過松針灑下斑駁的碎影，踩在厚厚的落葉上發出沙沙聲，濤聲隔著林木傳來。
