base_description: 清末開山撫番時期遺留下來的樟腦蒸餾小屋殘骸。隱藏在深密的樟樹林中，倒塌的紅磚灶台與銹蝕的蒸餾鐵桶依然靜靜訴說著當年的樟腦黃金歲月。
