base_description: 建於日治時期的紅磚拱橋，原名魚藤坪鐵橋。在1935年新竹台中大地震中震毀，留下了高聳的大紅磚石橋墩，是台灣最知名的地震遺址之一。
canonical_name: 龍騰斷橋
connections:
- miaoli_old_railway
id: longteng_broken_bridge
is_heritage: true
names:
- era: qing
  name: 魚藤坪溪谷
- era: japanese
  name: 魚藤坪磚拱橋
- era: modern
  name: 龍騰斷橋
rumors:
- 老一輩人傳說，橋下溪谷中曾有一隻巨大的魚藤精，大地震就是為了震封這隻巨獸。
settlement: miaoli
travel_arrive_text: 你站在巨大的龍騰斷橋墩下，高聳的紅磚橋基直插雲霄，頂端長滿了野草與灌木，極具視覺衝擊力。
