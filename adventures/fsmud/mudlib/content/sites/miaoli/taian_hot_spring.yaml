base_description: 汶水溪上游的泰安溫泉源頭。溫泉水質為碳酸氫鈉泉，清澈無味，日治時期由日警開發為療養所，藏在險峻的峽谷深處。
canonical_name: 泰安溫泉源頭
connections:
- dakeng_aboriginal_village
id: taian_hot_spring
is_heritage: false
names:
- era: qing
  name: 汶水溪溫泉谷
- era: japanese
  name: 上島溫泉
- era: modern
  name: 泰安溫泉
rumors:
- 泰雅族獵人傳說，這口溫泉是受傷的黑熊發現的，黑熊在泉水裡泡過後傷口便迅速癒合。
settlement: miaoli
travel_arrive_text: 你來到溫泉源頭，溪谷中熱氣蒸騰，溫泉水從石縫中湧出，沿著岩石留下一層白色的碳酸鈣結晶。
