base_description: 鳴鳳古道是清代漢人與賽夏族原住民物資交換的交通要道。古道沿著溪谷修築，兩旁樟樹密佈，是當年採樟業的重要運輸線。
canonical_name: 獅潭鳴鳳古道
connections:
- miaoli_hakka_yi_min
id: shitan_camphor_trail
is_heritage: true
names:
- era: qing
  name: 鳴鳳開墾古道
- era: japanese
  name: 鳴鳳聯絡道
- era: modern
  name: 鳴鳳古道
rumors:
- 古道旁的「情人谷」，老一輩人說在清晨霧氣最濃時，能聽見原住民悠揚的木琴笛聲。
settlement: miaoli
travel_arrive_text: 你踩在古老的石板階梯上，山林幽靜，兩旁布滿了厚厚的青苔，溪水在下方的谷底潺潺流過。
