  name: 後龍砲台山
- era: japanese
  name: 後龍眺望台
- era: modern
  name: 後龍好望角
rumors:
- 好望角下方的平埔族遺址，曾有考古學家在暴雨後的泥土中撿到過彩色的貝殼項鍊殘片。
settlement: miaoli
travel_arrive_text: 你站在好望角高地上，強勁的海風迎面吹來，白色的巨大風車在耳邊發出沉悶的呼嘯聲，鐵路火車沿著海岸緩緩駛過。
