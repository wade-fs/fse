base_description: 後龍海岸的高耸岬角。視野遼闊，可以俯瞰下方的台灣海峽與縱貫鐵路，巨大的白色風力發電機在海岸線上緩緩轉動，是看海的絕佳景點。
canonical_name: 後龍好望角
connections:
- miaoli_site
id: houlong_cape_hope
is_heritage: false
names:
