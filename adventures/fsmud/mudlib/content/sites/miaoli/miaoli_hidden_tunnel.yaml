rumors:
- 老一輩鐵路工人說，深夜在隧道深處有時能聽見火車鳴笛聲，但那段鐵路早已停駛了數十年。
settlement: miaoli
travel_arrive_text: 你走入漆黑的舊山線二號隧道，手電筒的光束照亮了古老紅磚砌成的拱頂，水滴聲在空曠的通道中回盪。
