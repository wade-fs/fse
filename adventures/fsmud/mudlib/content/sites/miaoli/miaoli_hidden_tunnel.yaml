base_description: 舊山線二號隧道，深藏於三義山林之中，建於日治時期。隧道內部陰涼，壁面上殘留著當年蒸汽火車留下的煤煙痕跡，深處的水坑裡還寄居著獨特的穴居生物。
canonical_name: 舊山線二號隧道
connections:
