rumors:
- 玉清宮大殿的青銅大鐘，在重大民事糾紛調解成功的那天，據說會自己發出清脆的鳴響。
settlement: miaoli
travel_arrive_text: 你來到玉清宮前的廟埕，宏偉的牌樓下香煙裊裊，殿內關帝神像威嚴肅穆，香客們正虔誠叩拜。
