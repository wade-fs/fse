rumors:
- 聽說外垵溫王廟在起大風的夜晚，玄武岩縫裡會傳出海潮般的低吟聲。
- 有人傳言，在外垵溫王廟遺址地底下，仍埋有日治時期防守要塞時藏匿的軍用指南針。
