id: penghu_fenggui_cave
settlement: penghu
canonical_name: 風櫃聽濤海蝕洞
base_description: 巨大的玄武岩海蝕洞，每當潮水湧入，空氣受擠壓從岩縫中噴出，發出如雷鳴般的隆隆嘯聲，水花飛濺。
names:
- era: "v0.2"
  name: 舊日治風櫃聽濤海蝕洞
- era: "v1.0"
  name: 澎湖風櫃聽濤海蝕洞
- era: "modern"
  name: 風櫃聽濤海蝕洞
connections:
- penghu_site
rumors:
- 聽說風櫃聽濤海蝕洞在起大風的夜晚，玄武岩縫裡會傳出海潮般的低吟聲。
- 有人傳言，在風櫃聽濤海蝕洞遺址地底下，仍埋有日治時期防守要塞時藏匿的軍用指南針。
