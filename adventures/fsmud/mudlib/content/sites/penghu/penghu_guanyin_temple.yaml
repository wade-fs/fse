id: penghu_guanyin_temple
settlement: penghu
canonical_name: 馬公觀音亭
base_description: 清代建廟的佛寺，廟前沙灘海灣平緩，日治時期曾設有海水浴場，是眺望澎湖西嶼落日的絕佳位置。
names:
- era: "v0.2"
  name: 舊日治馬公觀音亭
- era: "v1.0"
  name: 澎湖馬公觀音亭
- era: "modern"
  name: 馬公觀音亭
connections:
- penghu_site
rumors:
- 聽說馬公觀音亭在起大風的夜晚，玄武岩縫裡會傳出海潮般的低吟聲。
- 有人傳言，在馬公觀音亭遺址地底下，仍埋有日治時期防守要塞時藏匿的軍用指南針。
