id: sugar_refinery_north
settlement: chiayi_city
canonical_name: 嘉義製糖所（北廠）
is_heritage: false
base_description: |
  北廠的煙囪在嘉義市北邊的天際線上清晰可見。
  採收季時，甘蔗車一輛接一輛，整個街區瀰漫著熱糖的甜膩氣味。
  工人三班制，廠燈從未熄滅，是嘉義平原工業化最直白的象徵。
travel_arrive_text: "你走近糖廠，熱氣從磚牆縫隙滲出來，空氣裡有甜膩的蔗糖香。"

names:
  - era: japanese
    name: 嘉義製糖株式會社北廠
  - era: postwar
    name: 台糖嘉義廠
  - era: modern
    name: 嘉義製糖所北廠（廢棄）

rumors:
  - "糖廠倉管說有一個特定的磚頭格，裡面從日本時代起就從來沒有被清空過，格子上貼著封條，但封條是舊的。"

connections:
  - north_gate_area
  - alishan_railway_depot
