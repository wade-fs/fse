id: lantern_street
settlement: chiayi_city
canonical_name: 燈籠街
is_heritage: false
base_description: |
  這條窄巷的兩側掛滿了大大小小的紅燈籠，有廟宇訂製的、有婚慶用的、有祭典用的。
  燈籠師傅坐在店裡用竹篾彎出骨架，外面糊上薄薄的紅紙，
  再用毛筆寫上字。一個燈籠從頭到尾大概三十分鐘，師傅手從不停。
travel_arrive_text: "你走進燈籠街，紅色的光把整條巷子染成暖橘色，微風吹來，燈籠在頭頂輕輕搖晃。"

names:
  - era: japanese
    name: 提燈製造所通
  - era: postwar
    name: 燈籠巷
  - era: modern
    name: 燈籠街

rumors:
  - "燈籠師傅說他爺爺做過一批燈籠，送去掛二二八那天義勇軍的指揮部，後來那批燈籠沒有回來，人也沒有。"

connections:
  - chiayi_city_temple
  - chiayi_city
