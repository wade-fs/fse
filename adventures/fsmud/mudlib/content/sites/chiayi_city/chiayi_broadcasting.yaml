canonical_name: 嘉義放送局
is_heritage: true
hidden: true
base_description: |
  矮矮的磚造廠房裡有一個播音間，麥克風和轉盤機現在已是展示品。
  二二八那天，有人試圖佔領這裡向全嘉義廣播，
  廣播出去了，但廣播的人後來消失了。
travel_arrive_text: "你走進放送局，看著展示的廣播設備，麥克風的質感讓你有一種想說話又說不出口的感覺。"

names:
