    name: 嘉義放送局
  - era: postwar
    name: 嘉義廣播電台
  - era: modern
    name: 嘉義放送局文化資產館

rumors:
  - "館方人員說，展示的那個麥克風曾在二二八那天對著嘉義說話，但說了什麼，沒有錄音留下來。"

