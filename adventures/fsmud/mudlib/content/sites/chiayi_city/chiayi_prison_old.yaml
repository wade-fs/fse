id: chiayi_prison_old
settlement: chiayi_city
canonical_name: 嘉義監獄舊址
is_heritage: true
hidden: true
base_description: |
  扇形輻射狀的獄房格局是日本殖民者從西方移植來的監控設計，
  一個守衛站在圓心可以看到所有廊道。
  現在是文化園區，但走廊的長度和鐵門的重量感還在，
  讓每一個走過去的人都不由得放慢腳步。
travel_arrive_text: "你走進監獄舊址，腳步聲在長廊裡迴盪，和當年是同樣的聲音。"

names:
  - era: japanese
    name: 嘉義刑務所
  - era: postwar
    name: 嘉義監獄
  - era: modern
    name: 嘉義監獄文化園區

rumors:
  - "某個牢房的牆壁上有用指甲刻的字，刻的是日文和台語交替的一首詩，沒有名字，日期是昭和二十二年三月。"

connections:
