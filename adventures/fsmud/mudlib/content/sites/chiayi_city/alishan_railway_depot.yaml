id: alishan_railway_depot
settlement: chiayi_city
canonical_name: 阿里山鐵路調度場
is_heritage: true
base_description: |
  木造的調度廠房飄散著機油與松木的氣味。幾輛森林鐵路的蒸汽機車停在側線，
  車身塗著暗紅，是從阿里山原始森林裡運材而生的機器。
  技師們蹲在車輪旁敲打、測量，每一道維修記錄都是一頁林業史。
travel_arrive_text: "你走進阿里山鐵路調度場，蒸汽的嘶嘶聲和金屬敲擊聲交織成這個地方特有的節奏。"

names:
  - era: japanese
    name: 嘉義製材所鐵道部
  - era: postwar
    name: 阿里山鐵道修理廠
  - era: modern
    name: 阿里山鐵路調度場

rumors:
  - "老技師說調度場最裡面有一節車廂從來沒有打開過，鑰匙在日本人手裡，現在不知道去哪了。"

