    name: 嘉義公立醫院
  - era: postwar
    name: 嘉義市立醫院
  - era: modern
    name: 嘉義公立醫院文物館

rumors:
  - "醫院舊手術室的牆壁上有幾個字，說是二二八那幾天有傷患被藏在手術室裡，字是他們用血寫的，後來被漆掉了。"

