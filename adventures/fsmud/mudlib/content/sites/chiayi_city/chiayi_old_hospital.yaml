id: chiayi_old_hospital
settlement: chiayi_city
canonical_name: 嘉義公立醫院舊址
is_heritage: true
base_description: |
  這棟白色木造建築現在是醫療史文物館。長廊兩側的診間還保留著舊式的木製藥櫃，
  抽屜上貼著日文藥名的標籤。
  日治時代的護士制服掛在展示架上，白得像一個遙遠而乾淨的年代。
travel_arrive_text: "你走進舊醫院的長廊，消毒水的氣味早已不在，只有木材與時間的氣味。"

names:
