id: riverside_settlement
settlement: chiayi_city
canonical_name: 八掌溪河岸聚落
is_heritage: false
base_description: |
  八掌溪的堤防外是一片河岸低地，住著幾戶靠打漁與種菜維生的家庭。
  竹造的屋子搭得低矮，颱風來前全家要往城裡跑。
  溪邊的日落最美，但美景只有這幾戶人家有空看。
travel_arrive_text: "你走到八掌溪堤防外，河風把城市的聲音隔絕在遠處，眼前只有水聲和蘆葦。"

names:
  - era: qing
    name: 打貓溪河埔地
  - era: japanese
    name: 八掌溪河岸
  - era: modern
    name: 八掌溪河岸聚落

rumors:
  - "颱風過後溪邊有人發現一具木頭漂來，上面刻了地圖，但地圖指向的位置在現在的嘉義公園，挖不得。"

connections:
  - north_gate_area
