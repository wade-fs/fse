id: old_city_wall
settlement: chiayi_city
canonical_name: 諸羅舊城牆遺址
is_heritage: true
hidden: true
base_description: |
  幾段殘存的土城牆夾在現代樓房之間，像是時代縫隙裡的殘骸。
  磚色是暗紅的，是清代的手工燒磚，每塊都有輕微的手壓紋。
  解說牌立在旁邊，說這裡曾是林爽文攻城的決戰地點。
travel_arrive_text: "你走到舊城牆遺址，殘存的磚牆比你想像中矮，但站在它前面，有種說不清楚的重量感。"

names:
  - era: qing
    name: 諸羅縣城土牆
  - era: japanese
    name: 嘉義舊城址
  - era: postwar
    name: 嘉義古城牆
  - era: modern
    name: 諸羅舊城牆遺址

rumors:
  - "有人在城牆磚縫裡發現了一個小布包，裡面是幾枚清代銅錢和一張無字的紙，包包被帶走了，磚縫還在。"

connections:
  - chiayi_city
  - chiayi_city_temple
  - north_gate_area
