id: chicken_rice_alley
settlement: chiayi_city
canonical_name: 雞肉飯街
is_heritage: false
base_description: |
  這條短短的巷弄裡有七家雞肉飯，每家都說自己是正宗。
  火雞肉的油香從大鍋裡蒸騰而出，澆上雞油飯，
  搭一碗苦瓜湯。嘉義人的早餐不談歷史，只談這碗飯夠不夠香。
travel_arrive_text: "你轉進雞肉飯街，濃郁的雞油香氣立刻讓你的胃開始期待。"

names:
  - era: japanese
    name: 鶏肉料理屋台
  - era: postwar
    name: 火雞肉飯巷
  - era: modern
    name: 雞肉飯街

rumors:
  - "第一家火雞肉飯老闆的阿嬤說，雞肉飯的秘訣是日本時代從軍隊廚師那邊學來的，才有火雞這個食材。"

connections:
  - central_market
  - chiayi_city
