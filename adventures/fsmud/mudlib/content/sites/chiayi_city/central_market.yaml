id: central_market
settlement: chiayi_city
canonical_name: 嘉義東市場
is_heritage: true
base_description: |
  東市場的磁磚屋頂在清晨五點就已燈火通明。
  豬肉攤、魚攤、蔬菜行依著老規矩排列，走廊裡的小吃攤賣著火雞肉飯和米糕。
  每個攤位都是一個家族的命脈，從日治傳到現在，位置固定，客人固定。
travel_arrive_text: "你走進東市場，鮮魚和滷肉的氣味同時撲來，人聲在鐵皮屋頂下迴盪。"

names:
  - era: japanese
    name: 嘉義公設市場
  - era: postwar
    name: 嘉義東門市場
  - era: modern
    name: 嘉義東市場

rumors:
  - "市場最深處有一家布行從來不賣布，老闆整天坐在裡面喝茶，但從來沒人看過他出入過。"

