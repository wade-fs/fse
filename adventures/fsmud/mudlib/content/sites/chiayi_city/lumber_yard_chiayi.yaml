id: lumber_yard_chiayi
settlement: chiayi_city
canonical_name: 嘉義製材所遺址
is_heritage: true
base_description: |
  製材所的大型廠房骨架還在，鋼骨生著紅鏽，地面上留著鋸台的固定孔。
  這裡曾是全台最大的木材加工廠，阿里山的檜木從山上下來，
  就在這裡被剖成板材，再運往全島各地。
  木香已經散盡，只剩鐵鏽與野草。
travel_arrive_text: "你走進製材所遺址，腳踩著碎磚，腦海裡試著想像當年機器轟鳴的景象。"

names:
  - era: japanese
    name: 嘉義製材所
  - era: postwar
    name: 台灣林產管理局嘉義廠
  - era: modern
    name: 嘉義製材所遺址

rumors:
  - "製材所深處有一棟小辦公室，窗戶用磚頭封死了，有人說戰後封掉的時候裡面還有人的東西沒有帶走。"

connections:
