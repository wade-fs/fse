id: city_park
settlement: chiayi_city
canonical_name: 嘉義公園
is_heritage: true
hidden: true
base_description: |
  公園裡的老榕樹樹齡超過百年，幾棵大樹的根系已經把石板路拱起來。
  日治時代這裡建過一座神社，戰後神社拆了，留下了石燈籠和一段石階。
  現在有老人在樹蔭下下棋，有孩子在草地上奔跑，石燈籠就這樣靜靜待在一旁。
travel_arrive_text: "你走進嘉義公園，老榕樹的氣根垂下來，樹蔭把午後的燥熱擋在外面。"

names:
  - era: japanese
    name: 嘉義神社
  - era: postwar
    name: 嘉義公園（舊神社址）
  - era: modern
    name: 嘉義公園

rumors:
  - "公園石階下面據說有一座封閉的地窖，是當年奉安庫，神社拆了但地窖沒有，被土蓋住了。"

connections:
  - north_gate_area
  - chiayi_city
