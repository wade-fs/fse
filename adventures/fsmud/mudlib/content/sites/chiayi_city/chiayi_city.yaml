rumors:
  - "有人說圓環噴水池下面是清代城牆的地基，挖深一點就會看到舊磚，只是沒人真的去挖過。"
  - "噴水圓環的某條輻射路通到一棟沒有窗的建築，日本時代用途不明，現在掛了布招，說是倉庫。"

