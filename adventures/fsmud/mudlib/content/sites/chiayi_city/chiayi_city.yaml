id: chiayi_city
settlement: chiayi_city
canonical_name: 嘉義市（中正路圓環）
is_heritage: true
base_description: |
  諸羅山城的心臟地帶。中正路的大型噴水圓環在烈日下噴出白色水花，
  圓環四周輻射出六條街道，糕餅店、布行、米食攤沿路鋪陳。
  聞著雞肉飯的香氣，看著人力車穿梭，這座城市把清領、日治、戰後的
  氣味全揉在同一條街道上。
travel_arrive_text: "你踏入嘉義市的核心，圓環噴水的水霧在陽光下散出七色彩虹，空氣裡有雞油的香氣。"
footprint: geo:chiayi_city

