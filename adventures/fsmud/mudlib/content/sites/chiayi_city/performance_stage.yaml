id: performance_stage
settlement: chiayi_city
canonical_name: 嘉義公會堂
is_heritage: true
base_description: |
  日式風格的公會堂外牆已修復，正面的山牆保留著昭和年間的洗石子工藝。
  門廊的木柱打磨得光滑，廳內可容納數百人。
  這裡曾舉辦過皇民奉公演講，也曾在某個夜晚擠滿了不知道明天會如何的人。
travel_arrive_text: "你走進公會堂，腳步在木地板上發出迴響，空曠的大廳讓聲音顯得格外清晰。"

names:
  - era: japanese
    name: 嘉義公會堂
  - era: postwar
    name: 嘉義市民會堂
  - era: modern
    name: 嘉義公會堂（修復）

rumors:
  - "有個老人說公會堂地板下有一個密室，是日本時代防空用的，入口在舞台右側的一塊活動地板。"

connections:
