id: incense_shop_chiayi
settlement: chiayi_city
canonical_name: 百年香舖
is_heritage: false
base_description: |
  紅磚店面的牆腳堆著成捆的線香，空氣裡的沉香木香和萬壽菊粉的氣味層層疊疊。
  老闆說他家的配方傳了四代，日治時代差點因為「奢靡之物」的命令被取締，
  靠著說成「衛生防疫用品」才撐下來。
travel_arrive_text: "你走進香舖，大量的香氣同時湧入，片刻後你的嗅覺才漸漸分辨出不同的氣味。"

names:
  - era: qing
    name: 諸羅香燭鋪
  - era: japanese
    name: 線香製造所
  - era: postwar
    name: 百年香行
  - era: modern
    name: 百年香舖

rumors:
  - "香舖老闆說有一種香已經停產了，因為配方的某樣原料在戰後進不來，但廟裡有幾個老委員還在問有沒有存貨。"

connections:
  - chiayi_city_temple
  - lantern_street
