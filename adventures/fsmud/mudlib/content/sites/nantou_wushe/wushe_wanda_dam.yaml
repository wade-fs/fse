rumors:
- 萬大溪的老漁夫說，萬大水庫蓄水池的湖底，埋藏著當年抗日六社被銷毀的數百支燧發槍。
- 有人傳言，莫那·魯道藏身的岩洞周圍，長年有劇毒的眼鏡蛇守護，常人根本無法靠近。
