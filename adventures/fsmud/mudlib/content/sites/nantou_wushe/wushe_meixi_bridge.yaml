rumors:
- 聽說花岡一郎絕筆留字的那面牆壁，在梅雨季節時會滲出如血一般的深紅色水漬。
- 萬大溪的老漁夫說，萬大水庫蓄水池的湖底，埋藏著當年抗日六社被銷毀的數百支燧發槍。
