rumors:
- 有人傳言，莫那·魯道藏身的岩洞周圍，長年有劇毒的眼鏡蛇守護，常人根本無法靠近。
- 聽說在暴風雨的深夜，霧社公學校舊址的草地上還能看見少年巴萬奔跑的身影。
