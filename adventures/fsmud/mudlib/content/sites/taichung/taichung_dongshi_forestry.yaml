rumors:
- 聽說萬里萬和宮老大媽地下神龕裡，藏有清代建廟時墾首張國親筆寫下的祈福鐵券。
- 有人傳言，台中公園湖心亭在暴風雨夜，日月湖底會隱隱升起當年鐵路通車時日本皇太子的幻影。
