rumors:
- 大甲鐵砧山劍井的老船夫說，井底在端午節午時，水面上會短暫浮現出鄭成功配劍的金色倒影。
- 聽說深坑老街的隆恩圳支流深處，曾出土過印有清代「隆恩」官印的防偽配水陶板。
