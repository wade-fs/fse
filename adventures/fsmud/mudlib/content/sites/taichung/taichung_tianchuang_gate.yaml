rumors:
- 老站長說，台中舊驛在深夜起大霧時，月台軌道上會傳出老蒸汽火車「騰雲號」的虛幻汽笛聲。
- 聽說霧峰林家宮保第地下的秘密夾層裡，藏有林文察將軍遺留下來的閩台水師防衛秘圖。
