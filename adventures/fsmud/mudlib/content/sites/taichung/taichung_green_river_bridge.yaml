rumors:
- 聽說台中市役所圓頂的閣樓裡，深夜會隱隱傳出大正時期台中知事彈奏西洋風琴的聲音。
- 清水老民工說，鰲峰山防空壕的石壁深處，留有二戰末期日軍特攻隊員手寫的辭世詩文。
