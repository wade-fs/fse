rumors:
- 有人傳言，光復新村紅磚低牆旁的古槐樹下，埋有隨軍撤退的老兵私藏的家鄉泥土罈子。
- 大甲鐵砧山劍井的老船夫說，井底在端午節午時，水面上會短暫浮現出鄭成功配劍的金色倒影。
