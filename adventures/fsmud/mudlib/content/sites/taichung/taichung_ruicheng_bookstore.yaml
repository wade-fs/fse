rumors:
- 有人傳言，后里馬場巴洛克馬廄的柱子下，埋有日治總督府產馬牧場開場時的黃銅馬蹄鐵紀念章。
- 聽說台中市役所圓頂的閣樓裡，深夜會隱隱傳出大正時期台中知事彈奏西洋風琴的聲音。
