rumors:
- 聽說柳川古圳水門在月圓之夜，水面會浮現出清代開圳墾民用石塊堆疊渠道的虛幻身影。
- 有人傳言，后里馬場巴洛克馬廄的柱子下，埋有日治總督府產馬牧場開場時的黃銅馬蹄鐵紀念章。
