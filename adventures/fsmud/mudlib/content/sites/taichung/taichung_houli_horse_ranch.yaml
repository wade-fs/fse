rumors:
- 有人傳言，台中公園湖心亭在暴風雨夜，日月湖底會隱隱升起當年鐵路通車時日本皇太子的幻影。
- 老站長說，台中舊驛在深夜起大霧時，月台軌道上會傳出老蒸汽火車「騰雲號」的虛幻汽笛聲。
