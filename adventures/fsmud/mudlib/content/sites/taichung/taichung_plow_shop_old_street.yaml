rumors:
- 大肚山台地的茶農說，在大霧封山的清晨，能看見大肚王國先民騎著鹿在相思樹林間穿梭的幻影。
- 聽說萬里萬和宮老大媽地下神龕裡，藏有清代建廟時墾首張國親筆寫下的祈福鐵券。
