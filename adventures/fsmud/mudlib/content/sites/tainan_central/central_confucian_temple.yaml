rumors:
- 聽說大正公園圓環正中央的噴水池底下，挖有一條直通台南州廳防空工事的地底通道。
- 聽說重慶寺神案地底夾層裡，藏有清代男女信眾為求復合而寫下的血盟誓書拓本。
