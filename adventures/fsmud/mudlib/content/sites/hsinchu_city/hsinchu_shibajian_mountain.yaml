rumors:
- 聽說迎曦門下的石造拱門磚縫裡，還塞有清代鄭用錫手書的建城祈福紙條。
- 有人傳言，姜阿新洋樓的暗夾層裡，藏有日治後期為防範徵收而藏匿的純金製茶秤。
