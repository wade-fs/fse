rumors:
- 城隍廟的老食客說，七月城隍出巡時，神轎經過的街角，深夜偶爾能聽到虛幻的鎖鏈碰撞聲。
- 香山蚵農傳言，新竹九降風最強的那一夜，外海的蚵架會發出像古戰士歌唱的風聲。
