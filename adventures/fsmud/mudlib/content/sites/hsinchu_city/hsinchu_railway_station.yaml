id: hsinchu_railway_station
settlement: hsinchu_city
canonical_name: 新竹老驛舍
base_description: 日治大正時期興建的文藝復興式老車站，巴洛克式鐘樓為新竹門戶地標，月台上蒸汽與鐵軌聲交織。
names:
- era: "v2.0"
  name: 舊日治新竹老驛舍
- era: "v3.0"
  name: 新竹新竹老驛舍
- era: "modern"
  name: 新竹老驛舍
connections:
