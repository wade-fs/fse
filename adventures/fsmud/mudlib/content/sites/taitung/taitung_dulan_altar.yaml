id: taitung_dulan_altar
settlement: taitung
canonical_name: 都蘭山祖靈祭壇
base_description: 都蘭山腰深林中的原住民祖靈祭祀磐石，四周巨木圍繞，苔蘚密布，是阿美族與卑南族的神聖禁地。
names:
- era: "v0.1"
  name: 舊日治都蘭山祖靈祭壇
- era: "v2.0"
  name: 台東都蘭山祖靈祭壇
- era: "modern"
  name: 都蘭山祖靈祭壇
connections:
- chishang
rumors:
- 聽說都蘭山祖靈祭壇在起大風的夜晚，玄武岩或花崗岩縫裡會傳出像戰士低吟的風聲。
- 有人傳言，在都蘭山祖靈祭壇遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用急救箱。
