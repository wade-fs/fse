id: taitung_zhiben_slatehouse
settlement: taitung
canonical_name: 知本排灣石板屋
base_description: 知本部落保留的排灣族板岩合屋，屋前立有高大的石牌，梁柱刻有百步蛇紋路，古樸莊嚴。
names:
