id: taitung_baxian_caves
settlement: taitung
canonical_name: 八仙洞海蝕洞群
base_description: 巨大的玄武岩海蝕洞穴群，曾出土台灣最古老的「長濱文化」舊石器時代遺物，洞內海濤聲迴盪，如空谷迴音。
names:
- era: "v0.1"
  name: 舊日治八仙洞海蝕洞群
- era: "v2.0"
  name: 台東八仙洞海蝕洞群
- era: "modern"
  name: 八仙洞海蝕洞群
connections:
- chishang
rumors:
- 聽說八仙洞海蝕洞群在起大風的夜晚，玄武岩或花崗岩縫裡會傳出像戰士低吟的風聲。
- 有人傳言，在八仙洞海蝕洞群遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用急救箱。
