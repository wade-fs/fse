rumors:
- 聽說知本溫泉溪谷在起大風的夜晚，玄武岩或花崗岩縫裡會傳出像戰士低吟的風聲。
- 有人傳言，在知本溫泉溪谷遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用急救箱。
