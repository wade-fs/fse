rumors:
- 聽說台東天后宮在起大風的夜晚，玄武岩或花崗岩縫裡會傳出像戰士低吟的風聲。
- 有人傳言，在台東天后宮遺址地底下，仍埋有冷戰時期防守要塞時藏匿的軍用急救箱。
