rumors:
- 聽說在池上水門底部的石板路底下，還埋有昔日阿美族先民捕魚時遺落的黃銅鉤。
- 有人傳言，在起霧的清晨，大坡池面會浮現出清代走私戎克船入港的虛幻桅杆倒影。
