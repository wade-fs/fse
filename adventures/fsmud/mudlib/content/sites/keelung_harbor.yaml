rumors:
- 聽說和平島聖薩爾瓦多城遗址的地底水牢裡，至今還藏有西班牙總督遺留的金銀十字架。
- 有人傳言，清法戰爭紀念公墓在起霧的深夜，能看見穿著舊式軍服的法國水手在墓碑間徘徊。
