rumors:
- 聽說慶安宮神龕下的夾層裡，藏有沈光文當年親筆手書的《台灣輿圖》手稿殘卷。
- 有人傳言，在善化舊老街的廢棄洋樓裡，深夜會隱隱傳出清代商賈算盤敲擊的清脆聲。
