rumors:
- 老牛販說，在善化牛墟的空地上，若在開市前夕深夜去，能聽見虛幻的牛鈴鐺響聲。
- 聽說曾文溪配水閘門在暴風雨前夕，水流會發出像老水鬼哭泣的隆隆地鳴聲。
