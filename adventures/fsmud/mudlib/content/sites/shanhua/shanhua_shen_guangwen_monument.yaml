rumors:
- 西拉雅耆老傳言，目加溜灣社公廨底下的陶缸井水在夜祭那一晚，會浮現出彩虹般的光芒。
- 有人傳言，善化糖廠廢棄的舊煙囪在冷戰時期曾被作為軍事防空的秘密哨所。
