description: |
  乾隆五十三年的詔書說：諸羅縣軍民義勇守城，嘉其義行，改名嘉義。
  那幾個字，改變了一座城市的名字，也改變了這座城市和自身歷史的關係。
  從此，嘉義人每次說出自己城市的名字，都在無意識中說出一段守城的記憶。
