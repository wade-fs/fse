title: 五峰旗瀑布的山難事件
era: modern
evidence_type: 自然記憶
quality: 2
progress: 10
description: 五峰旗瀑布三層飛瀑雖然壯麗，卻因溪流湍急、豪雨溪水暴漲，每隔數年就發生山友遭到山洪捲走的悲劇。當地人流傳著一個說法：在瀑布上方的密林深處，住著一位因山難死去的日治時代測量員，他的魂靈仍在霧中執著地量測著山的高度，偶爾可以聽見叢林中有鏈條碰撞的聲音。
