id: yilan_irrigation_shennong_canal
title: 宜蘭圳與農田水利之父
era: qing
evidence_type: 農業記憶
quality: 2
progress: 10
description: 嘉慶年間，漢人開鑿了宜蘭第一條大型灌溉渠道「金同春圳」，引蘭陽溪水灌溉廣闊的平原稻田。工程耗費十年，期間多次因颱風與土石流摧毀渠道，開鑿者李拔為此三度重建。開圳後，蘭陽平原從沼澤蘆葦地化為萬頃良田，被後人尊稱為「農田水利之父」。
settlement: yilan
trigger_site: yilan_lanyang_creek
