description: "製糖所每天天亮前就開始運作，工人在蒸氣與熱氣中熬過漫長的輪班。他們大多是附近農家的子弟，靠著這份工錢養活一家老小。其中有個叫阿土的年輕人，總在輪班結束後，用甘蔗梗偷偷在磚牆上畫下工廠的樣子——那些素描如今已消失在歲月的粉塵之下。"
