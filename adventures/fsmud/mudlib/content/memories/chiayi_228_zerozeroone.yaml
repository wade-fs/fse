description: |
  民國三十六年三月二十五日清晨，嘉義火車站前廣場人聲寂靜。
  不是早晨的靜，是恐懼的靜。
  四個穿著西裝的男人被帶到廣場中央，其中一個是畫家，他的手曾畫過嘉義的陽光。
  槍聲之後，廣場更靜了，比靜還靜的那種。
