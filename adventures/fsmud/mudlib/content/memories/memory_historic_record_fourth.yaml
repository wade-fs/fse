title: "新港社的祭典之夜"
era: "dutch"
evidence_type: "儀式記憶"
quality: 3
progress: 10
description: |
  荷蘭傳教士第一次目睹新港社的祭典，是一個月圓的夜晚。
  族人圍成一圈，燃燒著他不認識的香草，吟唱他聽不懂的歌。
  他在日記裡寫：「他們呼喚的是祖先，或是山，或是什麼更古老的東西。
  我無法轉換成任何我學過的語言。」
