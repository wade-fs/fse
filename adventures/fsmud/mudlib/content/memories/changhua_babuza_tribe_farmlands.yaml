id: changhua_babuza_tribe_farmlands
title: 巴布薩族與彰化平原的農業起源
era: qing
evidence_type: 族群記憶
quality: 2
progress: 10
description: 彰化平原在漢人移民抵達之前，是巴布薩族（Babuza）的獵場與農耕地。他們種植小米與山芋，以陷阱獵鹿，並用鹿皮向往來的漢商換取鐵製農具。清代初年，漳州移民大量湧入，巴布薩族的土地在地契的名義下逐漸被納入漢人的農田系統，族人最終北移，留下的只有幾個帶有平埔語地名的聚落，如「番仔田」與「阿束社」。
