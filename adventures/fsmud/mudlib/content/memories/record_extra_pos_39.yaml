id: record_extra_pos_39
title: "火雞肉飯的起源"
era: "postwar"
evidence_type: "飲食記憶"
quality: 1
progress: 10
description: |
  戰後初期，美軍顧問帶來了火雞，火雞肉便宜，一隻可以切出很多份。
  嘉義的廚師把火雞肉用熱水拆絲，淋上煉製的雞油，鋪在白飯上。
  這道食物在最困難的年代讓很多嘉義人吃飽了，後來成了嘉義的名片，
  但記得它起源的人越來越少。
settlement: "chiayi_city"
