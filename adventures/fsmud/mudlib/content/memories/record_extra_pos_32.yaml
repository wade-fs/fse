title: "甘蔗平原的冬天"
era: "japanese"
evidence_type: "農業記憶"
quality: 2
progress: 10
description: |
  採收季是冬天，嘉南平原的甘蔗在乾冷的季風中一片金黃。
  農民的手被甘蔗葉劃滿了細小的傷口，鹽水泡過繼續砍。
  那些甘蔗送進北廠，製成砂糖，裝進麻袋，運往日本。
  農民得到的是「保証價格」，是一個他們沒有辦法拒絕的數字。
