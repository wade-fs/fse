description: |
  明治四十四年，製材所的第一批阿里山檜木運抵嘉義。
  工人們從沒見過那樣粗的原木，要四個人環抱才能合攏。
  鋸台開動的第一天，木屑在陽光裡飛揚，嘉義的空氣裡有了松木和機器的混合氣味。
  那棵樹在山上活了八百年。
