description: "光緒二十一年，日軍南下。打貓的居民扶老攜幼，在大士爺廟前集合，爭論著是逃入山中，還是留守家園。廟祝老伯跪在神前連擲三次聖杯，三次皆是聖筊。他說：『大士爺指引我們留下，以香火護佑這片土地。』那夜，砲聲從北方隱隱傳來，眾人跪在廟前，整夜未眠。"
