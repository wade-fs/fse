id: "farmer"
name: "農"
display_name: "農人"
description: "熟悉土地的人。懂得辨別土質、節氣，善於收集農業記憶與自然踏印。農人對土地的情感，讓他們更容易感受到農耕文明留下的歷史共鳴。"
# 職涯修練需要的記憶類型（收集這些 era 的記憶可獲得修練點）
memory_affinity:
  - "aboriginal"
  - "qing"
  - "japanese"
# 各等級對應的修練點門檻
ranks:
  - level: 1
    name: "農夫"
    min_points: 0
  - level: 2
    name: "耕者"
    min_points: 30
  - level: 3
    name: "農藝師"
    min_points: 80
  - level: 4
    name: "大地守護者"
    min_points: 160
# 職涯加成：影響 reveal_layer 條件
bonuses:
  memory_reveal_bonus: 1   # 提升 1 級記憶解鎖能力
  footprint_types:
    - "geo"
    - "settlement"
