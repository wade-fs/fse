id: quest_old_watchman_last_route_minxiong
title: "更夫的最後一班"
settlement: minxiong
scope:
  - minxiong
era: modern
difficulty: 1
description: |
  更夫阿旺已經七十八歲，老眼昏花，膝蓋也走不遠了。
  他說這條他走了五十年的更夫路，他想最後再走一遍，
  但一個人走不安全，要找個人陪。
  你陪他走完這條路，沿途他說起五十年來在這條街道見過的事，
  每走一個地方，就開口說一段往事。
objectives:
  - id: accept_request
    description: "答應陪更夫阿旺走最後一遍更夫路"
    npc: NPC_night_watchman_minxiong
    ask_topic: 秘密
  - id: walk_ghost_house
    description: "陪阿旺走到鬼屋前"
    site: ghost_house
    condition:
      type: in_party
      npc: NPC_night_watchman_minxiong
  - id: walk_temple
    description: "陪阿旺走到大士爺廟前"
    site: dashiye_temple
    condition:
      type: in_party
      npc: NPC_night_watchman_minxiong
  - id: walk_sugar_factory
    description: "陪阿旺走到糖廠廢墟前"
    site: sugar_factory_ruins
    condition:
      type: in_party
      npc: NPC_night_watchman_minxiong
  - id: final_stop
    description: "回到老街讓阿旺坐下休息，聽他說最後一段話"
    site: old_street
    condition:
      type: in_party
      npc: NPC_night_watchman_minxiong
completion_reward:
  exp: 800
  faction: minxiong_folk
  reputation: 50
  unlock_memory: minxiong_street_001
  note: "完成後阿旺贈予竹梆，可作為解密道具用於廟宇地下暗渠"
