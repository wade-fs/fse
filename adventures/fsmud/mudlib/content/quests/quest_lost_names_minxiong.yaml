id: quest_lost_names_minxiong
title: "那些失去的名字"
settlement: minxiong
scope:
  - minxiong
era: japanese
difficulty: 2
description: |
  皇民化運動期間，許多民雄家庭被強制改用日本姓名。
  戰後這些名字大多被遺忘，但老一輩的人記得那個夾縫中的年代。
  老師德仔先拜託你協助找回三個家庭的原漢名，
  讓公學校的畢業名冊能還原一頁真實的歷史。
objectives:
  - id: find_kominka_records
    description: "在公學校找到皇民化時期的學籍記錄"
    site: school
    action: look
  - id: ask_teacher
    description: "詢問德仔先關於三個家庭的原漢名線索"
    npc: NPC_school_teacher_minxiong
    ask_topic: 漢文
  - id: find_hidden_primer
    description: "找到藏在課桌夾層的漢文課本"
    site: school
    action: search
  - id: verify_with_pharmacist
    description: "向藥舖仁德確認其中一個家庭的本名"
    npc: NPC_pharmacist_minxiong
    ask_topic: 日本時代
completion_reward:
  exp: 1000
  faction: taiwan_cultural_memory
  reputation: 60
  unlock_incident: minxiong_kominka_incident
  memory_fragment: minxiong_kominka_001
