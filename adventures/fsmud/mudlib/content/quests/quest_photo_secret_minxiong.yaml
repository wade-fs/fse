id: quest_photo_secret_minxiong
title: "照相館後的秘密"
settlement: minxiong
scope:
  - minxiong
era: modern
difficulty: 3
description: |
  更夫阿旺說，照相館打烊後窗內有無頭人影。
  理髮師文水說，老闆娘秀蓮每晚在店內待到深夜。
  秀蓮本人說，日本時代的相片她大多燒了。
  但是——如果燒了，為什麼藥舖地窖的舊鐵盒裡，
  藏著一張穿著日本軍服的男人與秀蓮的合照？
objectives:
  - id: talk_to_barber
    description: "向文水詢問照相館老闆娘近況"
    npc: NPC_barber_minxiong
    ask_topic: 照相館
  - id: talk_to_watchman
    description: "向更夫阿旺詢問夜間所見"
    npc: NPC_night_watchman_minxiong
    ask_topic: 傳言
  - id: talk_to_owner
    description: "試著與秀蓮談及日本時代"
    npc: NPC_photo_studio_owner_minxiong
    ask_topic: 日本時代
  - id: find_hidden_photo
    description: "在藥舖地窖找到鐵盒與舊照片"
    site: pharmacy
    action: search
    condition:
      type: has_talked
      npc: NPC_photo_studio_owner_minxiong
  - id: confront_owner
    description: "拿著相片再次詢問秀蓮"
    npc: NPC_photo_studio_owner_minxiong
    ask_topic: 軍官
    condition:
      type: has_item
      item: old_photo_studio_secret
completion_reward:
  exp: 1400
  faction: minxiong_folk
  reputation: 70
  unlock_memory: minxiong_photo_001
