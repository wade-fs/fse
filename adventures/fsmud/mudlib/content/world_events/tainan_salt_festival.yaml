id: tainan_salt_festival
name: 七股鹽田送夕陽
type: scheduled
era_active: modern
duration_days: 1
affected_sites:
  - tainan_beimen_salt_field
  - anping_harbor
description: |
  七股鹽田在歲末舉辦的送夕陽慶典，市民與遊客齊聚鹽山與舊鹽田，在琴聲中目送最後一道餘暉沒入海峽。
effects:
  site_desc_override:
    tainan_beimen_salt_field: |
      白色鹽田在落日餘暉下被染成一片絢麗的粉紅與金黃，老鹽工阿海默默看著落日，像是送別一個時代的戰友。
