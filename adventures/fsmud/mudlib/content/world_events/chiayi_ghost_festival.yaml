id: chiayi_ghost_festival
name: 嘉義城隍廟中元普渡
type: scheduled
era_active: null
trigger:
  month: 7
  day: 15
  calendar: lunar
duration_days: 3
affected_sites:
  - chiayi_city_temple
  - chiayi_city
  - lantern_street
description: |
  農曆七月十五日，城隍廟舉行中元大普渡，廟埕搭起高台，燈籠街的紅燈籠全數點亮，整個嘉義的氣氛既熱鬧又肅穆。
effects:
  site_desc_override:
    chiayi_city_temple: |
      廟埕搭起高台，大士爺像高達兩層樓，香火鼎盛，人聲鼎沸，煙霧瀰漫，分不清是香煙還是紙錢的灰。
    lantern_street: |
      所有的燈籠都亮起來了，巷子被紅光染透，像走進了另一個世界的入口。
