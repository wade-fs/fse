id: lukang_dragon_boat_festival
name: 鹿港慶端陽（龍王祭與點燈）
type: scheduled
era_active: null
duration_days: 3
affected_sites:
  - lukang_longshan_temple
  - lukang_guichao_port
  - lukang_old_street
description: |
  端午節期間的鹿港慶端陽活動。以龍山寺的『龍王祭』拉開序幕，恭迎龍王尊神至舊渡頭為龍舟開光點睛，老街沿路高掛古色古香的燈籠。
effects:
  site_desc_override:
    lukang_longshan_temple: |
      龍山寺山門前聚集了迎龍王的陣頭，老木雕施師傅正神情肅穆地確認龍王頭雕刻的最後裝飾。
    lukang_guichao_port: |
      淤積的舊渡頭水道兩側掛滿了五彩的裝飾燈籠，市民齊聚岸邊，觀看傳統的龍舟點睛開光儀式。
