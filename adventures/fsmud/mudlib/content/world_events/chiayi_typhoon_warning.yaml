id: chiayi_typhoon_warning
name: 颱風警報
type: random
era_active: null
duration_days: 2
affected_sites:
  - riverside_settlement
  - chiayi_city
  - central_market
description: |
  氣象台發布颱風警報，嘉義市進入備戰狀態，市場提早收攤，河岸居民往城裡撤離。
effects:
  site_desc_override:
    chiayi_city: |
      街道上的攤販都收起來了，圓環噴水池停了，廣場空曠，風吹過的聲音格外響亮。
    riverside_settlement: |
      堤外已無人煙，小屋的竹板被綁緊了，但在強風來臨前，這些薄薄的竹板能撐多久，沒有人知道。
