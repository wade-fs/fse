id: typhoon_season
name:
  zh-TW: "颱風警報"
  en: "Typhoon Warning"
description:
  zh-TW: "強烈颱風逼近，風雨交加，外出危險，各地交通受阻。"
  en: "A powerful typhoon is approaching. Strong winds and heavy rain make travel dangerous."

trigger:
  type: "random"
  chance_per_tick: 3       # 每 15 遊戲分鐘有 3% 機率觸發
  min_interval: 480        # 距上次觸發至少 8 遊戲小時才能再觸發

duration_minutes: 180      # 持續 3 遊戲小時

effects:
  npc_event_flag: "typhoon_active"

  blocked_routes:
    - "route_chiayi_tainan"
    - "route_minxiong_chiayi"

  site_desc_override:
    minxiong_old_station:
      zh-TW: "月台上風聲呼嘯，沙土隨狂風捲起，幾乎站不穩腳跟。縱貫線列車已全面停駛。"
      en: "Howling winds sweep the platform. The western mainline trains have all been suspended."
    minxiong_market:
      zh-TW: "市場所有攤販早已收攤，鐵皮屋頂在強風中嘎嘎作響，地面積水橫流。"
      en: "All stalls have been cleared. The tin roofs clatter in the gale, and water floods the ground."
    ghost_house:
      zh-TW: "颱風天的鬼屋更顯陰森，風灌入破窗，發出令人毛骨悚然的低嗚聲。"
      en: "The haunted house is even more foreboding in the typhoon. Wind moans through the broken windows."
    dashiye_temple:
      zh-TW: "廟前旗幟被強風扯得獵獵作響，幾位廟祝正奮力加固香爐，為信眾祈求平安。"
      en: "The temple banners snap violently in the wind. Priests are securing the incense burners and praying for safety."
    sugar_factory_ruins:
      zh-TW: "廢棄廠房的鐵板在風中搖搖欲墜，四處傳來金屬碰撞的巨響，此刻靠近實屬危險。"
      en: "The old factory's metal sheets are barely holding on. Dangerous to approach right now."
