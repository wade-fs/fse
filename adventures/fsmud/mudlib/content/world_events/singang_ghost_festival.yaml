id: singang_ghost_festival
name: 笨港中元普渡
type: scheduled
era_active: null
duration_days: 2
affected_sites:
  - beimen_creek_old
  - singang
  - singang_market
description: |
  農曆七月，新港依照古笨港的傳統舉行中元普渡，
  沿著舊笨港溪河道一帶設立普渡桌，祭拜當年洪水中逝去的先民亡魂。
  這個習俗已延續兩百多年，是笨港歷史記憶最直接的現存儀式。
effects:
  site_desc_override:
    beimen_creek_old: |
      舊河道旁擺著長桌，普渡的供品從一端延伸到另一端，老人說每個桌位對應的是當年洪水時逝去的一個家族。
    singang: |
      廟埕上的普渡儀式同步進行，廟公說今年的普渡特別重要，因為有幾個亡魂等了很久，今年才終於有後代來祭拜。
