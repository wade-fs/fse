id: lukang_mazu_birthday
name: 鹿港迎媽祖（天后宮誕辰慶典）
type: scheduled
era_active: null
duration_days: 3
affected_sites:
  - lukang_tianhou_temple
  - lukang_old_street
  - lukang_pastry_shop
description: |
  每年農曆三月二十三日媽祖誕辰，鹿港天后宮舉行盛大的迎媽祖遶境，各大街區與老街塞滿了各地進香人潮，民俗陣頭與鞭炮齊鳴。
effects:
  site_desc_override:
    lukang_tianhou_temple: |
      天后宮前殿被信眾與香煙完全籠罩，大門口排滿了各地的神轎，鞭炮聲連綿不絕。
    lukang_pastry_shop: |
      餅鋪阿修今天忙得不可開交，鳳眼糕與綠豆椪在開爐幾分鐘內就被進香的香客搶購一空。
