id: npc_taoyuan_cihu_guard
name:
  zh-TW: "老儀隊兵"
settlement: taoyuan
home_site: "taoyuan_cihu_mausoleum"
role: "守衛"
hint:
  zh-TW: "曾守備慈湖陵寢多年的退伍儀隊老兵，熟悉慈湖行館防衛體系與周邊山路。"
responses:
  "歷史":
    zh-TW: "桃園的歷史，是一面由大圳與古城牆抵禦強風，一面由桃園神社與眷村大合院寫成的開墾長卷。"
  "山海":
    zh-TW: "不論是角板山的古防空洞，還是大溪的巴洛克老街，都是我們桃園人在風浪中討生活的根。"
