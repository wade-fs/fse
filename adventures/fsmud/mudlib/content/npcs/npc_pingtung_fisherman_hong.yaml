id: npc_pingtung_fisherman_hong
name:
  zh-TW: "洪老船長"
settlement: pingtung
home_site: "pingtung_houbihu_harbor"
role: "船長"
hint:
  zh-TW: "世居東港與恆春的老船長，熟悉黑潮洋流捕魚技術與巴士海峽避風港。"
responses:
  "歷史":
    zh-TW: "屏東的歷史，是一面由石板屋與恆春古城城牆抵禦海風，一面由東港迎王大典的火光與排灣族祖靈寫成的山海長卷。"
  "山海":
    zh-TW: "不論是牡丹社的古戰場，還是萬金聖母教堂，都是我們屏東人在風浪中討生活的根。"
