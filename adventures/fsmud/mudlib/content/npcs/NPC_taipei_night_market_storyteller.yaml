id: NPC_taipei_night_market_storyteller
name:
  zh-TW: 饒河街說書人
settlement: taipei
home_site: taipei_101_raohe_night_market
role: storyteller
hint:
  zh-TW: 坐在夜市小廣場、口若懸河的老人，正在對著聚集的攤販和遊客說書。
responses:
  台北歷史:
    zh-TW: 你聽說過「後山埤」嗎？那是松山一帶以前的大埤塘，後來填掉蓋了夜市，底下還有老魚跑來跑去咧。
  民間傳說:
    zh-TW: 台北哪裡有鬼屋、哪裡有靈異事件，我都知道，要聽嗎？等我說完這一段先。
