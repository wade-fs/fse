id: NPC_lukang_incense_master
name:
  zh-TW: "沉香師傅阿義"
settlement: lukang
home_site: lukang_incense_garden
role: craftsman
hint:
  zh-TW: "六十多歲的老香藝師，身上永遠有一股淡淡的檀香味，手指關節粗大，說話聲音沉靜平和。"
responses:
  "香":
    zh-TW: "製香是良心事業。我們只用中藥材、天然沉香粉和楠木皮粉。你點一根香，它是要送上天給神明聽的，如果用化學香精，神明聞了會生氣，人聞了會生病。"
  "避邪神香":
    zh-TW: "（神情凝重）那款香的配方，大天后宮的木盒裡確實有。我父親以前試做過一次，點燃後煙是純白色的，有一股非常奇特的草藥清香。但配方裡有一味藥是『台灣沉香』，現在這種植物在山裡已經找不到了。"
  "木雕":
    zh-TW: "我和木雕施師傅是多年的鄰居。他雕神像，我製神香，神像沒有香火就沒有靈，神香沒有神像就沒有方向，我們這兩個行業，是互相依賴的。"
  "傳言":
    zh-TW: "老街半邊井的對面，以前有一家香舖，據說他們家有一種香，點燃後煙不會往上升，而是沿著地面像水流一樣流動，叫『地藏香』，用來引導地下的魂，後來失傳了。"
