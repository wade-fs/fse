id: npc_hsinchu_rice_noodle_owner
name:
  zh-TW: "陳老闆娘"
settlement: hsinchu_city
home_site: "hsinchu_hsinchu_temple_market"
role: "店家"
hint:
  zh-TW: "城隍廟前三代經營米粉攤的老闆娘，堅持使用九降風自然風乾的炊粉。"
responses:
  "歷史":
    zh-TW: "新竹九降風吹了幾百年，吹乾了米粉與柿餅，也吹開了這座竹塹城的城樓。"
  "文化":
    zh-TW: "不論是北埔的客家膨風茶，還是城隍廟的都城隍出巡，都是新竹人的根。"
