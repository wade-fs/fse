id: NPC_lukang_pastry_boss
name:
  zh-TW: "百年餅鋪傳承人阿修"
settlement: lukang
home_site: lukang_pastry_shop
role: vendor
hint:
  zh-TW: "三十多歲的年輕繼承人，戴著白色廚帽，手腳俐落，熱情地向客人介紹各種漢餅的傳統意涵。"
responses:
  "糕餅":
    zh-TW: "鹿港的漢餅，最重要的是綠豆沙和麥芽的比例。綠豆椪吃起來要鬆、要香，凤眼糕要入口即化。我們到現在還堅持手工用木模敲，敲出來的糕，口感和機器做的就是不一樣。"
  "鳳眼木模":
    zh-TW: "那只鳳眼木模是我們店的傳家寶，大正年間由木雕大師手雕的。你看看那個弧度，像不像是美人的鳳眼？用這個模敲出來的糕，連當年的日本皇太子都讚賞過。"
  "歷史":
    zh-TW: "鹿港曾經是一座非常繁榮的港口，商船進出，糕餅是船員必帶的點心，因為耐放、熱量高。現在港口淤積了，但糕餅的甜味留了下來，成了我們的生活。"
  "傳言":
    zh-TW: "聽說以前的餅鋪老闆會在餅裡塞秘密字條，用來傳遞反日或者抗清的情報，這在歷史上是有的。但我現在的餅裡只有香甜的綠豆沙，沒有情報，只有誠意。"
