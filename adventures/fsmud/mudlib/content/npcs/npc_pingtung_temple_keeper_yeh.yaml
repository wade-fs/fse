id: npc_pingtung_temple_keeper_yeh
name:
  zh-TW: "葉道長"
settlement: pingtung
home_site: "pingtung_donggang_temple"
role: "廟祝"
hint:
  zh-TW: "東隆宮的資深轎班班頭，精通東港迎王大祭的王船建造科儀與燒王船歷史。"
responses:
  "歷史":
    zh-TW: "屏東的歷史，是一面由石板屋與恆春古城城牆抵禦海風，一面由東港迎王大典的火光與排灣族祖靈寫成的山海長卷。"
  "山海":
    zh-TW: "不論是牡丹社的古戰場，還是萬金聖母教堂，都是我們屏東人在風浪中討生活的根。"
