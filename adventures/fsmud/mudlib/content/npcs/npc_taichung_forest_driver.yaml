id: npc_taichung_forest_driver
name:
  zh-TW: "徐車長"
settlement: taichung
home_site: "taichung_dongshi_forestry"
role: "司機"
hint:
  zh-TW: "東勢舊製材所的老司機，熟悉從八仙山與大雪山運送巨木下山的小火車線路。"
responses:
  "歷史":
    zh-TW: "台中的歷史，是一面由縱貫鐵路牽引，一面由大甲媽祖與二七部隊寫成的長卷。"
  "文化":
    zh-TW: "不論是南屯的打鐵聲，還是櫟社詩人們在望月亭下的低吟，都是我們中台灣的根。"
