id: NPC_changhua_mountain_guide
name:
  zh-TW: "八卦山戰史解說員老陳"
settlement: changhua_city
home_site: changhua_bagua_mountain
role: guide
hint:
  zh-TW: "退休的軍史愛好者，常年守在八卦山抗日烈士紀念碑旁，對1895年乙未戰爭的防線細節瞭若指掌。"
responses:
  "乙未戰爭":
    zh-TW: "1895年，日本近衛師團從澳底登陸，一路南下。到了彰化八卦山，遭遇了吳彭年率領的黑旗軍與地方義軍最強烈的抵抗。那場仗打得天昏地暗，義軍幾乎全軍覆沒，吳彭年也戰死在這裡。"
  "吳彭年":
    zh-TW: "吳彭年是清軍將領，但他沒有逃跑，而是留下來和台灣人一起守八卦山。他是漢子。他在山頂指揮砲擊日軍，直到日軍突擊隊衝上山頂，肉搏戰死。"
  "彈孔":
    zh-TW: "孔廟柱子上的彈孔？那是真的。當年日軍大砲從北邊轟擊八卦山，流彈飛入縣城，孔廟大成殿也中了幾發。那一發剛好打在副梁上，歷史就這樣嵌在木頭裡了。"
  "傳言":
    zh-TW: "山頂那口無影井，傳說林爽文起義時有將領將印信丟進去，但我查過，那口井的水源通向山下的暗渠，如果真的丟了東西，早就被沖到山下的農田了，挖不到的。"
