id: npc_shanhua_shen_guangwen
name:
  zh-TW: "沈光文"
settlement: shanhua
home_site: "shanhua_shen_guangwen_monument"
role: "文人"
hint:
  zh-TW: "清初開台文化祖師，隱居目加溜灣社，傳播儒家文教與中醫藥理，深受漢人與原住民愛戴。"
responses:
  "歷史":
    zh-TW: "沈光文先生在慶安宮教學的時候，我們這裡還是一片密密麻麻的竹林。"
  "文化":
    zh-TW: "不論是目加溜灣社的夜祭，還是牛墟的開市，都是我們善化不能丟掉的記憶。"
