id: npc_xinshi_nanke_archaeologist
name:
  zh-TW: "南科考古隊學者"
settlement: xinshi
home_site: "xinshi_science_park"
role: "citizen"
hint:
  zh-TW: "在南部科學園區發掘出土遺址的老學者，雙手因清理細砂與炭化稻米而滿是細繭。"
responses:
  "歷史":
    zh-TW: "在科技廠房動土時，我們發掘出了數千年前的古人類聚落與精美的古陶罐，這是台灣史前的奇蹟。"
  "山海":
    zh-TW: "從千年前的史前漁獵生活，到如今最前沿的晶圓廠，這片土地的繁華是歷史的厚重累積。"
