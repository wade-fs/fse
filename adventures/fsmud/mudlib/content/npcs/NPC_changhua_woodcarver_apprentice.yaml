id: NPC_changhua_woodcarver_apprentice
name:
  zh-TW: "木雕施師傅的徒弟小施"
settlement: changhua_city
home_site: changhua_confucian_temple
role: craftsman
hint:
  zh-TW: "二十多歲的年輕匠人，正在孔廟大成殿偏殿修復一扇舊木窗，手持木槌，說話帶著年輕匠人的執著。"
responses:
  "木雕":
    zh-TW: "我是跟著鹿港施師傅學藝的，學了五年，剛出師。施師傅叫我來彰化孔廟幫忙修復木窗。孔廟的斗拱是清代的，雕刻風格比現代的更樸素、更有力量，修復它們需要極大的耐心。"
  "施師傅":
    zh-TW: "施師傅是個很嚴格的人，一刀刻錯，他會叫你整塊木頭重來。但他對手藝的尊重是刻在骨子裡的。他常說，我們匠人是在給神明和聖人蓋房子，手底下不能有半點虛假。"
  "老街屋":
    zh-TW: "彰化老街屋的梁木和門楣，有很多是我們鹿港匠人雕刻的。你在街上走，只要看門楣上的折枝花卉和如意紋，就能認出是哪位大師的手筆，這就是我們手藝人的簽名。"
  "傳言":
    zh-TW: "聽說孔廟偏殿的某個天花板夾層裡，藏有一盒日治初期的雕刻刀，是當年建廟匠師為了躲避日本人沒收金屬工具而藏進去的，修繕時我一直在找，還沒找到。"
