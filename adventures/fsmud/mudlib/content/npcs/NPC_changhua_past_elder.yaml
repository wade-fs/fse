id: NPC_changhua_past_elder
name:
  zh-TW: "八卦山麓古井老住戶阿公"
settlement: changhua_city
home_site: changhua_bagua_well
role: elder
hint:
  zh-TW: "八十多歲，住在井邊一輩子，手持蒲扇，對無影井的各種傳說樂此不疲地向遊客介紹。"
responses:
  "無影井":
    zh-TW: "這口井以前叫無影井，因為夏至那天中午，太陽照進去，井欄在水裡沒有影子。這不是迷信，是光學原理。但我們老一輩人說，這代表這口井通著地府，是乾淨的陰陽水。"
  "林爽文":
    zh-TW: "林爽文起義的時候，彰化是戰場。傳說他的副將把一方大印丟進井裡，怕被官兵搶走。那顆印是金子做的，沉得很，早就陷進井底的軟泥深處了，除非你用抽水機把井水抽乾，否則別想摸到。"
  "巴布薩":
    zh-TW: "你問這附近的平埔族？我小時候聽我阿公說，這片山腳以前是平埔族人打獵的地方，他們叫這裡『半線』，彰化舊名半線就是這樣來的。那時候山上有梅花鹿，多到像羊群一樣。"
  "傳言":
    zh-TW: "雨後古井的水位會突然上漲，而且水裡會有一種淡淡的野薄荷香氣。我阿公說，那是因為八卦山裡有一條暗河，河邊長滿了山薄荷，井水就是從那裡流過來的。"
