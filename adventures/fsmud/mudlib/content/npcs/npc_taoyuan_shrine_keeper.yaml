id: npc_taoyuan_shrine_keeper
name:
  zh-TW: "林守廟人"
settlement: taoyuan
home_site: "taoyuan_shinto_shrine"
role: "管理員"
hint:
  zh-TW: "桃園神社的年邁守護者，熟悉檜木殿宇的防腐技術與日式神社祭祀儀軌。"
responses:
  "歷史":
    zh-TW: "桃園的歷史，是一面由大圳與古城牆抵禦強風，一面由桃園神社與眷村大合院寫成的開墾長卷。"
  "山海":
    zh-TW: "不論是角板山的古防空洞，還是大溪的巴洛克老街，都是我們桃園人在風浪中討生活的根。"
