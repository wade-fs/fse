id: NPC_shennong_street_artist
name:
  zh-TW: "神農街駐村藝術家阿珍"
settlement: tainan
home_site: tainan_sakura_lane
role: artist
hint:
  zh-TW: "在神農街駐村創作的年輕藝術家，作品以台南的歷史層疊為主題，說話像在寫藝術家陳述。"
responses:
  "創作":
    zh-TW: "我的作品是在探索『層疊』。台南的每一塊地都至少有三四層歷史，荷蘭人在底下，鄭成功在上面，清代在更上面，日本時代在最上層，現在的台南在它們全部的頂端。我試著讓這些層疊可見。"
  "老磚":
    zh-TW: "這棟厝的磚是清代的，從顏色和尺寸就可以判斷。清代的磚比日治的磚大，燒製的溫度也不同，清代的磚敲起來聲音更悶，日治的磚聲音更清脆。你在台南走，只要會聽磚的聲音，就能大概知道你在哪個時代的地盤上。"
  "水道":
    zh-TW: "神農街底下的水道，每次大雨我都去那個位置趴著聽，聽到了，真的有水流的聲音。我把這個聲音錄下來，用在我的一件裝置作品裡，作品名字就叫『五條港的回聲』。"
  "傳言":
    zh-TW: "我找到那幾塊船板，就藏在神農街那家咖啡廳的角落，老闆說他裝修時挖到的。木頭的紋理讓我認出是一種用於清代商船的木材，我把那個紋理掃描下來，做成版畫，是我目前最喜歡的一件作品。"
