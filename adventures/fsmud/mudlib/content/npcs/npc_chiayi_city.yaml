id: npc_chiayi_city
name:
  zh-TW: "嘉義市長的秘書老文"
  en: "Mayor's Secretary Lao-Wen"
settlement: chiayi_city
home_site: chiayi_county_hall_old
role: official
hint:
  zh-TW: "穿著中山裝的中年男人，手上永遠夾著公文夾，走路很快，說話精準不廢話。"
responses:
  "縣廳":
    zh-TW: "嘉義縣廳是整個嘉南地區行政的核心，清代諸羅縣的轄區從這裡管到整個南部。你要問什麼行政問題，說。"
  "歷史":
    zh-TW: "嘉義有一件事很特別，就是它的名字是皇帝賜的，不是自稱的。這在台灣歷史上是少見的例子。名字裡有榮耀，也有代價。"
  "傳言":
    zh-TW: "地板低的那個房間我去量過，確實比走廊低了三公分，但那可能只是建築沉降，不一定是什麼坑道。可能是，也可能不是，我不確定。"
