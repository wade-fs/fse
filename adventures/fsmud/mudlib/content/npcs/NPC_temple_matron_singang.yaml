id: NPC_temple_matron_singang
name:
  zh-TW: "奉天宮廟婆阿鳳"
settlement: singang
home_site: singang
role: temple_keeper
hint:
  zh-TW: "頭髮花白、身穿素色唐裝的老婦人，在廟埕間輕快行走，偶爾停下來整理供桌的花果。"
responses:
  "媽祖":
    zh-TW: "媽祖從湄洲渡海來台，最先落腳在笨港，那是幾百年前的事了。新港這尊是真正的古媽，神威顯赫，你有什麼事，就去問她，她知道的比我多。"
  "西拉雅":
    zh-TW: "你問西拉雅？這片土地原來是他們的，叫做新港社。媽祖來了以後，他們有些人也跟著拜媽祖，兩種信仰在同一片土地上共存，很奇妙。"
  "石碑":
    zh-TW: "（神情謹慎）那塊碑是廟的秘密，你要看，要先問過總幹事，我沒有資格讓你進去。但我告訴你，那塊碑的字不是中文，也不是日文。"
  "傳言":
    zh-TW: "空的神龕？那個位置留了很久了，老廟公說那是給一個還沒有找到身份的神明留的。什麼神明，他沒有說，我也沒有問。"
