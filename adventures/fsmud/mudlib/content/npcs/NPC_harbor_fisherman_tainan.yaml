id: NPC_harbor_fisherman_tainan
name:
  zh-TW: "安平漁港老漁夫阿江"
settlement: tainan
home_site: anping_harbor
role: fisherman
hint:
  zh-TW: "赤腳站在碼頭邊，手法熟練地修補漁網，眼神看著海，說話也像對著海說。"
responses:
  "漁港":
    zh-TW: "安平港現在是小漁港，不像清代那樣繁盛。但每天還是有漁船出去，帶回魚，讓台南人吃魚，這件事幾百年沒有停過，颱風天停，其他時候就出去。"
  "台江":
    zh-TW: "台江內海消失以後，安平的漁業就沒落了，大船進不來，只能靠小船。我阿公說，他年輕的時候還能看到台江的範圍，那時候水面比現在廣很多，海鳥的種類也不一樣。"
  "鄭成功":
    zh-TW: "你說鄭成功從這裡登陸？不是這裡，是鹿耳門，在北邊。但他的船隊最後是停在安平的，所以安平見過那支艦隊。我有時候在海面上看到遠處的島影，就想，當年那些船看到的是同一片海。"
  "傳言":
    zh-TW: "台江淤積的速度是天文數字，顏清標說一晚上颱風就填掉了三分之一，我阿公也說颱風前後水深差很多。我不知道媽祖是不是真的在收地盤，但海的地盤越來越小，這是事實。"
