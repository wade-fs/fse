id: NPC_mazu_worshipper_tainan
name:
  zh-TW: "大天后宮老信徒阿珠嬤"
settlement: tainan
home_site: tainan_grand_mazu_temple
role: elder
hint:
  zh-TW: "八十多歲，每天清晨第一個進廟的信徒，對廟裡每一尊神明的來歷瞭若指掌。"
responses:
  "媽祖":
    zh-TW: "我們廟裡的媽祖是跟著鄭成功來的，那時候還叫天妃，不叫媽祖。後來才改封媽祖，這個名號從清代才開始的。"
  "古像":
    zh-TW: "你說那尊特別的媽祖？她最老，漆面脫了幾次，但我媽說骨子是原來的，原木。你看她的眼神，和新的那些不一樣，老的神看人的眼神不太一樣，我說不清楚哪裡不一樣，但就是不一樣。"
  "斷指":
    zh-TW: "那根補上去的手指？廟公說是鄭成功出海前用力握了媽祖的手，太用力，折斷了一根指頭。這是傳說，但補上去的那根指頭確實和其他不太一樣，你可以仔細看。"
  "傳言":
    zh-TW: "我在這個廟拜了七十年，只有一件事讓我說不清楚。就是每年農曆除夕，廟裡最深處的那個小神龕前面，早上去的時候已經有一束花了，但沒有人知道是誰放的，廟公說他是第一個開門的，但花在開門前已經在那裡了。"
