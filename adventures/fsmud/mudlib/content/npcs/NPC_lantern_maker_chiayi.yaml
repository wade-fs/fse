id: NPC_lantern_maker_chiayi
name:
  zh-TW: "燈籠師傅阿吉"
settlement: chiayi_city
home_site: lantern_street
role: craftsman
hint:
  zh-TW: "四十多歲的男人，手指靈活，坐在竹架旁邊彎著腰，做事時眼神專注，旁人說話他聽得到，但不一定回應。"
responses:
  "燈籠":
    zh-TW: "做燈籠的學問在竹篾的彎法。要讓骨架撐得住，又不能太硬，紙糊上去才不會皺。這件事說起來簡單，沒有三年，做不出一個好燈籠。"
  "日本時代":
    zh-TW: "我爺爺說，日本時代做燈籠有規定，哪些顏色可以用、哪些圖案可以畫，都要申請。做給廟的容易過，做給人家祭祖的有時候被說是迷信，要偷偷做。"
  "傳言":
    zh-TW: "我爺爺做過一批燈籠給二二八的義勇軍，後來那批人都消失了，燈籠也消失了。我爺爺說那是他做過最好看的一批燈籠，卻也是讓他後悔最深的一批。"
