id: npc_taitung_hongye_coach
name:
  zh-TW: "邱教練"
settlement: taitung
home_site: "taitung_hongye_playground"
role: "教練"
hint:
  zh-TW: "紅葉少棒隊的第一代老教練，熟悉昔日球員們赤腳在黃泥地上刻苦訓練的歷史。"
responses:
  "歷史":
    zh-TW: "台東的歷史，是一面由都蘭大山抵禦海風，一面由太平洋黑潮與原民先靈歌聲寫成的山海長卷。"
  "山海":
    zh-TW: "不論是卑南的古遺址，還是紅葉的操場，都是我們台東人在風浪中討生活的根。"
