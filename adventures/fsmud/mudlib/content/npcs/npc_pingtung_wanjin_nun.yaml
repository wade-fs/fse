id: npc_pingtung_wanjin_nun
name:
  zh-TW: "修女瑪利亞"
settlement: pingtung
home_site: "pingtung_wanjin_basilica"
role: "神職人員"
hint:
  zh-TW: "萬金聖母聖殿的年邁修女，守護大堂多年，熟知古鐘自西班牙運來的歷史。"
responses:
  "歷史":
    zh-TW: "屏東的歷史，是一面由石板屋與恆春古城城牆抵禦海風，一面由東港迎王大典的火光與排灣族祖靈寫成的山海長卷。"
  "山海":
    zh-TW: "不論是牡丹社的古戰場，還是萬金聖母教堂，都是我們屏東人在風浪中討生活的根。"
