id: NPC_city_god_keeper_chiayi
name:
  zh-TW: "城隍廟廟公阿全"
settlement: chiayi_city
home_site: chiayi_city_temple
role: temple_keeper
hint:
  zh-TW: "身穿灰色道袍的老廟公，手持銅鈴在廟埕內來回巡視，目光如炬。"
responses:
  "城隍":
    zh-TW: "城隍爺是嘉義的守護神，管的是陰間秩序。你說你來嘉義找什麼？找歷史？城隍爺都記錄著的。"
  "二二八":
    zh-TW: "（停頓很久）那幾天，廟埕裡站滿了人，有人在哭，有人在搬東西躲進來。城隍爺的神轎那幾天不停地在動，我阿爸說是不甘心的魂太多了。"
  "傳言":
    zh-TW: "你問傳言？嘉義城隍廟的傳言你要聽幾天？最近的是：有人深夜在廟門口看到一個穿旗袍的女人，問了廟的方向，問完就消失了，鞋聲都沒有。"
