id: npc_central_mazu_pilgrim
name:
  zh-TW: "蔡隨香客"
settlement: tainan_central
home_site: "central_grand_mazu_wing"
role: "市民"
hint:
  zh-TW: "常在大天后宮偏廊歇腳的資深隨香信徒，熟悉府城各廟宇聯境自治的掌故。"
responses:
  "歷史":
    zh-TW: "中西區的歷史，就是從泮宮石坊下的第一碗老茶與孔廟的鐘聲開始的。"
  "文化":
    zh-TW: "不論是重慶寺的醋矸，還是測候所的胡椒管，都是我們府城先民在大浪中討生活的根。"
