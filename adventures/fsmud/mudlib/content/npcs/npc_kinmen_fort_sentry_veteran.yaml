id: npc_kinmen_fort_sentry_veteran
name:
  zh-TW: "老哨兵"
settlement: kinmen
home_site: "kinmen_beishan_mansion"
role: "守衛"
hint:
  zh-TW: "古寧頭戰役的退伍老兵，留在金門安家立業，默默守護著彈孔斑駁的北山洋樓。"
responses:
  "歷史":
    zh-TW: "金門的歷史，是一面由花崗岩坑道抵禦砲火，一面由浯島城隍香火寫成的戰地長卷。"
  "戰地":
    zh-TW: "不論是北山洋樓的彈孔，還是翟山水路坑道，都是我們金門人在砲火中求生存的根。"
