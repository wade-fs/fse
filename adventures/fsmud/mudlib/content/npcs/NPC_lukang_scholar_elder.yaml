id: NPC_lukang_scholar_elder
name:
  zh-TW: "十宜樓文史研究員林先生"
settlement: lukang
home_site: lukang_shi_feng
role: scholar
hint:
  zh-TW: "穿著整潔西裝的老學者，在十宜樓的書房裡整理地方誌，說話文雅，對鹿港的文人歷史有極高敬意。"
responses:
  "十宜樓":
    zh-TW: "十宜樓是鹿港文人最雅致的聚會場所。宜琴、宜棋、宜詩、宜酒……十樣文人的雅好都在這裡展開。站在跑馬樓上，看著鹿港的屋頂和夕陽，那是當年文人創作的靈感泉源。"
  "文人":
    zh-TW: "鹿港在清代出了很多進士和舉人，我們的文風很盛。日治時代，文人們組織了『鹿江詩社』，用詩句來表達對殖民統治的無聲抵抗。這是一種高級的抵抗，不流血，但筆尖比刀利。"
  "小刀刻字":
    zh-TW: "（微笑）你說十宜樓窗櫺上的狂草？那是清代舉人林會堂寫的。他當年聽說朝廷割讓台灣給日本，悲憤之下，在這裡喝了一夜酒，用防身小刀在窗櫺上刻了四句詩。字跡很深，後來被油漆蓋了幾次，但輪廓還在。"
  "傳言":
    zh-TW: "傳說十宜樓的跑馬廊在深夜會有棋子落下的清脆聲，老一輩的人說是兩位清代的舉人還在對弈，沒下完的局，他們還在繼續。"
