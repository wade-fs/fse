id: NPC_kaohsiung_temple_medium
name:
  zh-TW: 三鳳宮老乩童阿水
settlement: kaohsiung
home_site: kaohsiung_main_temple
role: medium
hint:
  zh-TW: 七十幾歲的老乩童，替哪吒太子問事已有四十年，下壇後說話平靜，帶著某種見過太多事的淡然。
responses:
  哪吒:
    zh-TW: 哪吒是個孩子的神，但也是個武將的神。他管的是正義，但不管規矩。有時候問的事情沒有道理，他就說沒有道理，讓你自己去找道理。我替人問了四十年，沒有一次他說的話是無聊的。
  問事:
    zh-TW: 問事的人，十個有九個是問感情和錢。剩下一個是問死人的事。感情和錢的，我覺得自己拿主意就好，不需要問神；死人的事，我說得信他說的話，不信就不要問。
  高雄:
    zh-TW: 高雄這個地方，人很直接，也很有義氣。打仗的時候台灣人都不跑，高雄人更是不跑。我見過幾代人，每一代都說高雄沒有台北好——但是每一代都留下來了。
