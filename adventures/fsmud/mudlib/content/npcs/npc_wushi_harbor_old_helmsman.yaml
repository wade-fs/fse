id: npc_wushi_harbor_old_helmsman
name:
  zh-TW: "烏石港老舵手"
settlement: yilan
home_site: "yilan_toucheng_old_street"
role: "citizen"
hint:
  zh-TW: "世居頭城烏石港的老船長廖老大，擁有一張清代晚期觸礁沉沒的商船位置手繪圖殘本。"
responses:
  "歷史":
    zh-TW: "那艘外海沉船裝滿了噶瑪蘭時期的貿易陶罐，要不是海圖遺失，我早去探查那片珊瑚礁了。"
  "山海":
    zh-TW: "黑潮水急，龜山島在海上沉浮。要是不懂海況，大船很容易在烏石港外觸礁沉沒。"
