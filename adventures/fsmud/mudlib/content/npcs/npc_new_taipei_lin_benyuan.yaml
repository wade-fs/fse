id: npc_new_taipei_lin_benyuan
name:
  zh-TW: "林本源"
settlement: new_taipei
home_site: "new_taipei_lin_family_garden"
role: "地方領袖"
hint:
  zh-TW: "板橋林家開墾先祖，興建林家花園，掌控清代北台灣的樟腦與土地開墾大權。"
responses:
  "歷史":
    zh-TW: "新北市的歷史，是一半靠著淡水海風吹，一半靠著金瓜石火藥炸出來的。"
  "文化":
    zh-TW: "不論是平溪高空的天燈，還是三峽祖師廟的木雕，都是前人一筆劃刻出來的根。"
