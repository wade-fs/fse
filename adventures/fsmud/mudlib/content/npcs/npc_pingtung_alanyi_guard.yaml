id: npc_pingtung_alanyi_guard
name:
  zh-TW: "蔡巡守"
settlement: pingtung
home_site: "pingtung_alanyi_trail"
role: "巡守員"
hint:
  zh-TW: "阿塱壹古道生態保護區的巡守員，對古道岩礁與太平洋綠蠵龜生態極為熟悉。"
responses:
  "歷史":
    zh-TW: "屏東的歷史，是一面由石板屋與恆春古城城牆抵禦海風，一面由東港迎王大典的火光與排灣族祖靈寫成的山海長卷。"
  "山海":
    zh-TW: "不論是牡丹社的古戰場，還是萬金聖母教堂，都是我們屏東人在風浪中討生活的根。"
