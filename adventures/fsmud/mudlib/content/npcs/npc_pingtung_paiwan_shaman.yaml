id: npc_pingtung_paiwan_shaman
name:
  zh-TW: "女巫巴奈"
settlement: pingtung
home_site: "pingtung_jiaping_ancestral"
role: "祭司"
hint:
  zh-TW: "佳平祖靈屋的排灣族世襲女巫，精通阿立祖與排灣祖靈溝通的祭祀儀軌。"
responses:
  "歷史":
    zh-TW: "屏東的歷史，是一面由石板屋與恆春古城城牆抵禦海風，一面由東港迎王大典的火光與排灣族祖靈寫成的山海長卷。"
  "山海":
    zh-TW: "不論是牡丹社的古戰場，還是萬金聖母教堂，都是我們屏東人在風浪中討生活的根。"
