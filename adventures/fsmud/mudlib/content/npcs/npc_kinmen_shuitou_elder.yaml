id: npc_kinmen_shuitou_elder
name:
  zh-TW: "黃長老"
settlement: kinmen
home_site: "kinmen_deyuelou_mansion"
role: "僑商後代"
hint:
  zh-TW: "水頭聚落的蔡氏長老，熟知印尼僑商匯款回鄉建造得月樓與對抗土匪的往事。"
responses:
  "歷史":
    zh-TW: "金門的歷史，是一面由花崗岩坑道抵禦砲火，一面由浯島城隍香火寫成的戰地長卷。"
  "戰地":
    zh-TW: "不論是北山洋樓的彈孔，還是翟山水路坑道，都是我們金門人在砲火中求生存的根。"
