id: NPC_lukang_master_woodcarver
name:
  zh-TW: "木雕大師施師傅"
settlement: lukang
home_site: lukang_woodcarving_workshop
role: craftsman
hint:
  zh-TW: "七十多歲，雙手滿是老繭和刻刀留下的傷痕，眼神專注，說起木雕藝術時帶著無比的威嚴與自豪。"
responses:
  "木雕":
    zh-TW: "鹿港木雕的精髓在於『活』。一條龍，你不能只是雕出形，你要雕出牠在雲霧裡翻騰的氣勢。這靠的不是圖樣，是匠人手底下的氣。我磨了五十年，也才懂了一點點。"
  "龍山寺":
    zh-TW: "龍山寺是木雕的殿堂，特別是戲台的八卦藻井，那是我們木雕匠人的神殿。每次去，我都要給建廟的祖師爺鞠躬，那種結構，是神的工藝。"
  "傳承":
    zh-TW: "現在年輕人嫌髒、嫌累，都不學了。但我告訴你，只要這座廟還在，這門手藝就不會斷，神明需要神轎，菩薩需要神龕，匠人的手藝就永遠有人求。"
  "傳言":
    zh-TW: "你問藻井中心的鎮火符？那不是傳言，是我祖父那一代修繕時親眼看過的。那是一塊雕刻成太極圖的桃木，封在最頂端的榫頭縫裡，除非整座廟拆了，否則拿不出來。"
