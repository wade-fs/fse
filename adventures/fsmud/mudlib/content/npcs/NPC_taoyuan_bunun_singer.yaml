id: NPC_taoyuan_bunun_singer
name:
  zh-TW: 桃源布農族傳唱者伊斯坦大
settlement: kaohsiung
home_site: taoyuan_kaohsiung
role: performer
hint:
  zh-TW: 五十多歲的布農族男性，是部落裡的傳唱者，負責在祭典中帶領族人唱八部合音。聲音渾厚而宏亮，聽過一次就忘不了。
responses:
  八部合音:
    zh-TW: 布農族的pasibutbut（八部合音），不是八個人唱八個聲部——而是男性族人一起唱，在唱的過程中聲音自然分成多個聲部，形成和弦。那個聲音是從身體裡長出來的，不是學來的，是我們族人天生會的。
  小米:
    zh-TW: 我們唱pasibutbut，是為了向天神祈求小米豐收。唱得越好，小米就長得越好——這是我們的信仰，也是我們的農業實踐。音樂和土地，在我們族人那裡是同一件事。
  山:
    zh-TW: 我是在荖濃溪邊的部落長大的。那條溪，那些山，就是我的家。八八風災那年，溪改了道，部落被淹了，我們下山了。但我每年還是回去唱一次，在那個地方，給留在那裡的東西聽。
