id: NPC_old_tailor_tainan
name:
  zh-TW: "永樂市場老布商阿順仔"
settlement: tainan
home_site: tainan_yongle_market
role: merchant
hint:
  zh-TW: "六十歲出頭，坐在算盤後面，但算盤旁邊也放著計算機，說算盤是習慣，計算機是效率。"
responses:
  "布":
    zh-TW: "永樂市場的布從日治時代就在這裡了，那時候是洋布、台布混著賣。現在台灣自己做的布少了，大部分進口，但品質好的還是找得到，只是要懂得問、懂得找。"
  "老布頭":
    zh-TW: "你說那疋從清代留下來的布？那是真的，我有。那個布頭放在倉庫最深處的箱子裡，脆了，一碰就掉，但顏色是靛藍的，很深、很美，那個年代的染法現代很難複製。"
  "日本時代":
    zh-TW: "日本時代有一種布叫「台灣布」，是台灣本地棉紡的，比進口的粗，但耐用，農民喜歡。後來日本推廣機械紡織，台灣布就消失了，但有些老布商把最後一批存貨留著，從來沒有賣出去。"
  "傳言":
    zh-TW: "你說那個老布頭裡面有什麼？我有一次翻那疋布，在布的褶縫裡找到一張小紙片，上面是幾個漢字，寫的是：「此布留予來者認。」這句話我研究了很多年，不知道留給誰認什麼。"
