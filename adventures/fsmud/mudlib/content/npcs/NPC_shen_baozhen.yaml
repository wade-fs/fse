id: NPC_shen_baozhen
name:
  zh-TW: 沈葆楨
settlement: mudan
home_site: checheng_harbor
role: magistrate
hint:
  zh-TW: 大清欽差大臣，身穿一品官服，神情冷峻而精明，手撫長鬚，顯得憂國憂民。
responses:
  牡丹社:
    zh-TW: 日軍以琉球人為藉口侵我疆土，實乃窺視我台灣防務。本大臣奉命來台，當內撫番社、外禦強敵。
  開山撫番:
    zh-TW: 台灣後山歷來被視為版圖之外，此乃大謬！當開闢道路、安撫番社、設官治理，方能斷絕外人窺覬之心。
  海防奏摺:
    zh-TW: 本大臣已上奏朝廷，請求在恆春建城防守，並興建砲台。台灣乃東南門戶，海防不可一日鬆懈！
