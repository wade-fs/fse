id: NPC_broadcasting_staff
name:
  zh-TW: "放送局老播音員春花"
settlement: chiayi_city
home_site: chiayi_broadcasting
role: broadcaster
hint:
  zh-TW: "六十多歲的女性，說話聲音清亮，每句話的尾音自然揚起，像是永遠在廣播狀態。"
responses:
  "廣播":
    zh-TW: "我做廣播四十年，廣播的力量在於，你看不見說話的人，但你聽得到他的聲音。聲音能傳進任何地方，鎖不住它。"
  "二二八":
    zh-TW: "二二八那天，這裡有人試圖廣播。我當時還小，但我聽到了。後來那個聲音就消失了，廣播中斷，然後是靜默，那段靜默比任何話都更讓人害怕。"
  "傳言":
    zh-TW: "那個麥克風說過什麼？沒有錄音。但有個老播音員說，他聽過一個版本的說法，是當年廣播出去的最後一句話，那句話我轉述給你聽，但我沒辦法確認是不是真的。"
