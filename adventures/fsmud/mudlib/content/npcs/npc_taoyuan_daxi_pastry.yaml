id: npc_taoyuan_daxi_pastry
name:
  zh-TW: "陳掌櫃"
settlement: taoyuan
home_site: "taoyuan_daxi_old_street"
role: "店家"
hint:
  zh-TW: "大溪老街百年漢餅鋪老闆，熟知傳統大餅與祭祀用紅龜粿的古法製作。"
responses:
  "歷史":
    zh-TW: "桃園的歷史，是一面由大圳與古城牆抵禦強風，一面由桃園神社與眷村大合院寫成的開墾長卷。"
  "山海":
    zh-TW: "不論是角板山的古防空洞，還是大溪的巴洛克老街，都是我們桃園人在風浪中討生活的根。"
