id: NPC_gangshan_zhaoying_keeper
name:
  zh-TW: 招英廟廟祝老阿福
settlement: kaohsiung
home_site: gangshan_zhaoying
role: temple_keeper
hint:
  zh-TW: 七十幾歲的廟祝，在招英廟服務超過三十年，對朱一貴事件有特別深的研究，說話時帶著一種歷史帶來的沉重感。
responses:
  朱一貴:
    zh-TW: 朱一貴在阿公店起義，這個廟是和那段歷史有關的。他的義軍不是無名之輩，有名有姓的首領幾十人，來自各個地方。起義成功後他登上帝位，在台南稱「義王」，在台灣史上算是一件很有意思的事。
  義軍:
    zh-TW: 朱一貴的義軍，閩南人和客家人都有。起義成功後，兩邊合作就出了問題——客家人和閩南人之間有衝突，形成所謂「閩客械鬥」的苗頭。清軍就是趁著這個分裂，輕易平定了義軍。
  石碑:
    zh-TW: 廟裡那塊石碑，說的是義軍聚義的事，但有幾個字磨損了，看不清楚。我做了幾十年廟祝，一直想弄清楚那幾個字，但拓印的技術不好，就這樣擱著了，說不定我死之前能搞清楚。
