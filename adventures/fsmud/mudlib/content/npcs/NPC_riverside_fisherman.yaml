id: NPC_riverside_fisherman
name:
  zh-TW: "八掌溪漁夫阿水伯"
settlement: chiayi_city
home_site: riverside_settlement
role: fisherman
hint:
  zh-TW: "黑瘦的老漁夫，赤腳站在溪石上，看著水面的時間比說話的時間長。"
responses:
  "溪":
    zh-TW: "八掌溪現在魚少了，以前我爸說一網下去幾十條，現在一天撈到十條就不錯了。是農藥，是開發，是很多事情加在一起。"
  "顱風":
    zh-TW: "颱風來我就走，不走沒辦法，溪水一漲，堤外就淹。我已經搬過三次了，每次颱風過後，又回來蓋。這裡有我的生計，走不開。"
  "傳言":
    zh-TW: "漂來的那塊木頭？那是真的，我撈到的。那個地圖我看了，指向嘉義公園，我不去挖，那是公家的地，而且我覺得那不是地圖，那是某種記號，但記號要說什麼，我看不懂。"
