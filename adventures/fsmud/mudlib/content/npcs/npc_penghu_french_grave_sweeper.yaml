id: npc_penghu_french_grave_sweeper
name:
  zh-TW: "潘老守墓人"
settlement: penghu
home_site: "penghu_french_cemetery"
role: "管理員"
hint:
  zh-TW: "看守蛇頭山法軍公墓的本地老人，對這段帝國衝突與海難歷史深有感觸。"
responses:
  "歷史":
    zh-TW: "澎湖的歷史，是一半靠著天後宮媽祖庇佑，一半靠著玄武岩跟強烈東北季風寫下來的。"
  "海洋":
    zh-TW: "不論是西嶼的砲台，還是七美的雙心石滬，都是我們澎湖先民在大海中討生活的根。"
