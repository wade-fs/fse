id: npc_tainan_wusheng_keeper
name:
  zh-TW: "李道長"
settlement: tainan
home_site: "tainan_wusheng_temple"
role: "廟祝"
hint:
  zh-TW: "祀典武廟的老道士，精通大關帝廟歷代皇帝御筆匾額的背景與月老祠的歷史。"
responses:
  "歷史":
    zh-TW: "府城的歷史，是一面由紅磚古城牆抵禦海風，一面由各大古廟的裊裊香煙寫成的山海長卷。"
  "文化":
    zh-TW: "不論是迎王大典的火光，還是孔廟的明倫堂，都是我們台南先民在海浪中討生活的根。"
