id: npc_taoyuan_xiaoli_elder
name:
  zh-TW: "潘長老"
settlement: taoyuan
home_site: "taoyuan_xiaoli_altar"
role: "長老"
hint:
  zh-TW: "霄裡平埔族凱達格蘭先民後裔長老，致力於維護祖靈碑祭祀與傳承平埔神話。"
responses:
  "歷史":
    zh-TW: "桃園的歷史，是一面由大圳與古城牆抵禦強風，一面由桃園神社與眷村大合院寫成的開墾長卷。"
  "山海":
    zh-TW: "不論是角板山的古防空洞，還是大溪的巴洛克老街，都是我們桃園人在風浪中討生活的根。"
