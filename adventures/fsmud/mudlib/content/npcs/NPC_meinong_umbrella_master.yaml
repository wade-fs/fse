id: NPC_meinong_umbrella_master
name:
  zh-TW: 美濃油紙傘師傅廖師公
settlement: kaohsiung
home_site: meinong
role: artisan
hint:
  zh-TW: 七十幾歲的老師傅，手指長年沾著桐油，皮膚都染了一層淡黃色。說話用客語，但知道你聽不懂，就換成帶客語腔的台語。
responses:
  油紙傘:
    zh-TW: 美濃的紙傘，從我師公那代就做了，算起來五代了。這個傘骨的裁法，是我師公的師公傳下來的，外面沒有人會。你問我能不能傳授？要學，先跟我學三年劈竹子，再說傳什麼技法。
  客家:
    zh-TW: 美濃的客家人，從清代就在這裡了。我們客家人有句話：「寧可食無菜，不可食無茶」——講的是堅持，不是真的說茶。美濃人做什麼都這樣，要做就做到底。
  祖先:
    zh-TW: 我阿祖是從廣東梅縣來的，帶了幾粒種子和一個做傘的傳統。他在美濃落腳，說這裡的竹子好，適合做傘骨。他沒有說適合農耕，只說適合做傘——你說這個人，心裡想的是什麼。
