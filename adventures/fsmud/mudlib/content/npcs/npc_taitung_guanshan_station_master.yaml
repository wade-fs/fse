id: npc_taitung_guanshan_station_master
name:
  zh-TW: "老站長"
settlement: taitung
home_site: "taitung_guanshan_station"
role: "管理員"
hint:
  zh-TW: "關山舊火車站的退休老站長，熟悉日治時期窄軌蒸汽小火車運送檜木的往事。"
responses:
  "歷史":
    zh-TW: "台東的歷史，是一面由都蘭大山抵禦海風，一面由太平洋黑潮與原民先靈歌聲寫成的山海長卷。"
  "山海":
    zh-TW: "不論是卑南的古遺址，還是紅葉的操場，都是我們台東人在風浪中討生活的根。"
