id: NPC_night_watchman_minxiong
name:
  zh-TW: "更夫阿旺"
  en: "Night Watchman A-Wang"
hint:
  zh-TW: "夜晚才出沒的老人，手持竹梆，腳步輕緩地繞行街道。臉上總帶著一副老神在在的表情，彷彿什麼都見過。"
  en: "An elderly man who only appears at night, carrying a bamboo clapper, walking slowly around the streets. His face always bears an expression of one who has seen everything."
settlement: minxiong
home_site: old_street
responses:
  "更夫":
    zh-TW: "打更是老行業了。以前一夜打五更，每更兩個時辰。現在沒有人管這個，我只是走一走，習慣了。"
    en: "Being a night watchman is an old trade. Used to beat five watches a night, two hours each. Nobody maintains this now — I just walk around. I'm used to it."
  "夜晚":
    zh-TW: "夜晚的民雄才是真的民雄。你聽，那邊是哪家嬰兒在哭，那個角落是貓在打架。白天人聲雜，夜裡反而清楚。"
    en: "Minxiong at night is the real Minxiong. Listen — that baby crying over there, the cats fighting in that corner. Daytime is full of noise; night is clearer."
  "鬼":
    zh-TW: "鬼啊，我走了這麼多年，沒碰過。但我在鬼屋前走過，那裡的空氣確實不一樣，是濕的、重的。是靈氣還是鬼氣，說不上來。"
    en: "Ghosts? After all these years of walking, I've never encountered one. But I've passed by the haunted house, and the air there is different — damp and heavy. Whether it's spiritual energy or ghost energy, I can't say."
  "秘密":
    zh-TW: "你要我說民雄的秘密？（停頓）你知道大士爺廟地底下有幾條暗渠嗎？清朝留下來的，日本人加蓋過，現在全被封了。那裡頭流的是什麼，沒人知道了。"
    en: "You want me to tell you Minxiong's secrets? (pause) Do you know how many hidden channels run beneath the Dashiye Temple? From the Qing dynasty, reinforced by the Japanese, now all sealed. What flows through them — nobody knows anymore."
  "傳言":
    zh-TW: "今晚我走過照相館，窗裡有人影。我定睛看，影子沒有頭。我繼續走，沒有回頭。這種事情，看過就算了。"
    en: "Tonight I walked past the photo studio, there was a shadow in the window. I looked closely — the shadow had no head. I kept walking and didn't look back. These things, once seen, you just move on."
