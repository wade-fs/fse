id: npc_taoyuan_wood_master
name:
  zh-TW: "黃大師"
settlement: taoyuan
home_site: "taoyuan_daxi_wood_museum"
role: "工藝師"
hint:
  zh-TW: "大溪傳統木藝博物館的首席大木匠，精通紅木神轎與卡榫雕刻技術。"
responses:
  "歷史":
    zh-TW: "桃園的歷史，是一面由大圳與古城牆抵禦強風，一面由桃園神社與眷村大合院寫成的開墾長卷。"
  "山海":
    zh-TW: "不論是角板山的古防空洞，還是大溪的巴洛克老街，都是我們桃園人在風浪中討生活的根。"
