id: npc_taitung_peinan_scholar
name:
  zh-TW: "張教授"
settlement: taitung
home_site: "taitung_peinan_ruins"
role: "研究員"
hint:
  zh-TW: "專門研究卑南遺址的考古學家，對月形石柱的來源與石棺群的分佈極有研究。"
responses:
  "歷史":
    zh-TW: "台東的歷史，是一面由都蘭大山抵禦海風，一面由太平洋黑潮與原民先靈歌聲寫成的山海長卷。"
  "山海":
    zh-TW: "不論是卑南的古遺址，還是紅葉的操場，都是我們台東人在風浪中討生活的根。"
