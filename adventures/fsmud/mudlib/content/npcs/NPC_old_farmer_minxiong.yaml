id: NPC_old_farmer_minxiong
name:
  zh-TW: "甘蔗農阿土"
  en: "Sugarcane Farmer A-Tu"
hint:
  zh-TW: "皮膚黝黑、手掌寬厚，蹲在田埂上休息的中年農夫，草帽壓得很低。"
  en: "A middle-aged farmer with dark skin and broad hands, resting on the field ridge with his straw hat pulled low."
settlement: minxiong
home_site: sugarcane_field
responses:
  "甘蔗":
    zh-TW: "種甘蔗好操！砍了一批，要等一年多才長回來。日本時代是糖廠說幾錢就幾錢，現在也好不到哪去，糖公司壓價，農夫就是命苦。"
    en: "Growing sugarcane is tough work! Cut one batch, wait over a year for it to grow back. In the Japanese era, the sugar factory set the price. Now it's not much better — the sugar company suppresses prices, farmers just suffer."
  "糖廠":
    zh-TW: "糖廠倒了以後，田裡不知道種什麼才好。老一輩都說種菜，我看還是種稻比較穩。那個廢墟現在荒著，可惜。"
    en: "After the sugar factory closed, we didn't know what to plant. The older generation said vegetables, but I think rice is more stable. The ruin sits abandoned now — a pity."
  "土地":
    zh-TW: "這塊地是祖先傳下來的，再怎麼苦也不能賣。隔壁村的阿全仔把地賣給建商，結果人老了沒地種，日子才難過。"
    en: "This land was passed down from our ancestors. No matter how hard things get, we can't sell it. The neighbor A-Quan sold his land to developers, and now he's old with nowhere to farm — that's truly hard living."
  "鬼屋":
    zh-TW: "劉家那棟房子啊？以前這附近田地都是劉家的。後來戰爭一來，人就散了，田也荒了。說鬼是亂說，那是沒人管的房子罷了。"
    en: "That Liu family house? All the nearby fields used to belong to the Lius. Then the war came, the family scattered, the fields were abandoned. Calling it haunted is nonsense — it's just an unmaintained house."
  "傳言":
    zh-TW: "傳言？昨晚糖廠那邊有人看到奇怪的光，說是有人去挖什麼寶。我說那是螢火蟲，他們說太大顆了。"
    en: "Rumors? Last night someone saw strange lights near the sugar factory ruins, said someone was digging for treasure. I said it was fireflies, but they said the light was too large."
