id: npc_hsinchu_glass_master_lin
name:
  zh-TW: "林師傅"
settlement: hsinchu_city
home_site: "hsinchu_glass_museum"
role: "工藝師"
hint:
  zh-TW: "新竹資深的吹製玻璃大師，能赤手空拳在千度高溫的火爐旁吹製出流光溢彩的玻璃藝術品。"
responses:
  "歷史":
    zh-TW: "新竹九降風吹了幾百年，吹乾了米粉與柿餅，也吹開了這座竹塹城的城樓。"
  "文化":
    zh-TW: "不論是北埔的客家膨風茶，還是城隍廟的都城隍出巡，都是新竹人的根。"
