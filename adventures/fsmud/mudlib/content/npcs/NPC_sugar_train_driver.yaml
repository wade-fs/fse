id: NPC_sugar_train_driver
name:
  zh-TW: "仁德糖廠老司機阿旺"
settlement: tainan
home_site: tainan_guofeng_market
role: worker
hint:
  zh-TW: "退休的五分車司機，現在以志工身份在文化園區開假日的觀光五分車，說話帶著鄉音。"
responses:
  "五分車":
    zh-TW: "五分車的軌距是762毫米，一般火車的一半，所以叫五分。開起來和一般火車不一樣，車廂小、速度慢，但穩，地面的震動感不一樣，像是和土地更近一點。"
  "糖廠":
    zh-TW: "歸仁糖廠從大正時代開始，我進去做是民國五十年代，做了三十年。最忙的時候採收季，工人三班制，廠燈從不熄。後來糖業沒落，糖廠關閉，我是最後一批離開的工人。"
  "老機車":
    zh-TW: "你說角落那台機車？那是我開了二十年的那台，說是要整修，但我知道，那台只是需要換一個配件，那個配件不貴，也不難找，就是沒有人去找。我去說了幾次，他們說在計畫，我就不再說了。"
  "傳言":
    zh-TW: "糖廠有一個位置，每次下雨後，地面會有一種甜味，不是糖的甜，是更淡的，像是土地本身的甜。老師傅說，那是因為那個位置地下有一個當年製糖時滲漏的舊儲糖槽，幾十年了，甜味還在往上滲。"
