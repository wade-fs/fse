id: NPC_yancheng_restaurant_owner
name:
  zh-TW: 鹽埕海鮮餐廳老闆秋蘭
settlement: kaohsiung
home_site: yancheng
role: merchant
hint:
  zh-TW: 五十多歲的女性，鹽埕開海鮮餐廳三十年，廚藝了得，對鹽埕的每一棟老建築都有回憶，看見古蹟被拆掉就會罵人。
responses:
  鹽埕:
    zh-TW: 我在鹽埕長大，鹽埕是什麼感覺，就是這裡。老屋、老街、人——我認識鄰居的每一個人，他們的父母我也認識。現在很多都走了，有些搬走，有些死了，房子換了主人，感覺就不一樣了。
  海鮮:
    zh-TW: 高雄的海鮮，要吃就要吃新鮮的。我的食材是每天從旗津過來的，不是昨天的，不是外地的。你如果說想吃特別的，你告訴我，我去漁市問問。我的漁市朋友，什麼奇怪的都能弄到。
  鹽埕繁華:
    zh-TW: 大家都說鹽埕沒落了。我說沒有沒落，只是靜下來了。以前的繁華是那個年代的，現在的靜是這個年代的，鹽埕還是鹽埕，只是時代換了。你要說沒落，就是時代沒落了，不是這個地方沒落了。
