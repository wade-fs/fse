id: NPC_historical_novelist
name:
  zh-TW: "台南歷史小說家彥廷"
settlement: tainan
home_site: tainan_confucian_temple
role: writer
hint:
  zh-TW: "在孔廟旁的咖啡廳長期寫作的中年男性，書包裡有三本不同時期的草稿，說話有時像在朗讀自己的文字。"
responses:
  "台南":
    zh-TW: "台南是台灣最有歷史積累的城市，但這種積累讓台南人有時候太過依賴過去，在現在和過去之間說不清楚自己站在哪裡。我的小說一直在寫這個問題，但我自己也沒有答案。"
  "鄭成功":
    zh-TW: "我寫過一部以鄭成功的角度寫的小說，但從鄭成功的角度看，台灣是他的最後一張牌，不是夢想之地，是殘局之地。這種觀點在台灣不太受歡迎，但我認為接受複雜的歷史，才是真正的尊重。"
  "荷蘭":
    zh-TW: "荷蘭人在台灣三十八年，比蔣介石在台灣的時間還短，但留下的影響比很多人意識到的深。學術界現在越來越重視荷蘭時代，因為那段時期的文書資料是完整的，後來的年代反而殘缺。"
  "傳言":
    zh-TW: "我在寫一部關於五條港的小說，做田野調查時，有人告訴我，五條港的第五條港沒有完全消失，它的某段還在地底下流動，只是方向改變了。我去找地質調查資料，發現地下水流的方向和那條說法吻合。"
