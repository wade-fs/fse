id: NPC_confucian_temple_rector
name:
  zh-TW: "台南孔廟祭酒阿松先生"
settlement: tainan
home_site: tainan_confucian_temple
role: scholar
hint:
  zh-TW: "穿著中式長褂的老學者，在孔廟當義工策展人，說話引經據典，但偶爾會突然說一句台語俚語。"
responses:
  "孔廟":
    zh-TW: "全台首學，這四個字是清代康熙皇帝賜的，意思是台灣第一所官辦學校。在這裡讀過書的人，後來在清代台灣的歷史裡留下名字的，不是少數。"
  "老榕":
    zh-TW: "這棵老榕是鄭經時代種的，比孔廟的清代建築還老。你說台灣的樹見過多少歷史？這棵樹見過鄭氏台灣、清領、日治、戰後，它記得的，比任何人都多。"
  "石碑":
    zh-TW: "孔廟有很多石碑，大部分是官方記錄，但你說的那塊，背面的字，我知道。那個秀才是乾隆年間的，他的夢被他記下來，卻說「不在紙上」，這個矛盾我想了好多年，或許他的意思是，孔子說的道，在做的事情裡，不在寫的字裡。"
  "傳言":
    zh-TW: "祭孔的時候，大成殿的門要由德高望重的人開，我做了二十年，每次把門推開的那一刻，我都感覺裡面有人在等，但進去沒有人。這不是傳言，是我的感覺，但我不把它歸類為靈異，就只是孔廟的氣。"
