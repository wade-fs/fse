id: NPC_five_concubines_keeper
name:
  zh-TW: "五妃廟年輕廟公阿文"
settlement: tainan
home_site: five_concubines_temple
role: temple_keeper
hint:
  zh-TW: "二十多歲的年輕廟公，是廟公家族的第五代，有點靦腆，但對五妃的故事說起來眼神發亮。"
responses:
  "五妃":
    zh-TW: "五位侍妾在鄭克塽投降清朝之前，自己選擇了死。她們不是被命令的，是自己決定的。我每次講這件事，都覺得她們的選擇需要很大的勇氣，比很多男性英雄更值得被記住。"
  "花":
    zh-TW: "廟前的花每天都換，是我換的。你問那個神龕前面無緣無故出現的花？那不是我換的，我也不知道是誰放的。第一次發現是我爺爺那一代，說每年農曆某天早上開門，那裡有一束花，乾淨的，像剛採的。"
  "燭火":
    zh-TW: "農曆某天五座燭火同時搖動？那是我爸說的，他說他看過三次，每次都在同一天，但那天沒有風，廟門都是關著的。我接管廟之後只看過一次，那一次我站在那裡看了很久，不知道說什麼，就繼續做我的事了。"
  "傳言":
    zh-TW: "有人問我五妃有沒有留下什麼話，我說廟裡有一個牌位，上面的名字是五位侍妾的稱呼，不是真名，因為她們的真名沒有被記錄下來。這件事我覺得是五妃廟裡最大的遺憾。"
