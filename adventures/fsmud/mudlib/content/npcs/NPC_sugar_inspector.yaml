id: NPC_sugar_inspector
name:
  zh-TW: "糖業總辦"
  en: "Sugar Superintendent"
hint:
  zh-TW: "穿著白色洋裝的日籍督查官，表情嚴肅，正在做什麼紀錄。"
  en: "A stern-looking Japanese inspector in white, taking notes."
responses:
  "糖廠":
    zh-TW: "（對你打量了一番）民雄製糖株式會社有嚴格的作業規程，閒雜人等請勿進入廠區。"
    en: "(Eyes you carefully) The Minxiong Sugar Manufacturing Company has strict protocols. Unauthorized personnel are not allowed inside."
  "甘蔗":
    zh-TW: "今年甘蔗收成不差。但工人效率需要提升，這是我要調查的重點。"
    en: "This year's sugarcane harvest is decent. But worker efficiency needs improvement — that's what I'm investigating."
  "工人":
    zh-TW: "工人薪資已依公司規定發放，若有申訴請透過正式渠道。"
    en: "Worker wages have been paid as per company policy. File formal complaints through the proper channels."
  "事件":
    zh-TW: "（臉色微變）什麼事件？糖廠一切正常，你聽說了什麼謠言？"
    en: "(Face twitches) What incident? Everything is normal at the sugar factory. What rumor did you hear?"

schedule:
  default_site: "sugar_factory_ruins"
  routines:
    - time: "08:00-12:00"
      location: "sugar_factory_ruins"
      action_msg: "正在廠區巡邏，手持文件板。"
    - time: "12:00-13:00"
      location: "minxiong_old_station"
      action_msg: "在月台等待接送車，顯得有些不耐煩。"
    - time: "13:00-18:00"
      location: "sugar_factory_ruins"
      action_msg: "正在辦公桌前審閱生產報告。"
    - time: "18:00-08:00"
      location: "tavern"
      action_msg: "在角落獨自喝著清酒，眼神深沉。"

  # 當時代切換到清領時代，他不存在（只有日治時代才有日籍官員）
  overrides:
    - condition:
        type: "era_active"
        era: "qing"
      routines:
        - time: "00:00-23:59"
          location: "chiayi_city_temple"
          action_msg: "（此人在清領時代並不存在於民雄）"
