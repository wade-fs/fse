id: npc_lianjiang_qinbi_mason
name:
  zh-TW: "陳老石匠"
settlement: lianjiang
home_site: "lianjiang_qinbi_village"
role: "工藝師"
hint:
  zh-TW: "芹壁聚落最後一代手工打石的老石匠，精通閩東「人字砌」與「工字砌」築牆法。"
responses:
  "歷史":
    zh-TW: "連江的歷史，是一面由花崗岩坑道抵禦砲火，一面由天后宮媽祖衣冠塚香火寫成的戰地長卷。"
  "戰地":
    zh-TW: "不論是芹壁石屋的標語，還是北海地下水道，都是我們連江人在砲火與風浪中求生存的根。"
