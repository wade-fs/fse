id: NPC_kaohsiung_station_old_worker
name:
  zh-TW: 高雄車站退休站務員老阿雄
settlement: kaohsiung
home_site: kaohsiung_station
role: civilian
hint:
  zh-TW: 七十幾歲的退休站務員，在高雄車站工作了三十多年，見過車站幾次改建，對車站的歷史有深刻的感情。
responses:
  車站:
    zh-TW: 我在這個車站工作三十多年，見過幾百萬個人進出。有人來，有人走，有人哭著來，有人笑著走。車站這個地方，是最多離別和相聚發生的地方，你如果站在月台上，那個感覺是說不清楚的。
  日式建築:
    zh-TW: 舊的車站建築，是日本人建的，帝冠式的屋頂，很有特色。要拆掉的時候，很多人反對，後來說要保留，就整個建築移開，很奇妙的工程。我在現場看見那棟建築被頂著慢慢移動，覺得台灣人有時候是很在乎舊東西的。
  離別:
    zh-TW: 我見過最多的是離別。年輕人要去外地讀書工作，家人來送。有一次，我看見一個老婦人送她的兒子，說你去台北要照顧好自己，兒子說好好好，結果火車開了，兒子哭了，婦人也哭了。送人的和走的，誰比較捨不得，我到現在還說不定。
