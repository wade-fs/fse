id: NPC_old_craftsman_wood
name:
  zh-TW: "製材所老木工阿福"
settlement: chiayi_city
home_site: lumber_yard_chiayi
role: craftsman
hint:
  zh-TW: "雙手厚繭、身材矮壯的老人，身上有松木和鋸木屑的氣味，說話緩慢，每句話都像在切割木頭。"
responses:
  "木材":
    zh-TW: "阿里山的檜木是台灣最好的木材，日本人知道，所以才建鐵路、建製材所，把那些百年老樹送下來。那些樹砍了就沒了，這件事我到現在還很難接受。"
  "製材所":
    zh-TW: "我在製材所做了三十年，剖木、打磨、分類。最好的木材送去蓋神社，蓋官廳，蓋有錢人的房子。工人住的地方用的是什麼？邊角料，剩下來的那些。"
  "傳言":
    zh-TW: "那個房間？那個我知道，是日本時代的辦公室，我做了三十年，沒有人進去過。磚封住的，裡面有什麼沒有人說，但我有一次在牆邊聽到裡面有聲音，像是紙張翻動的聲音，可能是老鼠，也可能不是。"
