id: NPC_changhua_rebel_descendant
name:
  zh-TW: "東門圓環老茶莊老闆阿德"
settlement: changhua_city
home_site: changhua_east_gate
role: merchant
hint:
  zh-TW: "五十多歲，茶莊就開在舊東門圓環旁，熱愛收集彰化舊城牆的歷史文獻與殘件。"
responses:
  "東門":
    zh-TW: "東門以前叫樂耕門，面向八卦山和台中平原，是防禦的第一線。日治時期市區改正，日本政府嫌城牆礙事，全拆了蓋圓環。我茶莊的這塊花崗岩門檻，就是當年拆東門時，我曾祖父偷偷運回來的東門基石。"
  "城門匾額":
    zh-TW: "你問寫著『民胞物與』的匾額？那是在東門拆除前夕，彰化的幾位紳商聯手，趁著夜色用麻繩將匾額拆下，藏在老街一間米行的天花板夾層裡。那間米行現在改成了雜貨店，匾額應該還在裡面。"
  "歷史":
    zh-TW: "彰化建城是在雍正年間，最先是種刺竹當城牆，後來林爽文之役後，才改建磚石城牆。這座城牆守過很多次起義，也見證了台灣人抗日的血。拆了，可惜了。"
  "傳言":
    zh-TW: "東門圓環的地底下，在夜深人靜、車流散去的時候，如果趴在地板上，能聽到輕微的空洞回聲。老一輩人都說那是清代城牆根部留下的排水暗渠，沒有被完全填平。"
