id: npc_taoyuan_lalashan_farmer
name:
  zh-TW: "江老茶農"
settlement: taoyuan
home_site: "taoyuan_lalashan_woods"
role: "農夫"
hint:
  zh-TW: "拉拉山上的資深茶農，精通高山茶的手工烘焙與茶葉發酵技術。"
responses:
  "歷史":
    zh-TW: "桃園的歷史，是一面由大圳與古城牆抵禦強風，一面由桃園神社與眷村大合院寫成的開墾長卷。"
  "山海":
    zh-TW: "不論是角板山的古防空洞，還是大溪的巴洛克老街，都是我們桃園人在風浪中討生活的根。"
