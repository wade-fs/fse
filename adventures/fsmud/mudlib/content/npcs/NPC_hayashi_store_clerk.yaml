id: NPC_hayashi_store_clerk
name:
  zh-TW: "林百貨解說員阿珊"
settlement: tainan
home_site: tainan_hayashi_dept
role: guide
hint:
  zh-TW: "穿著旗袍款工作服的年輕女性，說話流暢，解說時會用現代的方式類比日治時代的體驗。"
responses:
  "林百貨":
    zh-TW: "林百貨一九三二年開幕，你想像一下那個年代的台南人，第一次看到電梯是什麼感覺。那不只是便利，那是一種震撼，告訴你世界比你認識的更大。"
  "神社":
    zh-TW: "頂樓的神社是日治時代的，戰後被廢棄，後來變成空軍廳舍，再後來空了幾十年，這次修復才重新開放。現在頂樓是咖啡廳和觀景台，但那個神社的空間輪廓還在，你仔細看，能感覺到它原來的形狀。"
  "電梯":
    zh-TW: "那台電梯已經不運作了，現在展示的是複製品。原始的電梯在修復時被拆下來保存，你在某個地方能看到它的一部分，但不在展示空間裡。"
  "傳言":
    zh-TW: "有個傳說，說林百貨的老闆在二戰末期把很多珍貴的商品藏在地下室，戰後沒有回來取。地下室後來修復時沒有發現什麼，但有一個角落的磚頭看起來是後來補砌的，和周圍的磚不太一樣的新。"
