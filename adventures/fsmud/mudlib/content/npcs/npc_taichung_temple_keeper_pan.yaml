id: npc_taichung_temple_keeper_pan
name:
  zh-TW: "潘老廟祝"
settlement: taichung
home_site: "taichung_wanhe_temple"
role: "廟祝"
hint:
  zh-TW: "萬和宮的資深廟祝，熟知老大媽出巡犁頭店的由來與字姓戲的演出世家。"
responses:
  "歷史":
    zh-TW: "台中的歷史，是一面由縱貫鐵路牽引，一面由大甲媽祖與二七部隊寫成的長卷。"
  "文化":
    zh-TW: "不論是南屯的打鐵聲，還是櫟社詩人們在望月亭下的低吟，都是我們中台灣的根。"
