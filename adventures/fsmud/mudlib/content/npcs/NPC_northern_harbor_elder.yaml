id: NPC_northern_harbor_elder
name:
  zh-TW: "笨港老人阿德仔"
settlement: singang
home_site: beimen_creek_old
role: elder
hint:
  zh-TW: "坐在舊河道旁的大石上，手持菸斗，眼神遙遠，像是在等那條河回來。"
responses:
  "笨港":
    zh-TW: "笨港就是這裡，你看這條溝，以前是大河，大船進出的。我阿公說那時候港口熱鬧，大陸來的船帶來絲綢茶葉，台灣的稻米糖出去。一場大水，全部沖掉了。"
  "洪水":
    zh-TW: "乾隆年間的洪水，把笨港分成兩邊。北邊的人說他們才是正宗笨港，南邊的人也這樣說。後來北邊叫北港，南邊叫新港，兩個媽祖廟，兩個故事，到現在還在吵。"
  "河道":
    zh-TW: "你問河道的磚頭？那是真的，每次大雨之後，溝底就有磚頭露出來，是紅磚，清代的。我撿過幾塊，放在家裡，有人說那是古物，不能帶走。我說，我的祖先在這裡建的，我帶回家算什麼古物。"
  "傳言":
    zh-TW: "漂來的木頭？不是在嘉義公園嗎？我怎麼知道這裡也有流傳？是不是同一塊木頭，我不知道，但這裡也流傳說溪底有個箱子，一百年前有人看到，後來就看不到了。"
