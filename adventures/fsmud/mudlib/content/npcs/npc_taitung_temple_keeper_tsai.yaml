id: npc_taitung_temple_keeper_tsai
name:
  zh-TW: "蔡廟祝"
settlement: taitung
home_site: "taitung_queen_temple"
role: "廟祝"
hint:
  zh-TW: "天后宮的老守護人，熟悉光復後建廟歷史與胡傳保境安民匾的來歷。"
responses:
  "歷史":
    zh-TW: "台東的歷史，是一面由都蘭大山抵禦海風，一面由太平洋黑潮與原民先靈歌聲寫成的山海長卷。"
  "山海":
    zh-TW: "不論是卑南的古遺址，還是紅葉的操場，都是我們台東人在風浪中討生活的根。"
