id: npc_tainan_treehouse_guide
name:
  zh-TW: "林解說員"
settlement: tainan
home_site: "tainan_anping_treehouse"
role: "guide"
hint:
  zh-TW: "安平樹屋的資深生態導覽員，熟悉榕樹氣根與德記洋行倉庫共生的歷史。"
responses:
  "歷史":
    zh-TW: "府城的歷史，是一面由紅磚古城牆抵禦海風，一面由各大古廟的裊裊香煙寫成的山海長卷。"
  "文化":
    zh-TW: "不論是迎王大典的火光，還是孔廟的明倫堂，都是我們台南先民在海浪中討生活的根。"
