id: NPC_lin_chaodong
name:
  zh-TW: 林朝棟
settlement: wufeng
home_site: wufeng_lin_mansion
role: clan_leader
hint:
  zh-TW: 霧峰林家當主，文質彬彬但英氣勃勃，腰懸長劍，手按家訓文書。
responses:
  霧峰林家:
    zh-TW: 我們林家從阿草埔起家，篳路藍縷。在林爽文與戴潮春兩次大亂中，我們林家精忠報國，協助清軍平叛，方有今日之基業。
  義民軍:
    zh-TW: 亂世之中，朝廷無力保境，唯有地方鄉紳組織義勇，方能保宗族性命。南投與彰化的義民廟，便是歷史的明證。
  樟腦專賣:
    zh-TW: 林家得巡撫委託，掌管中部樟腦與山防。這不僅是林家的財源，更是守護台灣中部防線的重大責任。
