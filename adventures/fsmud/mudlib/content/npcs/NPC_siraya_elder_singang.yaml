id: NPC_siraya_elder_singang
name:
  zh-TW: "西拉雅後裔阿甘伯"
settlement: singang
home_site: xilaya_stone_site
role: elder
hint:
  zh-TW: "黝黑瘦削的老人，額頭有深刻的皺紋，坐在石板墓旁邊的大樹蔭下，像是守著什麼。"
responses:
  "西拉雅":
    zh-TW: "我是西拉雅人，第幾代我不確定了，連我阿公也說不清楚。我們這裡在地圖上叫新港鄉，但我們的祖先叫這裡「新港社」。名字換了，但土地還是一樣的土地。"
  "石板":
    zh-TW: "這些石板是祖先的墓，我每天來看一看，確認還在。不是因為有人要偷，是因為如果沒有人看，它就只是石頭，不是記憶了。"
  "荷蘭":
    zh-TW: "荷蘭人來的時候，我們的祖先學了羅馬字，能夠寫契約、寫信。那些文字後來叫做「新港文書」，現在散在各個博物館裡。我希望有一天全部回來。"
  "傳言":
    zh-TW: "你說新港紋？那個竹藝師傅說的圖案，我阿嬤的阿嬤也會編，但她說那個圖案是一種祈禱，不是裝飾，你把它編出來就是在說一件事，但說什麼，她沒有告訴後代了。"
