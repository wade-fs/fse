id: npc_hualien_temple_keeper_tseng
name:
  zh-TW: "曾道長"
settlement: hualien
home_site: "hualien_hualien_temple"
role: "廟祝"
hint:
  zh-TW: "港天宮的資深廟祝，熟知媽祖神轎出巡與庇佑花蓮港築港工人安全的典故。"
responses:
  "歷史":
    zh-TW: "花蓮的歷史，是一面由大理石峽谷抵禦強風，一面由太平洋黑潮與原民先靈歌聲寫成的山海長卷。"
  "山海":
    zh-TW: "不論是太魯閣的長春祠，還是太巴塱的祖靈屋，都是我們花蓮人在風浪中討生活的根。"
