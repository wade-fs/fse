id: npc_tainan_salt_farmer_hong
name:
  zh-TW: "洪鹽工"
settlement: tainan
home_site: "tainan_beimen_well"
role: "鹽工"
hint:
  zh-TW: "井仔腳鹽田的資深曬鹽人，熟悉碎瓦片鋪設技術與在烈日下用木耙耙出雪白鹽晶的技巧。"
responses:
  "歷史":
    zh-TW: "府城的歷史，是一面由紅磚古城牆抵禦海風，一面由各大古廟的裊裊香煙寫成的山海長卷。"
  "文化":
    zh-TW: "不論是迎王大典的火光，還是孔廟的明倫堂，都是我們台南先民在海浪中討生活的根。"
