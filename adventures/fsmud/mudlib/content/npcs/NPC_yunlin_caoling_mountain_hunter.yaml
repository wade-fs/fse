name:
  zh-TW: 草嶺山林獵人廖哥
responses:
  秘境:
    zh-TW: 草嶺這深山裡有很多隱秘的峽谷和山洞。光緒年間抗日義軍簡義他們，就曾帶兵躲在這些山洞裡打游擊。
  義軍:
    zh-TW: 聽我阿公說，義軍在山裡設了許多陷阱，日本兵根本進不來。可惜最後還是因為被斷了糧草才失敗。
