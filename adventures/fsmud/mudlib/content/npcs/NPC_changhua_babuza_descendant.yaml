id: NPC_changhua_babuza_descendant
name:
  zh-TW: "巴布薩族後裔老潘"
settlement: changhua_city
home_site: changhua_old_well_babu
role: elder
hint:
  zh-TW: "六十多歲，皮膚黝黑，眼神深邃，居住在水潭遺址旁，對平埔族巴布薩族的歷史與器物極感興趣。"
responses:
  "巴布薩":
    zh-TW: "我們是巴布薩族，漢人叫我們平埔族。在漢人來彰化建城以前，這片平原是我們的獵場，我們叫這裡『半線社』。我們和梅花鹿一樣，在這片土地上活了很久，但現在，大家都以為我們消失了。"
  "水潭":
    zh-TW: "這處水潭是我們祖先早年祭儀和取水的地方。工廠蓋起來後，水潭差點被填平，是我和我父親聯手抗議，公家才以『古水利遺址』保留下來。水潭底下的陶片，是我們的根。"
  "半線":
    zh-TW: "半線是我們族語的音譯，意思是『草澤與森林的交界』。漢人建城後，把半線改叫彰化，意思是『昭彰皇化』。名字改了，我們的歷史也被蓋住了，但這口水潭還記得。"
  "傳言":
    zh-TW: "水潭深處有一塊黑色的大石，傳說在月圓之夜，如果把手放在大石上，能聽到梅花鹿群奔跑的震動聲。我試過幾次，水溫涼涼的，確實有一種低沉的震動，不知道是不是水泵的聲音。"
