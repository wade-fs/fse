id: NPC_taipei_aboriginal_cultural_worker
name:
  zh-TW: 原住民文化推廣者
settlement: taipei
home_site: taipei_101_national_museum
role: artist
hint:
  zh-TW: 身穿原住民傳統服飾圖案的年輕女性，正在博物館外展示原住民織布工藝。
responses:
  原住民:
    zh-TW: 我是阿美族，來台北工作，但我不忘自己的根，週末在博物館推廣原住民文化，讓更多人了解我們。
  文化:
    zh-TW: 原住民族的語言、音樂、祭典都非常豐富，但很多已在消失，我們年輕人有責任傳承下去。
