id: NPC_chen_zai
name:
  zh-TW: 農民陳仔
settlement: yunlin
home_site: yunlin_irrigation_field
role: farmer
hint:
  zh-TW: 漳州籍農夫，手裡拿著一把沾滿泥土的鋤頭，神色警惕，說話帶著濃郁的漳州腔。
responses:
  爭水:
    zh-TW: 泉州人太霸道了！把上游的水源全用土壩攔住，我們下游客莊的稻子全都要枯死了！不打一仗，大家都得餓死！
  械鬥:
    zh-TW: 鋤頭不光是耕地用的，也是保命用的。前幾年械鬥，我用這鋤頭跟泉州人的鐵叉拼過命。這水圳裡的泥，是紅色的。
  陳仔:
    zh-TW: 我就是個耕田的，誰想天天打仗？但宗族兄弟如果不抱團，在這台灣荒島上根本活不下去。
