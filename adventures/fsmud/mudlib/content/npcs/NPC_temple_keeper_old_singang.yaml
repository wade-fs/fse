id: NPC_temple_keeper_old_singang
name:
  zh-TW: "老廟公阿春"
settlement: singang
home_site: fengtian_shrine_garden
role: elder
hint:
  zh-TW: "八十多歲，走路緩慢但穩健，在廟後花園一帶守護，見到訪客眼神警覺，見到有誠意的人才開口。"
responses:
  "後花園":
    zh-TW: "廟後面的花園是不對外開放的，你怎麼進來的？算了，進來了就進來了。這個地方是荷蘭人蓋教堂的舊址，石柱留到現在，我每天來看，確認它還在。"
  "石柱":
    zh-TW: "那幾根石柱是荷蘭人留下的，是花崗岩，比廟的建材還好。我有時候靠著它坐，感覺比靠廟牆更穩，不知道為什麼。"
  "新港文書":
    zh-TW: "荷蘭人在這裡教西拉雅族讀書，就在這個地方。新港文書就是在這片土地上誕生的，想到這件事，這幾根石柱就不只是石柱了。"
  "傳言":
    zh-TW: "地下？（停頓很久）有一次雨後，石柱旁邊的土塌陷了一個坑，我去看，坑底有幾個磚頭，比廟的磚更舊，顏色更深，我把土填回去，沒有跟人說，但我知道那裡有什麼。"
