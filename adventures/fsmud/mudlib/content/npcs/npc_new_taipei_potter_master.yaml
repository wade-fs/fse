id: npc_new_taipei_potter_master
name:
  zh-TW: "許陶師"
settlement: new_taipei
home_site: "new_taipei_yingge_ceramic_street"
role: "工藝師"
hint:
  zh-TW: "鶯歌陶瓷老街的資深拉坯與燒窯大師，懂得如何用柴燒控制坏體釉色。"
responses:
  "歷史":
    zh-TW: "新北市的歷史，是一半靠著淡水海風吹，一半靠著金瓜石火藥炸出來的。"
  "文化":
    zh-TW: "不論是平溪高空的天燈，還是三峽祖師廟的木雕，都是前人一筆劃刻出來的根。"
