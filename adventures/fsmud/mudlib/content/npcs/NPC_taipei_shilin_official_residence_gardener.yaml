id: NPC_taipei_shilin_official_residence_gardener
name:
  zh-TW: 士林官邸老園丁
settlement: taipei
home_site: taipei_101_shilin_official_residence
role: worker
hint:
  zh-TW: 穿著草帽、手拿剪刀的老人，正在精心修剪官邸玫瑰花圃的枝枒。
responses:
  官邸:
    zh-TW: 蔣夫人最喜歡玫瑰花，我阿爸當年負責種玫瑰，我接班後把這片花圃維護到現在已四十幾年了。
  歷史:
    zh-TW: 這裡每棵大樹都見過歷史，看著台灣從威權走向民主，樹還在，故事變了。
