id: npc_taitung_baxian_guide
name:
  zh-TW: "林學者"
settlement: taitung
home_site: "taitung_baxian_caves"
role: "研究員"
hint:
  zh-TW: "長濱文化研究者，長年守在八仙洞，對舊石器時代先民砍砸石器的技術瞭若指掌。"
responses:
  "歷史":
    zh-TW: "台東的歷史，是一面由都蘭大山抵禦海風，一面由太平洋黑潮與原民先靈歌聲寫成的山海長卷。"
  "山海":
    zh-TW: "不論是卑南的古遺址，還是紅葉的操場，都是我們台東人在風浪中討生活的根。"
