id: NPC_cijin_food_stall_grandma
name:
  zh-TW: 旗津烤生蚵阿嬤
settlement: kaohsiung
home_site: cijin_sealife
role: merchant
hint:
  zh-TW: 七十多歲的老婦人，在旗津海鮮街烤生蚵超過四十年，手法快，炭火控制精準，說話不多，但說的話都有道理。
responses:
  生蚵:
    zh-TW: 旗津的生蚵，是當天採的，不是昨天的。你看那個殼，有泥的，才是現撈的，乾淨的是放了一天的。我的是有泥的，你看見了嗎？那個泥，是從養蚵的礁石帶來的，那個味道很重要。
  烤蚵:
    zh-TW: 烤生蚵，火候是關鍵。太大火，肉縮了，汁跑掉了；太小火，腥味出來了，不好。我用的炭，是特別找來的，不是一般的炭。哪種炭，我說我的秘密，不告訴你。
  四十年:
    zh-TW: 四十年了，這個位置，都是我。我的孩子說要讓我退休，我說退休做什麼，在家坐著？不如在這裡坐著，還能做生意。我說等我手抖了，做不到精準，再來說退休的事。現在我的手還穩。
