id: npc_keelung_dianji_temple_daoist
name:
  zh-TW: "開漳老道長"
settlement: keelung
home_site: "keelung_dianji_temple"
role: "廟祝"
hint:
  zh-TW: "奠濟宮的資深廟祝，熟知開漳聖王建廟歷史與廟口夜市百年來的變遷。"
responses:
  "歷史":
    zh-TW: "基隆港口的風雨就沒停過，西班牙人、法國人、日本人來了又走，只有雨水留了下來。"
  "中元祭":
    zh-TW: "放水燈是為了引路，讓那些在黑水溝裡遇難的孤魂野鬼有條回家的路。"
