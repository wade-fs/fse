id: npc_left_camp_old_city_guard
name:
  zh-TW: "左營舊城老城防"
settlement: kaohsiung
home_site: "kaohsiung_harbor"
role: "citizen"
hint:
  zh-TW: "看守左營興隆莊鳳山縣舊城拱券多年的老城防趙大爺，對斑駁的泥塑神將極為痛心。"
responses:
  "歷史":
    zh-TW: "這座舊城牆是清代咾咕石建成的，北門兩側的泥塑神將面容早已剝落，急需石灰與糯米膠修補。"
  "山海":
    zh-TW: "我們在左營守著舊城，日夜聽著西子灣的海潮聲，這就是打狗的歷史。"
