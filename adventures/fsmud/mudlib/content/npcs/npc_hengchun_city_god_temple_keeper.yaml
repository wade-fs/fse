id: npc_hengchun_city_god_temple_keeper
name:
  zh-TW: "恆春城隍廟老廟祝"
settlement: hengchun
home_site: "hengchun"
role: "citizen"
hint:
  zh-TW: "守護恆春古廟多年的林道長，正在尋找古老黃銅原料來修補廟內的神明爐足。"
responses:
  "歷史":
    zh-TW: "這爐子是百年前建廟時鑄造的，現在一隻足斷了，尋常生鐵補不得，必須要用上好的古銅。"
  "山海":
    zh-TW: "站在恆春古城牆上望去，落山風呼嘯而過，山巒與巴士海峽的浪花都盡收眼底。"
