id: NPC_sugar_factory_worker_minxiong
name:
  zh-TW: "糖廠老工人阿水"
  en: "Old Sugar Factory Worker A-Shui"
hint:
  zh-TW: "駝背老人坐在廢墟牆角，雙手布滿厚繭，眼神空洞地看著已倒塌的煙囪。"
  en: "A hunched elderly man sitting in the corner of the ruins, hands covered in thick calluses, staring blankly at the collapsed chimney."
settlement: minxiong
home_site: sugar_factory_ruins
responses:
  "糖廠":
    zh-TW: "我在這做了三十年。十六歲進來鏟蔗渣，後來學會操蒸餾鍋，再後來管品管。最後廠關了，說是虧損，說是機器老舊。其實是時代變了。"
    en: "I worked here thirty years. Came in at sixteen shoveling bagasse, later learned to operate the distillation kettle, then managed quality control. In the end the factory closed — they said losses, said old equipment. Really the times changed."
  "甘蔗":
    zh-TW: "甘蔗的學問大了。榨汁要趁新鮮，放過夜就變酸。所以採收季全廠二十四小時不停，燈光亮得連夜晚都像白天。那是最熱鬧的時候。"
    en: "There's a real art to sugarcane. Press the juice while fresh — leave it overnight and it turns sour. So during harvest season the whole factory ran twenty-four hours. Lights so bright even night looked like day. That was the most lively time."
  "地下室":
    zh-TW: "（停頓）地下室？你去過？那個地方我不去了。日本時代留下來的，我們接管之後也沒全部打開，說是危險。有什麼危險，我不知道。"
    en: "(pause) The basement? You've been there? I don't go there anymore. Left over from the Japanese era — when we took over we didn't fully open it either. Said it was dangerous. What kind of danger, I don't know."
  "工人":
    zh-TW: "一起做工的那些人啊，有的去嘉義，有的去台北，有的就在民雄種田。我沒去，這個地方的土我捨不得離開。"
    en: "The ones I worked with — some went to Chiayi, some to Taipei, some stayed to farm in Minxiong. I didn't leave. I can't bear to leave the soil of this place."
  "傳言":
    zh-TW: "有人說廢墟晚上有聲音，說是機器還在轉。我說那是風吹進舊煙囪的迴響。但如果你問我，有沒有一次我聽了以後覺得，不太對勁……有一次。"
    en: "People say there are sounds in the ruins at night, that the machines are still running. I say it's wind echoing through the old chimney. But if you ask me whether I've ever heard something that felt... off — there was one time."
