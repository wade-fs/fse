id: npc_new_taipei_grave_keeper
name:
  zh-TW: "法國墓園守墓人"
settlement: new_taipei
home_site: "new_taipei_french_cemetery"
role: "管理員"
hint:
  zh-TW: "看守清法戰爭法國士兵公墓的老人，每日打掃落葉，為異鄉孤魂燃香。"
responses:
  "歷史":
    zh-TW: "新北市的歷史，是一半靠著淡水海風吹，一半靠著金瓜石火藥炸出來的。"
  "文化":
    zh-TW: "不論是平溪高空的天燈，還是三峽祖師廟的木雕，都是前人一筆劃刻出來的根。"
