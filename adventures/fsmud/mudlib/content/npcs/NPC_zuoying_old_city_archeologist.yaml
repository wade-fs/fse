id: NPC_zuoying_old_city_archeologist
name:
  zh-TW: 左營舊城考古研究員陳建志
settlement: kaohsiung
home_site: zuoying_old_city
role: researcher
hint:
  zh-TW: 五十多歲的考古學者，在左營舊城附近做田野調查多年，身上有考古工具的包，說起清代城牆的建材如數家珍。
responses:
  舊城:
    zh-TW: 鳳山縣舊城是台灣目前保存最完整的清代石城，但它的重要性沒有得到應有的認識。問題在於它不在台南，不在台北，在高雄的左營，觀光客不太來這裡。但論歷史的厚度，它不輸任何一個台灣的古跡。
  城牆材料:
    zh-TW: 城牆的石材主要是咕咾石（珊瑚礁石）和砂岩，從澎湖和打狗山採運過來。我測過，有些石塊重達幾噸，在那個年代的運輸技術下，這是相當了不起的工程。工人的名字沒有留下來，但他們的手工留著。
  考古:
    zh-TW: 我在舊城附近挖掘時，找到過清代軍事器械的碎片，還有幾枚銅錢，年代從乾隆到光緒都有。最讓我意外的是一片有字的瓦片，字是民間的俗字，不是官方用字，寫的是幾個名字——那些名字現在查不到任何記錄了。
