id: NPC_qishan_sugar_mill_worker
name:
  zh-TW: 旗山糖廠退休工人阿傳
settlement: kaohsiung
home_site: qishan_sugar_mill
role: civilian
hint:
  zh-TW: 七十幾歲的退休糖廠工人，常在糖廠舊址附近閒晃，身上穿著一件褪色的糖廠工作服，那件衣服比他的兒子還老。
responses:
  糖廠:
    zh-TW: 我在這個糖廠工作了三十幾年，從年輕做到退休。榨汁的季節是最累的，連夜班都要開，機器的聲音大到說話要喊。現在廠停了，我回來這裡，覺得這個地方還是我的地方。
  甘蔗:
    zh-TW: 甘蔗收穫的時候，整個旗山盆地都是甘蔗香，空氣裡有一種甜的，不是一般的甜，是帶苦的甜，你現在聞不到了。現在這裡沒有甘蔗田，種的是別的東西。
  窄軌:
    zh-TW: 那些小鐵路，糖廠用的，比一般火車窄，是給運甘蔗的。以前整個高雄縣的糖廠都有這種小鐵路，幾百公里，比現在的高鐵路線還長。現在都拆了，只剩幾段保存起來給人看。
