id: npc_taoyuan_factory_worker
name:
  zh-TW: "張師傅"
settlement: taoyuan
home_site: "taoyuan_zhongli_factory"
role: "工人"
hint:
  zh-TW: "中壢老汽水工廠的退休老鍋爐工，見證了黑松汽水等飲料生產線的興衰。"
responses:
  "歷史":
    zh-TW: "桃園的歷史，是一面由大圳與古城牆抵禦強風，一面由桃園神社與眷村大合院寫成的開墾長卷。"
  "山海":
    zh-TW: "不論是角板山的古防空洞，還是大溪的巴洛克老街，都是我們桃園人在風浪中討生活的根。"
