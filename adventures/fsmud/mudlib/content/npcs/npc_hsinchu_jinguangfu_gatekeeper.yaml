id: npc_hsinchu_jinguangfu_gatekeeper
name:
  zh-TW: "姜長老"
settlement: hsinchu_city
home_site: "hsinchu_jinguangfu_hall"
role: "守衛"
hint:
  zh-TW: "金廣福公館的年邁守護人，保留著昔日防番開墾的警報木鑼與舊帳冊。"
responses:
  "歷史":
    zh-TW: "新竹九降風吹了幾百年，吹乾了米粉與柿餅，也吹開了這座竹塹城的城樓。"
  "文化":
    zh-TW: "不論是北埔的客家膨風茶，還是城隍廟的都城隍出巡，都是新竹人的根。"
