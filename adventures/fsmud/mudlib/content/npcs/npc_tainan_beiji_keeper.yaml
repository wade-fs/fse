id: npc_tainan_beiji_keeper
name:
  zh-TW: "張廟祝"
settlement: tainan
home_site: "tainan_beiji_temple"
role: "廟祝"
hint:
  zh-TW: "北極殿的守廟人，每天保養明代古鐘，熟知上帝廟地勢高度與玄天上帝信仰的由來。"
responses:
  "歷史":
    zh-TW: "府城的歷史，是一面由紅磚古城牆抵禦海風，一面由各大古廟的裊裊香煙寫成的山海長卷。"
  "文化":
    zh-TW: "不論是迎王大典的火光，還是孔廟的明倫堂，都是我們台南先民在海浪中討生活的根。"
