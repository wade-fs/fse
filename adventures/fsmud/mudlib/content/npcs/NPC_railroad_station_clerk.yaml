id: NPC_railroad_station_clerk
name:
  zh-TW: "車站站務員阿義"
settlement: chiayi_city
home_site: chiayi_train_station
role: clerk
hint:
  zh-TW: "穿著制服的年輕站務員，工作時認真，下班後話多，是觀察嘉義南來北往旅客的最佳位置。"
responses:
  "車站":
    zh-TW: "嘉義車站一天有幾百班列車，縱貫線加阿里山線，這裡是嘉南平原和山區的交界點。你要去哪裡，告訴我，我幫你查班次。"
  "旅客":
    zh-TW: "各種人都從這裡過，農夫、學生、商人、軍人。有時候看到很老的人獨自坐在月台上，對著某個方向看，我不敢問他們在等誰，因為感覺是在等一個很久以前的班車。"
  "傳言":
    zh-TW: "月台那個燈柱？下面有個刻痕，很多人不注意，但如果你蹲下來看，是一個日期和一個字，字是「待」。沒有人知道誰刻的，為什麼刻，那個日期是昭和二十二年。"
