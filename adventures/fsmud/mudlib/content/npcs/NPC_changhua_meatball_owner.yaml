id: NPC_changhua_meatball_owner
name:
  zh-TW: "肉圓老店第三代阿成"
settlement: changhua_city
home_site: changhua_meatball_alley
role: vendor
hint:
  zh-TW: "四十多歲的胖男人，站在油鍋前熟練地撈肉圓，說話豪爽，笑聲大，對自家的炸肉圓品質極有自信。"
responses:
  "肉圓":
    zh-TW: "彰化肉圓的靈魂在於外皮。番薯粉的黏度和水質要剛剛好，溫油慢炸，皮吃起來才會Q、才會脆，不能急。我家的配方是我阿公在日治初期擺攤時調出來的，一公克都不能差。"
  "老攤":
    zh-TW: "我阿公那時候就在孔廟前面擺攤，挑著扁擔，一頭是油鍋，一頭是肉圓。那時候來吃的都是苦力、挑夫和學生，阿公說，讓人用最便宜的錢吃飽，這就是我們家做肉圓的良心。"
  "老街":
    zh-TW: "彰化老街以前很熱鬧的，現在雖然觀光了，但肉圓的滋味沒變。很多去台北工作的彰化人，回鄉第一件事就是來我這裡吃兩粒肉圓，喝一碗貢丸湯，這就是鄉愁。"
  "傳言":
    zh-TW: "老巷子最深處的那家老屋，日治時期曾是抗日義軍的秘密聯絡點。義軍受傷了，就裝成客人來吃肉圓，我阿公會把傷藥藏在肉圓的竹籤筒裡遞過去。這是我阿公臨終前說的秘辛。"
