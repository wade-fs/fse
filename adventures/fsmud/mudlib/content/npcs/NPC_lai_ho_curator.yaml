id: NPC_lai_ho_curator
name:
  zh-TW: "賴和紀念館館員小敏"
settlement: changhua_city
home_site: changhua_lai_ho_clinic
role: scholar
hint:
  zh-TW: "三十多歲的文藝女性，對賴和的文學作品與社會關懷極有研究，解說時帶著文學青年的熱情。"
responses:
  "賴和":
    zh-TW: "賴和先生是我們彰化的驕傲。他不僅是『台灣新文學之父』，更是一位悲憫的醫生。他在這間診所裡行醫，對窮人常常不收醫藥費，甚至在過年時親手燒毀窮人的欠帳單，彰化人稱他為『媽祖醫生』。"
  "文學":
    zh-TW: "賴和的文學是從台灣這片土地的痛苦裡長出來的。他用漢字寫新詩、寫小說，揭露日治時期殖民統治的殘忍與不公。他的筆，比當時義軍的佩刀更讓日本總督府害怕。"
  "處方箋":
    zh-TW: "那張帶有詩句草稿的處方箋，是他在大正年間給一個貧窮農民看病時寫的。處方是治感冒的藥，背後的詩句是『時代的病，需要時代的藥』。這就是賴和的靈魂。"
  "傳言":
    zh-TW: "賴和先生去世時，彰化街頭有數千名市民自發前來送行，隊伍從南門一直排到孔廟。日本警察原本要取締，但看到人潮的悲憤，最後只能默默退開。"
