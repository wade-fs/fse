id: NPC_maolin_elder
name:
  zh-TW: 茂林魯凱族長老巴嘎
settlement: kaohsiung
home_site: maolin
role: elder
hint:
  zh-TW: 七十多歲的魯凱族長老，身上穿著傳統服飾，胸前的琉璃珠項鍊是家傳之物。說魯凱族語和國語，台語帶著腔調。
responses:
  魯凱族:
    zh-TW: 魯凱族說，百合花是貞潔和勇敢的象徵。女人用百合花表示她是純潔的，男人用百合花表示他殺了雄性的獵物。這個花，在我們的文化裡不只是花，是一種宣示。
  紫蝶:
    zh-TW: 那些蝴蝶每年來，我們族人說那是祖先的靈魂。現代人說那是遷徙，是氣候，是本能。兩種說法都是真的，只是語言不同。你用那個語言，就會看見那個真相。
  颱風:
    zh-TW: 八八風災那年，部落被沖走了。我們搬到山下去住，但山下的生活方式和山上不一樣，語言、習慣、祭典——有些東西搬不走，就留在那裡了，讓土石蓋住它。
