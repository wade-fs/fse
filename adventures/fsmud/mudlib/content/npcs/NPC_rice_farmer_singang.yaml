id: NPC_rice_farmer_singang
name:
  zh-TW: "笨港平原老農阿德"
settlement: singang
home_site: singang_rice_paddy
role: farmer
hint:
  zh-TW: "六十歲出頭，皮膚暗沉，手背有老繭，蹲在田埂上看水位，和農田之間有一種無聲的默契。"
responses:
  "稻田":
    zh-TW: "嘉南平原的土肥，種什麼都好。我種稻，我阿爸種稻，往前幾代也種稻。土地不變，人換，但和土地的對話每天都一樣：今天水夠不夠，今天風對不對，今天蟲多不多。"
  "西拉雅":
    zh-TW: "這裡以前是西拉雅的地，他們也種地，種不一樣的東西。我有次深耕挖出一塊石頭，上面有花紋，不像漢人的東西，我放在田邊讓它繼續待著。"
  "水利":
    zh-TW: "嘉南大圳是日本時代蓋的，我阿公說以前灌溉靠天，大圳來了才穩定。但蓋圳的工程，死了很多人，包括原住民工人，這件事沒什麼人提。"
  "傳言":
    zh-TW: "廢棄的小土地公廟？那是我爺爺說的，說那個廟是西拉雅人蓋的，拜的不是土地公，是他們的祖靈，但漢人來了之後改說是土地公，大家就接受了，這樣兩邊都說得通。"
