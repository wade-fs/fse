id: npc_tainan_gate_keeper_pan
name:
  zh-TW: "潘老城防"
settlement: tainan
home_site: "tainan_chongji_gate"
role: "守衛"
hint:
  zh-TW: "守護兌悅門多年的本地老人，每天清晨打掃城門石拱，熱心講述咾咕石城牆史。"
responses:
  "歷史":
    zh-TW: "府城的歷史，是一面由紅磚古城牆抵禦海風，一面由各大古廟的裊裊香煙寫成的山海長卷。"
  "文化":
    zh-TW: "不論是迎王大典的火光，還是孔廟的明倫堂，都是我們台南先民在海浪中討生活的根。"
