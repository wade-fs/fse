id: NPC_piertwo_artist
name:
  zh-TW: 駁二藝術家林雨晴
settlement: kaohsiung
home_site: piertwo
role: artist
hint:
  zh-TW: 三十多歲的女性藝術家，身上有幾塊顏料的痕跡，在駁二租了一個工作室做裝置藝術，說話時眼神專注，有時候看著空氣說話。
responses:
  駁二:
    zh-TW: 我剛搬來這裡工作的時候，覺得倉庫的空氣裡有種壓抑感。不是鬼，就是某種積累很久的東西。後來我查了一下，這裡以前是存放物資的地方，幾十年的貨物進進出出，也許那個重量還在。
  高雄:
    zh-TW: 高雄常常被說是工業城市，沒有文化。我不服氣。你去走走，這個城市有非常多的東西，只是跟台北的不一樣——它的文化是從港口長出來的，從工廠長出來的，是汗水的那種文化。
  創作:
    zh-TW: 我最近在做一件作品，關於那些從高雄港出走的人和回來的人。你知道嗎，出走的人大多不回來，回來的人反而是更遠的地方來的——這個港口，吸進來的和吐出去的，對象不一樣。
