id: npc_hualien_veteran_sapper
name:
  zh-TW: "老工兵"
settlement: hualien
home_site: "hualien_eternal_shrine"
role: "守衛"
hint:
  zh-TW: "參與中橫公路開鑿的退休老榮民，一隻手臂在開山爆破中受傷，長年看守長春祠。"
responses:
  "歷史":
    zh-TW: "花蓮的歷史，是一面由大理石峽谷抵禦強風，一面由太平洋黑潮與原民先靈歌聲寫成的山海長卷。"
  "山海":
    zh-TW: "不論是太魯閣的長春祠，還是太巴塱的祖靈屋，都是我們花蓮人在風浪中討生活的根。"
