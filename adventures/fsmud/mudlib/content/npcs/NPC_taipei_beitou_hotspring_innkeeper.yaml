id: NPC_taipei_beitou_hotspring_innkeeper
name:
  zh-TW: 北投溫泉旅館老闆
settlement: taipei
home_site: taipei_101_beitou_hotspring
role: innkeeper
hint:
  zh-TW: 笑容可掬的中年男子站在旅館門口招呼客人，身上穿著日式浴衣。
responses:
  溫泉:
    zh-TW: 北投的溫泉分青磺、白磺、鐳磺三種，我們這裡是白磺，對皮膚特別好，連日本人都特地飛來泡。
  日本時代:
    zh-TW: 日治時代北投是高官的休養勝地，那些老旅館見過多少歷史人物，說不完的故事。
