id: npc_hualien_pine_garden_sentry
name:
  zh-TW: "松園哨兵"
settlement: hualien
home_site: "hualien_pine_garden"
role: "守衛"
hint:
  zh-TW: "隨軍撤退至花蓮並駐守松園別館營房多年的老兵，對別館松林歷史極為熟悉。"
responses:
  "歷史":
    zh-TW: "花蓮的歷史，是一面由大理石峽谷抵禦強風，一面由太平洋黑潮與原民先靈歌聲寫成的山海長卷。"
  "山海":
    zh-TW: "不論是太魯閣的長春祠，還是太巴塱的祖靈屋，都是我們花蓮人在風浪中討生活的根。"
