id: NPC_taipei_underground_guide
name:
  zh-TW: 地下秘道探索者
settlement: taipei
home_site: taipei_101_hidden_underground_passage
role: guide
hint:
  zh-TW: 穿著黑色工作服、帶著頭燈的神秘人，在城牆廢址附近徘徊。
responses:
  地下道:
    zh-TW: 這條清代的地下道是真實存在的，我研究了二十年才找到入口，裡面有些刻字記錄著建造年份。
  秘密:
    zh-TW: 台北城地下還有很多秘密，很多都在都更工程中被毀了，剩下的要趕快保護起來。
