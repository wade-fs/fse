id: NPC_sanmin_old_barber
name:
  zh-TW: 三民老理髮師阿德仔
settlement: kaohsiung
home_site: sanmin
role: civilian
hint:
  zh-TW: 七十幾歲的老理髮師，店裡還掛著大同電鍋的廣告日曆，喜歡在剪頭髮的時候說各種他聽來的高雄故事。
responses:
  三民:
    zh-TW: 三民這地方，我從小就在這裡。以前這裡是漁村的感覺，後來慢慢蓋起樓，工廠進來，人就進來。人進來了，故事就多了，什麼樣的人都有，我剪過的頭，說起來有好幾百種故事。
  眷村:
    zh-TW: 三民有幾個老眷村，後來都拆掉了。眷村的老兵，很多是我的老客人。他們說的事，我都記著——不是因為我要記，是因為那些事說起來很有份量，自然就記住了。
  理髮:
    zh-TW: 剪頭髮這個職業，見的都是人最放鬆的時候。有人剪到一半哭，有人剪到一半睡著，有人進來就說一個秘密，說完就走。我想我的店裡，藏的故事比圖書館多。
