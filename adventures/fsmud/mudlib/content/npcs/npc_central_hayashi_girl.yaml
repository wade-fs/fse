id: npc_central_hayashi_girl
name:
  zh-TW: "林電梯小姐"
settlement: tainan_central
home_site: "central_hayashi_dept"
role: "導覽員"
hint:
  zh-TW: "穿著日式制服的林百貨電梯解說員，對指針電梯的結構與頂樓神社的歷史瞭若指掌。"
responses:
  "歷史":
    zh-TW: "中西區的歷史，就是從泮宮石坊下的第一碗老茶與孔廟的鐘聲開始的。"
  "文化":
    zh-TW: "不論是重慶寺的醋矸，還是測候所的胡椒管，都是我們府城先民在大浪中討生活的根。"
