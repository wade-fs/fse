id: npc_hualien_sea_woman_luan
name:
  zh-TW: "阿鸞姐"
settlement: hualien
home_site: "hualien_stone_stairs"
role: "海女"
hint:
  zh-TW: "石梯坪海岸的阿美族海女，擅長徒手在礁石區採集石花菜與笠螺。"
responses:
  "歷史":
    zh-TW: "花蓮的歷史，是一面由大理石峽谷抵禦強風，一面由太平洋黑潮與原民先靈歌聲寫成的山海長卷。"
  "山海":
    zh-TW: "不論是太魯閣的長春祠，還是太巴塱的祖靈屋，都是我們花蓮人在風浪中討生活的根。"
