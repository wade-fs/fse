id: npc_tainan_octagonal_house_owner
name:
  zh-TW: "葉掌櫃"
settlement: tainan
home_site: "tainan_salt_warehouse"
role: "茶商"
hint:
  zh-TW: "鹽水八角樓的葉氏後代，熱心於向遊客講述八角樓木雕與清代鹽水港貿易榮景。"
responses:
  "歷史":
    zh-TW: "府城的歷史，是一面由紅磚古城牆抵禦海風，一面由各大古廟的裊裊香煙寫成的山海長卷。"
  "文化":
    zh-TW: "不論是迎王大典的火光，還是孔廟的明倫堂，都是我們台南先民在海浪中討生活的根。"
