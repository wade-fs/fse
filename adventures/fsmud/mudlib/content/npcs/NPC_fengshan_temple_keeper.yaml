id: NPC_fengshan_temple_keeper
name:
  zh-TW: 鳳山城隍廟老廟祝阿全
settlement: kaohsiung
home_site: fengshan_caodong_temple
role: temple_keeper
hint:
  zh-TW: 七十幾歲的老廟祝，在鳳山城隍廟服務超過四十年，知道很多廟裡的舊事和地方秘辛，說話帶著古典的台語腔調。
responses:
  城隍:
    zh-TW: 城隍管的是陰司的事，但也管陽間的公道。鳳山這裡有不少冤案，清代官員貪腐，死了的人喊不出聲，城隍就替他們記著，等到審判的時候再算帳。
  朱一貴:
    zh-TW: 朱一貴？那個人在廟裡留過記錄的。攻進鳳山那天，他讓義軍在廟前點了一炷香，說是告祭城隍，說他們不是亂民，是來討公道的。那炷香的事，廟裡老人還傳著。
  林爽文:
    zh-TW: 林爽文事件時，城牆讓人攻破了。廟裡的文物被士兵搬走了一些，但最重要的那塊碑沒有動。後來清廷重修廟宇，縣令說是城隍爺護住了那塊碑。我不信神的，但那塊碑確實沒事。
