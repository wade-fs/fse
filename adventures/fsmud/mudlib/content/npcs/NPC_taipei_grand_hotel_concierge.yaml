id: NPC_taipei_grand_hotel_concierge
name:
  zh-TW: 圓山大飯店禮賓司
settlement: taipei
home_site: taipei_101_grand_hotel
role: worker
hint:
  zh-TW: 穿著金邊制服、儀態端莊的禮賓員，在大廳門口恭敬地迎接到訪的貴賓。
responses:
  圓山:
    zh-TW: 圓山大飯店曾是外國使節與國家貴賓的招待所，蔣總統接待艾森豪、尼克森都在這裡，每個角落都有歷史。
  密道:
    zh-TW: 飯店的地下室有一條秘密逃生通道，是戰時設計的，現在開放參觀，很多人不知道。
