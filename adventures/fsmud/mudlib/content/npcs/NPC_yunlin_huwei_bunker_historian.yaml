responses:
  虎尾飛行場:
    zh-TW: 當時日本神風特攻隊的飛機就是從虎尾機場起飛的。這防空壕就是那段殘酷戰爭歷史的無聲見證。
  防空壕:
    zh-TW: 這地下的鋼筋混凝土防空洞非常龐大。二戰末期，虎尾有機場，是美軍轟炸的重點目標，所以日本人蓋了這地下防空網。
