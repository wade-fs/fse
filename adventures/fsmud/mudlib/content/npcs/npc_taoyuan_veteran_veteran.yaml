id: npc_taoyuan_veteran_veteran
name:
  zh-TW: "老王排長"
settlement: taoyuan
home_site: "taoyuan_xianguang_village"
role: "市民"
hint:
  zh-TW: "退伍老排長，憲光二村的資深住戶，熱心於向年輕人講述戰後初期眷村生活的酸甜苦辣。"
responses:
  "歷史":
    zh-TW: "桃園的歷史，是一面由大圳與古城牆抵禦強風，一面由桃園神社與眷村大合院寫成的開墾長卷。"
  "山海":
    zh-TW: "不論是角板山的古防空洞，還是大溪的巴洛克老街，都是我們桃園人在風浪中討生活的根。"
