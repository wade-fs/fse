id: npc_hualien_sugar_worker_lin
name:
  zh-TW: "林工頭"
settlement: hualien
home_site: "hualien_sugar_factory"
role: "工頭"
hint:
  zh-TW: "光復糖廠的退休鍋爐工，見證了大和製糖所甘蔗製糖與五分車運輸的歷史。"
responses:
  "歷史":
    zh-TW: "花蓮的歷史，是一面由大理石峽谷抵禦強風，一面由太平洋黑潮與原民先靈歌聲寫成的山海長卷。"
  "山海":
    zh-TW: "不論是太魯閣的長春祠，還是太巴塱的祖靈屋，都是我們花蓮人在風浪中討生活的根。"
