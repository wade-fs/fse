id: npc_yilan_kavalan_elder
name:
  zh-TW: "噶瑪蘭社耆老"
settlement: yilan
home_site: "yilan_toucheng_old_street"
role: "citizen"
hint:
  zh-TW: "一位世居流流社的噶瑪蘭族長者，守護著部落百年的大葉山欖與老古井。"
responses:
  "歷史":
    zh-TW: "我們的祖先在這片平原上與風浪、黑潮共存，早在漢人開墾前，噶瑪蘭的歌聲就已在此傳唱。"
  "山海":
    zh-TW: "望著太平洋的波濤，龜山島就像是守護這座蘭陽平原的靈獸，靜靜地看著時代更迭。"
