id: npc_new_taipei_tamsui_pilot
name:
  zh-TW: "張引水人"
settlement: new_taipei
home_site: "new_taipei_tamsui_customs_quay"
role: "船長"
hint:
  zh-TW: "淡水港口的資深引水人，對淡水河口潮汐與沙洲暗礁的變化瞭若指掌。"
responses:
  "歷史":
    zh-TW: "新北市的歷史，是一半靠著淡水海風吹，一半靠著金瓜石火藥炸出來的。"
  "文化":
    zh-TW: "不論是平溪高空的天燈，還是三峽祖師廟的木雕，都是前人一筆劃刻出來的根。"
