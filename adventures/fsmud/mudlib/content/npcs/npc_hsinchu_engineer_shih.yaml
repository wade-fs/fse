id: npc_hsinchu_engineer_shih
name:
  zh-TW: "施工程師"
settlement: hsinchu_city
home_site: "hsinchu_science_park"
role: "工程師"
hint:
  zh-TW: "早年進入科學園區的半導體IC設計工程師，見證了新竹從玻璃港口轉型為矽谷的歷程。"
responses:
  "歷史":
    zh-TW: "新竹九降風吹了幾百年，吹乾了米粉與柿餅，也吹開了這座竹塹城的城樓。"
  "文化":
    zh-TW: "不論是北埔的客家膨風茶，還是城隍廟的都城隍出巡，都是新竹人的根。"
