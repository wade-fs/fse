id: NPC_taipei_beitou_old_resident
name:
  zh-TW: 北投長住日裔老太太
settlement: taipei
home_site: taipei_101_beitou_hotspring
role: civilian
hint:
  zh-TW: 穿著和服的白髮老婦人，緩緩走在北投的石板路上，見人便微微點頭問好。
responses:
  北投:
    zh-TW: （用帶有腔調的中文）我的父親在日本時代就定居北投，我出生在這裡，台灣是我的故鄉，不是日本。
  溫泉:
    zh-TW: 北投的溫泉讓我的腳沒有寒氣，我每天早上都去泡腳，已經泡了七十年了。
