id: npc_lianjiang_sapper_veteran
name:
  zh-TW: "老工兵"
settlement: lianjiang
home_site: "lianjiang_beihai_tunnel"
role: "守衛"
hint:
  zh-TW: "參與開鑿北海坑道的退休工兵，聽力因炸藥開山受損，熟悉坑道爆破殉職英靈的往事。"
responses:
  "歷史":
    zh-TW: "連江的歷史，是一面由花崗岩坑道抵禦砲火，一面由天后宮媽祖衣冠塚香火寫成的戰地長卷。"
  "戰地":
    zh-TW: "不論是芹壁石屋的標語，還是北海地下水道，都是我們連江人在砲火與風浪中求生存的根。"
