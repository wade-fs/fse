id: NPC_lotus_pond_monk
name:
  zh-TW: 蓮池潭廟中老道士明德
settlement: kaohsiung
home_site: lotus_pond
role: monk
hint:
  zh-TW: 七十幾歲的道士，清早就在廟中誦經，下午有時候會在廟前老榕樹下打坐，對左營的歷史知之甚詳。
responses:
  蓮池潭:
    zh-TW: 這個潭，以前比現在大很多。清代的時候，潭水連著護城河，舊城的城牆映在水面上，比現在的龍虎塔還壯觀。現在的龍虎塔是後來建的，那個年代的人想重現舊日的風光，但已經不一樣了。
  舊城:
    zh-TW: 鳳山縣舊城是台灣保存最好的清代石城，但現在知道的人不多。城牆就在潭邊不遠，你去走走，那些石頭是從澎湖、打狗山運來的，每一塊都有幾百年了。
  龍:
    zh-TW: 龍虎塔的龍嘴那個入口，是要你從龍嘴進去，從虎嘴出來——這樣走一圈，就是把你身上的煞氣換掉了。不相信也沒關係，但很多人進去的時候心情不好，出來之後說感覺輕了一點，我說那是走路散心的效果。
