id: npc_lianjiang_blue_tear_watcher
name:
  zh-TW: "阿香姐"
settlement: lianjiang
home_site: "lianjiang_jinsha_village"
role: "市民"
hint:
  zh-TW: "津沙聚落的藍眼淚導覽員，熟悉黑潮洋流與海中夜光藻在大風浪下綻放藍光的規律。"
responses:
  "歷史":
    zh-TW: "連江的歷史，是一面由花崗岩坑道抵禦砲火，一面由天后宮媽祖衣冠塚香火寫成的戰地長卷。"
  "戰地":
    zh-TW: "不論是芹壁石屋的標語，還是北海地下水道，都是我們連江人在砲火與風浪中求生存的根。"
