id: npc_taichung_xie_xuehong
name:
  zh-TW: "謝雪紅"
settlement: taichung
home_site: "taichung_army_defense_bunker"
role: "革命家"
hint:
  zh-TW: "二二八事件中台中「二七部隊」的發起者與女傑，具有強烈的反殖民與社會主義思想。"
responses:
  "歷史":
    zh-TW: "台中的歷史，是一面由縱貫鐵路牽引，一面由大甲媽祖與二七部隊寫成的長卷。"
  "文化":
    zh-TW: "不論是南屯的打鐵聲，還是櫟社詩人們在望月亭下的低吟，都是我們中台灣的根。"
