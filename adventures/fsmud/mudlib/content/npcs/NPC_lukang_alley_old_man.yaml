id: NPC_lukang_alley_old_man
name:
  zh-TW: "摸乳巷邊老居民阿吉伯"
settlement: lukang
home_site: lukang_mojing_alley
role: elder
hint:
  zh-TW: "八十多歲，每天坐在摸乳巷口曬太陽的老人，對進出這條巷子的旅客見怪不怪，喜歡和願意聊天的旅客說幾句玩笑話。"
responses:
  "摸乳巷":
    zh-TW: "這條巷子以前可不叫這個名字，叫君子巷。因為太窄了，兩個人碰到要側身，像君子一樣互相讓路。後來年輕人愛開玩笑，才叫成現在這個名字。名字粗俗了點，但巷子是真的好玩。"
  "地道":
    zh-TW: "地道？（哈哈大笑）那是我小時候我爸騙我的，說裡面有鬼，叫我不要進去玩。但如果你問我這下面有沒有東西，我告訴你，這條巷子底下的確有一條清代的舊排水溝，石砌的，很穩，現在還在排水呢。"
  "老街":
    zh-TW: "摸乳巷以前是老街的後巷，主要是運送貨物和防禦用的。因為巷子窄，外地土匪如果衝進來，很容易在這裡被卡住，一卡住，兩邊老屋二樓的女人拿開水往下潑，他們就得求饒。"
  "傳言":
    zh-TW: "聽說深夜走摸乳巷，如果聽到身後有兩個人的腳步聲，但你回頭只有你自己，那代表你在這條巷子裡遇到了當年的『君子』，他正在側身讓你先走。"
