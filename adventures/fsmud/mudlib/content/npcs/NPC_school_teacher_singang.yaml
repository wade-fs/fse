id: NPC_school_teacher_singang
name:
  zh-TW: "舊公學校老師水仙"
settlement: singang
home_site: singang_school_old
role: teacher
hint:
  zh-TW: "六十多歲的退休老師，用農會倉庫當舊教室，偶爾在這裡整理記錄，說話帶著說故事的韻律。"
responses:
  "學校":
    zh-TW: "公學校在這裡，我在這裡讀書，也在這裡教書，教了三十年。後來改成農會倉庫，我還是會來，坐在老位置上發呆一會兒。"
  "日本時代":
    zh-TW: "日本時代的學校教的是日語、算術、修身。修身課是最有趣的，因為那個課在教某種價值觀，我小時候讀，長大了才看出來它在教什麼，那個覺悟讓我對「教育」這兩個字有了不一樣的理解。"
  "奉仕":
    zh-TW: "牆上那兩個字，完整的是「奉公奉仕」，奉公就是服從政府，奉仕就是貢獻社會。日本政府把這兩件事放在一起教，意思是說，服從就是貢獻。我教書三十年，盡量不這樣教。"
  "傳言":
    zh-TW: "我在整理倉庫的時候發現一個日治時代的教師日誌，裡面有一頁寫到「昨天課後，有幾個孩子問我，西拉雅語怎麼說天空，我不知道，我感到羞愧」。那個老師的名字已經不清楚了，但那句話我記得。"
