id: NPC_nanzih_factory_worker
name:
  zh-TW: 楠梓加工區退休女工阿秀
settlement: kaohsiung
home_site: nanzih
role: civilian
hint:
  zh-TW: 六十幾歲的婦人，手指還帶著長年做精密工作留下的僵硬，說起當年在工廠的事，眼神既驕傲又有點複雜。
responses:
  加工區:
    zh-TW: 我十六歲就進加工區了，那時候家裡窮，能在那裡工作很高興的。一個月的薪水寄大半回去給父母，剩下的自己用。我們那個年代的女工，養了整個台灣。
  工廠:
    zh-TW: 我做的是電子零件，用放大鏡做，眼睛傷了。現在這些東西都讓別的國家做了，說我們不夠便宜了——那時候老闆也說你不夠便宜了，就把廠關掉。那些廠房現在空著，或是改成別的用途。
  加工區宿舍:
    zh-TW: 加工區有宿舍的，我住了七年。八個人一間房，窗戶很小。那七年的朋友，有幾個還聯絡，大部分散了。有的回老家，有的去台北，有的——就不知道去哪了。你問她們好不好，我說不清楚，因為我也不太確定我自己好不好。
