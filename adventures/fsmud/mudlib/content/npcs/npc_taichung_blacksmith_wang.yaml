id: npc_taichung_blacksmith_wang
name:
  zh-TW: "王鐵匠"
settlement: taichung
home_site: "taichung_plow_shop_old_street"
role: "鐵匠"
hint:
  zh-TW: "南屯犁頭店最後一家手工打鐵鋪的老鐵匠，一生都在風箱與爐火旁打製鋤頭。"
responses:
  "歷史":
    zh-TW: "台中的歷史，是一面由縱貫鐵路牽引，一面由大甲媽祖與二七部隊寫成的長卷。"
  "文化":
    zh-TW: "不論是南屯的打鐵聲，還是櫟社詩人們在望月亭下的低吟，都是我們中台灣的根。"
