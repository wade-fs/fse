id: NPC_taipei_photographer_street
name:
  zh-TW: 台北街頭攝影師
settlement: taipei
home_site: taipei_101_dadaocheng
role: artist
hint:
  zh-TW: 掛著相機、穿著黑色夾克的年輕攝影師，正悄悄舉起相機捕捉街上的瞬間。
responses:
  大稻埕:
    zh-TW: 大稻埕的光線特別美，下午的斜陽打在巴洛克建築上，老茶行的門窗都是絕佳的拍攝素材。
  台北:
    zh-TW: 台北的美在細節，舊招牌、廟口攤販、巷弄裡的貓，每一個角落都有故事等待被記錄下來。
