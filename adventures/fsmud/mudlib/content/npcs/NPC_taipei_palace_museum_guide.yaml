id: NPC_taipei_palace_museum_guide
name:
  zh-TW: 故宮博物院解說員
settlement: taipei
home_site: taipei_101_national_palace_museum
role: guide
hint:
  zh-TW: 穿著制服的解說員正帶領一群外國遊客，用流利的英文介紹翠玉白菜。
responses:
  故宮:
    zh-TW: 故宮的典藏是世界最完整的中華歷史文物，光是陶瓷器類就有三萬多件，要看完少說要幾年。
  翠玉白菜:
    zh-TW: 翠玉白菜是清朝瑾妃的嫁妝，你看那天然的翠色和白色完美地被匠師運用，鑲在菜葉上的蟋蟀和蝗蟲都是富饒的祝福。
