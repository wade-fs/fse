id: npc_tainan_kaiyuan_abbot
name:
  zh-TW: "釋慧長老"
settlement: tainan
home_site: "tainan_kaiyuan_temple"
role: "住持"
hint:
  zh-TW: "開元寺的住持，精通明倫堂舊史與北園別館做為鄭經行館時期的宮廷秘辛。"
responses:
  "歷史":
    zh-TW: "府城的歷史，是一面由紅磚古城牆抵禦海風，一面由各大古廟的裊裊香煙寫成的山海長卷。"
  "文化":
    zh-TW: "不論是迎王大典的火光，還是孔廟的明倫堂，都是我們台南先民在海浪中討生活的根。"
