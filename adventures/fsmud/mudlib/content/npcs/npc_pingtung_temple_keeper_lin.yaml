id: npc_pingtung_temple_keeper_lin
name:
  zh-TW: "林廟祝"
settlement: pingtung
home_site: "pingtung_checheng_temple"
role: "廟祝"
hint:
  zh-TW: "福安宮的年邁廟祝，熟悉土地公神像在日治時期的避難歷史與金爐吸金紙奇觀。"
responses:
  "歷史":
    zh-TW: "屏東的歷史，是一面由石板屋與恆春古城城牆抵禦海風，一面由東港迎王大典的火光與排灣族祖靈寫成的山海長卷。"
  "山海":
    zh-TW: "不論是牡丹社的古戰場，還是萬金聖母教堂，都是我們屏東人在風浪中討生活的根。"
