id: npc_central_temple_keeper_tsao
name:
  zh-TW: "曹老廟祝"
settlement: tainan_central
home_site: "central_confucian_temple"
role: "廟祝"
hint:
  zh-TW: "孔廟的資深守廟人，熟悉大成殿祭孔釋奠典禮儀軌與歷代御賜匾額的來歷。"
responses:
  "歷史":
    zh-TW: "中西區的歷史，就是從泮宮石坊下的第一碗老茶與孔廟的鐘聲開始的。"
  "文化":
    zh-TW: "不論是重慶寺的醋矸，還是測候所的胡椒管，都是我們府城先民在大浪中討生活的根。"
