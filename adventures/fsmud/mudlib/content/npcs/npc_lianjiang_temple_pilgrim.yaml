id: npc_lianjiang_temple_pilgrim
name:
  zh-TW: "隨香阿婆"
settlement: lianjiang
home_site: "lianjiang_matsu_temple"
role: "市民"
hint:
  zh-TW: "每年天后宮媽祖祭典都會前來隨香的虔誠老婦人，熟悉各式傳統祭祀貢品製作。"
responses:
  "歷史":
    zh-TW: "連江的歷史，是一面由花崗岩坑道抵禦砲火，一面由天后宮媽祖衣冠塚香火寫成的戰地長卷。"
  "戰地":
    zh-TW: "不論是芹壁石屋的標語，還是北海地下水道，都是我們連江人在砲火與風浪中求生存的根。"
