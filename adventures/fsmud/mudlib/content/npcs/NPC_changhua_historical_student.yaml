id: NPC_changhua_historical_student
name:
  zh-TW: "彰化高中歷史社社長小林"
settlement: changhua_city
home_site: changhua_bagua_mountain
role: student
hint:
  zh-TW: "十七歲的熱血高中生，戴著眼鏡，手持歷史相機，在八卦山防線進行乙未戰爭的地圖比對。"
responses:
  "乙未戰爭":
    zh-TW: "乙未戰爭是台灣歷史上規模最大、傷亡最慘烈的武裝抗日戰役。八卦山決戰是整個戰役的轉折點。吳彭年將軍和義軍在沒有後援的情況下，憑藉八卦山險要地勢和幾門舊砲，抵擋了日軍精銳部隊整整一天。他們的犧牲非常悲壯。"
  "歷史社":
    zh-TW: "我們社團正在做一個『彰化舊城牆與乙未戰線』的專題，我們試著重走當年的戰線，從東門、八卦山到孔廟，用照片和地圖重建當年的空間歷史。這比只讀歷史課本有趣多了。"
  "無影井":
    zh-TW: "無影井的位置剛好在八卦山麓，當年是義軍取水的重要水源。林爽文起義時它就在了，是一口見證了多次彰化戰亂的歷史古井，它的地理位置非常關鍵。"
  "傳言":
    zh-TW: "我聽說八卦山麓的古厝裡，有一本老人家留下來的手寫戰明日記，詳細記錄了1895年八卦山戰役那天，城內居民逃難與協助義軍的細節，我目前正在尋訪這本手稿的下落。"
