id: NPC_gangshan_old_doctor
name:
  zh-TW: 岡山老中醫師謝先生
settlement: kaohsiung
home_site: gangshan
role: doctor
hint:
  zh-TW: 七十多歲的老中醫，在岡山開了四十年診所，用的是祖傳的藥方，說話很有耐心，但不喜歡被催。
responses:
  中醫:
    zh-TW: 中醫看的是人的整體，不是個別的症狀。你說頭痛，我要看你的舌苔、脈象、精神狀態，才知道為什麼頭痛。有時候頭痛是腳的問題，這個邏輯現代醫學不認，但我的病人好了，他就不再問為什麼。
  岡山:
    zh-TW: 岡山的人，朱一貴那個時代就出了名——不是說反亂，是說那種不甘被欺壓的性格。幾百年過來，這個地方的人還是這樣，直接，有話就說，不太會拐彎抹角，也不太吃虧。
  藥方:
    zh-TW: 我的藥方，有幾帖是祖父傳下來的，幾帖是我自己研究的。有一帖我爸說是從清代一個廟裡的石碑抄來的，那個碑現在找不到了，只有那帖藥方還在。我不敢隨便給人，因為不確定在台灣的環境下效果一不一樣。
