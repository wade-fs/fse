id: NPC_kaohsiung_harbor_captain
name:
  zh-TW: 港務長陳長明
settlement: kaohsiung
home_site: kaohsiung_harbor
role: official
hint:
  zh-TW: 六十多歲的退休港務員，曬黑的臉上有道舊疤，說起港口的事如數家珍，眼神望向港灣時帶著某種說不清的惆悵。
responses:
  打狗港:
    zh-TW: 這個港口，我在這裡工作了四十年。清朝那時候叫打狗港，日本人來了叫高雄港，但海是一樣的海，只是名字換了，換來換去，最後留下來的還是討海人。
  沉船:
    zh-TW: 港灣裡沉著幾艘老船，有清朝的，有日本時代的，你潛下去就能看見。有人想打撈，但潛水夫說有什麼東西讓他們不舒服，說不出是什麼，就是不想再下去。
  颱風:
    zh-TW: 1977那年的颱風，我親眼見到一艘五千噸的貨船被浪舉起來，整個船身離開水面，然後放下去，還是活的，沒有沉——我講給年輕人聽，沒有人相信。
