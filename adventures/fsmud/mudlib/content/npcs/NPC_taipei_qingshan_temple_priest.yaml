id: NPC_taipei_qingshan_temple_priest
name:
  zh-TW: 艋舺青山宮主委
settlement: taipei
home_site: taipei_101_qingshan_temple
role: priest
hint:
  zh-TW: 頭髮梳得整齊、穿著唐裝的老主委，在廟前與廟務人員討論遶境路線。
responses:
  青山王:
    zh-TW: 青山靈安尊王是我們艋舺的守護神，每年遶境是全台規模最大的廟會之一，有夜巡、有陣頭，壯觀無比。
  艋舺:
    zh-TW: 艋舺雖然沒落了，但廟還在、信仰還在，我們的根就還在這裡。
