id: NPC_qishan_banana_merchant
name:
  zh-TW: 旗山香蕉行老闆娘春桃
settlement: kaohsiung
home_site: qishan_old_street
role: merchant
hint:
  zh-TW: 五十多歲的婦人，老街香蕉行的第三代傳人，人很爽朗，說話快，對香蕉的事什麼都懂。
responses:
  香蕉:
    zh-TW: 旗山的香蕉，以前是整個東南亞最好的，日本時代是帝國的貢品。現在進口香蕉多，我們的反而不好賣，但是吃過旗山香蕉的人，都說味道是不一樣的，比較甜，也比較香。
  日本時代:
    zh-TW: 我阿公說，日本時代香蕉最好賺的時候，整個旗山都是有錢人，那時候蓋的房子你看——老街那些磚樓，就是那個年代蓋的。一房子一棟香蕉錢，那時候的香蕉值錢。
  老街:
    zh-TW: 這條老街，說起來我們家在這裡三代了。大家都說要保存，但年輕人都走了，剩下我們這些老人撐著。我不關門，因為不想讓這條街少一家燈。
