id: NPC_market_granny_chiayi
name:
  zh-TW: "東市場阿桂嬤"
settlement: chiayi_city
home_site: central_market
role: vendor
hint:
  zh-TW: "挺著腰板坐在菜攤後方，頭戴斗笠，眼睛銳利，說話直接不拐彎。"
responses:
  "市場":
    zh-TW: "東市場從我還沒出生以前就在這裡了。我媽在這賣菜，我媽的媽也在這賣菜。我說這市場比嘉義市政府還穩，政府換過好幾次，市場還在。"
  "食物":
    zh-TW: "嘉義最好吃的是什麼？當然是雞肉飯，但你要懂得選，去那種開了三十年以上的，便宜又新鮮，不要去有招牌的，那是給外地人吃的。"
  "傳言":
    zh-TW: "你問傳言？市場最裡面那攤布行，說是賣布，我賣了一輩子菜，從來沒看到他們賣過一塊布，卻天天開門，也天天關門，你去問他們在做什麼，我很好奇。"
