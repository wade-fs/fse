id: NPC_love_river_boatman
name:
  zh-TW: 愛河遊船船夫阿義
settlement: kaohsiung
home_site: love_river
role: civilian
hint:
  zh-TW: 五十幾歲的遊船船夫，在愛河開船二十幾年，知道河的每一個轉彎，也記得每一個他曾經載過的特別乘客。
responses:
  愛河:
    zh-TW: 愛河以前很臭的，你知道嗎。工業廢水、生活污水，全部倒進去，臭到整個市區都是那個味道。清理了十幾年才變成現在這樣。現在來遊船的人說這裡很美，我說你沒見過以前的，就不知道現在有多不容易。
  夜晚:
    zh-TW: 夜晚的愛河最好看，兩岸的燈光倒在水面，像是兩個高雄重疊在一起。我開了二十幾年的船，每次夜晚出發都還是覺得好看。那是少數讓我覺得這個工作很值得的時刻。
  奇怪的事:
    zh-TW: 有次大概快打烊了，最後一趟，我在河中段的時候，水面上浮起一個東西，橢圓形的，有點像壇子。我靠過去，東西沉下去了。後來查了一下，那個地方很久以前是個渡口，有記錄說某年颱風淹掉了整個碼頭，連倉庫都沒了。
