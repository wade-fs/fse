id: NPC_taipei_parliament_journalist
name:
  zh-TW: 立院跑班記者
settlement: taipei
home_site: taipei_101_presidential_office
role: journalist
hint:
  zh-TW: 掛著記者証、手持錄音筆的年輕記者，正在廣場邊等待官員出入。
responses:
  政治:
    zh-TW: 台灣的民主化是一條漫長的路，從戒嚴到解嚴，每一步都是抗爭換來的，我要把這段歷史記錄好。
  新聞:
    zh-TW: 新聞自由得來不易，我每天跑立院，就是要讓市民知道政府在做什麼。
