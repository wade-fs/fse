id: NPC_arugus
name:
  zh-TW: 阿祿古斯
settlement: mudan
home_site: mudan_paiwan_village
role: tribal_chief
hint:
  zh-TW: 牡丹社排灣族總頭目。滿頭白髮，神情威嚴，身上披著華麗的傳統排灣族羽飾披風。
responses:
  日軍:
    zh-TW: 那些穿藍衣服的矮子帶著洋槍闖進我們的獵場。這裡的一草一木都是祖靈賜予的，除非我們戰死，否則外人休想奪走！
  祖靈規矩:
    zh-TW: 進入牡丹社的山林，就必須遵循祖靈的規矩。琉球人遇難，我們供水給糧，但他們不尊重我們的禁忌，這才是災禍的開始。
  石門:
    zh-TW: 石門是我們獵人守護部落的鐵閘。在那裡，我們的箭雨會讓入侵者知道，排灣族的山嶺不可侵犯！
