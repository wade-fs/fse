incident_id: kaohsiung_qishan_banana_boom
name: 旗山香蕉黃金時代與青果合作社風波
description: |
  民國五十年代，台灣香蕉外銷日本迎來黃金時期，旗山更被譽為「香蕉王國」。
  蕉農因外銷致富，老街商賈雲集。隨後爆發了青果合作社金碗案，震動政商界。
  你將深入旗山，探尋這段由黃金香蕉鋪成的繁華與權力風暴。
truth: |
  香蕉外銷日本在1960年代為台灣賺取大量外匯，旗山作為主產地，蕉農收入極高，甚至有「香蕉手」在酒家一擲千金的傳說。然而，1969年爆發的「剝蕉案」（青果合作社理事主席吳振瑞被指控貪污贈送金碗等），導致合作社重組，台灣香蕉在日本市場的優勢也逐漸被菲律賓香蕉取代。
