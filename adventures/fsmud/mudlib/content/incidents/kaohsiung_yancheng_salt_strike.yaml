incident_id: kaohsiung_yancheng_salt_strike
name: 鹽埕曬鹽工人的抗稅風潮
description: |
  清光緒年間，打狗鹽埕庄的曬鹽工人因不滿官府加徵鹽稅，集體罷工並包圍衙門。
  這場罷工維持了數週，導致南部鹽業供應中斷，最終官府被迫做出讓步。
  你將深入鹽埕的老街巷，探尋這段曬鹽工人的反抗歷史。
truth: |
  鹽埕在清領時期是南部重要的曬鹽區。清末為籌措防務經費，官府試圖實施鹽業專賣並提高稅率，引發了曬鹽工人的強烈抗爭。此事件反映了清末民生疾苦與官民之間的矛盾，也為日治時期鹽業的全面壟斷埋下了伏筆。
