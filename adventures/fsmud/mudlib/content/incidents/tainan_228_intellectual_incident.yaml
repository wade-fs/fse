incident_id: tainan_228_intellectual_incident
name: 台南二二八：府城知識份子的沉默
description: |
  1647年二二八事件波及台南，府城部分知識份子與仕紳試圖進行和平談判，但隨之而來的是逮捕與長期的戒嚴肅殺。
  你將收集歷史資料，拼湊這段台南記憶中最深沉的空白。
truth: |
  台南二二八的悲劇主要體現在事件後長期的白色恐怖與自我審查。府城各界在長達數十年的時間裡對此保持絕對的沉默，許多歷史記憶只以家書、日記等極其私密的形式存於民間角落。
