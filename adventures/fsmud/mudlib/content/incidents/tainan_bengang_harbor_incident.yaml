incident_id: tainan_bengang_harbor_incident
name: 台江內海淤積與五條港的誕生
description: |
  清代中葉，台江內海因泥沙淤積逐漸陸化，原本的大港口安平失去了直接靠岸的優勢。
  府城商家為了解決運輸問題，開鑿了五條平行水道引水入城，稱為「五條港」。
  你將調查神農街與老街區，重現這段港城變遷的歷史。
truth: |
  五條港的興起是府城商人為了克服地理限制而進行的都市再造工程。五條港不僅是商業通道，也形成了以各水道為核心的聯境與廟宇自治網，形成了台南獨特的市街紋理與市民自治傳統。
