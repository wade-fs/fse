truth: '嘉義二二八的特殊性在於，市民以相對有組織的方式進行武裝抵抗，並試圖透過談判解決。陳澄波的死不是意外，是刻意的示眾行為，目的是恐嚇和瓦解抵抗意志。事件後，嘉義的文化界沉默了近四十年。

  '
