description: '民國三十六年（1947）三月，嘉義爆發激烈的二二八事件，市民義勇軍包圍水上機場，試圖奪取武器。

  陳澄波與三名仕紳代表赴水上機場談判，遭逮捕後被押至嘉義火車站前槍決示眾。

  你試圖透過殘存的記憶碎片、目擊者口述、文物，還原這段歷史的輪廓。

  '
