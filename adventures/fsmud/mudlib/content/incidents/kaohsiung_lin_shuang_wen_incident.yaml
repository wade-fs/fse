incident_id: kaohsiung_lin_shuang_wen_incident
name: 乾隆五十一年林爽文之役：鳳山攻防戰
description: |
  乾隆五十一年（1786年），林爽文起兵反清，南路領袖莊大天隨之響應，率眾猛攻鳳山縣城。
  清軍與起義軍在城內展開慘烈的巷戰，鳳山縣治也因此次戰火幾乎全毀，最終遷移。
  你將重回這段戰火交織的城牆防線，尋找當時的戰役遺物與平民記憶。
truth: |
  林爽文事件中，南路起義軍莊大天部曾兩度攻陷鳳山縣城，造成清廷官兵的重大傷亡與行政系統癱瘓。戰後，清廷有感於原本在左營的「舊城」防禦力不足且殘破，決定將縣治正式遷移到原本的下埤頭街，即今日的「鳳山新城」。
