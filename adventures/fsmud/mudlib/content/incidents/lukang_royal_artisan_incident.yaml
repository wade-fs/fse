incident_id: lukang_royal_artisan_incident
name: 匠藝傳承：大木作與小木作的巔峰
description: |
  鹿港以精湛的傳統工藝聞名，龍山寺的八卦藻井與神像雕刻是閩南匠藝的極致體現。
  你將走訪木雕工坊與古寺，理解匠人如何用刀鑿將信仰實體化，並面對近代傳承的斷層。
truth: |
  鹿港木雕的巔峰得益於清代對渡貿易帶來的資金與福建大師的交流。龍山寺無釘藻井展現了小木作卡榫工藝的極致。日治時期的皇民化運動曾試圖沒收神像，靠著當地匠師與信眾聯手掉包才保住了核心的信仰標本。
