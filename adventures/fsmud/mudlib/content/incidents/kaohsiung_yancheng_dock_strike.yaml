incident_id: kaohsiung_yancheng_dock_strike
name: 1950年代高雄港碼頭工人自救抗爭
description: |
  1950年代，隨著高雄港進出口貿易量激增，碼頭裝卸工人長期面臨超時工作與低工資的剝削。
  在工會領袖帶領下，工人發起集體怠工與抗爭，要求改善勞動環境並提高搬運費。
  你將前往舊碼頭，還原這段屬於高雄港底層工人的反抗軌跡。
truth: |
  在戒嚴時期，工會活動受到嚴密監控，但高雄港碼頭工人仍透過多種默契式的怠工手段成功迫使資方與港務局提高待遇。這場抗爭是戰後初期少見的底層勞工自發運動，展示了港口工人的強大團結力量。
