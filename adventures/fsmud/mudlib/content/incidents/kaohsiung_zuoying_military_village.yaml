incident_id: kaohsiung_zuoying_military_village
name: 左營眷村的建立與聚落融合
description: |
  1949年國民政府遷台，大量軍人及其家屬進駐左營海軍基地周邊，建立起全台灣規模最大的海軍眷村群。
  這裡匯集了來自中國各省的移民，與當地的閩南、客家聚落展開了長達數十年的文化碰撞與融合。
  你將走進大院與窄巷，尋找眷村初建時的竹籬笆記憶。
truth: |
  左營眷村（如自助新村、明德新村等）是伴隨國共內戰與冷戰局勢產生的獨特移民地景。眷村內部形成了高度凝聚的社群文化與獨特的外省飲食特色，隨著時代變遷與眷改政策，多數舊眷村已面臨拆遷與重組，成為歷史記憶的一部分。
