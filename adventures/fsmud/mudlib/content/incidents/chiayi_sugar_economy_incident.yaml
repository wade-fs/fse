incident_id: chiayi_sugar_economy_incident
name: 糖業資本主義：嘉南平原的甜蜜剝削
description: |
  日治時期，台灣製糖株式會社在嘉南平原強制推行蔗作，農民失去選擇作物的自由，
  被迫以低於市場的「保証價格」出售甘蔗給糖廠。
  嘉義的糖廠是這個不平等體制的核心機構之一。
  你透過糖廠遺址、農民的口述與舊文書，追查這段甜蜜背後的苦澀。
truth: |
  台灣糖業的日治時期發展是一種典型的殖民地資本主義剝削：農民的土地和勞力被整合進大規模農業生產體系，利潤流向日本資本。戰後這個體制轉手給國民政府的台糖公司，剝削的結構雖有改變，但農民長期處於弱勢的處境延續了很久。
