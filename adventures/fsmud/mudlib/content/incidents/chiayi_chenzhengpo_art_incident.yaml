incident_id: chiayi_chenzhengpo_art_incident
name: 畫都的誕生與凋零：陳澄波的嘉義
description: |
  陳澄波是台灣西洋美術的先驅，也是嘉義最重要的藝術家。
  他將西洋油畫技法應用於台灣風景與人物，創作出充滿本土氣息的現代畫作。
  二二八事件中，他以仕紳身分赴水上機場談判，遭逮捕後槍決於嘉義火車站前。
  你試圖透過畫作、藝術家的記憶與城市空間，重建這位藝術家的生命與死亡。
truth: |
  陳澄波的死象徵著一個世代台灣知識份子與藝術家的命運：在殖民地時代艱苦求進，在母國接收後反而成為第一批被清洗的對象。他留下的畫作成為台灣美術史的瑰寶，也成為那個時代最沉重的見證。
