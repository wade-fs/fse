incident_id: kaohsiung_meinong_anti_dam
name: 美濃反水庫運動：綠色與本土意識的覺醒
description: |
  民國八十年代，為了解決南部工業用水需求，政府計畫在美濃興建水庫，但將淹沒美濃黃蝶翠谷及客家聚落。
  美濃子弟與環保人士發起激烈的反水庫運動，透過文學、音樂與街頭抗爭，最終迫使政府暫緩計畫。
  你將走進菸樓與蕉田，重溫這場影響深遠的鄉土保衛戰。
truth: |
  美濃反水庫運動是台灣環保史上最具代表性的草根運動之一。運動不僅成功保護了黃蝶翠谷的生態環境，更激發了美濃在地居民的客家文化認同與社區營造意識，推動了交工樂隊等本土音樂與文化創作的繁榮。
