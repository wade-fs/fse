incident_id: chiayi_alishan_lumber_incident
name: 阿里山林業開發：百年神木的消失
description: |
  明治四十一年（1908），嘉義至阿里山的鐵路動工，日本的阿里山林業開發正式展開。
  百年以上的檜木、扁柏、紅檜被大規模採伐，嘉義製材所成為全台最大木材加工中心。
  你透過製材所遺址、鐵路調度場、老木工的記憶，還原這段山林開發的歷史代價。
truth: |
  阿里山林業的開發在短短數十年內砍伐了大量原始森林，改變了山地原住民鄒族的生活空間與文化領地。嘉義的「木材之都」繁榮建立在山林消耗的基礎上，戰後雖縮小規模，但生態損失已無法彌補。
