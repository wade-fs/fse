incident_id: taipei_monga_fight_1853
name: 艋舺頂下郊拚
description: 1853年，艋舺爆發嚴重的泉州同鄉互鬥事件。三邑人襲擊同安人，雙方激烈交火，導致艋舺部分街區被焚毀，同安人隨後遷至大稻埕發展。
truth: 頂下郊拚是台北歷史上最嚴重的分類械鬥之一，直接改變了台北的城市空間格局，促成了大稻埕的崛起，奠定了台北雙核心的發展模式。
