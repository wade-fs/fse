incident_id: chiayi_linshuangwen_incident
name: 林爽文之役：諸羅義民
description: |
  乾隆五十一年（1786），林爽文率領天地會眾起義，佔領台灣大部分地區。
  諸羅縣城成為清朝在南台灣的重要據點，城內軍民頑強守城長達十個月。
  「嘉義」這個名字，就是乾隆皇帝為表揚守城之「義」而賜名。
  你透過古城牆、文廟、城隍廟的記憶，還原這段義民守城的歷史。
truth: |
  林爽文事件中的「義民」守城，並非如官方所呈現的純粹忠君愛國，其背後有更複雜的族群角力（閩粵矛盾）與在地利益考量。但守城的勇氣和犧牲是真實的，「嘉義」這個名字因此得來，成為台灣最早因義行得名的地方。
