incident_id: changhua_shuangwen_siege_incident
name: 林爽文起義：半線古城的攻防戰
description: |
  乾隆五十一（1786）年，林爽文率領天地會起義，攻佔彰化縣城，並以八卦山為大本營與清軍對峙。
  這場起義震動大清帝國，也徹底改變了彰化平原的社會防衛結構（隘門與城牆興建）。
  你將調查東門與無影井，還原這場歷史風暴。
truth: |
  林爽文事件直接導致清廷在戰後同意將原本的刺竹城牆改建為磚石縣城。城內居民為了自衛，在各大街區普遍建立防禦隘門與分類聯境，形成了清代彰化古城如同迷宮一般的防衛格局，影響了後續百年的都市結構。
