incident_id: mudan_reservoir_construction
name: 牡丹水庫的興建與村落變遷
description: 隨著牡丹水庫的興建，淹沒區的排灣族部落被迫集體遷徙，留下了沉入水底的故鄉回憶。
truth: 1980年代至1990年代興建的牡丹水庫解決了恆春半島的用水問題，但也使牡丹社部分舊址與耕地永沉湖底，是地方現代化發展與原住民部落權益博弈的重要縮影。
