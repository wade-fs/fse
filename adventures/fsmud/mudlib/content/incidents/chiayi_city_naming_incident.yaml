incident_id: chiayi_city_naming_incident
name: 諸羅改名嘉義：一個城市的命名政治
description: |
  乾隆五十三年（1788），為表揚諸羅縣城軍民在林爽文事件中的忠義守城，
  清高宗下詔改「諸羅」為「嘉義」，意為「嘉其義行」。
  這個名字從清代延用至今，成為台灣少數因義行而命名的城市。
  你透過縣廳舊址、城牆遺跡與地方記憶，重建這段命名的歷史。
truth: |
  「嘉義」這個名字的由來，是台灣歷史中少見的正面官方表揚，但它也遮掩了守城過程中更複雜的族群矛盾與政治現實。城市的名字是歷史的壓縮包，展開來才能看到它的全貌。
