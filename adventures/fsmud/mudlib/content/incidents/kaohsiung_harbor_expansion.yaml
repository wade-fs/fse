incident_id: kaohsiung_harbor_expansion
name: 明治末年打狗港築港工程
description: |
  日本統治時期，為將打狗港改造成現代化貿易港，總督府於明治四十一年（1908年）啟動大規模築港計畫。
  工程歷時多年，疏浚航道、興建碼頭與鐵路，徹底改變了打狗港的形貌。
  你將穿梭於新舊港口之間，還原這座現代化港口的誕生歷程。
truth: |
  打狗港築港工程是日治時期台灣最重要的基建工程之一。第一期工程完成後，打狗港正式具備了停泊大型貨輪的能力，成為南台灣的糖與稻米輸出日本的最大門戶，也奠定了日後高雄作為工業城市的基礎。
