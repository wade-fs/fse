# /data/yaml/world_states/minxiong_sugar_chain.yaml
#
# 民雄糖業世界狀態鏈 (P21)
#
# 這份 YAML 定義了「minxiong_sugar_chain」這條世界演化線。
# 每個 state 代表民雄糖業事件在不同解決進度下的世界現況。
# 玩家收集線索、完成任務、解開 Incident 後，世界會逐步從
# state_0 推進到 state_4，使場景、NPC 對話、任務都隨之改變。
#
# 狀態推進條件（unlock_condition）：
#   incident_resolved:  <incident_id>    某 Incident 結案
#   quest_completed:    <quest_id>       某 Quest 完成
#   memory_unlocked:    <memory_id>      某 Memory 解鎖
#   all_of:             [ condition, ... ] 所有條件都滿足
#
# 狀態效果（effects）：
#   site_desc_inject:   ([ site_id: 額外描述文字 ]) 注入地點描述
#   npc_spawn:          [{ npc_id, site_id }]         新增 NPC 出沒
#   npc_dismiss:        [ npc_id ]                    移除 NPC
#   npc_flag:           ([ npc_id: flag ])             設置 NPC 旗標（供 schedule override 用）
#   quest_unlock:       [ quest_id ]                  解鎖新任務
#   memory_unlock:      [ memory_id ]                 強制解鎖記憶
#   site_unlock:        [ site_id ]                   開放新地點
#   settlement_boost:   ([ dim: value ])              提升聚落維度值
#   broadcast:          公告訊息（向所有在線玩家廣播）

id: minxiong_sugar_chain
settlement: minxiong
name: "民雄糖業演化線"
description: "從糖廠事故調查，到糖鐵修復重開，再到民雄記憶重建。"

states:
  # ── 初始狀態：糖廠廢墟，記憶封存 ────────────────────────
  - id: state_0
    name: "糖廠廢墟期"
    description: "糖廠已廢棄多年，無人知曉其中秘密，民雄的糖業記憶逐漸凋零。"
    # state_0 是初始狀態，不需要 unlock_condition
    effects:
      site_desc_inject:
        sugar_factory_ruins: "廢棄的廠房靜靜佇立，廠牆上爬滿藤蔓。老工人們偶爾在此徘徊，卻閉口不談那段過往。"
      npc_flag:
        NPC_old_stationmaster_minxiong: "sugar_secret_locked"

  # ── 狀態一：調查開始，老站長鬆口 ─────────────────────────
  - id: state_1
    name: "事件調查期"
    description: "玩家開始調查糖業事件，老站長態度轉變，市場開始流傳謠言。"
    unlock_condition:
      type: memory_unlocked
      memory_id: record_extra_pos_75
    effects:
      site_desc_inject:
        minxiong_old_station: "老站長坐在月台的角落，神情有些不安。他不時望向糖廠遺址的方向，欲言又止。"
        minxiong_market: "市場的阿嬤們在低聲議論什麼，見到外人靠近便刻意壓低聲音。\"那棟老廠啊，有些事還是別去追究……\""
      npc_flag:
        NPC_old_stationmaster_minxiong: "sugar_secret_investigating"
      quest_unlock:
        - sugar_railway_repair
      broadcast: "【民雄】有人開始在糖廠遺址附近走動，老站長的神情比往日凝重許多。"

  # ── 狀態二：真相揭露，糖鐵開始修復 ──────────────────────
  - id: state_2
    name: "真相揭露期"
    description: "糖業事件真相大白，地下設施曝光，社區開始動員修復糖業鐵路。"
    unlock_condition:
      type: incident_resolved
      incident_id: minxiong_sugar_incident
    effects:
      site_desc_inject:
        sugar_factory_ruins: "廠區入口已重新開放。幾名工人正合力清理廢墟，偶爾撿到當年的鐵道零件。傳言說地下層正在進行勘查。"
        minxiong_old_station: "老站長站在月台，臉上出現了久違的神采。「如果糖鐵能重開就好了……」他若有所思地說。"
        minxiong_market: "市場裡流傳著振奮人心的消息：「有人要把糖業鐵路重新修起來了！」商販們看起來都充滿了期待。"
      npc_spawn:
        - npc_id: NPC_sugar_inspector
          site_id: sugar_factory_ruins
      npc_flag:
        NPC_old_stationmaster_minxiong: "sugar_truth_revealed"
      site_unlock:
        - minxiong_sugar_underground
      memory_unlock:
        - record_extra_pos_21
      settlement_boost:
        memory: 10
        culture: 5
      broadcast: "【民雄】糖業事件的真相終於水落石出！地下設施的秘密被揭開，民雄的歷史記憶正在重新被喚醒。"

  # ── 狀態三：糖鐵修復完成，NPC 開始搭車 ─────────────────
  - id: state_3
    name: "糖鐵重開期"
    description: "糖業鐵路修復完工，NPC 開始搭車往來，市場出現新商人，地方活絡起來。"
    unlock_condition:
      type: quest_completed
      quest_id: sugar_railway_repair
    effects:
      site_desc_inject:
        minxiong_old_station: "修復後的糖業鐵路旁，偶爾傳來輕微的鐵軌震動聲。老站長站在月台上，眼眶微紅：「終於……又能運作了。」"
        minxiong_market: "市場多了幾個新攤位。一位從甲仙來的蜂蜜商人說：「聽說糖鐵修好了，所以我來碰碰運氣。」"
        sugar_factory_ruins: "廠房已不再是廢墟。部分工作空間重新啟用，有人在研究將老設施改建成文史展示館。"
      npc_spawn:
        - npc_id: NPC_traveling_merchant
          site_id: minxiong_market
        - npc_id: NPC_sugar_inspector
          site_id: minxiong_old_station
      npc_flag:
        NPC_old_stationmaster_minxiong: "sugar_railway_restored"
        NPC_sugar_inspector: "on_restored_railway"
      quest_unlock:
        - minxiong_heritage_documentation
      settlement_boost:
        industry: 15
        trade: 10
        population: 5
      broadcast: "【民雄】糖業鐵路修復完工！老站長站在月台上，終於露出笑容。民雄因此迎來了久違的人潮與商機。"

  # ── 狀態四：民雄記憶重建，文史館開幕 ────────────────────
  - id: state_4
    name: "記憶重建期"
    description: "民雄糖業文史館正式開幕，地方記憶全面復甦，民雄蛻變為文化重鎮。"
    unlock_condition:
      type: quest_completed
      quest_id: minxiong_heritage_documentation
    effects:
      site_desc_inject:
        sugar_factory_ruins: "昔日廢墟已搖身一變，成為「民雄糖業文史館」。展示板上陳列著老照片、鐵道零件與工人口述歷史。每逢假日，都有學生前來參觀。"
        minxiong_old_station: "車站旁豎立起了一塊新解說牌，介紹糖業鐵路的百年歷史。老站長每天早上都來擦拭它，彷彿在照顧一個老朋友。"
        minxiong_market: "市場因文史館帶來的觀光人潮而更加熱鬧。有人特地從台北下來，只為了嚐一嚐民雄傳統的芋頭飯與糖蔗汁。"
      site_unlock:
        - minxiong_heritage_museum
      memory_unlock:
        - minxiong_sugar_003
      settlement_boost:
        memory: 20
        culture: 15
        cohesion: 10
        trade: 5
      npc_flag:
        NPC_old_stationmaster_minxiong: "sugar_legacy_restored"
      broadcast: "【民雄】糖業文史館正式開幕！民雄的歷史記憶從塵埃中甦醒，這座小鎮終於找回了屬於自己的故事。"
